<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 780" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <filter id="glowGreen">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
  </defs>

  <rect width="1100" height="780" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="380" y="38" text-anchor="middle" fill="#f8fafc" font-size="22" font-weight="700">Prototype Pollution — Defense Strategy</text>
  <text x="380" y="58" text-anchor="middle" fill="#94a3b8" font-size="12">プロトタイプ汚染に対する防御戦略</text>
  <rect x="310" y="66" width="140" height="20" rx="10" fill="#22c55e" opacity="0.15"/>
  <text x="380" y="80" text-anchor="middle" fill="#86efac" font-size="10" font-weight="600">Multi-Layer Defense</text>

  <!-- Attacker (dimmed) -->
  <g transform="translate(115, 280)" filter="url(#shadow)">
    <rect x="-56" y="-30" width="112" height="125" rx="12" fill="#1e1b2e" stroke="#ef4444" stroke-width="1.5" opacity="0.45"/>
    <g transform="translate(0, 10)" opacity="0.45">
      <path d="M-13,-17 Q0,-28 13,-17 L13,-4 Q0,2 -13,-4 Z" fill="none" stroke="#ef4444" stroke-width="1.8"/>
      <circle cx="-4" cy="-9" r="1.8" fill="#ef4444"/>
      <circle cx="4" cy="-9" r="1.8" fill="#ef4444"/>
      <path d="M-17,36 Q-17,14 0,10 Q17,14 17,36" fill="none" stroke="#ef4444" stroke-width="2"/>
      <line x1="-17" y1="36" x2="17" y2="36" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
    </g>
    <text x="0" y="72" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="700" opacity="0.5">攻撃者</text>
    <text x="0" y="86" text-anchor="middle" fill="#ef4444" font-size="9.5" opacity="0.35">Attacker</text>
  </g>

  <!-- Web Server (protected) -->
  <g transform="translate(400, 280)" filter="url(#shadow)">
    <rect x="-56" y="-30" width="112" height="125" rx="12" fill="#1e1b2e" stroke="#22c55e" stroke-width="1.5"/>
    <g transform="translate(0, 14)">
      <rect x="-20" y="-18" width="40" height="12" rx="3" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
      <circle cx="-12" cy="-12" r="2" fill="#3b82f6"/><circle cx="-5" cy="-12" r="2" fill="#3b82f6"/>
      <rect x="-20" y="-2" width="40" height="12" rx="3" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
      <circle cx="-12" cy="4" r="2" fill="#3b82f6"/><circle cx="-5" cy="4" r="2" fill="#3b82f6"/>
      <rect x="-20" y="14" width="40" height="12" rx="3" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
      <circle cx="-12" cy="20" r="2" fill="#3b82f6"/><circle cx="-5" cy="20" r="2" fill="#3b82f6"/>
    </g>
    <g transform="translate(42, -22)">
      <path d="M0,-9 L9,-4 L9,3 Q9,9 0,12 Q-9,9 -9,3 L-9,-4 Z" fill="#22c55e" opacity="0.2" stroke="#22c55e" stroke-width="1.2"/>
      <polyline points="-3,2 -1,5 5,-2" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    <text x="0" y="72" text-anchor="middle" fill="#86efac" font-size="13" font-weight="700">Webサーバー</text>
    <text x="0" y="86" text-anchor="middle" fill="#22c55e" font-size="9.5" opacity="0.7">Protected App</text>
  </g>

  <!-- Application State (protected) -->
  <g transform="translate(645, 280)" filter="url(#shadow)">
    <rect x="-56" y="-30" width="112" height="125" rx="12" fill="#1e1b2e" stroke="#22c55e" stroke-width="1.5"/>
    <g transform="translate(0, 8)">
      <text x="0" y="-6" text-anchor="middle" fill="#f97316" font-size="11" font-family="'Fira Code', monospace">{__proto__}</text>
      <rect x="-22" y="4" width="44" height="16" rx="3" fill="none" stroke="#f97316" stroke-width="1.2" stroke-dasharray="3,2"/>
      <text x="0" y="16" text-anchor="middle" fill="#f97316" font-size="8" font-family="'Fira Code', monospace">.prototype</text>
    </g>
    <g transform="translate(42, -22)">
      <path d="M0,-9 L9,-4 L9,3 Q9,9 0,12 Q-9,9 -9,3 L-9,-4 Z" fill="#22c55e" opacity="0.2" stroke="#22c55e" stroke-width="1.2"/>
      <polyline points="-3,2 -1,5 5,-2" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    <text x="0" y="72" text-anchor="middle" fill="#86efac" font-size="13" font-weight="700">アプリ状態</text>
    <text x="0" y="86" text-anchor="middle" fill="#22c55e" font-size="9.5" opacity="0.7">Object.freeze()</text>
  </g>

  <!-- Dimmed attack arrow -->
  <path d="M 171 270 L 290 270" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,3" opacity="0.25"/>

  <!-- Block mark -->
  <g transform="translate(310, 270)">
    <circle cx="0" cy="0" r="16" fill="#052e16" stroke="#22c55e" stroke-width="2" filter="url(#glowGreen)"/>
    <line x1="-6" y1="-6" x2="6" y2="6" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="6" y1="-6" x2="-6" y2="6" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <text x="310" y="298" text-anchor="middle" fill="#86efac" font-size="8">__proto__除外</text>

  <!-- Safe arrow: Server sanitizes input -->
  <path d="M 458 290 L 583 290" fill="none" stroke="#22c55e" stroke-width="2.2" marker-end="url(#arrowGreen)"/>
  <text x="520" y="282" text-anchor="middle" fill="#86efac" font-size="8.5">サニタイズ済みデータのみ</text>

  <!-- Safe result box -->
  <g transform="translate(400, 420)" filter="url(#shadow)">
    <rect x="-150" y="-22" width="300" height="60" rx="8" fill="#052e16" stroke="#22c55e" stroke-width="1.5"/>
    <text x="0" y="-4" text-anchor="middle" fill="#86efac" font-size="11" font-weight="700">✅ __proto__キーは除外済み</text>
    <text x="0" y="14" text-anchor="middle" fill="#22c55e" font-size="9" font-family="'Fira Code', monospace">if (key === '__proto__') continue;</text>
    <text x="0" y="30" text-anchor="middle" fill="#bbf7d0" font-size="9">Object.prototype は汚染されない — 権限チェック維持</text>
  </g>

  <!-- Defense Cards 2x2 layout -->
  <!-- Card 1: __proto__キーの除外 -->
  <g transform="translate(195, 530)" filter="url(#shadow)">
    <rect x="-125" y="-10" width="250" height="120" rx="8" fill="#052e16" stroke="#22c55e" stroke-width="1.5"/>
    <g transform="translate(-90, 30)">
      <polygon points="-11,-13 11,-13 4,2 4,10 -4,10 -4,2" fill="none" stroke="#22c55e" stroke-width="1.4" stroke-linejoin="round"/>
    </g>
    <text x="10" y="8" text-anchor="middle" fill="#86efac" font-size="12" font-weight="700">__proto__キーの除外</text>
    <text x="10" y="24" text-anchor="middle" fill="#bbf7d0" font-size="9">マージ時に危険なキーをスキップ</text>
    <line x1="-110" y1="34" x2="110" y2="34" stroke="#22c55e" stroke-width="0.5" opacity="0.4"/>
    <text x="0" y="52" text-anchor="middle" fill="#22c55e" font-size="9" font-family="'Fira Code', monospace">if (key === '__proto__')</text>
    <text x="0" y="66" text-anchor="middle" fill="#22c55e" font-size="9" font-family="'Fira Code', monospace">  continue;</text>
    <text x="0" y="82" text-anchor="middle" fill="#22c55e" font-size="9" font-family="'Fira Code', monospace">if (key === 'constructor')</text>
    <text x="0" y="96" text-anchor="middle" fill="#22c55e" font-size="9" font-family="'Fira Code', monospace">  continue;</text>
  </g>

  <!-- Card 2: Object.create(null) -->
  <g transform="translate(505, 530)" filter="url(#shadow)">
    <rect x="-125" y="-10" width="250" height="120" rx="8" fill="#052e16" stroke="#22c55e" stroke-width="1.5"/>
    <g transform="translate(-90, 30)">
      <rect x="-9" y="-2" width="18" height="14" rx="3" fill="none" stroke="#22c55e" stroke-width="1.4"/>
      <path d="M-5,-2 L-5,-7 Q-5,-12 0,-12 Q5,-12 5,-7 L5,-2" fill="none" stroke="#22c55e" stroke-width="1.4"/>
      <circle cx="0" cy="5" r="2" fill="#22c55e"/>
    </g>
    <text x="10" y="8" text-anchor="middle" fill="#86efac" font-size="12" font-weight="700">Object.create(null)</text>
    <text x="10" y="24" text-anchor="middle" fill="#bbf7d0" font-size="9">プロトタイプなしオブジェクト使用</text>
    <line x1="-110" y1="34" x2="110" y2="34" stroke="#22c55e" stroke-width="0.5" opacity="0.4"/>
    <text x="0" y="52" text-anchor="middle" fill="#22c55e" font-size="9" font-family="'Fira Code', monospace">const config =</text>
    <text x="0" y="66" text-anchor="middle" fill="#22c55e" font-size="9" font-family="'Fira Code', monospace">  Object.create(null);</text>
    <text x="0" y="82" text-anchor="middle" fill="#bbf7d0" font-size="8">__proto__が存在しないため</text>
    <text x="0" y="96" text-anchor="middle" fill="#bbf7d0" font-size="8">プロトタイプチェーンを辿れない</text>
  </g>

  <!-- Card 3: Object.freeze -->
  <g transform="translate(195, 670)" filter="url(#shadow)">
    <rect x="-125" y="-10" width="250" height="100" rx="8" fill="#052e16" stroke="#22c55e" stroke-width="1.5"/>
    <g transform="translate(-90, 26)">
      <path d="M0,-13 L12,-6 L12,3 Q12,11 0,15 Q-12,11 -12,3 L-12,-6 Z" fill="none" stroke="#22c55e" stroke-width="1.4"/>
      <polyline points="-4,1 -1,5 6,-4" fill="none" stroke="#22c55e" stroke-width="1.8" stroke-linecap="round"/>
    </g>
    <text x="10" y="8" text-anchor="middle" fill="#86efac" font-size="12" font-weight="700">Object.freeze</text>
    <text x="10" y="24" text-anchor="middle" fill="#bbf7d0" font-size="9">Object.prototypeを凍結して保護</text>
    <line x1="-110" y1="34" x2="110" y2="34" stroke="#22c55e" stroke-width="0.5" opacity="0.4"/>
    <text x="0" y="52" text-anchor="middle" fill="#22c55e" font-size="9" font-family="'Fira Code', monospace">Object.freeze(</text>
    <text x="0" y="66" text-anchor="middle" fill="#22c55e" font-size="9" font-family="'Fira Code', monospace">  Object.prototype);</text>
    <text x="0" y="80" text-anchor="middle" fill="#bbf7d0" font-size="8">変更不可にして汚染を防止</text>
  </g>

  <!-- Card 4: 安全なマージライブラリ -->
  <g transform="translate(505, 670)" filter="url(#shadow)">
    <rect x="-125" y="-10" width="250" height="100" rx="8" fill="#052e16" stroke="#22c55e" stroke-width="1.5"/>
    <g transform="translate(-90, 26)">
      <rect x="-10" y="-10" width="20" height="20" rx="4" fill="none" stroke="#22c55e" stroke-width="1.4"/>
      <line x1="-5" y1="0" x2="5" y2="0" stroke="#22c55e" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="0" y1="-5" x2="0" y2="5" stroke="#22c55e" stroke-width="1.8" stroke-linecap="round"/>
    </g>
    <text x="10" y="8" text-anchor="middle" fill="#86efac" font-size="12" font-weight="700">安全なマージライブラリ</text>
    <text x="10" y="24" text-anchor="middle" fill="#bbf7d0" font-size="9">lodash.merge等のサニタイズ済みライブラリ</text>
    <line x1="-110" y1="34" x2="110" y2="34" stroke="#22c55e" stroke-width="0.5" opacity="0.4"/>
    <text x="0" y="52" text-anchor="middle" fill="#22c55e" font-size="9" font-family="'Fira Code', monospace">import merge from</text>
    <text x="0" y="66" text-anchor="middle" fill="#22c55e" font-size="9" font-family="'Fira Code', monospace">  'lodash/merge'; // v4.6.2+</text>
    <text x="0" y="80" text-anchor="middle" fill="#bbf7d0" font-size="8">修正済みバージョンを使用</text>
  </g>

  <!-- Defense Sidebar -->
  <g transform="translate(785, 100)">
    <rect x="0" y="0" width="295" height="340" rx="10" fill="#0f172a" stroke="#22c55e" stroke-width="1"/>
    <text x="148" y="28" text-anchor="middle" fill="#86efac" font-size="14" font-weight="700">防御レイヤー一覧</text>
    <line x1="14" y1="42" x2="281" y2="42" stroke="#22c55e" stroke-width="0.5" opacity="0.5"/>

    <g transform="translate(18, 64)">
      <rect x="0" y="-8" width="18" height="18" rx="4" fill="#22c55e" opacity="0.15"/>
      <text x="9" y="6" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="700">1</text>
      <text x="28" y="2" fill="#f8fafc" font-size="11" font-weight="600">__proto__キーの除外</text>
      <text x="28" y="18" fill="#94a3b8" font-size="9">マージ処理で __proto__,</text>
      <text x="28" y="31" fill="#94a3b8" font-size="9">constructor をスキップ (根本対策)</text>
    </g>

    <g transform="translate(18, 130)">
      <rect x="0" y="-8" width="18" height="18" rx="4" fill="#22c55e" opacity="0.15"/>
      <text x="9" y="6" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="700">2</text>
      <text x="28" y="2" fill="#f8fafc" font-size="11" font-weight="600">Object.create(null)</text>
      <text x="28" y="18" fill="#94a3b8" font-size="9">プロトタイプなしオブジェクトを</text>
      <text x="28" y="31" fill="#94a3b8" font-size="9">使用し、チェーンを断ち切る</text>
    </g>

    <g transform="translate(18, 196)">
      <rect x="0" y="-8" width="18" height="18" rx="4" fill="#22c55e" opacity="0.15"/>
      <text x="9" y="6" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="700">3</text>
      <text x="28" y="2" fill="#f8fafc" font-size="11" font-weight="600">Object.freeze()</text>
      <text x="28" y="18" fill="#94a3b8" font-size="9">Object.prototype を凍結し</text>
      <text x="28" y="31" fill="#94a3b8" font-size="9">プロパティ追加を不可にする</text>
    </g>

    <g transform="translate(18, 262)">
      <rect x="0" y="-8" width="18" height="18" rx="4" fill="#22c55e" opacity="0.15"/>
      <text x="9" y="6" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="700">4</text>
      <text x="28" y="2" fill="#f8fafc" font-size="11" font-weight="600">安全なライブラリ使用</text>
      <text x="28" y="18" fill="#94a3b8" font-size="9">lodash v4.6.2+ 等の修正済み</text>
      <text x="28" y="31" fill="#94a3b8" font-size="9">マージライブラリを使用</text>
    </g>

    <line x1="14" y1="306" x2="281" y2="306" stroke="#22c55e" stroke-width="0.5" opacity="0.5"/>
    <text x="148" y="328" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="600">🔒 多層防御 (Defense in Depth)</text>
  </g>

  <!-- Legend -->
  <g transform="translate(30, 730)">
    <rect x="0" y="0" width="360" height="36" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <line x1="14" y1="18" x2="44" y2="18" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,3" opacity="0.3"/>
    <text x="52" y="22" fill="#fca5a5" font-size="9" opacity="0.6">遮断された攻撃</text>
    <g transform="translate(172, 18)">
      <circle cx="0" cy="0" r="8" fill="#052e16" stroke="#22c55e" stroke-width="1.2"/>
      <line x1="-3" y1="-3" x2="3" y2="3" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="3" y1="-3" x2="-3" y2="3" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    <text x="188" y="22" fill="#86efac" font-size="9">ブロックポイント</text>
    <rect x="282" y="10" width="16" height="16" rx="3" fill="#052e16" stroke="#22c55e" stroke-width="1"/>
    <text x="304" y="22" fill="#86efac" font-size="9">防御機構</text>
  </g>
</svg>