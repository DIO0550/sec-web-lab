<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 780" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <filter id="glowGreen">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="780" fill="url(#bgGrad)" rx="12"/>

  <!-- ===== Title ===== -->
  <text x="380" y="38" text-anchor="middle" fill="#f8fafc" font-size="22" font-weight="700">postMessage &#8212; Defense Strategy</text>
  <text x="380" y="58" text-anchor="middle" fill="#94a3b8" font-size="12">postMessage&#33030;&#24369;&#24615;&#12395;&#23550;&#12377;&#12427;&#22810;&#23652;&#38450;&#24481;</text>
  <rect x="310" y="66" width="140" height="20" rx="10" fill="#22c55e" opacity="0.15"/>
  <text x="380" y="80" text-anchor="middle" fill="#86efac" font-size="10" font-weight="600">Multi-Layer Defense</text>

  <!-- ====================================================== -->
  <!--  ACTORS                                                 -->
  <!-- ====================================================== -->

  <!-- Attacker (dimmed) -->
  <g transform="translate(115, 280)" filter="url(#shadow)">
    <rect x="-56" y="-30" width="112" height="125" rx="12" fill="#1e1b2e" stroke="#ef4444" stroke-width="1.5" opacity="0.45"/>
    <g transform="translate(0, 10)" opacity="0.45">
      <path d="M-13,-17 Q0,-28 13,-17 L13,-4 Q0,2 -13,-4 Z" fill="none" stroke="#ef4444" stroke-width="1.8"/>
      <circle cx="-4" cy="-9" r="1.8" fill="#ef4444"/>
      <circle cx="4" cy="-9" r="1.8" fill="#ef4444"/>
      <path d="M-17,36 Q-17,14 0,10 Q17,14 17,36" fill="none" stroke="#ef4444" stroke-width="2"/>
      <line x1="-17" y1="36" x2="17" y2="36" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
    </g>
    <text x="0" y="72" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="700" opacity="0.5">&#25915;&#25731;&#32773;</text>
    <text x="0" y="86" text-anchor="middle" fill="#ef4444" font-size="9.5" opacity="0.35">Attacker</text>
  </g>

  <!-- Victim Browser (protected) -->
  <g transform="translate(380, 280)" filter="url(#shadow)">
    <rect x="-56" y="-30" width="112" height="125" rx="12" fill="#1e1b2e" stroke="#22c55e" stroke-width="1.5"/>
    <g transform="translate(0, 10)">
      <circle cx="0" cy="-9" r="13" fill="none" stroke="#a855f7" stroke-width="1.8"/>
      <circle cx="-4" cy="-11" r="1.5" fill="#a855f7"/>
      <circle cx="4" cy="-11" r="1.5" fill="#a855f7"/>
      <path d="M-4,-4 Q0,1 4,-4" fill="none" stroke="#a855f7" stroke-width="1.3" stroke-linecap="round"/>
      <path d="M-17,36 Q-17,14 0,10 Q17,14 17,36" fill="none" stroke="#a855f7" stroke-width="2"/>
      <line x1="-17" y1="36" x2="17" y2="36" stroke="#a855f7" stroke-width="2" stroke-linecap="round"/>
    </g>
    <g transform="translate(42, -22)">
      <path d="M0,-9 L9,-4 L9,3 Q9,9 0,12 Q-9,9 -9,3 L-9,-4 Z" fill="#22c55e" opacity="0.2" stroke="#22c55e" stroke-width="1.2"/>
      <polyline points="-3,2 -1,5 5,-2" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    <text x="0" y="72" text-anchor="middle" fill="#86efac" font-size="13" font-weight="700">&#34987;&#23475;&#32773;&#12502;&#12521;&#12454;&#12470;</text>
    <text x="0" y="86" text-anchor="middle" fill="#22c55e" font-size="9.5" opacity="0.7">Protected</text>
  </g>

  <!-- Target App (protected) -->
  <g transform="translate(645, 280)" filter="url(#shadow)">
    <rect x="-56" y="-30" width="112" height="125" rx="12" fill="#1e1b2e" stroke="#22c55e" stroke-width="1.5"/>
    <g transform="translate(0, 14)">
      <rect x="-20" y="-18" width="40" height="12" rx="3" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
      <circle cx="-12" cy="-12" r="2" fill="#3b82f6"/><circle cx="-5" cy="-12" r="2" fill="#3b82f6"/>
      <rect x="-20" y="-2" width="40" height="12" rx="3" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
      <circle cx="-12" cy="4" r="2" fill="#3b82f6"/><circle cx="-5" cy="4" r="2" fill="#3b82f6"/>
      <rect x="-20" y="14" width="40" height="12" rx="3" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
      <circle cx="-12" cy="20" r="2" fill="#3b82f6"/><circle cx="-5" cy="20" r="2" fill="#3b82f6"/>
    </g>
    <g transform="translate(42, -22)">
      <path d="M0,-9 L9,-4 L9,3 Q9,9 0,12 Q-9,9 -9,3 L-9,-4 Z" fill="#22c55e" opacity="0.2" stroke="#22c55e" stroke-width="1.2"/>
      <polyline points="-3,2 -1,5 5,-2" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    <text x="0" y="72" text-anchor="middle" fill="#86efac" font-size="13" font-weight="700">&#27491;&#35215;&#12450;&#12503;&#12522;</text>
    <text x="0" y="86" text-anchor="middle" fill="#22c55e" font-size="9.5" opacity="0.7">Protected App</text>
  </g>

  <!-- ====================================================== -->
  <!--  BLOCKED ARROWS                                         -->
  <!-- ====================================================== -->

  <!-- Dimmed attack: Attacker → Victim -->
  <path d="M 171 270 L 300 270" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,3" opacity="0.2"/>

  <!-- Block mark: postMessage blocked by origin check -->
  <g transform="translate(310, 270)">
    <circle cx="0" cy="0" r="16" fill="#052e16" stroke="#22c55e" stroke-width="2" filter="url(#glowGreen)"/>
    <line x1="-6" y1="-6" x2="6" y2="6" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="6" y1="-6" x2="-6" y2="6" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <text x="310" y="298" text-anchor="middle" fill="#86efac" font-size="8">origin&#26908;&#35388;&#12391;&#25298;&#21542;</text>

  <!-- Dimmed attack: Attacker → Target (lower) -->
  <path d="M 171 300 Q 260 360 310 300" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,3" opacity="0.15"/>

  <!-- Dimmed data leak path -->
  <path d="M 580 500 C 520 680, 200 680, 115 380" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,3" opacity="0.15"/>
  <g transform="translate(340, 670)">
    <circle cx="0" cy="0" r="16" fill="#052e16" stroke="#22c55e" stroke-width="2" filter="url(#glowGreen)"/>
    <line x1="-6" y1="-6" x2="6" y2="6" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="6" y1="-6" x2="-6" y2="6" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Safe arrow: Trusted communication -->
  <path d="M 436 280 L 583 280" fill="none" stroke="#22c55e" stroke-width="2.2" marker-end="url(#arrowGreen)"/>
  <text x="510" y="272" text-anchor="middle" fill="#86efac" font-size="8.5">&#26908;&#35388;&#28168;&#12415;&#12513;&#12483;&#12475;&#12540;&#12472;&#12398;&#12415;</text>

  <!-- ====================================================== -->
  <!--  DEFENSE CARDS (2x2 grid, 250x120px)                    -->
  <!-- ====================================================== -->

  <!-- Defense 1: origin&#26908;&#35388; (top-left) -->
  <g transform="translate(255, 440)" filter="url(#shadow)">
    <rect x="-125" y="-20" width="250" height="120" rx="8" fill="#052e16" stroke="#22c55e" stroke-width="1.5"/>
    <g transform="translate(-88, 16)">
      <path d="M0,-13 L12,-6 L12,3 Q12,11 0,15 Q-12,11 -12,3 L-12,-6 Z" fill="none" stroke="#22c55e" stroke-width="1.4"/>
      <polyline points="-4,1 -1,5 6,-4" fill="none" stroke="#22c55e" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="12" y="-3" text-anchor="middle" fill="#86efac" font-size="12" font-weight="700">origin&#26908;&#35388;</text>
    <text x="12" y="13" text-anchor="middle" fill="#bbf7d0" font-size="9">&#20449;&#38972;&#12391;&#12365;&#12427;origin&#20197;&#22806;&#12434;&#25298;&#21542;</text>
    <line x1="-110" y1="24" x2="110" y2="24" stroke="#22c55e" stroke-width="0.5" opacity="0.4"/>
    <text x="0" y="42" text-anchor="middle" fill="#22c55e" font-size="9" font-family="'Fira Code', monospace">if (e.origin !==</text>
    <text x="0" y="56" text-anchor="middle" fill="#22c55e" font-size="9" font-family="'Fira Code', monospace">  'https://trusted.com') return</text>
    <line x1="-110" y1="66" x2="110" y2="66" stroke="#22c55e" stroke-width="0.5" opacity="0.3"/>
    <text x="0" y="84" text-anchor="middle" fill="#4ade80" font-size="8">&#26681;&#26412;&#23550;&#31574;: &#19981;&#27491;&#12394;origin&#12363;&#12425;&#12398;&#12513;&#12483;&#12475;&#12540;&#12472;&#12434;&#28961;&#35222;</text>
  </g>

  <!-- Defense 2: targetOrigin&#25351;&#23450; (top-right) -->
  <g transform="translate(535, 440)" filter="url(#shadow)">
    <rect x="-125" y="-20" width="250" height="120" rx="8" fill="#052e16" stroke="#22c55e" stroke-width="1.5"/>
    <g transform="translate(-88, 16)">
      <rect x="-9" y="-2" width="18" height="14" rx="3" fill="none" stroke="#22c55e" stroke-width="1.4"/>
      <path d="M-5,-2 L-5,-7 Q-5,-12 0,-12 Q5,-12 5,-7 L5,-2" fill="none" stroke="#22c55e" stroke-width="1.4"/>
      <circle cx="0" cy="5" r="2" fill="#22c55e"/>
    </g>
    <text x="12" y="-3" text-anchor="middle" fill="#86efac" font-size="12" font-weight="700">targetOrigin&#25351;&#23450;</text>
    <text x="12" y="13" text-anchor="middle" fill="#bbf7d0" font-size="9">&#36865;&#20449;&#20808;&#12434;&#26126;&#31034;&#30340;&#12395;&#25351;&#23450;</text>
    <line x1="-110" y1="24" x2="110" y2="24" stroke="#22c55e" stroke-width="0.5" opacity="0.4"/>
    <text x="0" y="42" text-anchor="middle" fill="#22c55e" font-size="9" font-family="'Fira Code', monospace">postMessage(data,</text>
    <text x="0" y="56" text-anchor="middle" fill="#22c55e" font-size="9" font-family="'Fira Code', monospace">  'https://app.com')</text>
    <line x1="-110" y1="66" x2="110" y2="66" stroke="#22c55e" stroke-width="0.5" opacity="0.3"/>
    <text x="0" y="84" text-anchor="middle" fill="#4ade80" font-size="8">'*'&#12434;&#20351;&#12431;&#12378;&#23550;&#35937;origin&#12434;&#38480;&#23450;</text>
  </g>

  <!-- Defense 3: &#12513;&#12483;&#12475;&#12540;&#12472;&#12398;&#12496;&#12522;&#12487;&#12540;&#12471;&#12519;&#12531; (bottom-left) -->
  <g transform="translate(255, 590)" filter="url(#shadow)">
    <rect x="-125" y="-20" width="250" height="120" rx="8" fill="#052e16" stroke="#22c55e" stroke-width="1.5"/>
    <g transform="translate(-88, 14)">
      <rect x="-9" y="-8" width="18" height="16" rx="2" fill="none" stroke="#22c55e" stroke-width="1.2"/>
      <polyline points="-4,-2 -2,2 4,-4" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    <text x="12" y="-3" text-anchor="middle" fill="#86efac" font-size="12" font-weight="700">&#12513;&#12483;&#12475;&#12540;&#12472;&#12398;&#12496;&#12522;&#12487;&#12540;&#12471;&#12519;&#12531;</text>
    <text x="12" y="13" text-anchor="middle" fill="#bbf7d0" font-size="9">&#21463;&#20449;&#12487;&#12540;&#12479;&#12398;&#27083;&#36896;&#12434;&#26908;&#35388;</text>
    <line x1="-110" y1="24" x2="110" y2="24" stroke="#22c55e" stroke-width="0.5" opacity="0.4"/>
    <text x="0" y="42" text-anchor="middle" fill="#22c55e" font-size="9" font-family="'Fira Code', monospace">if (!isValidSchema(e.data))</text>
    <text x="0" y="56" text-anchor="middle" fill="#22c55e" font-size="9" font-family="'Fira Code', monospace">  return</text>
    <line x1="-110" y1="66" x2="110" y2="66" stroke="#22c55e" stroke-width="0.5" opacity="0.3"/>
    <text x="0" y="84" text-anchor="middle" fill="#4ade80" font-size="8">&#26399;&#24453;&#12375;&#12394;&#12356;&#12487;&#12540;&#12479;&#24418;&#24335;&#12434;&#25298;&#21542;&#12377;&#12427;</text>
  </g>

  <!-- Defense 4: sandbox&#23646;&#24615; (bottom-right) -->
  <g transform="translate(535, 590)" filter="url(#shadow)">
    <rect x="-125" y="-20" width="250" height="120" rx="8" fill="#052e16" stroke="#22c55e" stroke-width="1.5"/>
    <g transform="translate(-88, 14)">
      <rect x="-10" y="-7" width="20" height="14" rx="3" fill="none" stroke="#22c55e" stroke-width="1.2"/>
      <line x1="-10" y1="0" x2="10" y2="0" stroke="#22c55e" stroke-width="1.0"/>
      <line x1="0" y1="-7" x2="0" y2="7" stroke="#22c55e" stroke-width="1.0"/>
