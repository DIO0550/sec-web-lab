    <text x="0" y="86" text-anchor="middle" fill="#3b82f6" font-size="9.5" opacity="0.7">Target App</text>
  </g>

  <!-- ====================================================== -->
  <!--  ARROWS                                                 -->
  <!-- ====================================================== -->

  <!-- Step 1: Attacker embeds target in iframe -->
  <path d="M 171 240 L 322 240" fill="none" stroke="#ef4444" stroke-width="2.2" stroke-dasharray="8,4" marker-end="url(#arrowRed)"/>
  <circle cx="246" cy="218" r="16" fill="#ef4444"/>
  <text x="246" y="223" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">1</text>

  <!-- Step 2: Sends malicious postMessage (attacker → victim iframe) -->
  <path d="M 170 275 Q 260 335 324 275" fill="none" stroke="#ef4444" stroke-width="2.2" stroke-dasharray="8,4" marker-end="url(#arrowRed)"/>
  <circle cx="248" cy="325" r="16" fill="#ef4444"/>
  <text x="248" y="330" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">2</text>

  <!-- Step 3: Target receives without origin check (victim → target app) -->
  <path d="M 436 250 L 587 250" fill="none" stroke="#a855f7" stroke-width="2.2" marker-end="url(#arrowPurple)"/>
  <circle cx="514" cy="228" r="16" fill="#a855f7"/>
  <text x="514" y="233" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">3</text>

  <!-- Step 4: Malicious action executed (DOM manipulation) -->
  <path d="M 645 345 L 645 410" fill="none" stroke="#3b82f6" stroke-width="2.2" stroke-dasharray="6,3" marker-end="url(#arrowBlue)"/>
  <circle cx="669" cy="378" r="16" fill="#3b82f6"/>
  <text x="669" y="383" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">4</text>

  <!-- Step 5: Data/session leaked back to attacker (curve below) -->
  <path d="M 580 480 C 520 620, 200 620, 115 345" fill="none" stroke="#ef4444" stroke-width="2.2" stroke-dasharray="8,4" marker-end="url(#arrowRed)"/>
  <circle cx="330" cy="610" r="16" fill="#ef4444"/>
  <text x="330" y="615" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">5</text>

  <!-- ===== Vulnerability callout ===== -->
  <g transform="translate(380, 420)" filter="url(#shadow)">
    <rect x="-155" y="-18" width="310" height="62" rx="8" fill="#451a03" stroke="#f97316" stroke-width="1"/>
    <text x="0" y="-1" text-anchor="middle" fill="#fdba74" font-size="11" font-weight="700">&#9888; origin&#26410;&#26908;&#35388;&#12398;&#12513;&#12483;&#12475;&#12540;&#12472;&#12495;&#12531;&#12489;&#12521;</text>
    <text x="0" y="16" text-anchor="middle" fill="#fb923c" font-size="9" font-family="'Fira Code', monospace">addEventListener('message', (e) =&gt; {</text>
    <text x="0" y="28" text-anchor="middle" fill="#fb923c" font-size="9" font-family="'Fira Code', monospace">  /* no origin check */ eval(e.data) })</text>
    <text x="0" y="40" text-anchor="middle" fill="#fed7aa" font-size="8.5">&#20219;&#24847;&#12398;origin&#12363;&#12425;&#12398;&#12513;&#12483;&#12475;&#12540;&#12472;&#12434;&#28961;&#26465;&#20214;&#12395;&#23455;&#34892;</text>
  </g>

  <!-- ===== Malicious code callout ===== -->
  <g transform="translate(380, 530)">
    <rect x="-195" y="-14" width="390" height="28" rx="5" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="0" y="4" text-anchor="middle" fill="#94a3b8" font-size="9.5" font-family="'Fira Code', monospace">
      <tspan fill="#ef4444">targetWindow</tspan><tspan fill="#93c5fd">.postMessage(</tspan><tspan fill="#fca5a5">payload</tspan><tspan fill="#93c5fd">, </tspan><tspan fill="#ef4444" font-weight="700">'*'</tspan><tspan fill="#93c5fd">)</tspan>
    </text>
  </g>

  <!-- Server action box (DOM manipulation) -->
