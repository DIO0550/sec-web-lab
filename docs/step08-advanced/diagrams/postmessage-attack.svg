    <text x="56" y="232" fill="#f8fafc" font-size="11.5" font-weight="600">&#24746;&#24847;&#12354;&#12427;&#12467;&#12540;&#12489;&#23455;&#34892;</text>
    <text x="56" y="248" fill="#94a3b8" font-size="9.5">eval(e.data)&#12391;DOM&#25805;&#20316;&#12420;</text>
    <text x="56" y="261" fill="#94a3b8" font-size="9.5">&#12473;&#12463;&#12522;&#12503;&#12488;&#12364;&#23455;&#34892;&#12373;&#12428;&#12427;</text>

    <!-- Step 5 -->
    <circle cx="34" cy="292" r="13" fill="#ef4444"/>
    <text x="34" y="297" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">5</text>
    <text x="56" y="288" fill="#f8fafc" font-size="11.5" font-weight="600">&#12487;&#12540;&#12479;/&#12475;&#12483;&#12471;&#12519;&#12531;&#28431;&#27945;</text>
    <text x="56" y="304" fill="#94a3b8" font-size="9.5">&#31428;&#21462;&#12375;&#12383;&#12487;&#12540;&#12479;&#12420;&#12475;&#12483;&#12471;&#12519;&#12531;&#12434;</text>
    <text x="56" y="317" fill="#94a3b8" font-size="9.5">&#25915;&#25731;&#32773;&#12398;&#12469;&#12540;&#12496;&#12540;&#12408;&#36865;&#20449;</text>
  </g>

  <!-- ====================================================== -->
