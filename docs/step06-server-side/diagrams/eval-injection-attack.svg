      <text x="0" y="2" text-anchor="middle" fill="#ef4444" font-size="5.5" font-family="'Fira Code', monospace">$</text>
    </g>
    <text x="10" y="16" text-anchor="middle" fill="#f8fafc" font-size="11" font-weight="600">リモートコード実行</text>
    <text x="10" y="30" text-anchor="middle" fill="#94a3b8" font-size="8.5">child_processでOSコマンド実行</text>
  </g>

  <!-- ===== Legend ===== -->
  <g transform="translate(775, 485)">
    <rect x="0" y="0" width="305" height="68" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
