    <text x="0" y="18" text-anchor="middle" fill="#94a3b8" font-size="8.5" font-family="'Fira Code', monospace">
      <tspan fill="#ef4444">require('fs').readFileSync('/etc/shadow','utf8')</tspan>
    </text>
    <text x="0" y="30" text-anchor="middle" fill="#fca5a5" font-size="7.5">eval() により Node.js の全APIにアクセス可能</text>
  </g>

  <!-- ====================================================== -->
  <!--  STEP LIST (right sidebar)                              -->
  <!-- ====================================================== -->
  <g transform="translate(775, 100)">
    <rect x="0" y="0" width="305" height="360" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="152" y="28" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="700">攻撃ステップ詳細</text>
    <line x1="16" y1="40" x2="289" y2="40" stroke="#334155" stroke-width="1"/>

    <!-- Step 1 -->
    <circle cx="34" cy="68" r="13" fill="#ef4444"/>
    <text x="34" y="73" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">1</text>
    <text x="56" y="64" fill="#f8fafc" font-size="11.5" font-weight="600">悪意ある式の送信</text>
    <text x="56" y="80" fill="#94a3b8" font-size="9.5">計算APIのexprパラメータに</text>
    <text x="56" y="93" fill="#94a3b8" font-size="9.5">process.env.SECRET を送信</text>

    <!-- Step 2 -->
    <circle cx="34" cy="124" r="13" fill="#3b82f6"/>
    <text x="34" y="129" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">2</text>
    <text x="56" y="120" fill="#f8fafc" font-size="11.5" font-weight="600">eval()への入力値渡し</text>
    <text x="56" y="136" fill="#94a3b8" font-size="9.5">サーバーが入力値をそのまま</text>
    <text x="56" y="149" fill="#94a3b8" font-size="9.5">eval()の引数に渡す（脆弱なコード）</text>

    <!-- Step 3 -->
    <circle cx="34" cy="180" r="13" fill="#f97316"/>
    <text x="34" y="185" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">3</text>
    <text x="56" y="176" fill="#f8fafc" font-size="11.5" font-weight="600">任意コードの実行</text>
    <text x="56" y="192" fill="#94a3b8" font-size="9.5">eval()がJavaScriptとして解釈・</text>
    <text x="56" y="205" fill="#94a3b8" font-size="9.5">実行し、環境変数を読み取る</text>

    <!-- Step 4 -->
    <circle cx="34" cy="236" r="13" fill="#f97316"/>
    <text x="34" y="241" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">4</text>
    <text x="56" y="232" fill="#f8fafc" font-size="11.5" font-weight="600">実行結果の返却</text>
    <text x="56" y="248" fill="#94a3b8" font-size="9.5">eval()の戻り値がサーバーに返り、</text>
    <text x="56" y="261" fill="#94a3b8" font-size="9.5">レスポンスボディとして構成される</text>

    <!-- Step 5 -->
    <circle cx="34" cy="292" r="13" fill="#3b82f6"/>
    <text x="34" y="297" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">5</text>
    <text x="56" y="288" fill="#f8fafc" font-size="11.5" font-weight="600">RCE達成・機密情報取得</text>
    <text x="56" y="304" fill="#94a3b8" font-size="9.5">攻撃者が環境変数やファイル内容を</text>
    <text x="56" y="317" fill="#94a3b8" font-size="9.5">取得し、さらなる攻撃に利用</text>

    <!-- Key insight -->
    <line x1="16" y1="336" x2="289" y2="336" stroke="#334155" stroke-width="1"/>
    <text x="152" y="352" text-anchor="middle" fill="#ef4444" font-size="10" font-weight="600">任意のNode.jsコードが実行可能 (RCE)</text>
  </g>

  <!-- ====================================================== -->
  <!--  ATTACK TECHNIQUE CARDS (bottom)                        -->
  <!-- ====================================================== -->
  <line x1="30" y1="660" x2="1070" y2="660" stroke="#334155" stroke-width="1"/>
  <text x="550" y="685" text-anchor="middle" fill="#fca5a5" font-size="14" font-weight="700">使用される攻撃テクニック</text>

  <!-- Card: eval()実行 -->
  <g transform="translate(165, 698)" filter="url(#shadow)">
    <rect x="-120" y="0" width="240" height="38" rx="8" fill="#1e1b2e" stroke="#ef4444" stroke-width="1"/>
    <rect x="-108" y="6" width="28" height="26" rx="5" fill="#ef4444" opacity="0.1"/>
    <text x="-94" y="24" text-anchor="middle" fill="#ef4444" font-size="10" font-family="'Fira Code', monospace" font-weight="700">{ }</text>
    <text x="10" y="16" text-anchor="middle" fill="#f8fafc" font-size="11" font-weight="600">eval()実行</text>
    <text x="10" y="30" text-anchor="middle" fill="#94a3b8" font-size="8.5">任意のJS式をサーバーで実行</text>
  </g>

  <!-- Card: 環境変数窃取 -->
  <g transform="translate(465, 698)" filter="url(#shadow)">
    <rect x="-120" y="0" width="240" height="38" rx="8" fill="#1e1b2e" stroke="#ef4444" stroke-width="1"/>
    <rect x="-108" y="6" width="28" height="26" rx="5" fill="#ef4444" opacity="0.1"/>
    <g transform="translate(-94, 19)">
      <rect x="-8" y="-8" width="16" height="16" rx="2" fill="none" stroke="#ef4444" stroke-width="1.2"/>
      <text x="0" y="4" text-anchor="middle" fill="#ef4444" font-size="7" font-weight="700">ENV</text>
    </g>
    <text x="10" y="16" text-anchor="middle" fill="#f8fafc" font-size="11" font-weight="600">環境変数窃取</text>
    <text x="10" y="30" text-anchor="middle" fill="#94a3b8" font-size="8.5">process.envからAPIキー等を取得</text>
  </g>

  <!-- Card: リモートコード実行 -->
  <g transform="translate(765, 698)" filter="url(#shadow)">
    <rect x="-120" y="0" width="240" height="38" rx="8" fill="#1e1b2e" stroke="#ef4444" stroke-width="1"/>
    <rect x="-108" y="6" width="28" height="26" rx="5" fill="#ef4444" opacity="0.1"/>
    <g transform="translate(-94, 19)">
