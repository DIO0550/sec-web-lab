<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 780" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <filter id="glowGreen">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a855f7"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="780" fill="url(#bgGrad)" rx="12"/>

  <!-- ===== Title ===== -->
  <text x="380" y="38" text-anchor="middle" fill="#f8fafc" font-size="22" font-weight="700">Security Headers &#8212; Defense Strategy</text>
  <text x="380" y="58" text-anchor="middle" fill="#94a3b8" font-size="12">&#12475;&#12461;&#12517;&#12522;&#12486;&#12451;&#12504;&#12483;&#12480;&#12540;&#19981;&#20633;&#12395;&#23550;&#12377;&#12427;&#22810;&#23652;&#38450;&#24481;</text>
  <rect x="310" y="66" width="140" height="20" rx="10" fill="#22c55e" opacity="0.15"/>
  <text x="380" y="80" text-anchor="middle" fill="#86efac" font-size="10" font-weight="600">Multi-Layer Defense</text>

  <!-- ====================================================== -->
  <!--  ACTORS                                                 -->
  <!-- ====================================================== -->

  <!-- Attacker (dimmed) -->
  <g transform="translate(115, 280)" filter="url(#shadow)">
    <rect x="-56" y="-30" width="112" height="125" rx="12" fill="#1e1b2e" stroke="#ef4444" stroke-width="1.5" opacity="0.45"/>
    <g transform="translate(0, 10)" opacity="0.45">
      <path d="M-13,-17 Q0,-28 13,-17 L13,-4 Q0,2 -13,-4 Z" fill="none" stroke="#ef4444" stroke-width="1.8"/>
      <circle cx="-4" cy="-9" r="1.8" fill="#ef4444"/>
      <circle cx="4" cy="-9" r="1.8" fill="#ef4444"/>
      <path d="M-17,36 Q-17,14 0,10 Q17,14 17,36" fill="none" stroke="#ef4444" stroke-width="2"/>
      <line x1="-17" y1="36" x2="17" y2="36" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
    </g>
    <text x="0" y="72" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="700" opacity="0.5">&#25915;&#25731;&#32773;</text>
    <text x="0" y="86" text-anchor="middle" fill="#ef4444" font-size="9.5" opacity="0.35">Attacker</text>
  </g>

  <!-- Victim (protected) -->
  <g transform="translate(380, 280)" filter="url(#shadow)">
    <rect x="-56" y="-30" width="112" height="125" rx="12" fill="#1e1b2e" stroke="#22c55e" stroke-width="1.5"/>
    <g transform="translate(0, 10)">
      <circle cx="0" cy="-9" r="13" fill="none" stroke="#a855f7" stroke-width="1.8"/>
      <circle cx="-4" cy="-11" r="1.5" fill="#a855f7"/>
      <circle cx="4" cy="-11" r="1.5" fill="#a855f7"/>
      <path d="M-4,-4 Q0,1 4,-4" fill="none" stroke="#a855f7" stroke-width="1.3" stroke-linecap="round"/>
      <path d="M-17,36 Q-17,14 0,10 Q17,14 17,36" fill="none" stroke="#a855f7" stroke-width="2"/>
      <line x1="-17" y1="36" x2="17" y2="36" stroke="#a855f7" stroke-width="2" stroke-linecap="round"/>
    </g>
    <g transform="translate(42, -22)">
      <path d="M0,-9 L9,-4 L9,3 Q9,9 0,12 Q-9,9 -9,3 L-9,-4 Z" fill="#22c55e" opacity="0.2" stroke="#22c55e" stroke-width="1.2"/>
      <polyline points="-3,2 -1,5 5,-2" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    <text x="0" y="72" text-anchor="middle" fill="#86efac" font-size="13" font-weight="700">&#34987;&#23475;&#32773;</text>
    <text x="0" y="86" text-anchor="middle" fill="#22c55e" font-size="9.5" opacity="0.7">Protected</text>
  </g>

  <!-- Web Server (protected) -->
  <g transform="translate(645, 280)" filter="url(#shadow)">
    <rect x="-56" y="-30" width="112" height="125" rx="12" fill="#1e1b2e" stroke="#22c55e" stroke-width="1.5"/>
    <g transform="translate(0, 14)">
      <rect x="-20" y="-18" width="40" height="12" rx="3" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
      <circle cx="-12" cy="-12" r="2" fill="#3b82f6"/><circle cx="-5" cy="-12" r="2" fill="#3b82f6"/>
      <rect x="-20" y="-2" width="40" height="12" rx="3" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
      <circle cx="-12" cy="4" r="2" fill="#3b82f6"/><circle cx="-5" cy="4" r="2" fill="#3b82f6"/>
      <rect x="-20" y="14" width="40" height="12" rx="3" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
      <circle cx="-12" cy="20" r="2" fill="#3b82f6"/><circle cx="-5" cy="20" r="2" fill="#3b82f6"/>
    </g>
    <g transform="translate(42, -22)">
      <path d="M0,-9 L9,-4 L9,3 Q9,9 0,12 Q-9,9 -9,3 L-9,-4 Z" fill="#22c55e" opacity="0.2" stroke="#22c55e" stroke-width="1.2"/>
      <polyline points="-3,2 -1,5 5,-2" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    <text x="0" y="72" text-anchor="middle" fill="#86efac" font-size="13" font-weight="700">Web&#12469;&#12540;&#12496;&#12540;</text>
    <text x="0" y="86" text-anchor="middle" fill="#22c55e" font-size="9.5" opacity="0.7">Protected Server</text>
  </g>

  <!-- ====================================================== -->
  <!--  BLOCKED ARROWS                                         -->
  <!-- ====================================================== -->

  <!-- Attacker → Victim (dimmed, blocked) -->
  <path d="M 170 250 Q 250 155 324 250" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="8,4" marker-end="url(#arrowRed)" opacity="0.25"/>

  <!-- Attacker iframe attempt BLOCKED -->
  <path d="M 170 300 L 280 300" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,3" opacity="0.25"/>
  <g transform="translate(296, 300)">
    <circle cx="0" cy="0" r="16" fill="#052e16" stroke="#22c55e" stroke-width="2" filter="url(#glowGreen)"/>
    <line x1="-6" y1="-6" x2="6" y2="6" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="6" y1="-6" x2="-6" y2="6" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- HTTPS downgrade attempt BLOCKED -->
  <path d="M 170 340 Q 280 420 380 375" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,3" opacity="0.15"/>
  <g transform="translate(290, 395)">
    <circle cx="0" cy="0" r="16" fill="#052e16" stroke="#22c55e" stroke-width="2" filter="url(#glowGreen)"/>
    <line x1="-6" y1="-6" x2="6" y2="6" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="6" y1="-6" x2="-6" y2="6" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- ====================================================== -->
  <!--  DEFENSE CARDS (2x2 grid, 250x120px)                    -->
  <!-- ====================================================== -->

  <!-- Defense Card 1: X-Frame-Options (top-left) -->
  <g transform="translate(265, 440)" filter="url(#shadow)">
    <rect x="0" y="0" width="250" height="120" rx="8" fill="#052e16" stroke="#22c55e" stroke-width="1.5"/>
    <g transform="translate(24, 28)">
      <path d="M0,-13 L12,-6 L12,3 Q12,11 0,15 Q-12,11 -12,3 L-12,-6 Z" fill="none" stroke="#22c55e" stroke-width="1.4"/>
      <polyline points="-4,1 -1,5 6,-4" fill="none" stroke="#22c55e" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="52" y="18" fill="#86efac" font-size="12" font-weight="700">X-Frame-Options</text>
    <text x="52" y="34" fill="#bbf7d0" font-size="9">iframe&#22475;&#12417;&#36796;&#12415;&#12434;&#12469;&#12540;&#12496;&#12540;&#20596;&#12391;&#25298;&#21542;</text>
    <line x1="14" y1="48" x2="236" y2="48" stroke="#22c55e" stroke-width="0.5" opacity="0.4"/>
    <text x="125" y="68" text-anchor="middle" fill="#22c55e" font-size="10" font-family="'Fira Code', monospace">X-Frame-Options: DENY</text>
    <text x="125" y="86" text-anchor="middle" fill="#4ade80" font-size="8.5">&#12502;&#12521;&#12454;&#12470;&#12364;iframe&#12398;&#35501;&#12415;&#36796;&#12415;&#12434;&#12502;&#12525;&#12483;&#12463;</text>
    <text x="125" y="100" text-anchor="middle" fill="#4ade80" font-size="8.5">&#12463;&#12522;&#12483;&#12463;&#12472;&#12515;&#12483;&#12461;&#12531;&#12464;&#12434;&#23436;&#20840;&#38459;&#27490;</text>
  </g>

  <!-- Defense Card 2: X-Content-Type-Options (top-right) -->
  <g transform="translate(535, 440)" filter="url(#shadow)">
    <rect x="0" y="0" width="250" height="120" rx="8" fill="#052e16" stroke="#22c55e" stroke-width="1.5"/>
    <g transform="translate(24, 28)">
      <rect x="-9" y="-8" width="18" height="16" rx="2" fill="none" stroke="#22c55e" stroke-width="1.2"/>
      <text x="0" y="4" text-anchor="middle" fill="#22c55e" font-size="7" font-family="'Fira Code', monospace">CT</text>
    </g>
    <text x="52" y="18" fill="#86efac" font-size="12" font-weight="700">Content-Type-Options</text>
    <text x="52" y="34" fill="#bbf7d0" font-size="9">MIME&#12473;&#12491;&#12483;&#12501;&#12451;&#12531;&#12464;&#12434;&#38450;&#27490;</text>
    <line x1="14" y1="48" x2="236" y2="48" stroke="#22c55e" stroke-width="0.5" opacity="0.4"/>
    <text x="125" y="68" text-anchor="middle" fill="#22c55e" font-size="10" font-family="'Fira Code', monospace">X-Content-Type-Options: nosniff</text>
    <text x="125" y="86" text-anchor="middle" fill="#4ade80" font-size="8.5">&#12502;&#12521;&#12454;&#12470;&#12364;Content-Type&#12434;&#21427;&#23494;&#12395;&#36981;&#23432;</text>
    <text x="125" y="100" text-anchor="middle" fill="#4ade80" font-size="8.5">&#24746;&#24847;&#12354;&#12427;&#12501;&#12449;&#12452;&#12523;&#12398;&#33258;&#21205;&#23455;&#34892;&#12434;&#38450;&#27490;</text>
  </g>

  <!-- Defense Card 3: HSTS (bottom-left) -->
  <g transform="translate(265, 575)" filter="url(#shadow)">
    <rect x="0" y="0" width="250" height="120" rx="8" fill="#052e16" stroke="#22c55e" stroke-width="1.5"/>
    <g transform="translate(24, 28)">
      <rect x="-9" y="-2" width="18" height="14" rx="3" fill="none" stroke="#22c55e" stroke-width="1.4"/>
      <path d="M-5,-2 L-5,-7 Q-5,-12 0,-12 Q5,-12 5,-7 L5,-2" fill="none" stroke="#22c55e" stroke-width="1.4"/>
      <circle cx="0" cy="5" r="2" fill="#22c55e"/>
    </g>
    <text x="52" y="18" fill="#86efac" font-size="12" font-weight="700">Strict-Transport-Security</text>
    <text x="52" y="34" fill="#bbf7d0" font-size="9">HTTPS&#12408;&#12398;&#24375;&#21046;&#12450;&#12483;&#12503;&#12464;&#12524;&#12540;&#12489;</text>
    <line x1="14" y1="48" x2="236" y2="48" stroke="#22c55e" stroke-width="0.5" opacity="0.4"/>
    <text x="125" y="66" text-anchor="middle" fill="#22c55e" font-size="9.5" font-family="'Fira Code', monospace">Strict-Transport-Security:</text>
    <text x="125" y="80" text-anchor="middle" fill="#22c55e" font-size="9.5" font-family="'Fira Code', monospace">max-age=31536000; includeSubDomains</text>
    <text x="125" y="100" text-anchor="middle" fill="#4ade80" font-size="8.5">HTTP&#12408;&#12398;&#12480;&#12454;&#12531;&#12464;&#12524;&#12540;&#12489;&#25915;&#25731;&#12434;&#38450;&#27490;</text>
  </g>

  <!-- Defense Card 4: Referrer-Policy (bottom-right) -->
  <g transform="translate(535, 575)" filter="url(#shadow)">
    <rect x="0" y="0" width="250" height="120" rx="8" fill="#052e16" stroke="#22c55e" stroke-width="1.5"/>
    <g transform="translate(24, 28)">
      <path d="M-8,0 L0,-10 L8,0 L0,10 Z" fill="none" stroke="#22c55e" stroke-width="1.2"/>
      <circle cx="0" cy="0" r="3" fill="#22c55e" opacity="0.4"/>
    </g>
    <text x="52" y="18" fill="#86efac" font-size="12" font-weight="700">Referrer-Policy</text>
    <text x="52" y="34" fill="#bbf7d0" font-size="9">&#12522;&#12501;&#12449;&#12521;&#12540;&#24773;&#22577;&#12398;&#28431;&#27945;&#12434;&#21046;&#24481;</text>
    <line x1="14" y1="48" x2="236" y2="48" stroke="#22c55e" stroke-width="0.5" opacity="0.4"/>
    <text x="125" y="68" text-anchor="middle" fill="#22c55e" font-size="10" font-family="'Fira Code', monospace">Referrer-Policy: strict-origin</text>
    <text x="125" y="86" text-anchor="middle" fill="#4ade80" font-size="8.5">&#22806;&#37096;&#12469;&#12452;&#12488;&#12408;&#12398;URL&#28431;&#27945;&#12434;&#38450;&#27490;</text>
    <text x="125" y="100" text-anchor="middle" fill="#4ade80" font-size="8.5">&#12463;&#12525;&#12473;&#12458;&#12522;&#12472;&#12531;&#12391;&#12497;&#12473;&#24773;&#22577;&#12434;&#38560;&#34109;</text>
  </g>

  <!-- ====================================================== -->
  <!--  DEFENSE SIDEBAR                                        -->
  <!-- ====================================================== -->
  <g transform="translate(785, 100)">
    <rect x="0" y="0" width="295" height="340" rx="10" fill="#0f172a" stroke="#22c55e" stroke-width="1"/>
    <text x="148" y="28" text-anchor="middle" fill="#86efac" font-size="14" font-weight="700">&#38450;&#24481;&#12524;&#12452;&#12516;&#12540;&#19968;&#35239;</text>
    <line x1="14" y1="42" x2="281" y2="42" stroke="#22c55e" stroke-width="0.5" opacity="0.5"/>

    <!-- Layer 1 -->
    <g transform="translate(18, 64)">
      <rect x="0" y="-8" width="18" height="18" rx="4" fill="#22c55e" opacity="0.15"/>
      <text x="9" y="6" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="700">1</text>
      <text x="28" y="2" fill="#f8fafc" font-size="11" font-weight="600">X-Frame-Options</text>
      <text x="28" y="18" fill="#94a3b8" font-size="9">iframe&#22475;&#12417;&#36796;&#12415;&#12434;HTTP&#12504;&#12483;&#12480;&#12540;</text>
      <text x="28" y="31" fill="#94a3b8" font-size="9">&#12391;&#25298;&#21542; (DENY / SAMEORIGIN)</text>
    </g>

    <!-- Layer 2 -->
    <g transform="translate(18, 130)">
      <rect x="0" y="-8" width="18" height="18" rx="4" fill="#22c55e" opacity="0.15"/>
      <text x="9" y="6" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="700">2</text>
      <text x="28" y="2" fill="#f8fafc" font-size="11" font-weight="600">X-Content-Type-Options</text>
      <text x="28" y="18" fill="#94a3b8" font-size="9">MIME&#12473;&#12491;&#12483;&#12501;&#12451;&#12531;&#12464;&#12434;&#31105;&#27490;&#12375;</text>
      <text x="28" y="31" fill="#94a3b8" font-size="9">&#24847;&#22259;&#12375;&#12394;&#12356;&#12473;&#12463;&#12522;&#12503;&#12488;&#23455;&#34892;&#12434;&#38459;&#27490;</text>
    </g>

    <!-- Layer 3 -->
    <g transform="translate(18, 196)">
      <rect x="0" y="-8" width="18" height="18" rx="4" fill="#22c55e" opacity="0.15"/>
      <text x="9" y="6" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="700">3</text>
      <text x="28" y="2" fill="#f8fafc" font-size="11" font-weight="600">Strict-Transport-Security</text>
      <text x="28" y="18" fill="#94a3b8" font-size="9">&#12502;&#12521;&#12454;&#12470;&#12395;HTTPS&#25509;&#32154;&#12434;&#24375;&#21046;&#12375;</text>
      <text x="28" y="31" fill="#94a3b8" font-size="9">&#12480;&#12454;&#12531;&#12464;&#12524;&#12540;&#12489;&#25915;&#25731;&#12434;&#38450;&#27490;</text>
    </g>

    <!-- Layer 4 -->
    <g transform="translate(18, 262)">
      <rect x="0" y="-8" width="18" height="18" rx="4" fill="#22c55e" opacity="0.15"/>
      <text x="9" y="6" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="700">4</text>
      <text x="28" y="2" fill="#f8fafc" font-size="11" font-weight="600">Referrer-Policy</text>
      <text x="28" y="18" fill="#94a3b8" font-size="9">&#22806;&#37096;&#12469;&#12452;&#12488;&#12408;&#12398;&#12522;&#12501;&#12449;&#12521;&#12540;</text>
      <text x="28" y="31" fill="#94a3b8" font-size="9">&#24773;&#22577;&#28431;&#27945;&#12434;&#21046;&#24481;</text>
    </g>

    <line x1="14" y1="306" x2="281" y2="306" stroke="#22c55e" stroke-width="0.5" opacity="0.5"/>
    <text x="148" y="328" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="600">&#128274; &#22810;&#23652;&#38450;&#24481; (Defense in Depth)</text>
  </g>

  <!-- ===== Legend ===== -->
  <g transform="translate(30, 730)">
    <rect x="0" y="0" width="360" height="36" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <line x1="14" y1="18" x2="44" y2="18" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,3" opacity="0.3"/>
    <text x="52" y="22" fill="#fca5a5" font-size="9" opacity="0.6">&#36974;&#26029;&#12373;&#12428;&#12383;&#25915;&#25731;</text>
    <g transform="translate(172, 18)">
      <circle cx="0" cy="0" r="8" fill="#052e16" stroke="#22c55e" stroke-width="1.2"/>
      <line x1="-3" y1="-3" x2="3" y2="3" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="3" y1="-3" x2="-3" y2="3" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    <text x="188" y="22" fill="#86efac" font-size="9">&#12502;&#12525;&#12483;&#12463;&#12509;&#12452;&#12531;&#12488;</text>
    <rect x="282" y="10" width="16" height="16" rx="3" fill="#052e16" stroke="#22c55e" stroke-width="1"/>
    <text x="304" y="22" fill="#86efac" font-size="9">&#38450;&#24481;&#27231;&#27083;</text>
  </g>

</svg>