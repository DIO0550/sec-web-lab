    <text x="10" y="16" text-anchor="middle" fill="#f8fafc" font-size="11" font-weight="600">&#12503;&#12525;&#12461;&#12471;&#12461;&#12515;&#12483;&#12471;&#12517;&#24746;&#29992;</text>
    <text x="10" y="30" text-anchor="middle" fill="#94a3b8" font-size="8.5">&#20849;&#26377;&#12503;&#12525;&#12461;&#12471;&#12398;&#12461;&#12515;&#12483;&#12471;&#12517;&#12434;&#24746;&#29992;</text>
  </g>

