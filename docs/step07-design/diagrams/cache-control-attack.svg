    <text x="0" y="22" text-anchor="middle" fill="#94a3b8" font-size="8.5" font-family="'Fira Code', monospace">/account/profile (cached)</text>
    <text x="0" y="36" text-anchor="middle" fill="#ef4444" font-size="8.5">&#27231;&#23494;&#12487;&#12540;&#12479;&#12364;&#24179;&#25991;&#12391;&#20445;&#23384;</text>
    <text x="0" y="48" text-anchor="middle" fill="#94a3b8" font-size="8">&#20491;&#20154;&#24773;&#22577;&#12539;&#12475;&#12483;&#12471;&#12519;&#12531;&#12487;&#12540;&#12479;</text>
  </g>

  <!-- ===== Vulnerability callout ===== -->
