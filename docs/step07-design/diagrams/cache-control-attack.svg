    <text x="10" y="16" text-anchor="middle" fill="#f8fafc" font-size="11" font-weight="600">&#25147;&#12427;&#12508;&#12479;&#12531;&#25915;&#25731;</text>
    <text x="10" y="30" text-anchor="middle" fill="#94a3b8" font-size="8.5">&#12502;&#12521;&#12454;&#12470;&#23653;&#27508;&#12391;&#12506;&#12540;&#12472;&#12434;&#24489;&#20803;</text>
  </g>

  <!-- Card: Proxy Cache Exploit -->
  <g transform="translate(765, 668)" filter="url(#shadow)">
    <rect x="-120" y="0" width="240" height="38" rx="8" fill="#1e1b2e" stroke="#ef4444" stroke-width="1"/>
