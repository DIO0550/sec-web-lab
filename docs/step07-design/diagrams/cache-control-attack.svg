    <rect x="-115" y="-18" width="230" height="56" rx="8" fill="#451a03" stroke="#f97316" stroke-width="1"/>
    <text x="0" y="-1" text-anchor="middle" fill="#fdba74" font-size="11" font-weight="700">&#9888; Cache-Control&#12504;&#12483;&#12480;&#12540;&#26410;&#35373;&#23450;</text>
    <text x="0" y="16" text-anchor="middle" fill="#fb923c" font-size="9" font-family="'Fira Code', monospace">// Cache-Control&#12504;&#12483;&#12480;&#12540;&#26410;&#35373;&#23450;</text>
    <text x="0" y="30" text-anchor="middle" fill="#fed7aa" font-size="8.5">&#27231;&#23494;&#12506;&#12540;&#12472;&#12364;&#12502;&#12521;&#12454;&#12470;&#12395;&#12461;&#12515;&#12483;&#12471;&#12517;&#12373;&#12428;&#12427;</text>
  </g>

  <!-- ===== HTTP response code ===== -->
  <g transform="translate(380, 565)">
    <rect x="-210" y="-14" width="420" height="28" rx="5" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="0" y="4" text-anchor="middle" fill="#94a3b8" font-size="9.5" font-family="'Fira Code', monospace">
      <tspan fill="#3b82f6">HTTP/1.1 200 OK</tspan><tspan fill="#fca5a5"> &#8592; Cache-Control&#12504;&#12483;&#12480;&#12540;&#12394;&#12375;</tspan><tspan fill="#ef4444"> &#8594; &#12461;&#12515;&#12483;&#12471;&#12517;&#12373;&#12428;&#12427;</tspan>
    </text>
  </g>

  <!-- ====================================================== -->
  <!--  STEP LIST (right sidebar)                              -->
  <!-- ====================================================== -->
  <g transform="translate(775, 100)">
    <rect x="0" y="0" width="305" height="360" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="152" y="28" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="700">&#25915;&#25731;&#12473;&#12486;&#12483;&#12503;&#35443;&#32048;</text>
    <line x1="16" y1="40" x2="289" y2="40" stroke="#334155" stroke-width="1"/>

    <!-- Step 1 -->
    <circle cx="34" cy="68" r="13" fill="#a855f7"/>
    <text x="34" y="73" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">1</text>
    <text x="56" y="64" fill="#f8fafc" font-size="11.5" font-weight="600">&#27231;&#23494;&#12506;&#12540;&#12472;&#12395;&#12450;&#12463;&#12475;&#12473;</text>
    <text x="56" y="80" fill="#94a3b8" font-size="9.5">&#34987;&#23475;&#32773;&#12364;&#12525;&#12464;&#12452;&#12531;&#24460;&#12289;</text>
    <text x="56" y="93" fill="#94a3b8" font-size="9.5">&#12450;&#12459;&#12454;&#12531;&#12488;&#24773;&#22577;&#31561;&#12434;&#34920;&#31034;</text>

    <!-- Step 2 -->
    <circle cx="34" cy="124" r="13" fill="#3b82f6"/>
    <text x="34" y="129" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">2</text>
    <text x="56" y="120" fill="#f8fafc" font-size="11.5" font-weight="600">Cache-Control&#12394;&#12375;&#12391;&#24540;&#31572;</text>
    <text x="56" y="136" fill="#94a3b8" font-size="9.5">&#12469;&#12540;&#12496;&#12540;&#12364;&#12461;&#12515;&#12483;&#12471;&#12517;&#21046;&#24481;</text>
    <text x="56" y="149" fill="#94a3b8" font-size="9.5">&#12504;&#12483;&#12480;&#12540;&#12394;&#12375;&#12391;&#12524;&#12473;&#12509;&#12531;&#12473;&#36820;&#21364;</text>

    <!-- Step 3 -->
    <circle cx="34" cy="180" r="13" fill="#a855f7"/>
    <text x="34" y="185" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">3</text>
    <text x="56" y="176" fill="#f8fafc" font-size="11.5" font-weight="600">&#12502;&#12521;&#12454;&#12470;&#12364;&#12461;&#12515;&#12483;&#12471;&#12517;&#20445;&#23384;</text>
    <text x="56" y="192" fill="#94a3b8" font-size="9.5">&#27231;&#23494;&#12487;&#12540;&#12479;&#12364;&#12502;&#12521;&#12454;&#12470;&#12398;</text>
    <text x="56" y="205" fill="#94a3b8" font-size="9.5">&#12461;&#12515;&#12483;&#12471;&#12517;&#12395;&#24179;&#25991;&#12391;&#20445;&#23384;&#12373;&#12428;&#12427;</text>

    <!-- Step 4 -->
    <circle cx="34" cy="236" r="13" fill="#a855f7" opacity="0.7"/>
    <text x="34" y="241" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">4</text>
    <text x="56" y="232" fill="#f8fafc" font-size="11.5" font-weight="600">&#34987;&#23475;&#32773;&#12364;&#38626;&#24109;/&#12525;&#12464;&#12450;&#12454;&#12488;</text>
    <text x="56" y="248" fill="#94a3b8" font-size="9.5">&#34987;&#23475;&#32773;&#12364;PC&#12434;&#38626;&#12428;&#12427;&#12364;</text>
    <text x="56" y="261" fill="#94a3b8" font-size="9.5">&#12461;&#12515;&#12483;&#12471;&#12517;&#12399;&#12502;&#12521;&#12454;&#12470;&#12395;&#27531;&#12427;</text>

    <!-- Step 5 -->
    <circle cx="34" cy="292" r="13" fill="#ef4444"/>
    <text x="34" y="297" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">5</text>
    <text x="56" y="288" fill="#f8fafc" font-size="11.5" font-weight="600">&#12461;&#12515;&#12483;&#12471;&#12517;&#12363;&#12425;&#27231;&#23494;&#12487;&#12540;&#12479;&#21462;&#24471;</text>
    <text x="56" y="304" fill="#94a3b8" font-size="9.5">&#25915;&#25731;&#32773;&#12364;&#25147;&#12427;&#12508;&#12479;&#12531;&#12420;</text>
    <text x="56" y="317" fill="#94a3b8" font-size="9.5">&#12461;&#12515;&#12483;&#12471;&#12517;&#12434;&#38322;&#35239;&#12375;&#12390;&#24773;&#22577;&#31397;&#21462;</text>
    <text x="56" y="343" fill="#64748b" font-size="8.5">&#8251; &#20849;&#26377;PC&#12391;&#12398;&#25915;&#25731;&#12395;&#29305;&#12395;&#26377;&#21177;</text>
  </g>

  <!-- ====================================================== -->
  <!--  ATTACK TECHNIQUE CARDS (bottom)                        -->
  <!-- ====================================================== -->
  <line x1="30" y1="630" x2="1070" y2="630" stroke="#334155" stroke-width="1"/>
  <text x="550" y="655" text-anchor="middle" fill="#fca5a5" font-size="14" font-weight="700">&#128293; &#20351;&#29992;&#12373;&#12428;&#12427;&#25915;&#25731;&#12486;&#12463;&#12491;&#12483;&#12463;</text>

  <!-- Card: Browser Cache Browsing -->
  <g transform="translate(165, 668)" filter="url(#shadow)">
    <rect x="-120" y="0" width="240" height="38" rx="8" fill="#1e1b2e" stroke="#ef4444" stroke-width="1"/>
    <rect x="-108" y="6" width="28" height="26" rx="5" fill="#ef4444" opacity="0.1"/>
    <g transform="translate(-94, 19)">
      <circle cx="0" cy="-3" r="6" fill="none" stroke="#ef4444" stroke-width="1.2"/>
