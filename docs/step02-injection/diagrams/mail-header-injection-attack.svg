<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 750" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f97316"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="750" fill="url(#bgGrad)" rx="12"/>

  <!-- ===== Title ===== -->
  <text x="380" y="38" text-anchor="middle" fill="#f8fafc" font-size="22" font-weight="700">Mail Header Injection Attack Flow</text>
  <text x="380" y="58" text-anchor="middle" fill="#94a3b8" font-size="12">メールヘッダインジェクション — 攻撃の流れ</text>
  <rect x="300" y="66" width="160" height="20" rx="10" fill="#ef4444" opacity="0.15"/>
  <text x="380" y="80" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="600">OWASP A03 — Injection</text>

  <!-- ====================================================== -->
  <!--  ACTORS                                                 -->
  <!-- ====================================================== -->

  <!-- Attacker -->
  <g transform="translate(115, 250)" filter="url(#shadow)">
    <rect x="-56" y="-30" width="112" height="125" rx="12" fill="#1e1b2e" stroke="#ef4444" stroke-width="1.5"/>
    <g transform="translate(0, 10)">
      <path d="M-13,-17 Q0,-28 13,-17 L13,-4 Q0,2 -13,-4 Z" fill="none" stroke="#ef4444" stroke-width="1.8"/>
      <circle cx="-4" cy="-9" r="1.8" fill="#ef4444"/>
      <circle cx="4" cy="-9" r="1.8" fill="#ef4444"/>
      <path d="M-17,36 Q-17,14 0,10 Q17,14 17,36" fill="none" stroke="#ef4444" stroke-width="2"/>
      <line x1="-17" y1="36" x2="17" y2="36" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
    </g>
    <text x="0" y="72" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="700">攻撃者</text>
    <text x="0" y="86" text-anchor="middle" fill="#ef4444" font-size="9.5" opacity="0.7">Attacker</text>
  </g>

  <!-- Web Server (Mail Form) -->
  <g transform="translate(380, 250)" filter="url(#shadow)">
    <rect x="-56" y="-30" width="112" height="125" rx="12" fill="#1e1b2e" stroke="#3b82f6" stroke-width="1.5"/>
    <g transform="translate(0, 14)">
      <rect x="-20" y="-18" width="40" height="12" rx="3" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
      <circle cx="-12" cy="-12" r="2" fill="#3b82f6"/><circle cx="-5" cy="-12" r="2" fill="#3b82f6"/>
      <rect x="-20" y="-2" width="40" height="12" rx="3" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
      <circle cx="-12" cy="4" r="2" fill="#3b82f6"/><circle cx="-5" cy="4" r="2" fill="#3b82f6"/>
      <rect x="-20" y="14" width="40" height="12" rx="3" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
      <circle cx="-12" cy="20" r="2" fill="#3b82f6"/><circle cx="-5" cy="20" r="2" fill="#3b82f6"/>
    </g>
    <text x="0" y="72" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">Webサーバー</text>
    <text x="0" y="86" text-anchor="middle" fill="#3b82f6" font-size="9.5" opacity="0.7">Mail Form</text>
  </g>

  <!-- Mail Server / Victim -->
  <g transform="translate(645, 250)" filter="url(#shadow)">
    <rect x="-56" y="-30" width="112" height="125" rx="12" fill="#1e1b2e" stroke="#f97316" stroke-width="1.5"/>
    <g transform="translate(0, 10)">
      <!-- Mail icon -->
      <rect x="-20" y="-12" width="40" height="28" rx="4" fill="none" stroke="#f97316" stroke-width="1.5"/>
      <polyline points="-20,-12 0,6 20,-12" fill="none" stroke="#f97316" stroke-width="1.5"/>
      <line x1="-20" y1="16" x2="-8" y2="4" stroke="#f97316" stroke-width="0.8" opacity="0.5"/>
      <line x1="20" y1="16" x2="8" y2="4" stroke="#f97316" stroke-width="0.8" opacity="0.5"/>
    </g>
    <text x="0" y="72" text-anchor="middle" fill="#fdba74" font-size="13" font-weight="700">メールサーバー</text>
    <text x="0" y="86" text-anchor="middle" fill="#f97316" font-size="9.5" opacity="0.7">SMTP Server</text>
  </g>

  <!-- ====================================================== -->
  <!--  ARROWS                                                 -->
  <!-- ====================================================== -->

  <!-- Step 1: Attacker → Server (CRLF入り件名をPOST) -->
  <path d="M 171 240 L 322 240" fill="none" stroke="#ef4444" stroke-width="2.2" stroke-dasharray="8,4" marker-end="url(#arrowRed)"/>
  <circle cx="247" cy="218" r="16" fill="#ef4444"/>
  <text x="247" y="223" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">1</text>

  <!-- Step 2: Server → Mail Server (改ざんされたメール送信) -->
  <path d="M 438 240 L 587 240" fill="none" stroke="#3b82f6" stroke-width="2.2" marker-end="url(#arrowBlue)"/>
  <circle cx="513" cy="218" r="16" fill="#3b82f6"/>
  <text x="513" y="223" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">2</text>

  <!-- Step 3: Mail Server delivers to unintended recipients (arrow down) -->
  <path d="M 645 375 L 645 420" fill="none" stroke="#f97316" stroke-width="2.2" marker-end="url(#arrowOrange)"/>
  <circle cx="670" cy="398" r="16" fill="#f97316"/>
  <text x="670" y="403" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">3</text>

  <!-- Spam delivery box -->
  <g transform="translate(645, 472)" filter="url(#shadow)">
    <rect x="-80" y="-28" width="160" height="70" rx="8" fill="#1e1b2e" stroke="#ef4444" stroke-width="1.2" stroke-dasharray="4,2"/>
    <rect x="-70" y="-20" width="140" height="13" rx="3" fill="#0f172a"/>
    <circle cx="-60" cy="-14" r="2.5" fill="#ef4444"/>
    <circle cx="-52" cy="-14" r="2.5" fill="#f59e0b"/>
    <circle cx="-44" cy="-14" r="2.5" fill="#22c55e"/>
    <text x="0" y="6" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="600">スパム配信</text>
    <text x="0" y="20" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="'Fira Code', monospace">Bcc: victim1, victim2...</text>
    <text x="0" y="34" text-anchor="middle" fill="#ef4444" font-size="8.5">大量の不正メール送信</text>
  </g>

  <!-- Step 4: Server → Attacker (200 OK) -->
  <path d="M 322 282 L 171 282" fill="none" stroke="#3b82f6" stroke-width="2.2" marker-end="url(#arrowBlue)"/>
  <circle cx="247" cy="304" r="16" fill="#3b82f6"/>
  <text x="247" y="309" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">4</text>

  <!-- Step 5: Attacker gains spam relay (big curve below) -->
  <path d="M 115 345 C 115 600, 645 600, 645 542" fill="none" stroke="#ef4444" stroke-width="2.2" stroke-dasharray="8,4" marker-end="url(#arrowRed)"/>
  <circle cx="380" cy="580" r="16" fill="#ef4444"/>
  <text x="380" y="585" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">5</text>

  <!-- ===== Vulnerability callout ===== -->
  <g transform="translate(380, 420)" filter="url(#shadow)">
    <rect x="-140" y="-18" width="280" height="62" rx="8" fill="#451a03" stroke="#f97316" stroke-width="1"/>
    <text x="0" y="-1" text-anchor="middle" fill="#fdba74" font-size="11" font-weight="700">⚠ 脆弱性: CRLF未サニタイズ</text>
    <text x="0" y="16" text-anchor="middle" fill="#fb923c" font-size="9.5" font-family="'Fira Code', monospace">subject = req.body.subject</text>
    <text x="0" y="30" text-anchor="middle" fill="#fb923c" font-size="9.5" font-family="'Fira Code', monospace">// \r\n を除去していない</text>
    <text x="0" y="42" text-anchor="middle" fill="#fed7aa" font-size="8.5">改行コードでヘッダーを注入可能</text>
  </g>

  <!-- ===== Malicious input example ===== -->
  <g transform="translate(380, 510)">
    <rect x="-220" y="-14" width="440" height="28" rx="5" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="0" y="4" text-anchor="middle" fill="#94a3b8" font-size="9.5" font-family="'Fira Code', monospace">
      <tspan fill="#64748b">Subject: </tspan><tspan fill="#93c5fd">お問い合わせ</tspan><tspan fill="#ef4444">\r\nBcc: victim@evil.com</tspan>
    </text>
  </g>

  <!-- ====================================================== -->
  <!--  STEP LIST (right sidebar)                              -->
  <!-- ====================================================== -->
  <g transform="translate(775, 100)">
    <rect x="0" y="0" width="305" height="320" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="152" y="28" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="700">攻撃ステップ詳細</text>
    <line x1="16" y1="40" x2="289" y2="40" stroke="#334155" stroke-width="1"/>

    <!-- Step 1 -->
    <circle cx="34" cy="68" r="13" fill="#ef4444"/>
    <text x="34" y="73" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">1</text>
    <text x="56" y="64" fill="#f8fafc" font-size="11.5" font-weight="600">CRLF入り件名を送信</text>
    <text x="56" y="80" fill="#94a3b8" font-size="9.5">お問い合わせフォームの件名に</text>
    <text x="56" y="93" fill="#94a3b8" font-size="9.5">\r\nBcc: を注入してPOST</text>

    <!-- Step 2 -->
    <circle cx="34" cy="124" r="13" fill="#3b82f6"/>
    <text x="34" y="129" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">2</text>
    <text x="56" y="120" fill="#f8fafc" font-size="11.5" font-weight="600">改ざんメールの構築・送信</text>
    <text x="56" y="136" fill="#94a3b8" font-size="9.5">サーバーがCRLFを含む件名を</text>
    <text x="56" y="149" fill="#94a3b8" font-size="9.5">そのままメールヘッダーに埋め込み</text>

    <!-- Step 3 -->
    <circle cx="34" cy="180" r="13" fill="#f97316"/>
    <text x="34" y="185" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">3</text>
    <text x="56" y="176" fill="#f8fafc" font-size="11.5" font-weight="600">スパムメールの配信</text>
    <text x="56" y="192" fill="#94a3b8" font-size="9.5">注入されたBccヘッダーにより</text>
    <text x="56" y="205" fill="#94a3b8" font-size="9.5">意図しない宛先にメールが届く</text>

    <!-- Step 4 -->
    <circle cx="34" cy="236" r="13" fill="#3b82f6"/>
    <text x="34" y="241" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">4</text>
    <text x="56" y="232" fill="#f8fafc" font-size="11.5" font-weight="600">正常レスポンスの返却</text>
    <text x="56" y="248" fill="#94a3b8" font-size="9.5">サーバーは送信成功として</text>
    <text x="56" y="261" fill="#94a3b8" font-size="9.5">200 OKを返す（異常に気づかない）</text>

    <!-- Step 5 -->
    <circle cx="34" cy="292" r="13" fill="#ef4444"/>
    <text x="34" y="297" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">5</text>
    <text x="56" y="288" fill="#f8fafc" font-size="11.5" font-weight="600">スパムの踏み台として悪用</text>
    <text x="56" y="304" fill="#94a3b8" font-size="9.5">正規サーバーのドメインから</text>
    <text x="56" y="317" fill="#94a3b8" font-size="9.5">大量のスパム・フィッシングメール送信</text>
  </g>

  <!-- ====================================================== -->
  <!--  ATTACK TECHNIQUE CARDS (bottom)                        -->
  <!-- ====================================================== -->
  <line x1="30" y1="660" x2="1070" y2="660" stroke="#334155" stroke-width="1"/>
  <text x="550" y="685" text-anchor="middle" fill="#fca5a5" font-size="14" font-weight="700">使用される攻撃テクニック</text>

  <!-- Card: CRLF Injection -->
  <g transform="translate(165, 698)" filter="url(#shadow)">
    <rect x="-120" y="0" width="240" height="38" rx="8" fill="#1e1b2e" stroke="#ef4444" stroke-width="1"/>
    <rect x="-108" y="6" width="28" height="26" rx="5" fill="#ef4444" opacity="0.1"/>
    <text x="-94" y="24" text-anchor="middle" fill="#ef4444" font-size="9" font-family="'Fira Code', monospace">\r\n</text>
    <text x="10" y="16" text-anchor="middle" fill="#f8fafc" font-size="11" font-weight="600">CRLFインジェクション</text>
    <text x="10" y="30" text-anchor="middle" fill="#94a3b8" font-size="8.5">改行コードでヘッダーを分割</text>
  </g>

  <!-- Card: Bcc Header Injection -->
  <g transform="translate(465, 698)" filter="url(#shadow)">
    <rect x="-120" y="0" width="240" height="38" rx="8" fill="#1e1b2e" stroke="#ef4444" stroke-width="1"/>
    <rect x="-108" y="6" width="28" height="26" rx="5" fill="#ef4444" opacity="0.1"/>
    <g transform="translate(-94, 18)">
      <rect x="-8" y="-6" width="16" height="11" rx="2" fill="none" stroke="#ef4444" stroke-width="1.2"/>
      <polyline points="-8,-6 0,1 8,-6" fill="none" stroke="#ef4444" stroke-width="1.2"/>
    </g>
    <text x="10" y="16" text-anchor="middle" fill="#f8fafc" font-size="11" font-weight="600">Bccヘッダー追加</text>
    <text x="10" y="30" text-anchor="middle" fill="#94a3b8" font-size="8.5">任意の宛先にメール送信</text>
  </g>

  <!-- Card: Spam Relay -->
  <g transform="translate(765, 698)" filter="url(#shadow)">
    <rect x="-120" y="0" width="240" height="38" rx="8" fill="#1e1b2e" stroke="#ef4444" stroke-width="1"/>
    <rect x="-108" y="6" width="28" height="26" rx="5" fill="#ef4444" opacity="0.1"/>
    <g transform="translate(-94, 19)">
      <circle cx="0" cy="0" r="3" fill="#ef4444" opacity="0.6"/>
      <line x1="0" y1="0" x2="-6" y2="-5" stroke="#ef4444" stroke-width="1"/>
      <line x1="0" y1="0" x2="6" y2="-5" stroke="#ef4444" stroke-width="1"/>
      <line x1="0" y1="0" x2="-6" y2="5" stroke="#ef4444" stroke-width="1"/>
      <line x1="0" y1="0" x2="6" y2="5" stroke="#ef4444" stroke-width="1"/>
      <circle cx="-6" cy="-5" r="1.5" fill="#ef4444"/>
      <circle cx="6" cy="-5" r="1.5" fill="#ef4444"/>
      <circle cx="-6" cy="5" r="1.5" fill="#ef4444"/>
      <circle cx="6" cy="5" r="1.5" fill="#ef4444"/>
    </g>
    <text x="10" y="16" text-anchor="middle" fill="#f8fafc" font-size="11" font-weight="600">スパム中継</text>
    <text x="10" y="30" text-anchor="middle" fill="#94a3b8" font-size="8.5">正規ドメインを踏み台に悪用</text>
  </g>

  <!-- ===== Legend ===== -->
  <g transform="translate(775, 445)">
    <rect x="0" y="0" width="305" height="68" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="14" y="18" fill="#94a3b8" font-size="10" font-weight="600">凡例</text>
    <line x1="14" y1="34" x2="44" y2="34" stroke="#ef4444" stroke-width="2" stroke-dasharray="6,3"/>
    <text x="52" y="38" fill="#fca5a5" font-size="9.5">攻撃通信</text>
    <line x1="152" y1="34" x2="182" y2="34" stroke="#3b82f6" stroke-width="2"/>
    <text x="190" y="38" fill="#93c5fd" font-size="9.5">サーバー通信</text>
    <line x1="14" y1="54" x2="44" y2="54" stroke="#f97316" stroke-width="2"/>
    <text x="52" y="58" fill="#fdba74" font-size="9.5">メール配信</text>
    <rect x="152" y="48" width="12" height="12" rx="2" fill="#451a03" stroke="#f97316" stroke-width="0.8"/>
    <text x="170" y="58" fill="#fdba74" font-size="9.5">脆弱性ポイント</text>
  </g>

</svg>