<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 750" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f97316"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="750" fill="url(#bgGrad)" rx="12"/>

  <!-- ===== Title ===== -->
  <text x="380" y="38" text-anchor="middle" fill="#f8fafc" font-size="22" font-weight="700">Input Validation Absence Attack</text>
  <text x="380" y="58" text-anchor="middle" fill="#94a3b8" font-size="12">入力バリデーション不備 — 攻撃の流れ</text>
  <rect x="280" y="66" width="200" height="20" rx="10" fill="#ef4444" opacity="0.15"/>
  <text x="380" y="80" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="600">OWASP A03 — Injection</text>

  <!-- ====================================================== -->
  <!--  ACTORS                                                 -->
  <!-- ====================================================== -->

  <!-- Attacker -->
  <g transform="translate(115, 250)" filter="url(#shadow)">
    <rect x="-56" y="-30" width="112" height="125" rx="12" fill="#1e1b2e" stroke="#ef4444" stroke-width="1.5"/>
    <g transform="translate(0, 10)">
      <path d="M-13,-17 Q0,-28 13,-17 L13,-4 Q0,2 -13,-4 Z" fill="none" stroke="#ef4444" stroke-width="1.8"/>
      <circle cx="-4" cy="-9" r="1.8" fill="#ef4444"/>
      <circle cx="4" cy="-9" r="1.8" fill="#ef4444"/>
      <path d="M-17,36 Q-17,14 0,10 Q17,14 17,36" fill="none" stroke="#ef4444" stroke-width="2"/>
      <line x1="-17" y1="36" x2="17" y2="36" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
    </g>
    <text x="0" y="72" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="700">攻撃者</text>
    <text x="0" y="86" text-anchor="middle" fill="#ef4444" font-size="9.5" opacity="0.7">Attacker</text>
  </g>

  <!-- Web Server (No Validation) -->
  <g transform="translate(380, 250)" filter="url(#shadow)">
    <rect x="-56" y="-30" width="112" height="125" rx="12" fill="#1e1b2e" stroke="#3b82f6" stroke-width="1.5"/>
    <g transform="translate(0, 14)">
      <rect x="-20" y="-18" width="40" height="12" rx="3" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
      <circle cx="-12" cy="-12" r="2" fill="#3b82f6"/><circle cx="-5" cy="-12" r="2" fill="#3b82f6"/>
      <rect x="-20" y="-2" width="40" height="12" rx="3" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
      <circle cx="-12" cy="4" r="2" fill="#3b82f6"/><circle cx="-5" cy="4" r="2" fill="#3b82f6"/>
      <rect x="-20" y="14" width="40" height="12" rx="3" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
      <circle cx="-12" cy="20" r="2" fill="#3b82f6"/><circle cx="-5" cy="20" r="2" fill="#3b82f6"/>
    </g>
    <text x="0" y="72" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">Webサーバー</text>
    <text x="0" y="86" text-anchor="middle" fill="#3b82f6" font-size="9.5" opacity="0.7">No Validation</text>
  </g>

  <!-- Backend (DB/OS) -->
  <g transform="translate(645, 250)" filter="url(#shadow)">
    <rect x="-56" y="-30" width="112" height="125" rx="12" fill="#1e1b2e" stroke="#f97316" stroke-width="1.5"/>
    <g transform="translate(0, 10)">
      <!-- Database + terminal icon -->
      <ellipse cx="0" cy="-14" rx="20" ry="8" fill="none" stroke="#f97316" stroke-width="1.5"/>
      <path d="M-20,-14 L-20,14" fill="none" stroke="#f97316" stroke-width="1.5"/>
      <path d="M20,-14 L20,14" fill="none" stroke="#f97316" stroke-width="1.5"/>
      <ellipse cx="0" cy="14" rx="20" ry="8" fill="none" stroke="#f97316" stroke-width="1.5"/>
      <path d="M-20,0 Q0,8 20,0" fill="none" stroke="#f97316" stroke-width="0.8" opacity="0.5"/>
    </g>
    <text x="0" y="72" text-anchor="middle" fill="#fdba74" font-size="13" font-weight="700">バックエンド</text>
    <text x="0" y="86" text-anchor="middle" fill="#f97316" font-size="9.5" opacity="0.7">DB / OS</text>
  </g>

  <!-- ====================================================== -->
  <!--  ARROWS                                                 -->
  <!-- ====================================================== -->

  <!-- Step 1: Attacker -> Server (malicious input submitted, Y=235) -->
  <path d="M 171 235 L 322 235" fill="none" stroke="#ef4444" stroke-width="2.2" stroke-dasharray="8,4" marker-end="url(#arrowRed)"/>
  <circle cx="247" cy="213" r="16" fill="#ef4444"/>
  <text x="247" y="218" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">1</text>

  <!-- Step 2: Server accepts without validation (vertical indicator) -->
  <path d="M 380 345 L 380 395" fill="none" stroke="#3b82f6" stroke-width="2.2" stroke-dasharray="6,3"/>
  <circle cx="404" cy="370" r="16" fill="#3b82f6"/>
  <text x="404" y="375" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">2</text>

  <!-- Step 3: Server -> Backend (unsanitized data passed, Y=250) -->
  <path d="M 438 250 L 589 250" fill="none" stroke="#3b82f6" stroke-width="2.2" marker-end="url(#arrowBlue)"/>
  <circle cx="514" cy="228" r="16" fill="#f97316"/>
  <text x="514" y="233" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">3</text>

  <!-- Step 4: Backend -> Server (injection succeeds, Y=272) -->
  <path d="M 589 272 L 438 272" fill="none" stroke="#f97316" stroke-width="2.2" marker-end="url(#arrowOrange)"/>
  <circle cx="514" cy="294" r="16" fill="#ef4444"/>
  <text x="514" y="299" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">4</text>

  <!-- Step 5: Server -> Attacker (data leaked / compromised, Y=275) -->
  <path d="M 322 275 L 171 275" fill="none" stroke="#ef4444" stroke-width="2.2" stroke-dasharray="8,4" marker-end="url(#arrowRed)"/>
  <circle cx="247" cy="297" r="16" fill="#ef4444"/>
  <text x="247" y="302" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">5</text>

  <!-- ===== Vulnerability callout (below server) ===== -->
  <g transform="translate(380, 425)" filter="url(#shadow)">
    <rect x="-140" y="-18" width="280" height="58" rx="8" fill="#451a03" stroke="#f97316" stroke-width="1"/>
    <text x="0" y="-1" text-anchor="middle" fill="#fdba74" font-size="11" font-weight="700">⚠ ユーザー入力を無検証で使用</text>
    <text x="0" y="16" text-anchor="middle" fill="#fb923c" font-size="9.5" font-family="'Fira Code', monospace">const name = req.body.name // バリデーションなし</text>
    <text x="0" y="32" text-anchor="middle" fill="#fed7aa" font-size="8.5">入力値がそのままクエリ・コマンドに展開される</text>
  </g>

  <!-- ===== Malicious payload box (below vulnerability) ===== -->
  <g transform="translate(380, 515)" filter="url(#shadow)">
    <rect x="-175" y="-22" width="350" height="72" rx="8" fill="#1e1b2e" stroke="#ef4444" stroke-width="1.2" stroke-dasharray="4,2"/>
    <text x="0" y="-6" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="600">攻撃ペイロード例</text>
    <text x="-155" y="12" fill="#94a3b8" font-size="9" font-family="'Fira Code', monospace"><tspan fill="#64748b">POST </tspan><tspan fill="#93c5fd">/api/users</tspan></text>
    <text x="-155" y="26" fill="#94a3b8" font-size="9" font-family="'Fira Code', monospace">{ name: "<tspan fill="#ef4444">'; DROP TABLE users;--</tspan>" }</text>
    <text x="-155" y="42" fill="#64748b" font-size="8">                    ↑ SQLインジェクションペイロード</text>
  </g>

  <!-- ===== Request example bar ===== -->
  <g transform="translate(380, 610)">
    <rect x="-210" y="-14" width="420" height="28" rx="5" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="0" y="4" text-anchor="middle" fill="#94a3b8" font-size="9.5" font-family="'Fira Code', monospace">
      <tspan fill="#64748b">POST </tspan><tspan fill="#93c5fd">/api/users</tspan><tspan fill="#94a3b8"> { name: "</tspan><tspan fill="#ef4444">'; DROP TABLE users;--</tspan><tspan fill="#94a3b8">" }</tspan>
    </text>
  </g>

  <!-- ====================================================== -->
  <!--  STEP LIST (right sidebar)                              -->
  <!-- ====================================================== -->
  <g transform="translate(775, 100)">
    <rect x="0" y="0" width="305" height="340" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="152" y="28" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="700">攻撃ステップ詳細</text>
    <line x1="16" y1="40" x2="289" y2="40" stroke="#334155" stroke-width="1"/>

    <!-- Step 1 -->
    <circle cx="34" cy="68" r="13" fill="#ef4444"/>
    <text x="34" y="73" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">1</text>
    <text x="56" y="64" fill="#f8fafc" font-size="11.5" font-weight="600">悪意ある入力の送信</text>
    <text x="56" y="80" fill="#94a3b8" font-size="9.5">SQLi・XSS・コマンドインジェクション</text>
    <text x="56" y="93" fill="#94a3b8" font-size="9.5">等のペイロードを含むリクエスト送信</text>

    <!-- Step 2 -->
    <circle cx="34" cy="124" r="13" fill="#3b82f6"/>
    <text x="34" y="129" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">2</text>
    <text x="56" y="120" fill="#f8fafc" font-size="11.5" font-weight="600">バリデーションなしで受理</text>
    <text x="56" y="136" fill="#94a3b8" font-size="9.5">入力値の型・長さ・形式を</text>
    <text x="56" y="149" fill="#94a3b8" font-size="9.5">検証せずにそのまま受け入れる</text>

    <!-- Step 3 -->
    <circle cx="34" cy="180" r="13" fill="#f97316"/>
    <text x="34" y="185" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">3</text>
    <text x="56" y="176" fill="#f8fafc" font-size="11.5" font-weight="600">未サニタイズでバックエンドへ</text>
    <text x="56" y="192" fill="#94a3b8" font-size="9.5">悪意あるデータがDBクエリや</text>
    <text x="56" y="205" fill="#94a3b8" font-size="9.5">OSコマンドにそのまま渡される</text>

    <!-- Step 4 -->
    <circle cx="34" cy="236" r="13" fill="#ef4444"/>
    <text x="34" y="241" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">4</text>
    <text x="56" y="232" fill="#f8fafc" font-size="11.5" font-weight="600">インジェクション攻撃成功</text>
    <text x="56" y="248" fill="#94a3b8" font-size="9.5">注入されたコードがバックエンドで</text>
    <text x="56" y="261" fill="#94a3b8" font-size="9.5">実行されてしまう</text>

    <!-- Step 5 -->
    <circle cx="34" cy="292" r="13" fill="#ef4444"/>
    <text x="34" y="297" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">5</text>
    <text x="56" y="288" fill="#f8fafc" font-size="11.5" font-weight="600">データ漏洩・システム侵害</text>
    <text x="56" y="304" fill="#94a3b8" font-size="9.5">機密データの窃取やシステムの</text>
    <text x="56" y="317" fill="#94a3b8" font-size="9.5">改ざん・破壊が完了する</text>
  </g>

  <!-- ====================================================== -->
  <!--  ATTACK TECHNIQUE CARDS (bottom)                        -->
  <!-- ====================================================== -->
  <line x1="30" y1="660" x2="1070" y2="660" stroke="#334155" stroke-width="1"/>
  <text x="550" y="685" text-anchor="middle" fill="#fca5a5" font-size="14" font-weight="700">使用される攻撃テクニック</text>

  <!-- Card: SQLインジェクション -->
  <g transform="translate(165, 698)" filter="url(#shadow)">
    <rect x="-120" y="0" width="240" height="38" rx="8" fill="#1e1b2e" stroke="#ef4444" stroke-width="1"/>
    <rect x="-108" y="6" width="28" height="26" rx="5" fill="#ef4444" opacity="0.1"/>
    <g transform="translate(-94, 19)">
      <!-- Database icon with injection -->
      <ellipse cx="0" cy="-4" rx="6" ry="3" fill="none" stroke="#ef4444" stroke-width="1.2"/>
      <path d="M-6,-4 L-6,4" fill="none" stroke="#ef4444" stroke-width="1.2"/>
      <path d="M6,-4 L6,4" fill="none" stroke="#ef4444" stroke-width="1.2"/>
      <ellipse cx="0" cy="4" rx="6" ry="3" fill="none" stroke="#ef4444" stroke-width="1.2"/>
    </g>
    <text x="10" y="16" text-anchor="middle" fill="#f8fafc" font-size="11" font-weight="600">SQLインジェクション</text>
    <text x="10" y="30" text-anchor="middle" fill="#94a3b8" font-size="8.5">DBクエリに悪意あるSQL注入</text>
  </g>

  <!-- Card: コマンドインジェクション -->
  <g transform="translate(465, 698)" filter="url(#shadow)">
    <rect x="-120" y="0" width="240" height="38" rx="8" fill="#1e1b2e" stroke="#ef4444" stroke-width="1"/>
    <rect x="-108" y="6" width="28" height="26" rx="5" fill="#ef4444" opacity="0.1"/>
    <g transform="translate(-94, 19)">
      <!-- Terminal icon -->
      <rect x="-7" y="-5" width="14" height="10" rx="2" fill="none" stroke="#ef4444" stroke-width="1.2"/>
      <polyline points="-4,-2 -1,0 -4,2" fill="none" stroke="#ef4444" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="1" y1="2" x2="4" y2="2" stroke="#ef4444" stroke-width="1.2" stroke-linecap="round"/>
    </g>
    <text x="10" y="16" text-anchor="middle" fill="#f8fafc" font-size="11" font-weight="600">コマンドインジェクション</text>
    <text x="10" y="30" text-anchor="middle" fill="#94a3b8" font-size="8.5">OSコマンドに悪意ある入力を注入</text>
  </g>

  <!-- Card: XSS -->
  <g transform="translate(765, 698)" filter="url(#shadow)">
    <rect x="-120" y="0" width="240" height="38" rx="8" fill="#1e1b2e" stroke="#ef4444" stroke-width="1"/>
    <rect x="-108" y="6" width="28" height="26" rx="5" fill="#ef4444" opacity="0.1"/>
    <g transform="translate(-94, 19)">
      <!-- Script/code icon -->
      <text x="0" y="4" text-anchor="middle" fill="#ef4444" font-size="11" font-family="'Fira Code', monospace" font-weight="700">&lt;/&gt;</text>
    </g>
    <text x="10" y="16" text-anchor="middle" fill="#f8fafc" font-size="11" font-weight="600">XSS</text>
    <text x="10" y="30" text-anchor="middle" fill="#94a3b8" font-size="8.5">HTMLにスクリプトを注入し実行</text>
  </g>

  <!-- ===== Legend ===== -->
  <g transform="translate(775, 465)">
    <rect x="0" y="0" width="305" height="68" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="14" y="18" fill="#94a3b8" font-size="10" font-weight="600">凡例</text>
    <line x1="14" y1="34" x2="44" y2="34" stroke="#ef4444" stroke-width="2" stroke-dasharray="6,3"/>
    <text x="52" y="38" fill="#fca5a5" font-size="9.5">攻撃通信</text>
    <line x1="152" y1="34" x2="182" y2="34" stroke="#3b82f6" stroke-width="2"/>
    <text x="190" y="38" fill="#93c5fd" font-size="9.5">サーバー通信</text>
    <line x1="14" y1="54" x2="44" y2="54" stroke="#f97316" stroke-width="2"/>
    <text x="52" y="58" fill="#fdba74" font-size="9.5">バックエンド応答</text>
    <rect x="152" y="48" width="12" height="12" rx="2" fill="#451a03" stroke="#f97316" stroke-width="0.8"/>
    <text x="170" y="58" fill="#fdba74" font-size="9.5">脆弱性ポイント</text>
  </g>

</svg>