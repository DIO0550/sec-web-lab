<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 780" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <filter id="glowGreen">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="780" fill="url(#bgGrad)" rx="12"/>

  <!-- ===== Title ===== -->
  <text x="380" y="38" text-anchor="middle" fill="#f8fafc" font-size="22" font-weight="700">Input Validation — Defense Strategy</text>
  <text x="380" y="58" text-anchor="middle" fill="#94a3b8" font-size="12">入力バリデーションによる多層防御</text>
  <rect x="310" y="66" width="140" height="20" rx="10" fill="#22c55e" opacity="0.15"/>
  <text x="380" y="80" text-anchor="middle" fill="#86efac" font-size="10" font-weight="600">Multi-Layer Defense</text>

  <!-- ====================================================== -->
  <!--  ACTORS                                                 -->
  <!-- ====================================================== -->

  <!-- Attacker (dimmed) -->
  <g transform="translate(115, 280)" filter="url(#shadow)">
    <rect x="-56" y="-30" width="112" height="125" rx="12" fill="#1e1b2e" stroke="#ef4444" stroke-width="1.5" opacity="0.45"/>
    <g transform="translate(0, 10)" opacity="0.45">
      <path d="M-13,-17 Q0,-28 13,-17 L13,-4 Q0,2 -13,-4 Z" fill="none" stroke="#ef4444" stroke-width="1.8"/>
      <circle cx="-4" cy="-9" r="1.8" fill="#ef4444"/>
      <circle cx="4" cy="-9" r="1.8" fill="#ef4444"/>
      <path d="M-17,36 Q-17,14 0,10 Q17,14 17,36" fill="none" stroke="#ef4444" stroke-width="2"/>
      <line x1="-17" y1="36" x2="17" y2="36" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
    </g>
    <text x="0" y="72" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="700" opacity="0.5">攻撃者</text>
    <text x="0" y="86" text-anchor="middle" fill="#ef4444" font-size="9.5" opacity="0.35">Attacker</text>
  </g>

  <!-- Web Server (protected - green border) -->
  <g transform="translate(380, 280)" filter="url(#shadow)">
    <rect x="-56" y="-30" width="112" height="125" rx="12" fill="#1e1b2e" stroke="#22c55e" stroke-width="1.5"/>
    <g transform="translate(0, 14)">
      <rect x="-20" y="-18" width="40" height="12" rx="3" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
      <circle cx="-12" cy="-12" r="2" fill="#3b82f6"/><circle cx="-5" cy="-12" r="2" fill="#3b82f6"/>
      <rect x="-20" y="-2" width="40" height="12" rx="3" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
      <circle cx="-12" cy="4" r="2" fill="#3b82f6"/><circle cx="-5" cy="4" r="2" fill="#3b82f6"/>
      <rect x="-20" y="14" width="40" height="12" rx="3" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
      <circle cx="-12" cy="20" r="2" fill="#3b82f6"/><circle cx="-5" cy="20" r="2" fill="#3b82f6"/>
    </g>
    <!-- Shield badge -->
    <g transform="translate(42, -22)">
      <path d="M0,-9 L9,-4 L9,3 Q9,9 0,12 Q-9,9 -9,3 L-9,-4 Z" fill="#22c55e" opacity="0.2" stroke="#22c55e" stroke-width="1.2"/>
      <polyline points="-3,2 -1,5 5,-2" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    <text x="0" y="72" text-anchor="middle" fill="#86efac" font-size="13" font-weight="700">Webサーバー</text>
    <text x="0" y="86" text-anchor="middle" fill="#22c55e" font-size="9.5" opacity="0.7">Validated</text>
  </g>

  <!-- Backend (DB/OS) (protected - green border) -->
  <g transform="translate(645, 280)" filter="url(#shadow)">
    <rect x="-56" y="-30" width="112" height="125" rx="12" fill="#1e1b2e" stroke="#22c55e" stroke-width="1.5"/>
    <g transform="translate(0, 10)">
      <ellipse cx="0" cy="-14" rx="20" ry="8" fill="none" stroke="#f97316" stroke-width="1.5"/>
      <path d="M-20,-14 L-20,14" fill="none" stroke="#f97316" stroke-width="1.5"/>
      <path d="M20,-14 L20,14" fill="none" stroke="#f97316" stroke-width="1.5"/>
      <ellipse cx="0" cy="14" rx="20" ry="8" fill="none" stroke="#f97316" stroke-width="1.5"/>
      <path d="M-20,0 Q0,8 20,0" fill="none" stroke="#f97316" stroke-width="0.8" opacity="0.5"/>
    </g>
    <!-- Shield badge -->
    <g transform="translate(42, -22)">
      <path d="M0,-9 L9,-4 L9,3 Q9,9 0,12 Q-9,9 -9,3 L-9,-4 Z" fill="#22c55e" opacity="0.2" stroke="#22c55e" stroke-width="1.2"/>
      <polyline points="-3,2 -1,5 5,-2" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    <text x="0" y="72" text-anchor="middle" fill="#86efac" font-size="13" font-weight="700">バックエンド</text>
    <text x="0" y="86" text-anchor="middle" fill="#22c55e" font-size="9.5" opacity="0.7">Protected</text>
  </g>

  <!-- ====================================================== -->
  <!--  BLOCKED ARROWS (dimmed attack flow)                    -->
  <!-- ====================================================== -->

  <!-- Attacker -> Server (malicious input, dimmed) -->
  <path d="M 171 270 L 322 270" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="8,4" marker-end="url(#arrowRed)" opacity="0.25"/>

  <!-- Server -> Backend BLOCKED (unsanitized input blocked) -->
  <path d="M 438 270 L 540 270" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,3" opacity="0.2"/>
  <!-- Green block X mark -->
  <g transform="translate(490, 270)">
    <circle cx="0" cy="0" r="16" fill="#052e16" stroke="#22c55e" stroke-width="2" filter="url(#glowGreen)"/>
    <line x1="-6" y1="-6" x2="6" y2="6" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="6" y1="-6" x2="-6" y2="6" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Server -> Backend (safe validated data) -->
  <path d="M 438 290 L 589 290" fill="none" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)" opacity="0.7"/>
  <text x="514" y="310" text-anchor="middle" fill="#86efac" font-size="8.5">検証済みデータのみ通過</text>

  <!-- Server -> Attacker safe error response -->
  <path d="M 322 300 L 171 300" fill="none" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)" opacity="0.7"/>
  <text x="247" y="320" text-anchor="middle" fill="#86efac" font-size="8.5">400 バリデーションエラー</text>

  <!-- ====================================================== -->
  <!--  DEFENSE CARDS (2x2 grid, 250x120px)                    -->
  <!-- ====================================================== -->

  <!-- Card 1: ホワイトリスト検証 (top-left) -->
  <g transform="translate(170, 440)" filter="url(#shadow)">
    <rect x="-125" y="-20" width="250" height="120" rx="8" fill="#052e16" stroke="#22c55e" stroke-width="1.5"/>
    <!-- Checkmark list icon -->
    <g transform="translate(-87, 22)">
      <rect x="-10" y="-12" width="20" height="16" rx="3" fill="none" stroke="#22c55e" stroke-width="1.4"/>
      <polyline points="-5,-4 -3,-1 2,-7" fill="none" stroke="#22c55e" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="-5" y1="2" x2="5" y2="2" stroke="#22c55e" stroke-width="1" opacity="0.6"/>
    </g>
    <text x="8" y="-3" text-anchor="middle" fill="#86efac" font-size="12" font-weight="700">ホワイトリスト検証</text>
    <text x="8" y="13" text-anchor="middle" fill="#bbf7d0" font-size="9">許可パターンのみ受け入れる</text>
    <line x1="-110" y1="22" x2="110" y2="22" stroke="#22c55e" stroke-width="0.5" opacity="0.4"/>
    <text x="0" y="42" text-anchor="middle" fill="#22c55e" font-size="9" font-family="'Fira Code', monospace">if (!/^[a-zA-Z0-9]+$/.test(name))</text>
    <text x="0" y="56" text-anchor="middle" fill="#22c55e" font-size="9" font-family="'Fira Code', monospace">  throw new Error('Invalid')</text>
    <text x="0" y="76" text-anchor="middle" fill="#4ade80" font-size="8">許可された文字のみ通過させ</text>
    <text x="0" y="89" text-anchor="middle" fill="#4ade80" font-size="8">想定外の入力を完全に排除</text>
  </g>

  <!-- Card 2: 型・長さ・範囲チェック (top-right) -->
  <g transform="translate(460, 440)" filter="url(#shadow)">
    <rect x="-125" y="-20" width="250" height="120" rx="8" fill="#052e16" stroke="#22c55e" stroke-width="1.5"/>
    <!-- Ruler/measure icon -->
    <g transform="translate(-87, 22)">
      <rect x="-10" y="-6" width="20" height="12" rx="2" fill="none" stroke="#22c55e" stroke-width="1.4"/>
      <line x1="-6" y1="-6" x2="-6" y2="-1" stroke="#22c55e" stroke-width="1" opacity="0.8"/>
      <line x1="-2" y1="-6" x2="-2" y2="0" stroke="#22c55e" stroke-width="1" opacity="0.8"/>
      <line x1="2" y1="-6" x2="2" y2="-1" stroke="#22c55e" stroke-width="1" opacity="0.8"/>
      <line x1="6" y1="-6" x2="6" y2="0" stroke="#22c55e" stroke-width="1" opacity="0.8"/>
    </g>
    <text x="8" y="-3" text-anchor="middle" fill="#86efac" font-size="12" font-weight="700">型・長さ・範囲チェック</text>
    <text x="8" y="13" text-anchor="middle" fill="#bbf7d0" font-size="9">スキーマベースの入力検証</text>
    <line x1="-110" y1="22" x2="110" y2="22" stroke="#22c55e" stroke-width="0.5" opacity="0.4"/>
    <text x="0" y="42" text-anchor="middle" fill="#22c55e" font-size="9" font-family="'Fira Code', monospace">zod.string().max(50).parse(input)</text>
    <text x="0" y="76" text-anchor="middle" fill="#4ade80" font-size="8">型安全な検証で不正な型や</text>
    <text x="0" y="89" text-anchor="middle" fill="#4ade80" font-size="8">過大な長さの入力を自動拒否</text>
  </g>

  <!-- Card 3: パラメータ化クエリ (bottom-left) -->
  <g transform="translate(170, 590)" filter="url(#shadow)">
    <rect x="-125" y="-20" width="250" height="120" rx="8" fill="#052e16" stroke="#22c55e" stroke-width="1.5"/>
    <!-- Database shield icon -->
    <g transform="translate(-87, 22)">
      <ellipse cx="0" cy="-4" rx="8" ry="4" fill="none" stroke="#22c55e" stroke-width="1.4"/>
      <path d="M-8,-4 L-8,6" fill="none" stroke="#22c55e" stroke-width="1.4"/>
      <path d="M8,-4 L8,6" fill="none" stroke="#22c55e" stroke-width="1.4"/>
      <ellipse cx="0" cy="6" rx="8" ry="4" fill="none" stroke="#22c55e" stroke-width="1.4"/>
    </g>
    <text x="8" y="-3" text-anchor="middle" fill="#86efac" font-size="12" font-weight="700">パラメータ化クエリ</text>
    <text x="8" y="13" text-anchor="middle" fill="#bbf7d0" font-size="9">SQL文と値を分離して実行</text>
    <line x1="-110" y1="22" x2="110" y2="22" stroke="#22c55e" stroke-width="0.5" opacity="0.4"/>
    <text x="0" y="42" text-anchor="middle" fill="#22c55e" font-size="9" font-family="'Fira Code', monospace">db.query(</text>
    <text x="0" y="56" text-anchor="middle" fill="#22c55e" font-size="9" font-family="'Fira Code', monospace">  'SELECT * WHERE id=$1', [id])</text>
    <text x="0" y="76" text-anchor="middle" fill="#4ade80" font-size="8">プレースホルダにより入力値が</text>
    <text x="0" y="89" text-anchor="middle" fill="#4ade80" font-size="8">SQL構文として解釈されない</text>
  </g>

  <!-- Card 4: エスケープ処理 (bottom-right) -->
  <g transform="translate(460, 590)" filter="url(#shadow)">
    <rect x="-125" y="-20" width="250" height="120" rx="8" fill="#052e16" stroke="#22c55e" stroke-width="1.5"/>
    <!-- Escape/filter icon -->
    <g transform="translate(-87, 22)">
      <polygon points="-10,-10 10,-10 4,2 4,8 -4,8 -4,2" fill="none" stroke="#22c55e" stroke-width="1.4" stroke-linejoin="round"/>
    </g>
    <text x="8" y="-3" text-anchor="middle" fill="#86efac" font-size="12" font-weight="700">エスケープ処理</text>
    <text x="8" y="13" text-anchor="middle" fill="#bbf7d0" font-size="9">出力コンテキストに応じたエスケープ</text>
    <line x1="-110" y1="22" x2="110" y2="22" stroke="#22c55e" stroke-width="0.5" opacity="0.4"/>
    <text x="0" y="42" text-anchor="middle" fill="#22c55e" font-size="9" font-family="'Fira Code', monospace">HTML: &amp;lt; &amp;gt; &amp;amp; &amp;quot;</text>
    <text x="0" y="56" text-anchor="middle" fill="#22c55e" font-size="9" font-family="'Fira Code', monospace">SQL: prepared statements</text>
    <text x="0" y="76" text-anchor="middle" fill="#4ade80" font-size="8">HTML・SQL・OSコマンド等</text>
    <text x="0" y="89" text-anchor="middle" fill="#4ade80" font-size="8">各コンテキストで適切にエスケープ</text>
  </g>

  <!-- ====================================================== -->
  <!--  DEFENSE SIDEBAR (right)                                -->
  <!-- ====================================================== -->
  <g transform="translate(785, 100)">
    <rect x="0" y="0" width="295" height="340" rx="10" fill="#0f172a" stroke="#22c55e" stroke-width="1"/>
    <text x="148" y="28" text-anchor="middle" fill="#86efac" font-size="14" font-weight="700">防御レイヤー一覧</text>
    <line x1="14" y1="42" x2="281" y2="42" stroke="#22c55e" stroke-width="0.5" opacity="0.5"/>

    <!-- Layer 1 -->
    <g transform="translate(18, 64)">
      <rect x="0" y="-8" width="18" height="18" rx="4" fill="#22c55e" opacity="0.15"/>
      <text x="9" y="6" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="700">1</text>
      <text x="28" y="2" fill="#f8fafc" font-size="11" font-weight="600">ホワイトリスト検証</text>
      <text x="28" y="18" fill="#94a3b8" font-size="9">許可パターンのみ受け入れ</text>
      <text x="28" y="31" fill="#94a3b8" font-size="9">想定外の文字を完全排除</text>
    </g>

    <!-- Layer 2 -->
    <g transform="translate(18, 130)">
      <rect x="0" y="-8" width="18" height="18" rx="4" fill="#22c55e" opacity="0.15"/>
      <text x="9" y="6" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="700">2</text>
      <text x="28" y="2" fill="#f8fafc" font-size="11" font-weight="600">型・長さ・範囲チェック</text>
      <text x="28" y="18" fill="#94a3b8" font-size="9">Zodなどのスキーマバリデータで</text>
      <text x="28" y="31" fill="#94a3b8" font-size="9">型安全な入力検証を実施</text>
    </g>

    <!-- Layer 3 -->
    <g transform="translate(18, 196)">
      <rect x="0" y="-8" width="18" height="18" rx="4" fill="#22c55e" opacity="0.15"/>
      <text x="9" y="6" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="700">3</text>
      <text x="28" y="2" fill="#f8fafc" font-size="11" font-weight="600">パラメータ化クエリ</text>
      <text x="28" y="18" fill="#94a3b8" font-size="9">SQL文と値を分離し</text>
      <text x="28" y="31" fill="#94a3b8" font-size="9">SQLインジェクションを防止</text>
    </g>

    <!-- Layer 4 -->
    <g transform="translate(18, 262)">
      <rect x="0" y="-8" width="18" height="18" rx="4" fill="#22c55e" opacity="0.15"/>
      <text x="9" y="6" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="700">4</text>
      <text x="28" y="2" fill="#f8fafc" font-size="11" font-weight="600">エスケープ処理</text>
      <text x="28" y="18" fill="#94a3b8" font-size="9">出力先のコンテキストに応じた</text>
      <text x="28" y="31" fill="#94a3b8" font-size="9">適切なエスケープ処理を適用</text>
    </g>

    <!-- Defense-in-depth note -->
    <line x1="14" y1="306" x2="281" y2="306" stroke="#22c55e" stroke-width="0.5" opacity="0.5"/>
    <text x="148" y="328" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="600">多層防御 (Defense in Depth)</text>
  </g>

  <!-- ===== Legend ===== -->
  <g transform="translate(30, 730)">
    <rect x="0" y="0" width="360" height="36" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <line x1="14" y1="18" x2="44" y2="18" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,3" opacity="0.3"/>
    <text x="52" y="22" fill="#fca5a5" font-size="9" opacity="0.6">遮断された攻撃</text>
    <g transform="translate(172, 18)">
      <circle cx="0" cy="0" r="8" fill="#052e16" stroke="#22c55e" stroke-width="1.2"/>
      <line x1="-3" y1="-3" x2="3" y2="3" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="3" y1="-3" x2="-3" y2="3" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    <text x="188" y="22" fill="#86efac" font-size="9">ブロックポイント</text>
    <rect x="282" y="10" width="16" height="16" rx="3" fill="#052e16" stroke="#22c55e" stroke-width="1"/>
    <text x="304" y="22" fill="#86efac" font-size="9">防御機構</text>
  </g>

</svg>