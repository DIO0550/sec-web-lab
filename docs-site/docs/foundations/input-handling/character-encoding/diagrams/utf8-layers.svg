<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrowDown" markerWidth="8" markerHeight="6" refX="4" refY="0" orient="auto">
      <path d="M0,0 L4,6 L8,0" fill="#4ade80" stroke="none"/>
    </marker>
    <marker id="arrowUp" markerWidth="8" markerHeight="6" refX="4" refY="6" orient="auto-start-reverse">
      <path d="M0,6 L4,0 L8,6" fill="#4ade80" stroke="none"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="500" height="450" fill="url(#bg)" rx="0"/>

  <!-- Title -->
  <text x="250" y="35" text-anchor="middle" fill="#f8fafc" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="18" font-weight="bold">UTF-8統一スタック</text>

  <!-- Layer 1: Client (top) -->
  <rect x="100" y="55" width="300" height="55" rx="12" fill="#1e1b2e" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="250" y="80" text-anchor="middle" fill="#93c5fd" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="14" font-weight="bold">クライアント</text>
  <rect x="310" y="90" width="70" height="16" rx="6" fill="rgba(34,197,94,0.15)" stroke="#22c55e" stroke-width="1"/>
  <text x="345" y="102" text-anchor="middle" fill="#4ade80" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="10" font-weight="bold">UTF-8</text>

  <!-- Arrow 1 down -->
  <line x1="250" y1="110" x2="250" y2="145" stroke="#4ade80" stroke-width="2" marker-end="url(#arrowDown)"/>
  <text x="320" y="133" fill="#94a3b8" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="11">リクエスト (UTF-8)</text>

  <!-- Layer 2: Web Server -->
  <rect x="100" y="150" width="300" height="55" rx="12" fill="#1e1b2e" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="250" y="175" text-anchor="middle" fill="#93c5fd" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="14" font-weight="bold">Web サーバー</text>
  <rect x="310" y="185" width="70" height="16" rx="6" fill="rgba(34,197,94,0.15)" stroke="#22c55e" stroke-width="1"/>
  <text x="345" y="197" text-anchor="middle" fill="#4ade80" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="10" font-weight="bold">UTF-8</text>

  <!-- Arrow 2 down -->
  <line x1="250" y1="205" x2="250" y2="240" stroke="#4ade80" stroke-width="2" marker-end="url(#arrowDown)"/>
  <text x="320" y="228" fill="#94a3b8" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="11">クエリ (UTF-8)</text>

  <!-- Layer 3: Database -->
  <rect x="100" y="245" width="300" height="55" rx="12" fill="#1e1b2e" stroke="#a855f7" stroke-width="2" filter="url(#shadow)"/>
  <text x="250" y="270" text-anchor="middle" fill="#d8b4fe" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="14" font-weight="bold">データベース</text>
  <rect x="282" y="280" width="110" height="16" rx="6" fill="rgba(34,197,94,0.15)" stroke="#22c55e" stroke-width="1"/>
  <text x="337" y="292" text-anchor="middle" fill="#4ade80" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="10" font-weight="bold">UTF-8 / utf8mb4</text>

  <!-- Arrow 3 down -->
  <line x1="250" y1="300" x2="250" y2="335" stroke="#4ade80" stroke-width="2" marker-end="url(#arrowDown)"/>
  <text x="320" y="323" fill="#94a3b8" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="11">レスポンス (UTF-8)</text>

  <!-- Layer 4: Client (bottom) -->
  <rect x="100" y="340" width="300" height="55" rx="12" fill="#1e1b2e" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="250" y="365" text-anchor="middle" fill="#93c5fd" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="14" font-weight="bold">クライアント</text>
  <rect x="310" y="375" width="70" height="16" rx="6" fill="rgba(34,197,94,0.15)" stroke="#22c55e" stroke-width="1"/>
  <text x="345" y="387" text-anchor="middle" fill="#4ade80" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="10" font-weight="bold">UTF-8</text>

  <!-- Green safe indicator on left side -->
  <line x1="70" y1="70" x2="70" y2="380" stroke="#22c55e" stroke-width="2" stroke-dasharray="6,4" opacity="0.5"/>
  <text x="60" y="225" text-anchor="middle" fill="#22c55e" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="11" font-weight="bold" transform="rotate(-90,60,225)">全レイヤーで統一</text>

  <!-- Checkmark badge -->
  <rect x="140" y="410" width="220" height="28" rx="10" fill="rgba(34,197,94,0.1)" stroke="#22c55e" stroke-width="1.5"/>
  <text x="250" y="429" text-anchor="middle" fill="#4ade80" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="12" font-weight="bold">&#x2713; エンコーディング不一致による脆弱性を防止</text>
</svg>