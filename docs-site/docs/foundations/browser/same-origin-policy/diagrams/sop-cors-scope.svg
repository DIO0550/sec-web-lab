<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a855f7"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" fill="#f8fafc" font-size="20" font-weight="700">SOP / CORS の保護範囲</text>
  <text x="450" y="56" text-anchor="middle" fill="#94a3b8" font-size="12">防げる攻撃と防げない攻撃の違い</text>

  <!-- ===== Section 1: Protected (top) ===== -->
  <rect x="20" y="75" width="860" height="170" rx="10" fill="#022c22" stroke="#22c55e" stroke-width="1" opacity="0.4"/>
  <rect x="30" y="82" width="100" height="22" rx="6" fill="#22c55e" opacity="0.2"/>
  <text x="80" y="97" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="700">防御成功</text>

  <!-- Scenario: fetch blocked -->
  <g transform="translate(0, 0)">
    <!-- Attacker site -->
    <g transform="translate(130, 150)" filter="url(#shadow)">
      <rect x="-70" y="-28" width="140" height="56" rx="10" fill="#1e1b2e" stroke="#ef4444" stroke-width="1.2"/>
      <text x="0" y="-6" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="600">攻撃者のサイト</text>
      <text x="0" y="12" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="'Fira Code', monospace">evil.com</text>
    </g>

    <!-- fetch arrow -->
    <line x1="205" y1="140" x2="370" y2="140" stroke="#ef4444" stroke-width="2" stroke-dasharray="8,4" marker-end="url(#arrowRed)"/>
    <text x="288" y="132" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="600">fetch()</text>

    <!-- Server -->
    <g transform="translate(440, 150)" filter="url(#shadow)">
      <rect x="-60" y="-28" width="120" height="56" rx="10" fill="#1e1b2e" stroke="#3b82f6" stroke-width="1.2"/>
      <text x="0" y="-6" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="600">正規サイト</text>
      <text x="0" y="12" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="'Fira Code', monospace">bank.com</text>
    </g>

    <!-- Response arrow (blocked) -->
    <line x1="380" y1="162" x2="205" y2="162" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <text x="288" y="178" text-anchor="middle" fill="#93c5fd" font-size="10">レスポンス</text>

    <!-- Block badge -->
    <g transform="translate(560, 150)">
      <!-- Shield shape -->
      <path d="M0,-22 L18,-14 L18,4 Q18,20 0,26 Q-18,20 -18,4 L-18,-14 Z" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
      <!-- X mark -->
      <line x1="-6" y1="-6" x2="6" y2="6" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="6" y1="-6" x2="-6" y2="6" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round"/>
      <text x="0" y="42" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="700">BLOCKED</text>
    </g>

    <!-- Explanation -->
    <text x="720" y="138" text-anchor="middle" fill="#94a3b8" font-size="10">SOPにより</text>
    <text x="720" y="154" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="600">レスポンスの読み取り</text>
    <text x="720" y="170" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="600">をブロック</text>
  </g>

  <!-- ===== Section 2: Not Protected - CSRF (middle) ===== -->
  <rect x="20" y="260" width="860" height="110" rx="10" fill="#450a0a" stroke="#ef4444" stroke-width="1" opacity="0.3"/>
  <rect x="30" y="267" width="100" height="22" rx="6" fill="#ef4444" opacity="0.2"/>
  <text x="80" y="282" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="700">防御失敗</text>

  <!-- CSRF Scenario -->
  <g transform="translate(0, 0)">
    <!-- Attacker site -->
    <g transform="translate(130, 315)" filter="url(#shadow)">
      <rect x="-70" y="-22" width="140" height="44" rx="10" fill="#1e1b2e" stroke="#ef4444" stroke-width="1.2"/>
      <text x="0" y="-2" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="600">攻撃者のサイト</text>
      <text x="0" y="14" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="'Fira Code', monospace">&lt;form action=&quot;...&quot;&gt;</text>
    </g>

    <!-- form POST arrow -->
    <line x1="205" y1="308" x2="370" y2="308" stroke="#ef4444" stroke-width="2" stroke-dasharray="8,4" marker-end="url(#arrowRed)"/>
    <text x="288" y="300" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="600">form POST</text>

    <!-- Server -->
    <g transform="translate(440, 315)" filter="url(#shadow)">
      <rect x="-60" y="-22" width="120" height="44" rx="10" fill="#1e1b2e" stroke="#3b82f6" stroke-width="1.2"/>
      <text x="0" y="-2" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="600">正規サーバー</text>
      <text x="0" y="14" text-anchor="middle" fill="#94a3b8" font-size="9">処理を実行してしまう</text>
    </g>

    <!-- Pass badge -->
    <g transform="translate(560, 310)">
      <!-- Broken shield -->
      <path d="M0,-22 L18,-14 L18,4 Q18,20 0,26 Q-18,20 -18,4 L-18,-14 Z" fill="#451a03" stroke="#f97316" stroke-width="1.5"/>
      <!-- Lightning crack -->
      <polyline points="-2,-12 3,-2 -3,0 4,14" fill="none" stroke="#fb923c" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="0" y="42" text-anchor="middle" fill="#fb923c" font-size="11" font-weight="700">BYPASS</text>
    </g>

    <!-- Explanation -->
    <text x="720" y="300" text-anchor="middle" fill="#94a3b8" font-size="10">SOPはリクエストの</text>
    <text x="720" y="316" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="600">送信を止めない</text>
    <text x="720" y="332" text-anchor="middle" fill="#94a3b8" font-size="10">（CSRF攻撃が成立）</text>
  </g>

  <!-- ===== Section 3: Not Protected - XSS (bottom) ===== -->
  <rect x="20" y="385" width="860" height="110" rx="10" fill="#450a0a" stroke="#ef4444" stroke-width="1" opacity="0.3"/>

  <!-- XSS Scenario -->
  <g transform="translate(0, 0)">
    <!-- Injected script inside legitimate site -->
    <g transform="translate(130, 440)" filter="url(#shadow)">
      <rect x="-70" y="-22" width="140" height="44" rx="10" fill="#1e1b2e" stroke="#a855f7" stroke-width="1.2"/>
      <text x="0" y="-2" text-anchor="middle" fill="#d8b4fe" font-size="11" font-weight="600">正規サイト内</text>
      <text x="0" y="14" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="'Fira Code', monospace">XSSスクリプト</text>
    </g>

    <!-- XSS arrow -->
    <line x1="205" y1="440" x2="370" y2="440" stroke="#a855f7" stroke-width="2" marker-end="url(#arrowPurple)"/>
    <text x="288" y="432" text-anchor="middle" fill="#d8b4fe" font-size="10" font-weight="600">DOM / Cookie アクセス</text>

    <!-- Same origin DOM -->
    <g transform="translate(440, 440)" filter="url(#shadow)">
      <rect x="-60" y="-22" width="120" height="44" rx="10" fill="#1e1b2e" stroke="#a855f7" stroke-width="1.2"/>
      <text x="0" y="-2" text-anchor="middle" fill="#d8b4fe" font-size="11" font-weight="600">同一オリジンの</text>
      <text x="0" y="14" text-anchor="middle" fill="#d8b4fe" font-size="11" font-weight="600">DOM / Cookie</text>
    </g>

    <!-- Pass badge -->
    <g transform="translate(560, 440)">
      <!-- Broken shield -->
      <path d="M0,-22 L18,-14 L18,4 Q18,20 0,26 Q-18,20 -18,4 L-18,-14 Z" fill="#451a03" stroke="#f97316" stroke-width="1.5"/>
      <!-- Lightning crack -->
      <polyline points="-2,-12 3,-2 -3,0 4,14" fill="none" stroke="#fb923c" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="0" y="42" text-anchor="middle" fill="#fb923c" font-size="11" font-weight="700">BYPASS</text>
    </g>

    <!-- Explanation -->
    <text x="720" y="428" text-anchor="middle" fill="#94a3b8" font-size="10">同一オリジンで実行されるため</text>
    <text x="720" y="444" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="600">SOPの保護対象外</text>
    <text x="720" y="460" text-anchor="middle" fill="#94a3b8" font-size="10">（XSS攻撃が成立）</text>
  </g>
</svg>
