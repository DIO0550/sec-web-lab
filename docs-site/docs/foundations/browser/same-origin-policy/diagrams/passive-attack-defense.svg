<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 840" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <filter id="glowGreen">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="840" fill="url(#bgGrad)" rx="12"/>

  <!-- ===== Title ===== -->
  <text x="385" y="38" text-anchor="middle" fill="#f8fafc" font-size="22" font-weight="700">Passive Attack Defense</text>
  <text x="385" y="58" text-anchor="middle" fill="#94a3b8" font-size="12">受動的攻撃への対策 — SOP / CORSによる多層防御</text>
  <rect x="315" y="66" width="140" height="20" rx="10" fill="#22c55e" opacity="0.15"/>
  <text x="385" y="80" text-anchor="middle" fill="#86efac" font-size="10" font-weight="600">多層防御 Defense in Depth</text>

  <!-- ===== ACTORS ===== -->

  <!-- Attacker (dimmed) -->
  <g transform="translate(115, 250)" filter="url(#shadow)" opacity="0.45">
    <rect x="-56" y="-30" width="112" height="125" rx="12" fill="#1e1b2e" stroke="#ef4444" stroke-width="1.5"/>
    <g transform="translate(0, 10)">
      <path d="M-13,-17 Q0,-28 13,-17 L13,-4 Q0,2 -13,-4 Z" fill="none" stroke="#ef4444" stroke-width="1.8"/>
      <circle cx="-4" cy="-9" r="1.8" fill="#ef4444"/>
      <circle cx="4" cy="-9" r="1.8" fill="#ef4444"/>
      <path d="M-17,36 Q-17,14 0,10 Q17,14 17,36" fill="none" stroke="#ef4444" stroke-width="2"/>
      <line x1="-17" y1="36" x2="17" y2="36" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
    </g>
    <text x="0" y="72" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="700">攻撃者</text>
    <text x="0" y="86" text-anchor="middle" fill="#ef4444" font-size="9.5" opacity="0.7">Attacker</text>
  </g>

  <!-- Victim Browser (protected) -->
  <g transform="translate(380, 250)" filter="url(#shadow)">
    <rect x="-56" y="-30" width="112" height="125" rx="12" fill="#1e1b2e" stroke="#22c55e" stroke-width="1.5"/>
    <g transform="translate(0, 10)">
      <circle cx="0" cy="-9" r="13" fill="none" stroke="#22c55e" stroke-width="1.8"/>
      <circle cx="-4" cy="-11" r="1.5" fill="#22c55e"/>
      <circle cx="4" cy="-11" r="1.5" fill="#22c55e"/>
      <path d="M-4,-4 Q0,1 4,-4" fill="none" stroke="#22c55e" stroke-width="1.3" stroke-linecap="round"/>
      <path d="M-17,36 Q-17,14 0,10 Q17,14 17,36" fill="none" stroke="#22c55e" stroke-width="2"/>
      <line x1="-17" y1="36" x2="17" y2="36" stroke="#22c55e" stroke-width="2" stroke-linecap="round"/>
    </g>
    <text x="0" y="72" text-anchor="middle" fill="#86efac" font-size="13" font-weight="700">被害者</text>
    <text x="0" y="86" text-anchor="middle" fill="#22c55e" font-size="9.5" opacity="0.7">Protected Browser</text>
    <!-- Shield badge -->
    <g transform="translate(42, -22)">
      <path d="M0,-9 L9,-4 L9,3 Q9,9 0,12 Q-9,9 -9,3 L-9,-4 Z" fill="#22c55e" opacity="0.2" stroke="#22c55e" stroke-width="1.2"/>
      <polyline points="-3,2 -1,5 5,-2" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Legitimate Server (protected) -->
  <g transform="translate(645, 250)" filter="url(#shadow)">
    <rect x="-56" y="-30" width="112" height="125" rx="12" fill="#1e1b2e" stroke="#22c55e" stroke-width="1.5"/>
    <g transform="translate(0, 14)">
      <rect x="-20" y="-18" width="40" height="12" rx="3" fill="none" stroke="#22c55e" stroke-width="1.5"/>
      <circle cx="-12" cy="-12" r="2" fill="#22c55e"/><circle cx="-5" cy="-12" r="2" fill="#22c55e"/>
      <rect x="-20" y="-2" width="40" height="12" rx="3" fill="none" stroke="#22c55e" stroke-width="1.5"/>
      <circle cx="-12" cy="4" r="2" fill="#22c55e"/><circle cx="-5" cy="4" r="2" fill="#22c55e"/>
      <rect x="-20" y="14" width="40" height="12" rx="3" fill="none" stroke="#22c55e" stroke-width="1.5"/>
      <circle cx="-12" cy="20" r="2" fill="#22c55e"/><circle cx="-5" cy="20" r="2" fill="#22c55e"/>
    </g>
    <text x="0" y="72" text-anchor="middle" fill="#86efac" font-size="13" font-weight="700">正規サーバー</text>
    <text x="0" y="86" text-anchor="middle" fill="#22c55e" font-size="9.5" opacity="0.7">CORS Configured</text>
    <!-- Shield badge -->
    <g transform="translate(42, -22)">
      <path d="M0,-9 L9,-4 L9,3 Q9,9 0,12 Q-9,9 -9,3 L-9,-4 Z" fill="#22c55e" opacity="0.2" stroke="#22c55e" stroke-width="1.2"/>
      <polyline points="-3,2 -1,5 5,-2" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/>
    </g>
  </g>

  <!-- ===== Blocked Attack Arrows (dimmed) ===== -->

  <!-- Blocked: Attacker's script tries to read cross-origin response -->
  <path d="M 171 282 L 324 282" fill="none" stroke="#ef4444" stroke-width="2.2" stroke-dasharray="8,4" opacity="0.2" marker-end="url(#arrowRed)"/>

  <!-- Blocked: Data exfiltration attempt -->
  <path d="M 350 345 C 300 460, 180 460, 145 345" fill="none" stroke="#ef4444" stroke-width="2.2" stroke-dasharray="8,4" opacity="0.15"/>

  <!-- SOP blocks cross-origin response reading -->
  <path d="M 589 260 L 436 260" fill="none" stroke="#ef4444" stroke-width="2.2" stroke-dasharray="4,3" opacity="0.25"/>

  <!-- ===== Block Points ===== -->

  <!-- Block point 1: SOP blocks response reading -->
  <g transform="translate(512, 260)">
    <circle r="16" fill="#052e16" stroke="#22c55e" stroke-width="2" filter="url(#glowGreen)"/>
    <line x1="-6" y1="-6" x2="6" y2="6" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="6" y1="-6" x2="-6" y2="6" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <text x="512" y="238" text-anchor="middle" fill="#86efac" font-size="9" font-weight="600">SOP: レスポンス読み取りブロック</text>

  <!-- Block point 2: SameSite Cookie blocks CSRF -->
  <g transform="translate(248, 282)">
    <circle r="16" fill="#052e16" stroke="#22c55e" stroke-width="2" filter="url(#glowGreen)"/>
    <line x1="-6" y1="-6" x2="6" y2="6" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="6" y1="-6" x2="-6" y2="6" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <text x="248" y="310" text-anchor="middle" fill="#86efac" font-size="9" font-weight="600">CSP: スクリプト実行をブロック</text>

  <!-- ===== Defense Wall: SOP ===== -->
  <g transform="translate(460, 370)" filter="url(#shadow)">
    <rect x="-65" y="-20" width="130" height="46" rx="6" fill="#052e16" stroke="#22c55e" stroke-width="1.5"/>
    <text x="0" y="-2" text-anchor="middle" fill="#86efac" font-size="11" font-weight="700">🛡 同一オリジンポリシー</text>
    <text x="0" y="16" text-anchor="middle" fill="#bbf7d0" font-size="8.5">異なるオリジンのレスポンス読取を禁止</text>
  </g>

  <!-- ===== SIDEBAR ===== -->
  <g transform="translate(785, 100)">
    <rect x="0" y="0" width="295" height="340" rx="10" fill="#0f172a" stroke="#22c55e" stroke-width="1"/>
    <text x="148" y="28" text-anchor="middle" fill="#86efac" font-size="14" font-weight="700">防御レイヤー一覧</text>
    <line x1="14" y1="42" x2="281" y2="42" stroke="#22c55e" stroke-width="0.5" opacity="0.5"/>

    <!-- Layer 1 -->
    <g transform="translate(18, 64)">
      <rect x="0" y="-8" width="18" height="18" rx="4" fill="#22c55e" opacity="0.15"/>
      <text x="9" y="6" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="700">1</text>
      <text x="28" y="2" fill="#f8fafc" font-size="11" font-weight="600">同一オリジンポリシー (SOP)</text>
      <text x="28" y="18" fill="#94a3b8" font-size="9">異なるオリジンからのレスポンス</text>
      <text x="28" y="31" fill="#94a3b8" font-size="9">読み取りをブラウザがブロック</text>
    </g>

    <!-- Layer 2 -->
    <g transform="translate(18, 130)">
      <rect x="0" y="-8" width="18" height="18" rx="4" fill="#22c55e" opacity="0.15"/>
      <text x="9" y="6" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="700">2</text>
      <text x="28" y="2" fill="#f8fafc" font-size="11" font-weight="600">CORS設定</text>
      <text x="28" y="18" fill="#94a3b8" font-size="9">Access-Control-Allow-Origin で</text>
      <text x="28" y="31" fill="#94a3b8" font-size="9">許可するオリジンを明示的に指定</text>
    </g>

    <!-- Layer 3 -->
    <g transform="translate(18, 196)">
      <rect x="0" y="-8" width="18" height="18" rx="4" fill="#22c55e" opacity="0.15"/>
      <text x="9" y="6" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="700">3</text>
      <text x="28" y="2" fill="#f8fafc" font-size="11" font-weight="600">CSP (Content Security Policy)</text>
      <text x="28" y="18" fill="#94a3b8" font-size="9">インラインスクリプトや外部スクリプトの</text>
      <text x="28" y="31" fill="#94a3b8" font-size="9">実行を制限するセキュリティヘッダ</text>
    </g>

    <!-- Layer 4 -->
    <g transform="translate(18, 262)">
      <rect x="0" y="-8" width="18" height="18" rx="4" fill="#22c55e" opacity="0.15"/>
      <text x="9" y="6" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="700">4</text>
      <text x="28" y="2" fill="#f8fafc" font-size="11" font-weight="600">SameSite Cookie</text>
      <text x="28" y="18" fill="#94a3b8" font-size="9">クロスサイトリクエストでのCookie</text>
      <text x="28" y="31" fill="#94a3b8" font-size="9">自動送信を制限しCSRFを緩和</text>
    </g>

    <!-- Defense in Depth note -->
    <text x="148" y="320" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="600">🔒 多層防御 (Defense in Depth)</text>
  </g>

  <!-- ===== Defense Technique Cards (2x2 Grid) ===== -->
  <line x1="60" y1="448" x2="710" y2="448" stroke="#22c55e" stroke-width="0.7" opacity="0.3"/>
  <rect x="315" y="435" width="140" height="26" rx="13" fill="#052e16" stroke="#22c55e" stroke-width="1"/>
  <text x="385" y="453" text-anchor="middle" fill="#86efac" font-size="11" font-weight="700">防御テクニック</text>

  <!-- Card 1: SOP -->
  <g transform="translate(215, 535)" filter="url(#shadow)">
    <rect x="-125" y="-22" width="250" height="120" rx="8" fill="#052e16" stroke="#22c55e" stroke-width="1.5"/>
    <rect x="-108" y="-12" width="22" height="22" rx="5" fill="#22c55e" opacity="0.15"/>
    <text x="-97" y="5" text-anchor="middle" fill="#22c55e" font-size="12" font-weight="700">1</text>
    <text x="-78" y="4" fill="#86efac" font-size="11" font-weight="700">同一オリジンポリシー</text>
    <text x="-78" y="22" fill="#bbf7d0" font-size="9">ブラウザ組み込みのセキュリティ機構</text>
    <line x1="-108" y1="34" x2="108" y2="34" stroke="#22c55e" stroke-width="0.5" opacity="0.4"/>
    <text x="0" y="54" text-anchor="middle" fill="#22c55e" font-size="9" font-family="'Fira Code', monospace">fetch(cross-origin)</text>
    <text x="0" y="74" text-anchor="middle" fill="#22c55e" font-size="9" font-family="'Fira Code', monospace">→ レスポンス読み取りブロック</text>
    <text x="0" y="88" text-anchor="middle" fill="#4ade80" font-size="8">スキーム+ホスト+ポートで判定</text>
  </g>

  <!-- Card 2: CORS -->
  <g transform="translate(555, 535)" filter="url(#shadow)">
    <rect x="-125" y="-22" width="250" height="120" rx="8" fill="#052e16" stroke="#22c55e" stroke-width="1.5"/>
    <rect x="-108" y="-12" width="22" height="22" rx="5" fill="#22c55e" opacity="0.15"/>
    <text x="-97" y="5" text-anchor="middle" fill="#22c55e" font-size="12" font-weight="700">2</text>
    <text x="-78" y="4" fill="#86efac" font-size="11" font-weight="700">CORS設定</text>
    <text x="-78" y="22" fill="#bbf7d0" font-size="9">許可オリジンをサーバー側で明示</text>
    <line x1="-108" y1="34" x2="108" y2="34" stroke="#22c55e" stroke-width="0.5" opacity="0.4"/>
    <text x="0" y="54" text-anchor="middle" fill="#22c55e" font-size="9" font-family="'Fira Code', monospace">Access-Control-Allow-Origin:</text>
    <text x="0" y="74" text-anchor="middle" fill="#22c55e" font-size="9" font-family="'Fira Code', monospace">https://app.example.com</text>
    <text x="0" y="88" text-anchor="middle" fill="#4ade80" font-size="8">ワイルドカード(*)は認証付きで使用不可</text>
  </g>

  <!-- Card 3: CSP -->
  <g transform="translate(215, 690)" filter="url(#shadow)">
    <rect x="-125" y="-22" width="250" height="120" rx="8" fill="#052e16" stroke="#22c55e" stroke-width="1.5"/>
    <rect x="-108" y="-12" width="22" height="22" rx="5" fill="#22c55e" opacity="0.15"/>
    <text x="-97" y="5" text-anchor="middle" fill="#22c55e" font-size="12" font-weight="700">3</text>
    <text x="-78" y="4" fill="#86efac" font-size="11" font-weight="700">Content Security Policy</text>
    <text x="-78" y="22" fill="#bbf7d0" font-size="9">スクリプト実行元を制限するヘッダ</text>
    <line x1="-108" y1="34" x2="108" y2="34" stroke="#22c55e" stroke-width="0.5" opacity="0.4"/>
    <text x="0" y="54" text-anchor="middle" fill="#22c55e" font-size="9" font-family="'Fira Code', monospace">Content-Security-Policy:</text>
    <text x="0" y="74" text-anchor="middle" fill="#22c55e" font-size="9" font-family="'Fira Code', monospace">script-src 'self'</text>
    <text x="0" y="88" text-anchor="middle" fill="#4ade80" font-size="8">インラインスクリプト・eval を禁止</text>
  </g>

  <!-- Card 4: SameSite Cookie -->
  <g transform="translate(555, 690)" filter="url(#shadow)">
    <rect x="-125" y="-22" width="250" height="120" rx="8" fill="#052e16" stroke="#22c55e" stroke-width="1.5"/>
    <rect x="-108" y="-12" width="22" height="22" rx="5" fill="#22c55e" opacity="0.15"/>
    <text x="-97" y="5" text-anchor="middle" fill="#22c55e" font-size="12" font-weight="700">4</text>
    <text x="-78" y="4" fill="#86efac" font-size="11" font-weight="700">SameSite Cookie</text>
    <text x="-78" y="22" fill="#bbf7d0" font-size="9">クロスサイトでのCookie送信を制限</text>
    <line x1="-108" y1="34" x2="108" y2="34" stroke="#22c55e" stroke-width="0.5" opacity="0.4"/>
    <text x="0" y="54" text-anchor="middle" fill="#22c55e" font-size="9" font-family="'Fira Code', monospace">Set-Cookie: sid=xxx;</text>
    <text x="0" y="74" text-anchor="middle" fill="#22c55e" font-size="9" font-family="'Fira Code', monospace">SameSite=Lax; Secure</text>
    <text x="0" y="88" text-anchor="middle" fill="#4ade80" font-size="8">CSRF攻撃の緩和に効果的</text>
  </g>

  <!-- ===== Legend ===== -->
  <g transform="translate(205, 800)">
    <rect x="0" y="0" width="360" height="36" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <line x1="14" y1="18" x2="44" y2="18" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,3" opacity="0.3"/>
    <text x="52" y="22" fill="#fca5a5" font-size="9" opacity="0.6">遮断された攻撃</text>
    <circle cx="168" cy="18" r="8" fill="#052e16" stroke="#22c55e" stroke-width="1"/>
    <text x="184" y="22" fill="#86efac" font-size="9">ブロックポイント</text>
    <rect x="282" y="10" width="16" height="16" rx="3" fill="#052e16" stroke="#22c55e" stroke-width="1"/>
    <text x="304" y="22" fill="#86efac" font-size="9">防御機構</text>
  </g>
</svg>
