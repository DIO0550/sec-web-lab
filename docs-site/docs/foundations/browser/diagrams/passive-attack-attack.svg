<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 750" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a855f7"/>
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="750" fill="url(#bgGrad)" rx="12"/>

  <!-- ===== Title ===== -->
  <text x="380" y="38" text-anchor="middle" fill="#f8fafc" font-size="22" font-weight="700">Passive Attack Flow</text>
  <text x="380" y="58" text-anchor="middle" fill="#94a3b8" font-size="12">受動的攻撃 — 被害者のブラウザを経由した攻撃の流れ</text>
  <rect x="300" y="66" width="160" height="20" rx="10" fill="#ef4444" opacity="0.15"/>
  <text x="380" y="80" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="600">OWASP — Client-Side Attack</text>

  <!-- ===== ACTORS ===== -->

  <!-- Attacker (罠サイト) -->
  <g transform="translate(115, 250)" filter="url(#shadow)">
    <rect x="-56" y="-30" width="112" height="125" rx="12" fill="#1e1b2e" stroke="#ef4444" stroke-width="1.5"/>
    <g transform="translate(0, 10)">
      <path d="M-13,-17 Q0,-28 13,-17 L13,-4 Q0,2 -13,-4 Z" fill="none" stroke="#ef4444" stroke-width="1.8"/>
      <circle cx="-4" cy="-9" r="1.8" fill="#ef4444"/>
      <circle cx="4" cy="-9" r="1.8" fill="#ef4444"/>
      <path d="M-17,36 Q-17,14 0,10 Q17,14 17,36" fill="none" stroke="#ef4444" stroke-width="2"/>
      <line x1="-17" y1="36" x2="17" y2="36" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
    </g>
    <text x="0" y="72" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="700">攻撃者</text>
    <text x="0" y="86" text-anchor="middle" fill="#ef4444" font-size="9.5" opacity="0.7">Attacker</text>
  </g>

  <!-- Victim Browser -->
  <g transform="translate(380, 250)" filter="url(#shadow)">
    <rect x="-56" y="-30" width="112" height="125" rx="12" fill="#1e1b2e" stroke="#a855f7" stroke-width="1.5"/>
    <g transform="translate(0, 10)">
      <circle cx="0" cy="-9" r="13" fill="none" stroke="#a855f7" stroke-width="1.8"/>
      <circle cx="-4" cy="-11" r="1.5" fill="#a855f7"/>
      <circle cx="4" cy="-11" r="1.5" fill="#a855f7"/>
      <path d="M-4,-4 Q0,1 4,-4" fill="none" stroke="#a855f7" stroke-width="1.3" stroke-linecap="round"/>
      <path d="M-17,36 Q-17,14 0,10 Q17,14 17,36" fill="none" stroke="#a855f7" stroke-width="2"/>
      <line x1="-17" y1="36" x2="17" y2="36" stroke="#a855f7" stroke-width="2" stroke-linecap="round"/>
    </g>
    <text x="0" y="72" text-anchor="middle" fill="#d8b4fe" font-size="13" font-weight="700">被害者</text>
    <text x="0" y="86" text-anchor="middle" fill="#a855f7" font-size="9.5" opacity="0.7">Victim Browser</text>
  </g>

  <!-- Legitimate Server -->
  <g transform="translate(645, 250)" filter="url(#shadow)">
    <rect x="-56" y="-30" width="112" height="125" rx="12" fill="#1e1b2e" stroke="#3b82f6" stroke-width="1.5"/>
    <g transform="translate(0, 14)">
      <rect x="-20" y="-18" width="40" height="12" rx="3" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
      <circle cx="-12" cy="-12" r="2" fill="#3b82f6"/><circle cx="-5" cy="-12" r="2" fill="#3b82f6"/>
      <rect x="-20" y="-2" width="40" height="12" rx="3" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
      <circle cx="-12" cy="4" r="2" fill="#3b82f6"/><circle cx="-5" cy="4" r="2" fill="#3b82f6"/>
      <rect x="-20" y="14" width="40" height="12" rx="3" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
      <circle cx="-12" cy="20" r="2" fill="#3b82f6"/><circle cx="-5" cy="20" r="2" fill="#3b82f6"/>
    </g>
    <text x="0" y="72" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">正規サーバー</text>
    <text x="0" y="86" text-anchor="middle" fill="#3b82f6" font-size="9.5" opacity="0.7">Legitimate Server</text>
  </g>

  <!-- ===== ARROWS ===== -->

  <!-- Step 1: Attacker sets up trap (top curve attacker -> victim) -->
  <path d="M 155 220 Q 248 120 365 220" fill="none" stroke="#ef4444" stroke-width="2.2" stroke-dasharray="8,4" marker-end="url(#arrowRed)"/>
  <circle cx="248" cy="138" r="16" fill="#ef4444"/>
  <text x="248" y="143" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">1</text>
  <text x="248" y="120" text-anchor="middle" fill="#fca5a5" font-size="9">罠リンクを送信</text>

  <!-- Step 2: Victim accesses trap site (victim -> attacker) -->
  <path d="M 338 240 L 171 240" fill="none" stroke="#a855f7" stroke-width="2.2" marker-end="url(#arrowPurple)"/>
  <circle cx="254" cy="218" r="16" fill="#a855f7"/>
  <text x="254" y="223" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">2</text>

  <!-- Step 3: Trap returns malicious content (attacker -> victim) -->
  <path d="M 171 282 L 324 282" fill="none" stroke="#ef4444" stroke-width="2.2" stroke-dasharray="8,4" marker-end="url(#arrowRed)"/>
  <circle cx="248" cy="304" r="16" fill="#ef4444"/>
  <text x="248" y="309" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">3</text>

  <!-- Step 4: Victim browser sends request to legitimate server (victim -> server) -->
  <path d="M 436 240 L 589 240" fill="none" stroke="#a855f7" stroke-width="2.2" marker-end="url(#arrowPurple)"/>
  <circle cx="512" cy="218" r="16" fill="#a855f7"/>
  <text x="512" y="223" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">4</text>

  <!-- Step 5: Server returns data (server -> victim) -->
  <path d="M 589 282 L 436 282" fill="none" stroke="#3b82f6" stroke-width="2.2" marker-end="url(#arrowBlue)"/>
  <circle cx="512" cy="304" r="16" fill="#3b82f6"/>
  <text x="512" y="309" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">5</text>

  <!-- Step 6: Data exfiltrated to attacker (bottom curve victim -> attacker) -->
  <path d="M 350 345 C 300 500, 180 500, 145 345" fill="none" stroke="#ef4444" stroke-width="2.2" stroke-dasharray="8,4" marker-end="url(#arrowRed)"/>
  <circle cx="230" cy="480" r="16" fill="#ef4444"/>
  <text x="230" y="485" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">6</text>
  <text x="230" y="510" text-anchor="middle" fill="#fca5a5" font-size="9">窃取データ送信</text>

  <!-- ===== Browser Box (under victim) ===== -->
  <g transform="translate(380, 420)" filter="url(#shadow)">
    <rect x="-75" y="-28" width="150" height="70" rx="8" fill="#1e1b2e" stroke="#ef4444" stroke-width="1.2" stroke-dasharray="4,2"/>
    <rect x="-65" y="-20" width="130" height="13" rx="3" fill="#0f172a"/>
    <circle cx="-55" cy="-14" r="2.5" fill="#ef4444"/>
    <circle cx="-47" cy="-14" r="2.5" fill="#f59e0b"/>
    <circle cx="-39" cy="-14" r="2.5" fill="#22c55e"/>
    <text x="0" y="6" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="600">悪意のあるスクリプト</text>
    <text x="0" y="20" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="'Fira Code', monospace">fetch() + document.cookie</text>
    <text x="0" y="34" text-anchor="middle" fill="#ef4444" font-size="8.5">被害者の権限でリクエスト実行</text>
  </g>

  <!-- ===== Vulnerability Box ===== -->
  <g transform="translate(512, 360)" filter="url(#shadow)">
    <rect x="-100" y="-18" width="200" height="38" rx="8" fill="#451a03" stroke="#f97316" stroke-width="1"/>
    <text x="0" y="0" text-anchor="middle" fill="#fdba74" font-size="11" font-weight="700">⚠ Cookieの自動送信</text>
    <text x="0" y="16" text-anchor="middle" fill="#fed7aa" font-size="8.5">ブラウザが正規サーバーにCookieを自動付与</text>
  </g>

  <!-- ===== SIDEBAR ===== -->
  <g transform="translate(775, 100)">
    <rect x="0" y="0" width="305" height="400" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="152" y="28" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="700">攻撃ステップ詳細</text>
    <line x1="16" y1="40" x2="289" y2="40" stroke="#334155" stroke-width="1"/>

    <!-- Step 1 -->
    <circle cx="34" cy="68" r="13" fill="#ef4444"/>
    <text x="34" y="73" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">1</text>
    <text x="56" y="64" fill="#f8fafc" font-size="11.5" font-weight="600">罠リンクの配布</text>
    <text x="56" y="80" fill="#94a3b8" font-size="9.5">メール・SNS等で罠URLを被害者に送信</text>
    <text x="56" y="93" fill="#94a3b8" font-size="9.5">被害者がクリックするのを待つ</text>

    <!-- Step 2 -->
    <circle cx="34" cy="124" r="13" fill="#a855f7"/>
    <text x="34" y="129" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">2</text>
    <text x="56" y="120" fill="#f8fafc" font-size="11.5" font-weight="600">罠サイトにアクセス</text>
    <text x="56" y="136" fill="#94a3b8" font-size="9.5">被害者が罠リンクをクリック</text>
    <text x="56" y="149" fill="#94a3b8" font-size="9.5">攻撃者の用意したページを表示</text>

    <!-- Step 3 -->
    <circle cx="34" cy="180" r="13" fill="#ef4444"/>
    <text x="34" y="185" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">3</text>
    <text x="56" y="176" fill="#f8fafc" font-size="11.5" font-weight="600">悪意のあるコンテンツ返却</text>
    <text x="56" y="192" fill="#94a3b8" font-size="9.5">JSスクリプトを含むHTMLを返却</text>
    <text x="56" y="205" fill="#94a3b8" font-size="9.5">被害者ブラウザで自動実行される</text>

    <!-- Step 4 -->
    <circle cx="34" cy="236" r="13" fill="#a855f7"/>
    <text x="34" y="241" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">4</text>
    <text x="56" y="232" fill="#f8fafc" font-size="11.5" font-weight="600">正規サーバーへリクエスト</text>
    <text x="56" y="248" fill="#94a3b8" font-size="9.5">被害者の権限（Cookie付き）で</text>
    <text x="56" y="261" fill="#94a3b8" font-size="9.5">正規サーバーにリクエストを送信</text>

    <!-- Step 5 -->
    <circle cx="34" cy="292" r="13" fill="#3b82f6"/>
    <text x="34" y="297" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">5</text>
    <text x="56" y="288" fill="#f8fafc" font-size="11.5" font-weight="600">正規サーバーが応答</text>
    <text x="56" y="304" fill="#94a3b8" font-size="9.5">正規のリクエストと区別できず</text>
    <text x="56" y="317" fill="#94a3b8" font-size="9.5">被害者のデータをレスポンスで返す</text>

    <!-- Step 6 -->
    <circle cx="34" cy="348" r="13" fill="#ef4444"/>
    <text x="34" y="353" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">6</text>
    <text x="56" y="344" fill="#f8fafc" font-size="11.5" font-weight="600">データ窃取</text>
    <text x="56" y="360" fill="#94a3b8" font-size="9.5">取得したデータを攻撃者のサーバーへ</text>
    <text x="56" y="373" fill="#94a3b8" font-size="9.5">送信（img.src / fetch等を使用）</text>
  </g>

  <!-- ===== Legend ===== -->
  <g transform="translate(775, 520)">
    <rect x="0" y="0" width="305" height="68" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="14" y="18" fill="#94a3b8" font-size="10" font-weight="600">凡例</text>
    <line x1="14" y1="34" x2="44" y2="34" stroke="#ef4444" stroke-width="2" stroke-dasharray="6,3"/>
    <text x="52" y="38" fill="#fca5a5" font-size="9.5">攻撃通信</text>
    <line x1="152" y1="34" x2="182" y2="34" stroke="#3b82f6" stroke-width="2"/>
    <text x="190" y="38" fill="#93c5fd" font-size="9.5">サーバー応答</text>
    <line x1="14" y1="54" x2="44" y2="54" stroke="#a855f7" stroke-width="2"/>
    <text x="52" y="58" fill="#d8b4fe" font-size="9.5">ユーザー通信</text>
    <rect x="152" y="48" width="12" height="12" rx="2" fill="#451a03" stroke="#f97316" stroke-width="0.8"/>
    <text x="170" y="58" fill="#fdba74" font-size="9.5">脆弱性ポイント</text>
  </g>

  <!-- ===== Bottom Section: Attack Techniques ===== -->
  <line x1="30" y1="615" x2="750" y2="615" stroke="#334155" stroke-width="1" opacity="0.5"/>
  <text x="380" y="645" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="700">🔥 使用される攻撃テクニック</text>

  <!-- Technique 1 -->
  <g transform="translate(125, 675)" filter="url(#shadow)">
    <rect x="-100" y="-14" width="200" height="38" rx="8" fill="#1e1b2e" stroke="#ef4444" stroke-width="1"/>
    <rect x="-88" y="-8" width="28" height="26" rx="5" fill="#ef4444" opacity="0.1"/>
    <text x="-74" y="10" text-anchor="middle" fill="#ef4444" font-size="12" font-weight="700">&lt;/&gt;</text>
    <text x="10" y="0" text-anchor="middle" fill="#f8fafc" font-size="11" font-weight="600">XSS / スクリプト注入</text>
    <text x="10" y="16" text-anchor="middle" fill="#94a3b8" font-size="8.5">悪意のあるJSを被害者ブラウザで実行</text>
  </g>

  <!-- Technique 2 -->
  <g transform="translate(380, 675)" filter="url(#shadow)">
    <rect x="-100" y="-14" width="200" height="38" rx="8" fill="#1e1b2e" stroke="#ef4444" stroke-width="1"/>
    <rect x="-88" y="-8" width="28" height="26" rx="5" fill="#ef4444" opacity="0.1"/>
    <text x="-74" y="10" text-anchor="middle" fill="#ef4444" font-size="12" font-weight="700">📋</text>
    <text x="10" y="0" text-anchor="middle" fill="#f8fafc" font-size="11" font-weight="600">CSRF / 偽造リクエスト</text>
    <text x="10" y="16" text-anchor="middle" fill="#94a3b8" font-size="8.5">被害者の権限で意図しない操作を実行</text>
  </g>

  <!-- Technique 3 -->
  <g transform="translate(635, 675)" filter="url(#shadow)">
    <rect x="-100" y="-14" width="200" height="38" rx="8" fill="#1e1b2e" stroke="#ef4444" stroke-width="1"/>
    <rect x="-88" y="-8" width="28" height="26" rx="5" fill="#ef4444" opacity="0.1"/>
    <text x="-74" y="10" text-anchor="middle" fill="#ef4444" font-size="12" font-weight="700">🔗</text>
    <text x="10" y="0" text-anchor="middle" fill="#f8fafc" font-size="11" font-weight="600">フィッシング / 罠リンク</text>
    <text x="10" y="16" text-anchor="middle" fill="#94a3b8" font-size="8.5">正規サイトを装った罠URLで誘導</text>
  </g>
</svg>
