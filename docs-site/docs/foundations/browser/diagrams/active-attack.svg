<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="700" height="300" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="350" y="38" text-anchor="middle" fill="#f8fafc" font-size="20" font-weight="700">Active Attack Flow</text>
  <text x="350" y="58" text-anchor="middle" fill="#94a3b8" font-size="12">能動的攻撃 — 攻撃者が直接サーバーを攻撃する</text>

  <!-- Attacker -->
  <g transform="translate(160, 170)" filter="url(#shadow)">
    <rect x="-65" y="-45" width="130" height="110" rx="12" fill="#1e1b2e" stroke="#ef4444" stroke-width="1.5"/>
    <g transform="translate(0, -5)">
      <path d="M-13,-17 Q0,-28 13,-17 L13,-4 Q0,2 -13,-4 Z" fill="none" stroke="#ef4444" stroke-width="1.8"/>
      <circle cx="-4" cy="-9" r="1.8" fill="#ef4444"/>
      <circle cx="4" cy="-9" r="1.8" fill="#ef4444"/>
      <path d="M-17,36 Q-17,14 0,10 Q17,14 17,36" fill="none" stroke="#ef4444" stroke-width="2"/>
      <line x1="-17" y1="36" x2="17" y2="36" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
    </g>
    <text x="0" y="52" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="700">攻撃者</text>
  </g>

  <!-- Server -->
  <g transform="translate(540, 170)" filter="url(#shadow)">
    <rect x="-65" y="-45" width="130" height="110" rx="12" fill="#1e1b2e" stroke="#3b82f6" stroke-width="1.5"/>
    <g transform="translate(0, 0)">
      <rect x="-20" y="-28" width="40" height="12" rx="3" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
      <circle cx="-12" cy="-22" r="2" fill="#3b82f6"/><circle cx="-5" cy="-22" r="2" fill="#3b82f6"/>
      <rect x="-20" y="-12" width="40" height="12" rx="3" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
      <circle cx="-12" cy="-6" r="2" fill="#3b82f6"/><circle cx="-5" cy="-6" r="2" fill="#3b82f6"/>
      <rect x="-20" y="4" width="40" height="12" rx="3" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
      <circle cx="-12" cy="10" r="2" fill="#3b82f6"/><circle cx="-5" cy="10" r="2" fill="#3b82f6"/>
    </g>
    <text x="0" y="52" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">サーバー</text>
  </g>

  <!-- Arrow: Attacker -> Server -->
  <line x1="230" y1="160" x2="470" y2="160" stroke="#ef4444" stroke-width="2.5" stroke-dasharray="8,4" marker-end="url(#arrowRed)"/>

  <!-- Label on arrow -->
  <rect x="280" y="130" width="140" height="22" rx="6" fill="#451a03" stroke="#f97316" stroke-width="0.8"/>
  <text x="350" y="145" text-anchor="middle" fill="#fdba74" font-size="10.5" font-weight="600">悪意のあるリクエスト</text>

  <!-- Examples below arrow -->
  <text x="350" y="195" text-anchor="middle" fill="#94a3b8" font-size="10">SQLインジェクション、コマンドインジェクション等</text>

  <!-- Key point box -->
  <g transform="translate(350, 260)" filter="url(#shadow)">
    <rect x="-200" y="-16" width="400" height="32" rx="8" fill="#1e1b2e" stroke="#334155" stroke-width="1"/>
    <text x="0" y="3" text-anchor="middle" fill="#94a3b8" font-size="10.5">攻撃者のIPアドレスが記録される → サーバー側の入力検証・WAFで防御可能</text>
  </g>
</svg>
