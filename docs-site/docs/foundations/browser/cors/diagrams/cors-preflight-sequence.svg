<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 600" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a855f7"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="850" height="600" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="425" y="34" text-anchor="middle" fill="#f8fafc" font-size="20" font-weight="700">CORS プリフライトリクエスト シーケンス</text>
  <text x="425" y="54" text-anchor="middle" fill="#94a3b8" font-size="12">非単純リクエスト送信時のブラウザ・サーバー間の通信フロー</text>

  <!-- Actor: Browser -->
  <g transform="translate(180, 90)" filter="url(#shadow)">
    <rect x="-90" y="-16" width="180" height="32" rx="8" fill="#1e1b2e" stroke="#a855f7" stroke-width="1.5"/>
    <text x="0" y="5" text-anchor="middle" fill="#d8b4fe" font-size="13" font-weight="700">ブラウザ</text>
  </g>
  <text x="180" y="130" text-anchor="middle" fill="#94a3b8" font-size="9" font-style="italic">https://app.example.com</text>

  <!-- Actor: Server -->
  <g transform="translate(650, 90)" filter="url(#shadow)">
    <rect x="-90" y="-16" width="180" height="32" rx="8" fill="#1e1b2e" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="0" y="5" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">サーバー</text>
  </g>
  <text x="650" y="130" text-anchor="middle" fill="#94a3b8" font-size="9" font-style="italic">https://api.example.com</text>

  <!-- Lifelines -->
  <line x1="180" y1="140" x2="180" y2="570" stroke="#475569" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="650" y1="140" x2="650" y2="570" stroke="#475569" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- === Section 1: Preflight === -->
  <rect x="20" y="145" width="810" height="200" rx="8" fill="#a855f7" opacity="0.04" stroke="#a855f7" stroke-width="0.5" stroke-dasharray="4,3"/>
  <rect x="30" y="150" width="100" height="20" rx="5" fill="#a855f7" opacity="0.15"/>
  <text x="80" y="164" text-anchor="middle" fill="#d8b4fe" font-size="10" font-weight="600">Preflight</text>

  <!-- Browser detects non-simple request -->
  <rect x="50" y="178" width="160" height="20" rx="5" fill="#1e1b2e" stroke="#475569" stroke-width="0.8"/>
  <text x="130" y="192" text-anchor="middle" fill="#94a3b8" font-size="9">非単純リクエストを検出</text>

  <!-- Step 1: OPTIONS request -->
  <line x1="185" y1="212" x2="644" y2="212" stroke="#a855f7" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <circle cx="415" cy="212" r="12" fill="#a855f7"/>
  <text x="415" y="216" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">1</text>
  <text x="415" y="200" text-anchor="middle" fill="#d8b4fe" font-size="10" font-weight="600">OPTIONS /api/data</text>
  <text x="415" y="234" text-anchor="middle" fill="#94a3b8" font-size="9">Origin: https://app.example.com</text>
  <text x="415" y="247" text-anchor="middle" fill="#94a3b8" font-size="9">Access-Control-Request-Method: POST</text>
  <text x="415" y="260" text-anchor="middle" fill="#94a3b8" font-size="9">Access-Control-Request-Headers: Content-Type</text>

  <!-- Server validates origin -->
  <rect x="660" y="266" width="130" height="20" rx="5" fill="#1e1b2e" stroke="#475569" stroke-width="0.8"/>
  <text x="725" y="280" text-anchor="middle" fill="#94a3b8" font-size="9">オリジンを検証</text>

  <!-- Step 2: Preflight response -->
  <line x1="644" y1="300" x2="185" y2="300" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <circle cx="415" cy="300" r="12" fill="#3b82f6"/>
  <text x="415" y="304" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">2</text>
  <text x="415" y="288" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="600">204 No Content</text>
  <text x="415" y="322" text-anchor="middle" fill="#94a3b8" font-size="9">Access-Control-Allow-Origin: https://app...</text>
  <text x="415" y="335" text-anchor="middle" fill="#94a3b8" font-size="9">Access-Control-Allow-Methods: POST</text>

  <!-- === Section 2: Actual Request === -->
  <rect x="20" y="358" width="810" height="195" rx="8" fill="#22c55e" opacity="0.04" stroke="#22c55e" stroke-width="0.5" stroke-dasharray="4,3"/>
  <rect x="30" y="363" width="130" height="20" rx="5" fill="#22c55e" opacity="0.15"/>
  <text x="95" y="377" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="600">Actual Request</text>

  <!-- Browser: preflight OK -->
  <rect x="40" y="392" width="180" height="20" rx="5" fill="#1e1b2e" stroke="#475569" stroke-width="0.8"/>
  <text x="130" y="406" text-anchor="middle" fill="#4ade80" font-size="9">プリフライトOK → 実リクエスト送信</text>

  <!-- Step 3: Actual request -->
  <line x1="185" y1="428" x2="644" y2="428" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <circle cx="415" cy="428" r="12" fill="#22c55e"/>
  <text x="415" y="432" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">3</text>
  <text x="415" y="416" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="600">POST /api/data</text>
  <text x="415" y="450" text-anchor="middle" fill="#94a3b8" font-size="9">Content-Type: application/json</text>
  <text x="415" y="463" text-anchor="middle" fill="#94a3b8" font-size="9">{"key": "value"}</text>

  <!-- Step 4: Actual response -->
  <line x1="644" y1="490" x2="185" y2="490" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <circle cx="415" cy="490" r="12" fill="#3b82f6"/>
  <text x="415" y="494" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">4</text>
  <text x="415" y="478" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="600">200 OK</text>
  <text x="415" y="512" text-anchor="middle" fill="#94a3b8" font-size="9">Access-Control-Allow-Origin: https://app...</text>
  <text x="415" y="525" text-anchor="middle" fill="#94a3b8" font-size="9">{"result": "success"}</text>

  <!-- Legend -->
  <g transform="translate(30, 565)">
    <line x1="0" y1="8" x2="30" y2="8" stroke="#a855f7" stroke-width="2"/>
    <text x="38" y="12" fill="#d8b4fe" font-size="9.5">プリフライト（OPTIONS）</text>
    <line x1="200" y1="8" x2="230" y2="8" stroke="#22c55e" stroke-width="2"/>
    <text x="238" y="12" fill="#4ade80" font-size="9.5">実リクエスト</text>
    <line x1="380" y1="8" x2="410" y2="8" stroke="#3b82f6" stroke-width="2"/>
    <text x="418" y="12" fill="#93c5fd" font-size="9.5">サーバーレスポンス</text>
  </g>
</svg>
