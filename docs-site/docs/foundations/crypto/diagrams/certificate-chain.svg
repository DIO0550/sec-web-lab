<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="600" height="380" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="300" y="32" text-anchor="middle" fill="#f8fafc" font-size="20" font-weight="700">証明書チェーン</text>
  <text x="300" y="50" text-anchor="middle" fill="#94a3b8" font-size="11">Certificate Chain of Trust</text>

  <!-- ====== Root CA ====== -->
  <g transform="translate(220, 100)" filter="url(#shadow)">
    <rect x="-100" y="-28" width="200" height="56" rx="10" fill="#1e1b2e" stroke="#22c55e" stroke-width="1.8"/>
    <!-- Shield icon -->
    <g transform="translate(-72, 0)">
      <path d="M0,-14 L10,-8 L10,4 Q10,12 0,16 Q-10,12 -10,4 L-10,-8 Z" fill="none" stroke="#22c55e" stroke-width="1.3"/>
      <path d="M-4,0 L-1,4 L5,-4" fill="none" stroke="#22c55e" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="10" y="-6" text-anchor="middle" fill="#4ade80" font-size="12" font-weight="700">ルート認証局(CA)</text>
    <text x="10" y="10" text-anchor="middle" fill="#22c55e" font-size="9">の証明書</text>
  </g>

  <!-- Note: pre-installed -->
  <g transform="translate(460, 100)">
    <rect x="-80" y="-16" width="194" height="32" rx="6" fill="#052e16" stroke="#22c55e" stroke-width="0.8"/>
    <text x="17" y="-1" text-anchor="middle" fill="#4ade80" font-size="9" font-weight="600">ブラウザ/OSに</text>
    <text x="17" y="12" text-anchor="middle" fill="#4ade80" font-size="9" font-weight="600">事前インストール済み</text>
  </g>

  <!-- Arrow: Root -> Intermediate -->
  <line x1="220" y1="130" x2="220" y2="168" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <rect x="234" y="139" width="48" height="18" rx="5" fill="#052e16" stroke="#22c55e" stroke-width="0.6"/>
  <text x="258" y="152" text-anchor="middle" fill="#4ade80" font-size="9" font-weight="600">署名</text>

  <!-- ====== Intermediate CA ====== -->
  <g transform="translate(220, 200)" filter="url(#shadow)">
    <rect x="-100" y="-28" width="200" height="56" rx="10" fill="#1e1b2e" stroke="#3b82f6" stroke-width="1.5"/>
    <!-- Certificate icon -->
    <g transform="translate(-72, 0)">
      <rect x="-8" y="-12" width="16" height="20" rx="2" fill="none" stroke="#3b82f6" stroke-width="1.3"/>
      <line x1="-4" y1="-6" x2="4" y2="-6" stroke="#3b82f6" stroke-width="0.8"/>
      <line x1="-4" y1="-2" x2="4" y2="-2" stroke="#3b82f6" stroke-width="0.8"/>
      <line x1="-4" y1="2" x2="2" y2="2" stroke="#3b82f6" stroke-width="0.8"/>
    </g>
    <text x="10" y="-6" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="700">中間認証局</text>
    <text x="10" y="10" text-anchor="middle" fill="#3b82f6" font-size="9">の証明書</text>
  </g>

  <!-- Arrow: Intermediate -> Server -->
  <line x1="220" y1="230" x2="220" y2="268" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <rect x="234" y="239" width="48" height="18" rx="5" fill="#052e16" stroke="#22c55e" stroke-width="0.6"/>
  <text x="258" y="252" text-anchor="middle" fill="#4ade80" font-size="9" font-weight="600">署名</text>

  <!-- ====== Server Certificate ====== -->
  <g transform="translate(220, 300)" filter="url(#shadow)">
    <rect x="-100" y="-28" width="200" height="56" rx="10" fill="#1e1b2e" stroke="#a855f7" stroke-width="1.5"/>
    <!-- Server icon -->
    <g transform="translate(-72, 0)">
      <rect x="-8" y="-10" width="16" height="8" rx="2" fill="none" stroke="#a855f7" stroke-width="1.2"/>
      <circle cx="-3" cy="-6" r="1.5" fill="#a855f7"/>
      <rect x="-8" y="0" width="16" height="8" rx="2" fill="none" stroke="#a855f7" stroke-width="1.2"/>
      <circle cx="-3" cy="4" r="1.5" fill="#a855f7"/>
    </g>
    <text x="10" y="-6" text-anchor="middle" fill="#d8b4fe" font-size="12" font-weight="700">サーバー証明書</text>
    <text x="10" y="10" text-anchor="middle" fill="#a855f7" font-size="9">(example.com)</text>
  </g>

  <!-- Note: presented by server -->
  <g transform="translate(460, 300)">
    <rect x="-80" y="-14" width="166" height="28" rx="6" fill="#1e1b2e" stroke="#a855f7" stroke-width="0.8"/>
    <text x="3" y="5" text-anchor="middle" fill="#d8b4fe" font-size="9" font-weight="600">サーバーが提示</text>
  </g>

  <!-- Verification direction label -->
  <g transform="translate(80, 200)">
    <text x="0" y="-60" text-anchor="middle" fill="#64748b" font-size="9">検証方向</text>
    <line x1="0" y1="-50" x2="0" y2="50" stroke="#64748b" stroke-width="1.2" stroke-dasharray="4,3"/>
    <polygon points="-4,-50 4,-50 0,-56" fill="#64748b"/>
    <text x="0" y="66" text-anchor="middle" fill="#64748b" font-size="8">下から上へ</text>
    <text x="0" y="78" text-anchor="middle" fill="#64748b" font-size="8">辿って検証</text>
  </g>

</svg>