<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 700" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a855f7"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="700" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="550" y="40" text-anchor="middle" fill="#f8fafc" font-size="24" font-weight="700">TLSハンドシェイク（TLS 1.3）</text>
  <text x="550" y="62" text-anchor="middle" fill="#94a3b8" font-size="13">TLS 1.3 Handshake Sequence</text>

  <!-- Client lifeline -->
  <g transform="translate(230, 105)" filter="url(#shadow)">
    <rect x="-75" y="-20" width="150" height="48" rx="12" fill="#1e1b2e" stroke="#a855f7" stroke-width="1.5"/>
    <text x="0" y="2" text-anchor="middle" fill="#d8b4fe" font-size="15" font-weight="700">クライアント</text>
    <text x="0" y="18" text-anchor="middle" fill="#a855f7" font-size="10">Client</text>
  </g>
  <line x1="230" y1="137" x2="230" y2="660" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.4"/>

  <!-- Server lifeline -->
  <g transform="translate(870, 105)" filter="url(#shadow)">
    <rect x="-75" y="-20" width="150" height="48" rx="12" fill="#1e1b2e" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="0" y="2" text-anchor="middle" fill="#93c5fd" font-size="15" font-weight="700">サーバー</text>
    <text x="0" y="18" text-anchor="middle" fill="#3b82f6" font-size="10">Server</text>
  </g>
  <line x1="870" y1="137" x2="870" y2="660" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.4"/>

  <!-- Step 1: ClientHello -->
  <line x1="244" y1="190" x2="856" y2="190" stroke="#a855f7" stroke-width="2.2" marker-end="url(#arrowPurple)"/>
  <circle cx="190" cy="190" r="16" fill="#a855f7"/>
  <text x="190" y="195" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">1</text>
  <rect x="390" y="170" width="320" height="32" rx="6" fill="#0f172a" stroke="#a855f7" stroke-width="0.8"/>
  <text x="550" y="186" text-anchor="middle" fill="#d8b4fe" font-size="12" font-weight="600">ClientHello</text>
  <text x="550" y="198" text-anchor="middle" fill="#94a3b8" font-size="9.5">対応する暗号スイート一覧・鍵共有パラメータ</text>

  <!-- Step 2: ServerHello -->
  <line x1="856" y1="265" x2="244" y2="265" stroke="#3b82f6" stroke-width="2.2" marker-end="url(#arrowBlue)"/>
  <circle cx="910" cy="265" r="16" fill="#3b82f6"/>
  <text x="910" y="270" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">2</text>
  <rect x="370" y="244" width="360" height="32" rx="6" fill="#0f172a" stroke="#3b82f6" stroke-width="0.8"/>
  <text x="550" y="260" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="600">ServerHello</text>
  <text x="550" y="272" text-anchor="middle" fill="#94a3b8" font-size="9.5">選択した暗号スイート・鍵共有パラメータ</text>

  <!-- Step 3: Certificate -->
  <line x1="856" y1="325" x2="244" y2="325" stroke="#3b82f6" stroke-width="2.2" marker-end="url(#arrowBlue)"/>
  <circle cx="910" cy="325" r="16" fill="#3b82f6"/>
  <text x="910" y="330" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">3</text>
  <rect x="410" y="311" width="280" height="24" rx="6" fill="#0f172a" stroke="#3b82f6" stroke-width="0.8"/>
  <text x="550" y="328" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="600">サーバー証明書</text>

  <!-- Step 4: Key Exchange Parameters -->
  <line x1="856" y1="380" x2="244" y2="380" stroke="#3b82f6" stroke-width="2.2" marker-end="url(#arrowBlue)"/>
  <circle cx="910" cy="380" r="16" fill="#3b82f6"/>
  <text x="910" y="385" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">4</text>
  <rect x="410" y="366" width="280" height="24" rx="6" fill="#0f172a" stroke="#3b82f6" stroke-width="0.8"/>
  <text x="550" y="383" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="600">鍵交換パラメータ</text>

  <!-- Step 5: Certificate Verification -->
  <line x1="244" y1="455" x2="856" y2="455" stroke="#a855f7" stroke-width="2.2" marker-end="url(#arrowPurple)"/>
  <circle cx="190" cy="455" r="16" fill="#a855f7"/>
  <text x="190" y="460" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">5</text>
  <rect x="380" y="434" width="340" height="32" rx="6" fill="#0f172a" stroke="#a855f7" stroke-width="0.8"/>
  <text x="550" y="450" text-anchor="middle" fill="#d8b4fe" font-size="12" font-weight="600">証明書を検証</text>
  <text x="550" y="462" text-anchor="middle" fill="#94a3b8" font-size="9.5">CA署名チェーンを確認</text>

  <!-- Step 6: Key Exchange Complete -->
  <line x1="244" y1="510" x2="856" y2="510" stroke="#a855f7" stroke-width="2.2" marker-end="url(#arrowPurple)"/>
  <circle cx="190" cy="510" r="16" fill="#a855f7"/>
  <text x="190" y="515" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">6</text>
  <rect x="380" y="498" width="340" height="24" rx="6" fill="#0f172a" stroke="#a855f7" stroke-width="0.8"/>
  <text x="550" y="515" text-anchor="middle" fill="#d8b4fe" font-size="12" font-weight="600">鍵交換完了（共通鍵を共有）</text>

  <!-- Final: Encrypted communication -->
  <rect x="170" y="570" width="760" height="60" rx="12" fill="#052e16" stroke="#22c55e" stroke-width="1.5" filter="url(#shadow)"/>
  <!-- Double arrows -->
  <line x1="270" y1="600" x2="400" y2="600" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="830" y1="600" x2="700" y2="600" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <!-- Lock icon -->
  <g transform="translate(550, 591)">
    <rect x="-7" y="0" width="14" height="10" rx="2" fill="none" stroke="#4ade80" stroke-width="1.3"/>
    <path d="M-4,0 L-4,-5 Q0,-10 4,-5 L4,0" fill="none" stroke="#4ade80" stroke-width="1.3"/>
  </g>
  <text x="550" y="620" text-anchor="middle" fill="#4ade80" font-size="14" font-weight="700">以降は共通鍵で暗号化通信</text>

  <!-- Note -->
  <text x="550" y="665" text-anchor="middle" fill="#64748b" font-size="10">TLS 1.3 では 1-RTT でハンドシェイクが完了（TLS 1.2 より高速）</text>

</svg>
