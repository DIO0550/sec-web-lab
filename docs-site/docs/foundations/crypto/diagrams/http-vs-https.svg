<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" fill="#f8fafc" font-size="20" font-weight="700">HTTP vs HTTPS</text>
  <text x="400" y="50" text-anchor="middle" fill="#94a3b8" font-size="11">平文通信と暗号化通信の違い</text>

  <!-- ====== HTTP Section (Top - Dangerous) ====== -->
  <rect x="30" y="68" width="740" height="130" rx="10" fill="#1e1b2e" stroke="#ef4444" stroke-width="1" filter="url(#shadow)" opacity="0.9"/>
  <rect x="42" y="76" width="56" height="18" rx="9" fill="#ef4444" opacity="0.15"/>
  <text x="70" y="89" text-anchor="middle" fill="#fca5a5" font-size="9" font-weight="600">DANGER</text>

  <!-- Client (HTTP) -->
  <g transform="translate(100, 120)" filter="url(#shadow)">
    <rect x="-42" y="-22" width="84" height="50" rx="8" fill="#0f172a" stroke="#a855f7" stroke-width="1.2"/>
    <text x="0" y="-4" text-anchor="middle" fill="#d8b4fe" font-size="11" font-weight="600">クライアント</text>
    <text x="0" y="12" text-anchor="middle" fill="#a855f7" font-size="8">Client</text>
  </g>

  <!-- Arrow HTTP -->
  <line x1="155" y1="120" x2="530" y2="120" stroke="#ef4444" stroke-width="2.5" marker-end="url(#arrowRed)"/>
  <rect x="270" y="103" width="150" height="22" rx="6" fill="#451a03" stroke="#f97316" stroke-width="0.8"/>
  <text x="345" y="118" text-anchor="middle" fill="#fdba74" font-size="10" font-weight="600">HTTP (平文)</text>

  <!-- Server (HTTP) -->
  <g transform="translate(590, 120)" filter="url(#shadow)">
    <rect x="-42" y="-22" width="84" height="50" rx="8" fill="#0f172a" stroke="#3b82f6" stroke-width="1.2"/>
    <text x="0" y="-4" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="600">サーバー</text>
    <text x="0" y="12" text-anchor="middle" fill="#3b82f6" font-size="8">Server</text>
  </g>

  <!-- Attacker (HTTP) - can see everything -->
  <g transform="translate(345, 168)">
    <line x1="0" y1="-18" x2="0" y2="-6" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="3,2"/>
    <rect x="-90" y="-6" width="180" height="44" rx="8" fill="#1e1b2e" stroke="#ef4444" stroke-width="1.2" filter="url(#shadow)"/>
    <g transform="translate(-62, 16)">
      <path d="M-8,-10 Q0,-16 8,-10 L8,-2 Q0,2 -8,-2 Z" fill="none" stroke="#ef4444" stroke-width="1.2"/>
      <circle cx="-2.5" cy="-5" r="1.2" fill="#ef4444"/>
      <circle cx="2.5" cy="-5" r="1.2" fill="#ef4444"/>
    </g>
    <text x="10" y="10" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="600">攻撃者が盗聴可能</text>
    <text x="10" y="24" text-anchor="middle" fill="#94a3b8" font-size="8">パスワード、Cookie、個人情報が丸見え</text>
  </g>

  <!-- ====== HTTPS Section (Bottom - Safe) ====== -->
  <rect x="30" y="226" width="740" height="150" rx="10" fill="#1e1b2e" stroke="#22c55e" stroke-width="1" filter="url(#shadow)" opacity="0.9"/>
  <rect x="42" y="234" width="46" height="18" rx="9" fill="#22c55e" opacity="0.15"/>
  <text x="65" y="247" text-anchor="middle" fill="#4ade80" font-size="9" font-weight="600">SAFE</text>

  <!-- Client (HTTPS) -->
  <g transform="translate(100, 280)" filter="url(#shadow)">
    <rect x="-42" y="-22" width="84" height="50" rx="8" fill="#0f172a" stroke="#a855f7" stroke-width="1.2"/>
    <text x="0" y="-4" text-anchor="middle" fill="#d8b4fe" font-size="11" font-weight="600">クライアント</text>
    <text x="0" y="12" text-anchor="middle" fill="#a855f7" font-size="8">Client</text>
  </g>

  <!-- Arrow HTTPS -->
  <line x1="155" y1="280" x2="530" y2="280" stroke="#22c55e" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  <rect x="258" y="263" width="174" height="22" rx="6" fill="#052e16" stroke="#22c55e" stroke-width="0.8"/>
  <!-- Lock icon -->
  <g transform="translate(278, 274)">
    <rect x="-4" y="-1" width="8" height="6" rx="1.5" fill="none" stroke="#4ade80" stroke-width="1"/>
    <path d="M-2,-1 L-2,-4 Q0,-7 2,-4 L2,-1" fill="none" stroke="#4ade80" stroke-width="1"/>
  </g>
  <text x="354" y="278" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="600">HTTPS (暗号化)</text>

  <!-- Server (HTTPS) -->
  <g transform="translate(590, 280)" filter="url(#shadow)">
    <rect x="-42" y="-22" width="84" height="50" rx="8" fill="#0f172a" stroke="#3b82f6" stroke-width="1.2"/>
    <text x="0" y="-4" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="600">サーバー</text>
    <text x="0" y="12" text-anchor="middle" fill="#3b82f6" font-size="8">Server</text>
  </g>

  <!-- Attacker (HTTPS) - cannot read -->
  <g transform="translate(345, 328)">
    <line x1="0" y1="-18" x2="0" y2="-6" stroke="#64748b" stroke-width="1.5" stroke-dasharray="3,2"/>
    <rect x="-90" y="-6" width="180" height="44" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1.2" filter="url(#shadow)"/>
    <g transform="translate(-62, 16)">
      <path d="M-8,-10 Q0,-16 8,-10 L8,-2 Q0,2 -8,-2 Z" fill="none" stroke="#64748b" stroke-width="1.2"/>
      <circle cx="-2.5" cy="-5" r="1.2" fill="#64748b"/>
      <circle cx="2.5" cy="-5" r="1.2" fill="#64748b"/>
      <!-- X over eyes -->
      <line x1="-5" y1="-8" x2="-0.5" y2="-2" stroke="#64748b" stroke-width="0.8"/>
      <line x1="-0.5" y1="-8" x2="-5" y2="-2" stroke="#64748b" stroke-width="0.8"/>
    </g>
    <text x="10" y="10" text-anchor="middle" fill="#64748b" font-size="10" font-weight="600">攻撃者には解読不能</text>
    <text x="10" y="24" text-anchor="middle" fill="#475569" font-size="8">暗号化されたデータしか見えない</text>
  </g>

</svg>