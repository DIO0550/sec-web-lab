<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 750" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a855f7"/>
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="750" fill="url(#bgGrad)" rx="12"/>

  <!-- ===== Title ===== -->
  <text x="380" y="38" text-anchor="middle" fill="#f8fafc" font-size="22" font-weight="700">Man-in-the-Middle Attack Flow</text>
  <text x="380" y="58" text-anchor="middle" fill="#94a3b8" font-size="12">中間者攻撃 -- 通信傍受・改ざんの流れ</text>
  <rect x="300" y="66" width="160" height="20" rx="10" fill="#ef4444" opacity="0.15"/>
  <text x="380" y="80" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="600">Network Layer Attack</text>

  <!-- ====================================================== -->
  <!--  ACTORS                                                 -->
  <!-- ====================================================== -->

  <!-- Victim (left) -->
  <g transform="translate(115, 250)" filter="url(#shadow)">
    <rect x="-56" y="-30" width="112" height="125" rx="12" fill="#1e1b2e" stroke="#a855f7" stroke-width="1.5"/>
    <g transform="translate(0, 10)">
      <circle cx="0" cy="-9" r="13" fill="none" stroke="#a855f7" stroke-width="1.8"/>
      <circle cx="-4" cy="-11" r="1.5" fill="#a855f7"/>
      <circle cx="4" cy="-11" r="1.5" fill="#a855f7"/>
      <path d="M-4,-4 Q0,1 4,-4" fill="none" stroke="#a855f7" stroke-width="1.3" stroke-linecap="round"/>
      <path d="M-17,36 Q-17,14 0,10 Q17,14 17,36" fill="none" stroke="#a855f7" stroke-width="2"/>
      <line x1="-17" y1="36" x2="17" y2="36" stroke="#a855f7" stroke-width="2" stroke-linecap="round"/>
    </g>
    <text x="0" y="72" text-anchor="middle" fill="#d8b4fe" font-size="13" font-weight="700">被害者</text>
    <text x="0" y="86" text-anchor="middle" fill="#a855f7" font-size="9.5" opacity="0.7">Victim</text>
  </g>

  <!-- Attacker (center) -->
  <g transform="translate(380, 250)" filter="url(#shadow)">
    <rect x="-56" y="-30" width="112" height="125" rx="12" fill="#1e1b2e" stroke="#ef4444" stroke-width="1.5"/>
    <g transform="translate(0, 10)">
      <path d="M-13,-17 Q0,-28 13,-17 L13,-4 Q0,2 -13,-4 Z" fill="none" stroke="#ef4444" stroke-width="1.8"/>
      <circle cx="-4" cy="-9" r="1.8" fill="#ef4444"/>
      <circle cx="4" cy="-9" r="1.8" fill="#ef4444"/>
      <path d="M-17,36 Q-17,14 0,10 Q17,14 17,36" fill="none" stroke="#ef4444" stroke-width="2"/>
      <line x1="-17" y1="36" x2="17" y2="36" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
    </g>
    <text x="0" y="72" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="700">攻撃者</text>
    <text x="0" y="86" text-anchor="middle" fill="#ef4444" font-size="9.5" opacity="0.7">Attacker (MITM)</text>
  </g>

  <!-- Server (right) -->
  <g transform="translate(645, 250)" filter="url(#shadow)">
    <rect x="-56" y="-30" width="112" height="125" rx="12" fill="#1e1b2e" stroke="#3b82f6" stroke-width="1.5"/>
    <g transform="translate(0, 14)">
      <rect x="-20" y="-18" width="40" height="12" rx="3" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
      <circle cx="-12" cy="-12" r="2" fill="#3b82f6"/><circle cx="-5" cy="-12" r="2" fill="#3b82f6"/>
      <rect x="-20" y="-2" width="40" height="12" rx="3" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
      <circle cx="-12" cy="4" r="2" fill="#3b82f6"/><circle cx="-5" cy="4" r="2" fill="#3b82f6"/>
      <rect x="-20" y="14" width="40" height="12" rx="3" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
      <circle cx="-12" cy="20" r="2" fill="#3b82f6"/><circle cx="-5" cy="20" r="2" fill="#3b82f6"/>
    </g>
    <text x="0" y="72" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">サーバー</text>
    <text x="0" y="86" text-anchor="middle" fill="#3b82f6" font-size="9.5" opacity="0.7">Server</text>
  </g>

  <!-- ====================================================== -->
  <!--  ORIGINAL COMMUNICATION (dimmed dashed curve above)     -->
  <!-- ====================================================== -->
  <path d="M 170 210 Q 380 115 590 210" fill="none" stroke="#64748b" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.35" marker-end="url(#arrowGray)"/>
  <text x="380" y="140" text-anchor="middle" fill="#64748b" font-size="9.5" opacity="0.5">本来の通信経路</text>

  <!-- ====================================================== -->
  <!--  ARROWS (actual intercepted communication)              -->
  <!-- ====================================================== -->

  <!-- Step 1: Victim -> Attacker (request, victim thinks it's going to server) -->
  <path d="M 171 235 L 322 235" fill="none" stroke="#a855f7" stroke-width="2.2" marker-end="url(#arrowPurple)"/>
  <circle cx="247" cy="213" r="16" fill="#a855f7"/>
  <text x="247" y="218" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">1</text>
  <text x="247" y="250" text-anchor="middle" fill="#d8b4fe" font-size="9">リクエスト送信</text>

  <!-- Step 2: Attacker intercepts (icon inside attacker area) -->
  <!-- Visual indicator: magnifying glass below attacker card -->
  <g transform="translate(380, 400)" filter="url(#shadow)">
    <rect x="-70" y="-18" width="140" height="52" rx="8" fill="#451a03" stroke="#f97316" stroke-width="1"/>
    <text x="0" y="-1" text-anchor="middle" fill="#fdba74" font-size="11" font-weight="700">&#x1F50D; 通信を傍受・閲覧</text>
    <text x="0" y="16" text-anchor="middle" fill="#fed7aa" font-size="9">認証情報・Cookie・個人情報</text>
    <text x="0" y="28" text-anchor="middle" fill="#94a3b8" font-size="8.5">を平文で取得</text>
  </g>
  <circle cx="380" cy="358" r="16" fill="#ef4444"/>
  <text x="380" y="363" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">2</text>

  <!-- Step 3: Attacker -> Server (forwarded, possibly modified) -->
  <path d="M 438 277 L 589 277" fill="none" stroke="#ef4444" stroke-width="2.2" stroke-dasharray="8,4" marker-end="url(#arrowRed)"/>
  <circle cx="514" cy="255" r="16" fill="#ef4444"/>
  <text x="514" y="260" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">3</text>
  <text x="514" y="292" text-anchor="middle" fill="#fca5a5" font-size="9">改ざんして転送</text>

  <!-- Step 4: Server -> Attacker (response) -->
  <path d="M 589 310 L 438 310" fill="none" stroke="#3b82f6" stroke-width="2.2" marker-end="url(#arrowBlue)"/>
  <circle cx="514" cy="332" r="16" fill="#3b82f6"/>
  <text x="514" y="337" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">4</text>
  <text x="514" y="324" text-anchor="middle" fill="#93c5fd" font-size="9">サーバー応答</text>

  <!-- Step 5: Attacker -> Victim (modified response) -->
  <path d="M 322 310 L 171 310" fill="none" stroke="#ef4444" stroke-width="2.2" stroke-dasharray="8,4" marker-end="url(#arrowRed)"/>
  <circle cx="247" cy="332" r="16" fill="#ef4444"/>
  <text x="247" y="337" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">5</text>
  <text x="247" y="324" text-anchor="middle" fill="#fca5a5" font-size="9">改ざんレスポンス</text>

  <!-- ===== Warning label between victim and server ===== -->
  <g transform="translate(380, 480)">
    <rect x="-100" y="-12" width="200" height="24" rx="5" fill="#0f172a" stroke="#f97316" stroke-width="1" stroke-dasharray="4,2"/>
    <text x="0" y="4" text-anchor="middle" fill="#f97316" font-size="10" font-weight="600">&#x26A0; 暗号化なし / HTTP通信</text>
  </g>

  <!-- ===== Intercepted data box ===== -->
  <g transform="translate(380, 540)">
    <rect x="-160" y="-14" width="320" height="48" rx="5" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="0" y="2" text-anchor="middle" fill="#94a3b8" font-size="9.5" font-family="'Fira Code', monospace">
      <tspan fill="#64748b">POST </tspan><tspan fill="#93c5fd">/login</tspan><tspan fill="#64748b"> { </tspan><tspan fill="#fca5a5">user: "admin"</tspan><tspan fill="#64748b">, </tspan><tspan fill="#fca5a5">pass: "secret123"</tspan><tspan fill="#64748b"> }</tspan>
    </text>
    <text x="0" y="22" text-anchor="middle" fill="#ef4444" font-size="8.5">攻撃者は平文の認証情報をすべて閲覧可能</text>
  </g>

  <!-- ====================================================== -->
  <!--  STEP LIST (right sidebar)                              -->
  <!-- ====================================================== -->
  <g transform="translate(775, 100)">
    <rect x="0" y="0" width="305" height="320" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="152" y="28" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="700">攻撃ステップ詳細</text>
    <line x1="16" y1="40" x2="289" y2="40" stroke="#334155" stroke-width="1"/>

    <!-- Step 1 -->
    <circle cx="34" cy="68" r="13" fill="#a855f7"/>
    <text x="34" y="73" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">1</text>
    <text x="56" y="64" fill="#f8fafc" font-size="11.5" font-weight="600">リクエスト送信</text>
    <text x="56" y="80" fill="#94a3b8" font-size="9.5">被害者がサーバーへリクエスト。</text>
    <text x="56" y="93" fill="#94a3b8" font-size="9.5">攻撃者のノードを経由する</text>

    <!-- Step 2 -->
    <circle cx="34" cy="124" r="13" fill="#ef4444"/>
    <text x="34" y="129" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">2</text>
    <text x="56" y="120" fill="#f8fafc" font-size="11.5" font-weight="600">通信の傍受</text>
    <text x="56" y="136" fill="#94a3b8" font-size="9.5">攻撃者が通信内容を傍受し、</text>
    <text x="56" y="149" fill="#94a3b8" font-size="9.5">認証情報や個人情報を閲覧</text>

    <!-- Step 3 -->
    <circle cx="34" cy="180" r="13" fill="#ef4444"/>
    <text x="34" y="185" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">3</text>
    <text x="56" y="176" fill="#f8fafc" font-size="11.5" font-weight="600">改ざんして転送</text>
    <text x="56" y="192" fill="#94a3b8" font-size="9.5">リクエストを改ざん（または</text>
    <text x="56" y="205" fill="#94a3b8" font-size="9.5">そのまま）サーバーへ転送</text>

    <!-- Step 4 -->
    <circle cx="34" cy="236" r="13" fill="#3b82f6"/>
    <text x="34" y="241" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">4</text>
    <text x="56" y="232" fill="#f8fafc" font-size="11.5" font-weight="600">サーバーの応答</text>
    <text x="56" y="248" fill="#94a3b8" font-size="9.5">サーバーが正規の応答を返す。</text>
    <text x="56" y="261" fill="#94a3b8" font-size="9.5">これも攻撃者を経由する</text>

    <!-- Step 5 -->
    <circle cx="34" cy="292" r="13" fill="#ef4444"/>
    <text x="34" y="297" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">5</text>
    <text x="56" y="288" fill="#f8fafc" font-size="11.5" font-weight="600">改ざんレスポンス転送</text>
    <text x="56" y="304" fill="#94a3b8" font-size="9.5">攻撃者がレスポンスを改ざんし</text>
    <text x="56" y="317" fill="#94a3b8" font-size="9.5">被害者に返す（気づかれない）</text>
  </g>

  <!-- ====================================================== -->
  <!--  ATTACK TECHNIQUE CARDS (bottom)                        -->
  <!-- ====================================================== -->
  <line x1="30" y1="610" x2="760" y2="610" stroke="#334155" stroke-width="1"/>
  <text x="395" y="635" text-anchor="middle" fill="#fca5a5" font-size="14" font-weight="700">&#x1F525; 使用される攻撃テクニック</text>

  <!-- Card: ARP Spoofing -->
  <g transform="translate(165, 658)" filter="url(#shadow)">
    <rect x="-120" y="0" width="240" height="38" rx="8" fill="#1e1b2e" stroke="#ef4444" stroke-width="1"/>
    <rect x="-108" y="6" width="28" height="26" rx="5" fill="#ef4444" opacity="0.1"/>
    <g transform="translate(-94, 19)">
      <rect x="-8" y="-7" width="16" height="14" rx="2" fill="none" stroke="#ef4444" stroke-width="1.2"/>
      <line x1="-4" y1="0" x2="4" y2="0" stroke="#ef4444" stroke-width="1"/>
      <line x1="0" y1="-3" x2="0" y2="3" stroke="#ef4444" stroke-width="1"/>
    </g>
    <text x="10" y="16" text-anchor="middle" fill="#f8fafc" font-size="11" font-weight="600">ARP Spoofing</text>
    <text x="10" y="30" text-anchor="middle" fill="#94a3b8" font-size="8.5">LAN内の通信経路を改ざん</text>
  </g>

  <!-- Card: SSL Stripping -->
  <g transform="translate(465, 658)" filter="url(#shadow)">
    <rect x="-120" y="0" width="240" height="38" rx="8" fill="#1e1b2e" stroke="#ef4444" stroke-width="1"/>
    <rect x="-108" y="6" width="28" height="26" rx="5" fill="#ef4444" opacity="0.1"/>
    <g transform="translate(-94, 19)">
      <circle cx="0" cy="-2" r="6" fill="none" stroke="#ef4444" stroke-width="1.2"/>
      <line x1="-4" y1="-2" x2="4" y2="-2" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    <text x="10" y="16" text-anchor="middle" fill="#f8fafc" font-size="11" font-weight="600">SSL Stripping</text>
    <text x="10" y="30" text-anchor="middle" fill="#94a3b8" font-size="8.5">HTTPS通信をHTTPに降格</text>
  </g>

  <!-- Card: Packet Sniffing -->
  <g transform="translate(765, 658)" filter="url(#shadow)">
    <rect x="-120" y="0" width="240" height="38" rx="8" fill="#1e1b2e" stroke="#ef4444" stroke-width="1"/>
    <rect x="-108" y="6" width="28" height="26" rx="5" fill="#ef4444" opacity="0.1"/>
    <g transform="translate(-94, 19)">
      <circle cx="0" cy="-1" r="7" fill="none" stroke="#ef4444" stroke-width="1.2"/>
      <line x1="5" y1="4" x2="9" y2="8" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    <text x="10" y="16" text-anchor="middle" fill="#f8fafc" font-size="11" font-weight="600">Packet Sniffing</text>
    <text x="10" y="30" text-anchor="middle" fill="#94a3b8" font-size="8.5">ネットワーク上のパケット盗聴</text>
  </g>

  <!-- ===== Legend ===== -->
  <g transform="translate(775, 445)">
    <rect x="0" y="0" width="305" height="68" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="14" y="18" fill="#94a3b8" font-size="10" font-weight="600">凡例</text>
    <line x1="14" y1="34" x2="44" y2="34" stroke="#ef4444" stroke-width="2" stroke-dasharray="6,3"/>
    <text x="52" y="38" fill="#fca5a5" font-size="9.5">攻撃通信(改ざん)</text>
    <line x1="170" y1="34" x2="200" y2="34" stroke="#3b82f6" stroke-width="2"/>
    <text x="208" y="38" fill="#93c5fd" font-size="9.5">サーバー応答</text>
    <line x1="14" y1="54" x2="44" y2="54" stroke="#a855f7" stroke-width="2"/>
    <text x="52" y="58" fill="#d8b4fe" font-size="9.5">被害者の通信</text>
    <line x1="170" y1="54" x2="200" y2="54" stroke="#64748b" stroke-width="1.5" stroke-dasharray="6,4"/>
    <text x="208" y="58" fill="#64748b" font-size="9.5">本来の通信経路</text>
  </g>

</svg>