<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="280" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" fill="#f8fafc" font-size="20" font-weight="700">ハッシュ関数</text>
  <text x="400" y="50" text-anchor="middle" fill="#94a3b8" font-size="11">Hash Function -- 一方向性と雪崩効果</text>

  <!-- ====== Main Flow ====== -->
  <rect x="30" y="62" width="740" height="90" rx="10" fill="#1e1b2e" stroke="#3b82f6" stroke-width="1" filter="url(#shadow)" opacity="0.9"/>

  <!-- Input -->
  <g transform="translate(120, 108)">
    <rect x="-72" y="-20" width="144" height="40" rx="8" fill="#0f172a" stroke="#a855f7" stroke-width="1.2"/>
    <text x="0" y="-2" text-anchor="middle" fill="#d8b4fe" font-size="10" font-weight="600">入力（任意の長さ）</text>
    <text x="0" y="12" text-anchor="middle" fill="#a855f7" font-size="8">Arbitrary Length Input</text>
  </g>

  <!-- Arrow -->
  <line x1="198" y1="108" x2="278" y2="108" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- Hash Function Box -->
  <g transform="translate(370, 108)">
    <rect x="-76" y="-24" width="152" height="48" rx="10" fill="#0f172a" stroke="#f97316" stroke-width="1.5"/>
    <text x="0" y="-4" text-anchor="middle" fill="#fdba74" font-size="12" font-weight="700">ハッシュ関数</text>
    <text x="0" y="12" text-anchor="middle" fill="#94a3b8" font-size="8">SHA-256 / bcrypt / Argon2</text>
  </g>

  <!-- Arrow -->
  <line x1="452" y1="108" x2="528" y2="108" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- Hash Output -->
  <g transform="translate(640, 108)">
    <rect x="-96" y="-20" width="192" height="40" rx="8" fill="#0f172a" stroke="#22c55e" stroke-width="1.2"/>
    <text x="0" y="-2" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="600">ハッシュ値（固定長）</text>
    <text x="0" y="12" text-anchor="middle" fill="#22c55e" font-size="8">Fixed Length Output</text>
  </g>

  <!-- ====== Avalanche Effect Examples ====== -->
  <rect x="30" y="168" width="740" height="94" rx="10" fill="#1e1b2e" stroke="#f97316" stroke-width="1" filter="url(#shadow)" opacity="0.9"/>
  <rect x="42" y="174" width="100" height="16" rx="8" fill="#f97316" opacity="0.12"/>
  <text x="92" y="186" text-anchor="middle" fill="#fdba74" font-size="9" font-weight="600">AVALANCHE EFFECT</text>
  <text x="160" y="186" fill="#94a3b8" font-size="9">雪崩効果: 1文字の違いで出力が大きく変化</text>

  <!-- Example 1 -->
  <g transform="translate(400, 212)">
    <rect x="-356" y="-12" width="160" height="24" rx="6" fill="#0f172a" stroke="#a855f7" stroke-width="0.8"/>
    <text x="-276" y="4" text-anchor="middle" fill="#d8b4fe" font-size="9" font-weight="600" font-family="'Fira Code', monospace">"password123"</text>

    <text x="-166" y="4" fill="#64748b" font-size="10">-&gt;</text>

    <rect x="-148" y="-12" width="330" height="24" rx="6" fill="#0f172a" stroke="#22c55e" stroke-width="0.8"/>
    <text x="18" y="4" text-anchor="middle" fill="#4ade80" font-size="8.5" font-family="'Fira Code', monospace">ef92b778bafe771e89245b89ecbc08a4...</text>
  </g>

  <!-- Example 2 -->
  <g transform="translate(400, 242)">
    <rect x="-356" y="-12" width="160" height="24" rx="6" fill="#0f172a" stroke="#a855f7" stroke-width="0.8"/>
    <text x="-276" y="4" text-anchor="middle" fill="#d8b4fe" font-size="9" font-weight="600" font-family="'Fira Code', monospace">"password12<tspan fill="#fca5a5" font-weight="700">4</tspan>"</text>

    <text x="-166" y="4" fill="#64748b" font-size="10">-&gt;</text>

    <rect x="-148" y="-12" width="330" height="24" rx="6" fill="#0f172a" stroke="#ef4444" stroke-width="0.8"/>
    <text x="18" y="4" text-anchor="middle" fill="#fca5a5" font-size="8.5" font-family="'Fira Code', monospace">c5765cc30e66e0fbb1f75e8e3e1f3dea...</text>
  </g>

  <!-- Highlight the difference -->
  <text x="730" y="228" fill="#22c55e" font-size="14" font-weight="700">}</text>
  <text x="748" y="228" fill="#94a3b8" font-size="8">完全に</text>
  <text x="748" y="240" fill="#94a3b8" font-size="8">異なる</text>
  <text x="748" y="252" fill="#94a3b8" font-size="8">出力</text>

</svg>