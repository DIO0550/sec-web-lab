<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 840" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowGreen">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="840" fill="url(#bgGrad)" rx="12"/>

  <!-- ===== Title ===== -->
  <text x="385" y="38" text-anchor="middle" fill="#f8fafc" font-size="22" font-weight="700">MITM Attack Defense</text>
  <text x="385" y="58" text-anchor="middle" fill="#94a3b8" font-size="12">中間者攻撃の防御 -- TLS/HTTPS による通信保護</text>
  <rect x="305" y="66" width="160" height="20" rx="10" fill="#22c55e" opacity="0.15"/>
  <text x="385" y="80" text-anchor="middle" fill="#86efac" font-size="10" font-weight="600">Defense in Depth</text>

  <!-- ====================================================== -->
  <!--  ACTORS                                                 -->
  <!-- ====================================================== -->

  <!-- Victim (left, protected) -->
  <g transform="translate(115, 250)" filter="url(#shadow)">
    <rect x="-56" y="-30" width="112" height="125" rx="12" fill="#1e1b2e" stroke="#22c55e" stroke-width="1.5"/>
    <!-- Shield badge -->
    <g transform="translate(42, -22)">
      <path d="M0,-8 L7,-4 L7,3 Q7,8 0,11 Q-7,8 -7,3 L-7,-4 Z" fill="#052e16" stroke="#22c55e" stroke-width="1.2"/>
      <path d="M-2,1 L0,3 L3,-2" fill="none" stroke="#22c55e" stroke-width="1.3" stroke-linecap="round"/>
    </g>
    <g transform="translate(0, 10)">
      <circle cx="0" cy="-9" r="13" fill="none" stroke="#a855f7" stroke-width="1.8"/>
      <circle cx="-4" cy="-11" r="1.5" fill="#a855f7"/>
      <circle cx="4" cy="-11" r="1.5" fill="#a855f7"/>
      <path d="M-4,-4 Q0,1 4,-4" fill="none" stroke="#a855f7" stroke-width="1.3" stroke-linecap="round"/>
      <path d="M-17,36 Q-17,14 0,10 Q17,14 17,36" fill="none" stroke="#a855f7" stroke-width="2"/>
      <line x1="-17" y1="36" x2="17" y2="36" stroke="#a855f7" stroke-width="2" stroke-linecap="round"/>
    </g>
    <text x="0" y="72" text-anchor="middle" fill="#d8b4fe" font-size="13" font-weight="700">被害者</text>
    <text x="0" y="86" text-anchor="middle" fill="#a855f7" font-size="9.5" opacity="0.7">Victim</text>
  </g>

  <!-- Attacker (center, dimmed) -->
  <g transform="translate(380, 250)" opacity="0.45" filter="url(#shadow)">
    <rect x="-56" y="-30" width="112" height="125" rx="12" fill="#1e1b2e" stroke="#ef4444" stroke-width="1.5"/>
    <g transform="translate(0, 10)">
      <path d="M-13,-17 Q0,-28 13,-17 L13,-4 Q0,2 -13,-4 Z" fill="none" stroke="#ef4444" stroke-width="1.8"/>
      <circle cx="-4" cy="-9" r="1.8" fill="#ef4444"/>
      <circle cx="4" cy="-9" r="1.8" fill="#ef4444"/>
      <path d="M-17,36 Q-17,14 0,10 Q17,14 17,36" fill="none" stroke="#ef4444" stroke-width="2"/>
      <line x1="-17" y1="36" x2="17" y2="36" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
    </g>
    <text x="0" y="72" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="700">攻撃者</text>
    <text x="0" y="86" text-anchor="middle" fill="#ef4444" font-size="9.5" opacity="0.7">Attacker</text>
  </g>

  <!-- Server (right, protected) -->
  <g transform="translate(645, 250)" filter="url(#shadow)">
    <rect x="-56" y="-30" width="112" height="125" rx="12" fill="#1e1b2e" stroke="#22c55e" stroke-width="1.5"/>
    <!-- Shield badge -->
    <g transform="translate(42, -22)">
      <path d="M0,-8 L7,-4 L7,3 Q7,8 0,11 Q-7,8 -7,3 L-7,-4 Z" fill="#052e16" stroke="#22c55e" stroke-width="1.2"/>
      <path d="M-2,1 L0,3 L3,-2" fill="none" stroke="#22c55e" stroke-width="1.3" stroke-linecap="round"/>
    </g>
    <g transform="translate(0, 14)">
      <rect x="-20" y="-18" width="40" height="12" rx="3" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
      <circle cx="-12" cy="-12" r="2" fill="#3b82f6"/><circle cx="-5" cy="-12" r="2" fill="#3b82f6"/>
      <rect x="-20" y="-2" width="40" height="12" rx="3" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
      <circle cx="-12" cy="4" r="2" fill="#3b82f6"/><circle cx="-5" cy="4" r="2" fill="#3b82f6"/>
      <rect x="-20" y="14" width="40" height="12" rx="3" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
      <circle cx="-12" cy="20" r="2" fill="#3b82f6"/><circle cx="-5" cy="20" r="2" fill="#3b82f6"/>
    </g>
    <text x="0" y="72" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">サーバー</text>
    <text x="0" y="86" text-anchor="middle" fill="#3b82f6" font-size="9.5" opacity="0.7">Server (TLS)</text>
  </g>

  <!-- ====================================================== -->
  <!--  SECURE COMMUNICATION (green curve, Victim <-> Server)  -->
  <!-- ====================================================== -->
  <path d="M 170 215 Q 380 130 590 215" fill="none" stroke="#22c55e" stroke-width="2.2" marker-end="url(#arrowGreen)"/>
  <text x="380" y="148" text-anchor="middle" fill="#86efac" font-size="10" font-weight="600">TLS 1.3 暗号化通信</text>
  <text x="380" y="162" text-anchor="middle" fill="#64748b" font-size="8.5">エンドツーエンド暗号化で攻撃者は内容を読めない</text>

  <!-- ====================================================== -->
  <!--  DIMMED ATTACK ARROWS with block points                 -->
  <!-- ====================================================== -->

  <!-- Dimmed: Victim -> Attacker intercept attempt -->
  <path d="M 171 245 L 310 245" fill="none" stroke="#ef4444" stroke-width="1.8" stroke-dasharray="8,4" opacity="0.2"/>
  <!-- Block point on victim->attacker -->
  <g transform="translate(240, 245)">
    <circle r="16" fill="#052e16" stroke="#22c55e" stroke-width="2" filter="url(#glowGreen)"/>
    <line x1="-6" y1="-6" x2="6" y2="6" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="6" y1="-6" x2="-6" y2="6" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Dimmed: Attacker -> Server forward attempt -->
  <path d="M 438 277 L 576 277" fill="none" stroke="#ef4444" stroke-width="1.8" stroke-dasharray="8,4" opacity="0.2"/>
  <!-- Block point on attacker->server -->
  <g transform="translate(510, 277)">
    <circle r="16" fill="#052e16" stroke="#22c55e" stroke-width="2" filter="url(#glowGreen)"/>
    <line x1="-6" y1="-6" x2="6" y2="6" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="6" y1="-6" x2="-6" y2="6" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Dimmed: Attacker -> Victim response attempt -->
  <path d="M 322 300 L 184 300" fill="none" stroke="#ef4444" stroke-width="1.8" stroke-dasharray="8,4" opacity="0.2"/>
  <!-- Block point on attacker->victim -->
  <g transform="translate(253, 300)">
    <circle r="16" fill="#052e16" stroke="#22c55e" stroke-width="2" filter="url(#glowGreen)"/>
    <line x1="-6" y1="-6" x2="6" y2="6" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="6" y1="-6" x2="-6" y2="6" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- ===== Encrypted data box ===== -->
  <g transform="translate(380, 400)">
    <rect x="-140" y="-14" width="280" height="36" rx="5" fill="#0f172a" stroke="#22c55e" stroke-width="1"/>
    <text x="0" y="2" text-anchor="middle" fill="#86efac" font-size="10" font-weight="600">&#x1F512; 暗号化されたデータ</text>
    <text x="0" y="16" text-anchor="middle" fill="#64748b" font-size="9" font-family="'Fira Code', monospace">7f3a...c9e2 (攻撃者には解読不能)</text>
  </g>

  <!-- ====================================================== -->
  <!--  DEFENSE TECHNIQUE SECTION                              -->
  <!-- ====================================================== -->
  <rect x="315" y="453" width="140" height="22" rx="11" fill="#22c55e" opacity="0.15"/>
  <text x="385" y="468" text-anchor="middle" fill="#86efac" font-size="12" font-weight="700">防御テクニック</text>
  <line x1="40" y1="484" x2="730" y2="484" stroke="#334155" stroke-width="1"/>

  <!-- Defense Card Grid: 2x2 -->

  <!-- Card 1: TLS/HTTPS (Row1, Col1) -->
  <g transform="translate(215, 535)" filter="url(#shadow)">
    <rect x="-125" y="-60" width="250" height="120" rx="8" fill="#052e16" stroke="#22c55e" stroke-width="1"/>
    <rect x="-108" y="-48" width="22" height="22" rx="5" fill="#22c55e" opacity="0.2"/>
    <text x="-97" y="-32" text-anchor="middle" fill="#22c55e" font-size="12" font-weight="700">1</text>
    <text x="-78" y="-32" fill="#86efac" font-size="11" font-weight="700">TLS/HTTPS暗号化</text>
    <text x="-78" y="-14" fill="#bbf7d0" font-size="9">通信を暗号化し盗聴・改ざんを防止</text>
    <line x1="-108" y1="-2" x2="108" y2="-2" stroke="#22c55e" stroke-width="0.5" opacity="0.3"/>
    <text x="0" y="18" text-anchor="middle" fill="#86efac" font-size="9" font-family="'Fira Code', monospace">server.listen(443, { key, cert })</text>
    <text x="0" y="34" text-anchor="middle" fill="#64748b" font-size="9" font-family="'Fira Code', monospace">TLS 1.3 + AES-256-GCM</text>
    <text x="0" y="50" text-anchor="middle" fill="#4ade80" font-size="8.5">ECDHE鍵交換で前方秘匿性を確保</text>
  </g>

  <!-- Card 2: Certificate Verification (Row1, Col2) -->
  <g transform="translate(555, 535)" filter="url(#shadow)">
    <rect x="-125" y="-60" width="250" height="120" rx="8" fill="#052e16" stroke="#22c55e" stroke-width="1"/>
    <rect x="-108" y="-48" width="22" height="22" rx="5" fill="#22c55e" opacity="0.2"/>
    <text x="-97" y="-32" text-anchor="middle" fill="#22c55e" font-size="12" font-weight="700">2</text>
    <text x="-78" y="-32" fill="#86efac" font-size="11" font-weight="700">証明書検証</text>
    <text x="-78" y="-14" fill="#bbf7d0" font-size="9">CA署名の検証で偽サーバーを検出</text>
    <line x1="-108" y1="-2" x2="108" y2="-2" stroke="#22c55e" stroke-width="0.5" opacity="0.3"/>
    <text x="0" y="18" text-anchor="middle" fill="#86efac" font-size="9" font-family="'Fira Code', monospace">X.509 Certificate Chain</text>
    <text x="0" y="34" text-anchor="middle" fill="#64748b" font-size="9" font-family="'Fira Code', monospace">Root CA -> Intermediate -> Server</text>
    <text x="0" y="50" text-anchor="middle" fill="#4ade80" font-size="8.5">不正な証明書は自動的に拒否</text>
  </g>

  <!-- Card 3: HSTS (Row2, Col1) -->
  <g transform="translate(215, 690)" filter="url(#shadow)">
    <rect x="-125" y="-60" width="250" height="120" rx="8" fill="#052e16" stroke="#22c55e" stroke-width="1"/>
    <rect x="-108" y="-48" width="22" height="22" rx="5" fill="#22c55e" opacity="0.2"/>
    <text x="-97" y="-32" text-anchor="middle" fill="#22c55e" font-size="12" font-weight="700">3</text>
    <text x="-78" y="-32" fill="#86efac" font-size="11" font-weight="700">HSTS</text>
    <text x="-78" y="-14" fill="#bbf7d0" font-size="9">HTTPへのダウングレードを防止</text>
    <line x1="-108" y1="-2" x2="108" y2="-2" stroke="#22c55e" stroke-width="0.5" opacity="0.3"/>
    <text x="0" y="18" text-anchor="middle" fill="#86efac" font-size="9" font-family="'Fira Code', monospace">Strict-Transport-Security:</text>
    <text x="0" y="34" text-anchor="middle" fill="#64748b" font-size="9" font-family="'Fira Code', monospace">max-age=31536000; includeSubDomains</text>
    <text x="0" y="50" text-anchor="middle" fill="#4ade80" font-size="8.5">SSL Stripping攻撃を完全にブロック</text>
  </g>

  <!-- Card 4: Certificate Pinning (Row2, Col2) -->
  <g transform="translate(555, 690)" filter="url(#shadow)">
    <rect x="-125" y="-60" width="250" height="120" rx="8" fill="#052e16" stroke="#22c55e" stroke-width="1"/>
    <rect x="-108" y="-48" width="22" height="22" rx="5" fill="#22c55e" opacity="0.2"/>
    <text x="-97" y="-32" text-anchor="middle" fill="#22c55e" font-size="12" font-weight="700">4</text>
    <text x="-78" y="-32" fill="#86efac" font-size="11" font-weight="700">Certificate Pinning</text>
    <text x="-78" y="-14" fill="#bbf7d0" font-size="9">特定の証明書のみを信頼</text>
    <line x1="-108" y1="-2" x2="108" y2="-2" stroke="#22c55e" stroke-width="0.5" opacity="0.3"/>
    <text x="0" y="18" text-anchor="middle" fill="#86efac" font-size="9" font-family="'Fira Code', monospace">Public-Key-Pins:</text>
    <text x="0" y="34" text-anchor="middle" fill="#64748b" font-size="9" font-family="'Fira Code', monospace">pin-sha256="base64hash..."</text>
    <text x="0" y="50" text-anchor="middle" fill="#4ade80" font-size="8.5">偽のCA証明書による攻撃も防御</text>
  </g>

  <!-- ====================================================== -->
  <!--  SIDEBAR: Defense Layer List                            -->
  <!-- ====================================================== -->
  <g transform="translate(785, 100)">
    <rect x="0" y="0" width="295" height="340" rx="10" fill="#0f172a" stroke="#22c55e" stroke-width="1"/>
    <text x="147" y="28" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="700">防御レイヤー一覧</text>
    <line x1="16" y1="40" x2="279" y2="40" stroke="#334155" stroke-width="1"/>

    <!-- Layer 1 -->
    <circle cx="34" cy="68" r="13" fill="#22c55e"/>
    <text x="34" y="73" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">1</text>
    <text x="56" y="64" fill="#f8fafc" font-size="11.5" font-weight="600">TLS/HTTPS暗号化</text>
    <text x="56" y="80" fill="#94a3b8" font-size="9.5">全通信をAES-256で暗号化。</text>
    <text x="56" y="93" fill="#94a3b8" font-size="9.5">傍受されても内容は解読不能</text>

    <!-- Layer 2 -->
    <circle cx="34" cy="124" r="13" fill="#22c55e"/>
    <text x="34" y="129" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">2</text>
    <text x="56" y="120" fill="#f8fafc" font-size="11.5" font-weight="600">証明書検証</text>
    <text x="56" y="136" fill="#94a3b8" font-size="9.5">信頼されたCAチェーンで</text>
    <text x="56" y="149" fill="#94a3b8" font-size="9.5">サーバーの真正性を検証</text>

    <!-- Layer 3 -->
    <circle cx="34" cy="180" r="13" fill="#22c55e"/>
    <text x="34" y="185" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">3</text>
    <text x="56" y="176" fill="#f8fafc" font-size="11.5" font-weight="600">HSTS</text>
    <text x="56" y="192" fill="#94a3b8" font-size="9.5">ブラウザにHTTPS強制を指示。</text>
    <text x="56" y="205" fill="#94a3b8" font-size="9.5">SSL Strippingを防止</text>

    <!-- Layer 4 -->
    <circle cx="34" cy="236" r="13" fill="#22c55e"/>
    <text x="34" y="241" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">4</text>
    <text x="56" y="232" fill="#f8fafc" font-size="11.5" font-weight="600">Certificate Pinning</text>
    <text x="56" y="248" fill="#94a3b8" font-size="9.5">期待する証明書のハッシュを</text>
    <text x="56" y="261" fill="#94a3b8" font-size="9.5">固定し、偽証明書を排除</text>

    <!-- Multi-layer defense note -->
    <line x1="16" y1="280" x2="279" y2="280" stroke="#334155" stroke-width="1"/>
    <text x="147" y="304" text-anchor="middle" fill="#86efac" font-size="10" font-weight="600">&#x1F512; 多層防御 (Defense in Depth)</text>
    <text x="147" y="320" text-anchor="middle" fill="#94a3b8" font-size="8.5">複数の防御層で攻撃の各段階を阻止</text>
  </g>

  <!-- ===== Legend ===== -->
  <g transform="translate(205, 800)">
    <rect x="0" y="0" width="360" height="28" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <line x1="14" y1="14" x2="34" y2="14" stroke="#ef4444" stroke-width="1.8" stroke-dasharray="6,3" opacity="0.3"/>
    <text x="40" y="18" fill="#94a3b8" font-size="9.5">遮断された攻撃</text>
    <g transform="translate(156, 14)">
      <circle r="7" fill="#052e16" stroke="#22c55e" stroke-width="1.2"/>
      <line x1="-3" y1="-3" x2="3" y2="3" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="3" y1="-3" x2="-3" y2="3" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    <text x="170" y="18" fill="#94a3b8" font-size="9.5">ブロックポイント</text>
    <rect x="270" y="7" width="12" height="12" rx="2" fill="#052e16" stroke="#22c55e" stroke-width="0.8"/>
    <text x="288" y="18" fill="#94a3b8" font-size="9.5">防御機構</text>
  </g>

</svg>