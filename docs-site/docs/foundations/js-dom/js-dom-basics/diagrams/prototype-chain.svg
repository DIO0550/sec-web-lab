<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrowDown" markerWidth="8" markerHeight="6" refX="4" refY="0" orient="auto">
      <path d="M0,0 L4,6 L8,0" fill="#94a3b8" stroke="none"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="600" height="380" fill="url(#bg)" rx="0"/>

  <!-- Title -->
  <text x="300" y="32" text-anchor="middle" fill="#f8fafc" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="18" font-weight="bold">プロトタイプチェーン</text>

  <!-- myObj box -->
  <rect x="180" y="52" width="240" height="70" rx="12" fill="#1e1b2e" stroke="#a855f7" stroke-width="2" filter="url(#shadow)"/>
  <text x="300" y="74" text-anchor="middle" fill="#d8b4fe" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="14" font-weight="bold">myObj</text>
  <line x1="195" y1="82" x2="405" y2="82" stroke="#a855f7" stroke-width="0.5" opacity="0.4"/>
  <text x="210" y="102" fill="#e2e8f0" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="12">name: </text>
  <text x="258" y="102" fill="#4ade80" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="12">'Alice'</text>

  <!-- Arrow 1: myObj -> Object.prototype -->
  <line x1="300" y1="122" x2="300" y2="158" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowDown)"/>
  <rect x="223" y="132" width="155" height="18" rx="4" fill="#0f172a"/>
  <text x="300" y="146" text-anchor="middle" fill="#94a3b8" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="11">[[Prototype]]</text>

  <!-- Object.prototype box -->
  <rect x="150" y="165" width="300" height="100" rx="12" fill="#1e1b2e" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="300" y="190" text-anchor="middle" fill="#93c5fd" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="14" font-weight="bold">Object.prototype</text>
  <line x1="165" y1="198" x2="435" y2="198" stroke="#3b82f6" stroke-width="0.5" opacity="0.4"/>
  <text x="175" y="220" fill="#e2e8f0" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="12">toString()</text>
  <text x="175" y="240" fill="#e2e8f0" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="12">hasOwnProperty()</text>
  <text x="175" y="256" fill="#e2e8f0" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="12">valueOf()</text>

  <!-- Arrow 2: Object.prototype -> null -->
  <line x1="300" y1="265" x2="300" y2="302" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowDown)"/>
  <rect x="223" y="275" width="155" height="18" rx="4" fill="#0f172a"/>
  <text x="300" y="289" text-anchor="middle" fill="#94a3b8" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="11">[[Prototype]]</text>

  <!-- null -->
  <rect x="250" y="310" width="100" height="36" rx="12" fill="#1e1b2e" stroke="#64748b" stroke-width="2" filter="url(#shadow)"/>
  <text x="300" y="333" text-anchor="middle" fill="#64748b" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="14" font-weight="bold">null</text>

  <!-- Explanation note -->
  <text x="300" y="370" text-anchor="middle" fill="#94a3b8" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="11">プロパティが見つからない場合、チェーンを遡って探索する</text>
</svg>