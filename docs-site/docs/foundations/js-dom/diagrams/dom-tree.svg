<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="350" fill="url(#bg)" rx="0"/>

  <!-- Title -->
  <text x="300" y="35" text-anchor="middle" fill="#f8fafc" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="18" font-weight="bold">DOM</text>

  <!-- Connection lines -->
  <line x1="300" y1="75" x2="300" y2="105" stroke="#475569" stroke-width="2"/>
  <line x1="300" y1="135" x2="300" y2="165" stroke="#475569" stroke-width="2"/>
  <line x1="300" y1="195" x2="200" y2="235" stroke="#475569" stroke-width="2"/>
  <line x1="300" y1="195" x2="400" y2="235" stroke="#475569" stroke-width="2"/>
  <!-- Text node connections -->
  <line x1="200" y1="265" x2="200" y2="295" stroke="#475569" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="400" y1="265" x2="400" y2="295" stroke="#475569" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- Document node -->
  <rect x="230" y="50" width="140" height="30" rx="10" fill="#1e1b2e" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="300" y="70" text-anchor="middle" fill="#93c5fd" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="13" font-weight="bold">Document</text>

  <!-- html node -->
  <rect x="240" y="108" width="120" height="30" rx="10" fill="#1e1b2e" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="300" y="128" text-anchor="middle" fill="#93c5fd" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="13" font-weight="bold">&lt;html&gt;</text>

  <!-- body node -->
  <rect x="240" y="168" width="120" height="30" rx="10" fill="#1e1b2e" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="300" y="188" text-anchor="middle" fill="#93c5fd" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="13" font-weight="bold">&lt;body&gt;</text>

  <!-- h1 node -->
  <rect x="130" y="238" width="140" height="30" rx="10" fill="#1e1b2e" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="200" y="258" text-anchor="middle" fill="#93c5fd" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="13" font-weight="bold">&lt;h1&gt;</text>

  <!-- p#content node -->
  <rect x="330" y="238" width="140" height="30" rx="10" fill="#1e1b2e" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="400" y="258" text-anchor="middle" fill="#93c5fd" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="13" font-weight="bold">&lt;p id="content"&gt;</text>

  <!-- Text node: タイトル -->
  <rect x="135" y="298" width="130" height="28" rx="12" fill="#1e1b2e" stroke="#22c55e" stroke-width="2" filter="url(#shadow)"/>
  <text x="200" y="317" text-anchor="middle" fill="#4ade80" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="12" font-style="italic">"タイトル"</text>

  <!-- Text node: 本文 -->
  <rect x="335" y="298" width="130" height="28" rx="12" fill="#1e1b2e" stroke="#22c55e" stroke-width="2" filter="url(#shadow)"/>
  <text x="400" y="317" text-anchor="middle" fill="#4ade80" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="12" font-style="italic">"本文"</text>

  <!-- Legend -->
  <rect x="20" y="50" width="12" height="12" rx="3" fill="#1e1b2e" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="38" y="61" fill="#94a3b8" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="11">要素ノード</text>
  <rect x="20" y="70" width="12" height="12" rx="3" fill="#1e1b2e" stroke="#22c55e" stroke-width="1.5"/>
  <text x="38" y="81" fill="#94a3b8" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="11">テキストノード</text>
</svg>