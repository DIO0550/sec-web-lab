<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 650" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a855f7"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="650" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#f8fafc" font-size="20" font-weight="700">セッション確立のシーケンス図</text>
  <text x="400" y="55" text-anchor="middle" fill="#94a3b8" font-size="11">Session Establishment Sequence Diagram</text>

  <!-- Actor: Client -->
  <g filter="url(#shadow)">
    <rect x="100" y="68" width="120" height="44" rx="10" fill="#1e1b2e" stroke="#a855f7" stroke-width="1.5"/>
    <text x="160" y="94" text-anchor="middle" fill="#d8b4fe" font-size="14" font-weight="700">クライアント</text>
  </g>

  <!-- Actor: Server -->
  <g filter="url(#shadow)">
    <rect x="560" y="68" width="120" height="44" rx="10" fill="#1e1b2e" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="620" y="94" text-anchor="middle" fill="#93c5fd" font-size="14" font-weight="700">サーバー</text>
  </g>

  <!-- Timeline lines -->
  <line x1="160" y1="112" x2="160" y2="630" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.5"/>
  <line x1="620" y1="112" x2="620" y2="630" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.5"/>

  <!-- ===== Section 1: ログイン ===== -->
  <rect x="30" y="125" width="740" height="175" rx="8" fill="#a855f7" opacity="0.04" stroke="#a855f7" stroke-width="0.5" stroke-dasharray="4,3" opacity="0.3"/>
  <rect x="34" y="128" width="72" height="20" rx="4" fill="#a855f7" opacity="0.15"/>
  <text x="70" y="142" text-anchor="middle" fill="#d8b4fe" font-size="10" font-weight="600">ログイン</text>

  <!-- Step 1: POST /login -->
  <g>
    <circle cx="135" cy="165" r="10" fill="#a855f7" opacity="0.2"/>
    <text x="135" y="169" text-anchor="middle" fill="#d8b4fe" font-size="11" font-weight="700">1</text>
    <line x1="160" y1="165" x2="610" y2="165" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrowPurple)"/>
    <rect x="260" y="151" width="260" height="20" rx="4" fill="#1e1b2e" opacity="0.9"/>
    <text x="390" y="165" text-anchor="middle" fill="#d8b4fe" font-size="10.5" font-weight="600">POST /login {user: "alice", pass: ..}</text>
  </g>

  <!-- Step 2: Server processes -->
  <g>
    <circle cx="645" cy="205" r="10" fill="#3b82f6" opacity="0.2"/>
    <text x="645" y="209" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="700">2</text>
    <rect x="400" y="192" width="235" height="44" rx="6" fill="#1e1b2e" stroke="#3b82f6" stroke-width="1" opacity="0.9"/>
    <text x="518" y="207" text-anchor="middle" fill="#22c55e" font-size="9.5" font-weight="600">認証成功</text>
    <text x="518" y="220" text-anchor="middle" fill="#60a5fa" font-size="9">sid = crypto.randomBytes(32)</text>
    <text x="518" y="232" text-anchor="middle" fill="#60a5fa" font-size="9">sessions[sid] = {user: "alice"}</text>
  </g>

  <!-- Step 3: Set-Cookie response -->
  <g>
    <circle cx="645" cy="268" r="10" fill="#3b82f6" opacity="0.2"/>
    <text x="645" y="272" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="700">3</text>
    <line x1="610" y1="268" x2="170" y2="268" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
    <rect x="195" y="252" width="390" height="24" rx="4" fill="#1e1b2e" opacity="0.9"/>
    <text x="390" y="268" text-anchor="middle" fill="#93c5fd" font-size="9.5" font-weight="600">HTTP 200 OK  Set-Cookie: sid=xxx; HttpOnly; Secure; SameSite=Lax</text>
  </g>

  <!-- ===== Section 2: リクエスト ===== -->
  <rect x="30" y="310" width="740" height="150" rx="8" fill="#3b82f6" opacity="0.04" stroke="#3b82f6" stroke-width="0.5" stroke-dasharray="4,3" opacity="0.3"/>
  <rect x="34" y="313" width="80" height="20" rx="4" fill="#3b82f6" opacity="0.15"/>
  <text x="74" y="327" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="600">リクエスト</text>

  <!-- Step 4: GET /api/profile -->
  <g>
    <circle cx="135" cy="350" r="10" fill="#a855f7" opacity="0.2"/>
    <text x="135" y="354" text-anchor="middle" fill="#d8b4fe" font-size="11" font-weight="700">4</text>
    <line x1="160" y1="350" x2="610" y2="350" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrowPurple)"/>
    <rect x="260" y="336" width="260" height="20" rx="4" fill="#1e1b2e" opacity="0.9"/>
    <text x="390" y="350" text-anchor="middle" fill="#d8b4fe" font-size="10.5" font-weight="600">GET /api/profile  Cookie: sid=xxx</text>
  </g>

  <!-- Step 5: Server lookup -->
  <g>
    <circle cx="645" cy="388" r="10" fill="#3b82f6" opacity="0.2"/>
    <text x="645" y="392" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="700">5</text>
    <rect x="430" y="376" width="205" height="26" rx="6" fill="#1e1b2e" stroke="#3b82f6" stroke-width="1" opacity="0.9"/>
    <text x="533" y="394" text-anchor="middle" fill="#60a5fa" font-size="9.5">sessions[sid] → {user: "alice"}</text>
  </g>

  <!-- Step 6: 200 OK -->
  <g>
    <circle cx="645" cy="425" r="10" fill="#3b82f6" opacity="0.2"/>
    <text x="645" y="429" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="700">6</text>
    <line x1="610" y1="425" x2="170" y2="425" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
    <rect x="280" y="411" width="220" height="20" rx="4" fill="#1e1b2e" opacity="0.9"/>
    <text x="390" y="425" text-anchor="middle" fill="#93c5fd" font-size="10.5" font-weight="600">HTTP 200 OK {"name": "Alice"}</text>
  </g>

  <!-- ===== Section 3: ログアウト ===== -->
  <rect x="30" y="468" width="740" height="150" rx="8" fill="#f97316" opacity="0.04" stroke="#f97316" stroke-width="0.5" stroke-dasharray="4,3" opacity="0.3"/>
  <rect x="34" y="471" width="80" height="20" rx="4" fill="#f97316" opacity="0.15"/>
  <text x="74" y="485" text-anchor="middle" fill="#fdba74" font-size="10" font-weight="600">ログアウト</text>

  <!-- Step 7: POST /logout -->
  <g>
    <circle cx="135" cy="510" r="10" fill="#a855f7" opacity="0.2"/>
    <text x="135" y="514" text-anchor="middle" fill="#d8b4fe" font-size="11" font-weight="700">7</text>
    <line x1="160" y1="510" x2="610" y2="510" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrowPurple)"/>
    <rect x="270" y="496" width="240" height="20" rx="4" fill="#1e1b2e" opacity="0.9"/>
    <text x="390" y="510" text-anchor="middle" fill="#d8b4fe" font-size="10.5" font-weight="600">POST /logout  Cookie: sid=xxx</text>
  </g>

  <!-- Step 8: Server deletes session -->
  <g>
    <circle cx="645" cy="548" r="10" fill="#3b82f6" opacity="0.2"/>
    <text x="645" y="552" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="700">8</text>
    <rect x="455" y="536" width="180" height="26" rx="6" fill="#1e1b2e" stroke="#f97316" stroke-width="1" opacity="0.9"/>
    <text x="545" y="554" text-anchor="middle" fill="#fdba74" font-size="9.5">delete sessions[sid]</text>
  </g>

  <!-- Step 9: Clear cookie response -->
  <g>
    <circle cx="645" cy="588" r="10" fill="#3b82f6" opacity="0.2"/>
    <text x="645" y="592" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="700">9</text>
    <line x1="610" y1="588" x2="170" y2="588" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
    <rect x="260" y="574" width="260" height="20" rx="4" fill="#1e1b2e" opacity="0.9"/>
    <text x="390" y="588" text-anchor="middle" fill="#93c5fd" font-size="10.5" font-weight="600">Set-Cookie: sid=; Max-Age=0</text>
  </g>

  <!-- Legend -->
  <g transform="translate(50, 628)">
    <line x1="0" y1="0" x2="30" y2="0" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrowPurple)"/>
    <text x="38" y="4" fill="#94a3b8" font-size="10">クライアント → サーバー</text>
    <line x1="180" y1="0" x2="210" y2="0" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
    <text x="218" y="4" fill="#94a3b8" font-size="10">サーバー → クライアント</text>
  </g>
</svg>