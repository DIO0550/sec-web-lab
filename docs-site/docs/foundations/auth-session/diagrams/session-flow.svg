<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a855f7"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="480" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#f8fafc" font-size="20" font-weight="700">セッション管理の基本的な流れ</text>
  <text x="400" y="55" text-anchor="middle" fill="#94a3b8" font-size="11">Basic Session Management Flow</text>

  <!-- Actor: Client -->
  <g filter="url(#shadow)">
    <rect x="100" y="72" width="120" height="44" rx="10" fill="#1e1b2e" stroke="#a855f7" stroke-width="1.5"/>
    <text x="160" y="98" text-anchor="middle" fill="#d8b4fe" font-size="14" font-weight="700">クライアント</text>
  </g>

  <!-- Actor: Server -->
  <g filter="url(#shadow)">
    <rect x="560" y="72" width="120" height="44" rx="10" fill="#1e1b2e" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="620" y="98" text-anchor="middle" fill="#93c5fd" font-size="14" font-weight="700">サーバー</text>
  </g>

  <!-- Timeline lines -->
  <line x1="160" y1="116" x2="160" y2="460" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.5"/>
  <line x1="620" y1="116" x2="620" y2="460" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.5"/>

  <!-- Step 1: POST /login -->
  <g>
    <circle cx="135" cy="148" r="10" fill="#a855f7" opacity="0.2"/>
    <text x="135" y="152" text-anchor="middle" fill="#d8b4fe" font-size="11" font-weight="700">1</text>
    <line x1="160" y1="148" x2="610" y2="148" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrowPurple)"/>
    <rect x="280" y="134" width="220" height="20" rx="4" fill="#1e1b2e" opacity="0.9"/>
    <text x="390" y="149" text-anchor="middle" fill="#d8b4fe" font-size="11" font-weight="600">POST /login {user, pass}</text>
  </g>

  <!-- Step 2: Server generates session -->
  <g>
    <circle cx="645" cy="192" r="10" fill="#3b82f6" opacity="0.2"/>
    <text x="645" y="196" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="700">2</text>
    <rect x="420" y="175" width="215" height="38" rx="6" fill="#1e1b2e" stroke="#3b82f6" stroke-width="1" opacity="0.9"/>
    <text x="528" y="190" text-anchor="middle" fill="#93c5fd" font-size="9.5">セッションID生成: "sid_xK9mP2..."</text>
    <text x="528" y="205" text-anchor="middle" fill="#60a5fa" font-size="9">sessions["sid_xK9mP2..."] = {user: "alice"}</text>
  </g>

  <!-- Step 3: Set-Cookie response -->
  <g>
    <circle cx="645" cy="240" r="10" fill="#3b82f6" opacity="0.2"/>
    <text x="645" y="244" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="700">3</text>
    <line x1="610" y1="240" x2="170" y2="240" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
    <rect x="240" y="226" width="300" height="20" rx="4" fill="#1e1b2e" opacity="0.9"/>
    <text x="390" y="240" text-anchor="middle" fill="#93c5fd" font-size="10.5" font-weight="600">Set-Cookie: sid=sid_xK9mP2...</text>
  </g>

  <!-- Step 4: GET /profile -->
  <g>
    <circle cx="135" cy="298" r="10" fill="#a855f7" opacity="0.2"/>
    <text x="135" y="302" text-anchor="middle" fill="#d8b4fe" font-size="11" font-weight="700">4</text>
    <line x1="160" y1="298" x2="610" y2="298" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrowPurple)"/>
    <rect x="240" y="284" width="300" height="20" rx="4" fill="#1e1b2e" opacity="0.9"/>
    <text x="390" y="298" text-anchor="middle" fill="#d8b4fe" font-size="10.5" font-weight="600">GET /profile  Cookie: sid=sid_xK9mP2...</text>
  </g>

  <!-- Step 5: Server lookup -->
  <g>
    <circle cx="645" cy="340" r="10" fill="#3b82f6" opacity="0.2"/>
    <text x="645" y="344" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="700">5</text>
    <rect x="420" y="328" width="215" height="26" rx="6" fill="#1e1b2e" stroke="#3b82f6" stroke-width="1" opacity="0.9"/>
    <text x="528" y="346" text-anchor="middle" fill="#60a5fa" font-size="9.5">sessions["sid_xK9mP2..."] → {user: "alice"}</text>
  </g>

  <!-- Step 6: 200 OK response -->
  <g>
    <circle cx="645" cy="385" r="10" fill="#3b82f6" opacity="0.2"/>
    <text x="645" y="389" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="700">6</text>
    <line x1="610" y1="385" x2="170" y2="385" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
    <rect x="280" y="371" width="220" height="20" rx="4" fill="#1e1b2e" opacity="0.9"/>
    <text x="390" y="385" text-anchor="middle" fill="#93c5fd" font-size="10.5" font-weight="600">200 OK {"name": "Alice"}</text>
  </g>

  <!-- Legend -->
  <g transform="translate(50, 435)">
    <line x1="0" y1="0" x2="30" y2="0" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrowPurple)"/>
    <text x="38" y="4" fill="#94a3b8" font-size="10">クライアント → サーバー</text>
    <line x1="180" y1="0" x2="210" y2="0" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
    <text x="218" y="4" fill="#94a3b8" font-size="10">サーバー → クライアント</text>
  </g>
</svg>