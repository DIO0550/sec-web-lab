<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 750" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a855f7"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="750" fill="url(#bgGrad)" rx="12"/>

  <!-- ===== Title ===== -->
  <text x="380" y="38" text-anchor="middle" fill="#f8fafc" font-size="22" font-weight="700">Session Expiration Attack Flow</text>
  <text x="380" y="58" text-anchor="middle" fill="#94a3b8" font-size="12">セッション有効期限の不備 — 無期限セッションの悪用</text>
  <rect x="278" y="66" width="204" height="20" rx="10" fill="#ef4444" opacity="0.15"/>
  <text x="380" y="80" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="600">OWASP A07 — Authentication Failures</text>

  <!-- ====================================================== -->
  <!--  ACTORS (3-actor: User x=115, Attacker x=380, Server x=645) -->
  <!-- ====================================================== -->

  <!-- User/Victim (original user) -->
  <g transform="translate(115, 250)" filter="url(#shadow)">
    <rect x="-56" y="-30" width="112" height="125" rx="12" fill="#1e1b2e" stroke="#a855f7" stroke-width="1.5"/>
    <g transform="translate(0, 10)">
      <circle cx="0" cy="-9" r="13" fill="none" stroke="#a855f7" stroke-width="1.8"/>
      <circle cx="-4" cy="-11" r="1.5" fill="#a855f7"/>
      <circle cx="4" cy="-11" r="1.5" fill="#a855f7"/>
      <path d="M-4,-4 Q0,1 4,-4" fill="none" stroke="#a855f7" stroke-width="1.3" stroke-linecap="round"/>
      <path d="M-17,36 Q-17,14 0,10 Q17,14 17,36" fill="none" stroke="#a855f7" stroke-width="2"/>
      <line x1="-17" y1="36" x2="17" y2="36" stroke="#a855f7" stroke-width="2" stroke-linecap="round"/>
    </g>
    <text x="0" y="72" text-anchor="middle" fill="#d8b4fe" font-size="13" font-weight="700">正規ユーザー</text>
    <text x="0" y="86" text-anchor="middle" fill="#a855f7" font-size="9.5" opacity="0.7">Legitimate User</text>
  </g>

  <!-- Attacker -->
  <g transform="translate(380, 250)" filter="url(#shadow)">
    <rect x="-56" y="-30" width="112" height="125" rx="12" fill="#1e1b2e" stroke="#ef4444" stroke-width="1.5"/>
    <g transform="translate(0, 10)">
      <path d="M-13,-17 Q0,-28 13,-17 L13,-4 Q0,2 -13,-4 Z" fill="none" stroke="#ef4444" stroke-width="1.8"/>
      <circle cx="-4" cy="-9" r="1.8" fill="#ef4444"/>
      <circle cx="4" cy="-9" r="1.8" fill="#ef4444"/>
      <path d="M-17,36 Q-17,14 0,10 Q17,14 17,36" fill="none" stroke="#ef4444" stroke-width="2"/>
      <line x1="-17" y1="36" x2="17" y2="36" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
    </g>
    <text x="0" y="72" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="700">攻撃者</text>
    <text x="0" y="86" text-anchor="middle" fill="#ef4444" font-size="9.5" opacity="0.7">共有PC利用者</text>
  </g>

  <!-- Web Server -->
  <g transform="translate(645, 250)" filter="url(#shadow)">
    <rect x="-56" y="-30" width="112" height="125" rx="12" fill="#1e1b2e" stroke="#3b82f6" stroke-width="1.5"/>
    <g transform="translate(0, 14)">
      <rect x="-20" y="-18" width="40" height="12" rx="3" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
      <circle cx="-12" cy="-12" r="2" fill="#3b82f6"/><circle cx="-5" cy="-12" r="2" fill="#3b82f6"/>
      <rect x="-20" y="-2" width="40" height="12" rx="3" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
      <circle cx="-12" cy="4" r="2" fill="#3b82f6"/><circle cx="-5" cy="4" r="2" fill="#3b82f6"/>
      <rect x="-20" y="14" width="40" height="12" rx="3" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
      <circle cx="-12" cy="20" r="2" fill="#3b82f6"/><circle cx="-5" cy="20" r="2" fill="#3b82f6"/>
    </g>
    <text x="0" y="72" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">Webサーバー</text>
    <text x="0" y="86" text-anchor="middle" fill="#3b82f6" font-size="9.5" opacity="0.7">No Expiration</text>
  </g>

  <!-- ====================================================== -->
  <!--  ARROWS                                                 -->
  <!-- ====================================================== -->

  <!-- Step 1: User → Server (upper curve) — ログインしてセッション取得 -->
  <path d="M 171 220 Q 380 130 589 220" fill="none" stroke="#a855f7" stroke-width="2.2" marker-end="url(#arrowPurple)"/>
  <circle cx="380" cy="145" r="16" fill="#a855f7"/>
  <text x="380" y="150" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">1</text>
  <text x="380" y="133" text-anchor="middle" fill="#d8b4fe" font-size="9.5" font-weight="600">ログイン → セッション発行</text>

  <!-- Step 2: User leaves — vertical arrow down from user -->
  <path d="M 115 375 L 115 398" fill="none" stroke="#a855f7" stroke-width="2.2" stroke-dasharray="6,3" marker-end="url(#arrowPurple)"/>
  <circle cx="140" cy="386" r="16" fill="#a855f7"/>
  <text x="140" y="391" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">2</text>

  <!-- User leaves box -->
  <g transform="translate(115, 408)" filter="url(#shadow)">
    <rect x="-80" y="0" width="160" height="48" rx="8" fill="#1e1b2e" stroke="#a855f7" stroke-width="1.2" stroke-dasharray="4,2"/>
    <text x="0" y="18" text-anchor="middle" fill="#d8b4fe" font-size="10" font-weight="700">端末を放置</text>
    <text x="0" y="34" text-anchor="middle" fill="#a855f7" font-size="8.5">数日〜数週間経過</text>
  </g>

  <!-- Step 3: Attacker finds the browser — L-shaped arrow from attacker to user's box -->
  <path d="M 324 270 L 200 270 L 200 408" fill="none" stroke="#ef4444" stroke-linejoin="round" stroke-width="2.2" stroke-dasharray="8,4" marker-end="url(#arrowRed)"/>
  <circle cx="260" cy="248" r="16" fill="#ef4444"/>
  <text x="260" y="253" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">3</text>
  <text x="280" y="270" fill="#fca5a5" font-size="9.5" font-weight="600">放置端末を発見</text>

  <!-- Step 4: Attacker → Server (Y=300) — 古いセッションでアクセス -->
  <path d="M 436 300 L 589 300" fill="none" stroke="#ef4444" stroke-width="2.2" stroke-dasharray="8,4" marker-end="url(#arrowRed)"/>
  <circle cx="514" cy="322" r="16" fill="#ef4444"/>
  <text x="514" y="327" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">4</text>
  <text x="514" y="340" text-anchor="middle" fill="#fca5a5" font-size="9.5" font-weight="600">古いセッションで接続</text>

  <!-- Step 5: Server → Attacker (Y=260) — アクセス許可 -->
  <path d="M 589 260 L 436 260" fill="none" stroke="#3b82f6" stroke-width="2.2" marker-end="url(#arrowBlue)"/>
  <circle cx="514" cy="240" r="16" fill="#3b82f6"/>
  <text x="514" y="245" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">5</text>
  <text x="514" y="230" text-anchor="middle" fill="#93c5fd" font-size="9.5" font-weight="600">セッション有効 → フルアクセス</text>

  <!-- ====================================================== -->
  <!--  VULNERABILITY BOX                                      -->
  <!-- ====================================================== -->
  <g transform="translate(400, 490)" filter="url(#shadow)">
    <rect x="-170" y="-18" width="340" height="68" rx="8" fill="#451a03" stroke="#f97316" stroke-width="1"/>
    <text x="0" y="-1" text-anchor="middle" fill="#fdba74" font-size="11" font-weight="700">⚠ セッション無期限</text>
    <text x="0" y="18" text-anchor="middle" fill="#fb923c" font-size="9.5" font-family="'Fira Code', monospace">Set-Cookie: sid=abc123; (no max-age/expires)</text>
    <text x="0" y="34" text-anchor="middle" fill="#fed7aa" font-size="9">有効期限・アイドルタイムアウトが設定されていない</text>
  </g>

  <!-- ===== Code example bar ===== -->
  <g transform="translate(400, 575)">
    <rect x="-195" y="-14" width="390" height="28" rx="5" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="0" y="4" text-anchor="middle" fill="#94a3b8" font-size="9.5" font-family="'Fira Code', monospace">
      <tspan fill="#64748b">Cookie:</tspan><tspan fill="#93c5fd"> sid=abc123</tspan><tspan fill="#94a3b8"> (</tspan><tspan fill="#ef4444">期限なし・数週間後も有効</tspan><tspan fill="#94a3b8">)</tspan>
    </text>
  </g>

  <!-- ====================================================== -->
  <!--  STEP LIST (right sidebar)                              -->
  <!-- ====================================================== -->
  <g transform="translate(775, 100)">
    <rect x="0" y="0" width="305" height="320" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="152" y="28" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="700">攻撃ステップ詳細</text>
    <line x1="16" y1="40" x2="289" y2="40" stroke="#334155" stroke-width="1"/>

    <!-- Step 1 -->
    <circle cx="34" cy="68" r="13" fill="#a855f7"/>
    <text x="34" y="73" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">1</text>
    <text x="56" y="64" fill="#f8fafc" font-size="11.5" font-weight="600">ユーザーがログイン</text>
    <text x="56" y="80" fill="#94a3b8" font-size="9.5">セッションCookieが発行されるが</text>
    <text x="56" y="93" fill="#94a3b8" font-size="9.5">max-age/expiresが未設定</text>

    <!-- Step 2 -->
    <circle cx="34" cy="124" r="13" fill="#a855f7"/>
    <text x="34" y="129" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">2</text>
    <text x="56" y="120" fill="#f8fafc" font-size="11.5" font-weight="600">ユーザーが端末を放置</text>
    <text x="56" y="136" fill="#94a3b8" font-size="9.5">共有PCや離席したまま</text>
    <text x="56" y="149" fill="#94a3b8" font-size="9.5">ログアウトせずに数日〜数週間</text>

    <!-- Step 3 -->
    <circle cx="34" cy="180" r="13" fill="#ef4444"/>
    <text x="34" y="185" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">3</text>
    <text x="56" y="176" fill="#f8fafc" font-size="11.5" font-weight="600">攻撃者が放置端末を発見</text>
    <text x="56" y="192" fill="#94a3b8" font-size="9.5">ブラウザを開くとセッションが</text>
    <text x="56" y="205" fill="#94a3b8" font-size="9.5">まだ有効な状態で残っている</text>

    <!-- Step 4 -->
    <circle cx="34" cy="236" r="13" fill="#ef4444"/>
    <text x="34" y="241" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">4</text>
    <text x="56" y="232" fill="#f8fafc" font-size="11.5" font-weight="600">古いセッションでアクセス</text>
    <text x="56" y="248" fill="#94a3b8" font-size="9.5">期限のないCookieを使って</text>
    <text x="56" y="261" fill="#94a3b8" font-size="9.5">Webアプリにリクエスト送信</text>

    <!-- Step 5 -->
    <circle cx="34" cy="292" r="13" fill="#3b82f6"/>
    <text x="34" y="297" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">5</text>
    <text x="56" y="288" fill="#f8fafc" font-size="11.5" font-weight="600">再認証なしでフルアクセス</text>
    <text x="56" y="304" fill="#94a3b8" font-size="9.5">サーバーはセッション有効と判断し</text>
    <text x="56" y="317" fill="#94a3b8" font-size="9.5">全機能へのアクセスを許可</text>
  </g>

  <!-- ====================================================== -->
  <!--  ATTACK TECHNIQUE CARDS (bottom)                        -->
  <!-- ====================================================== -->
  <line x1="30" y1="660" x2="1070" y2="660" stroke="#334155" stroke-width="1"/>
  <text x="550" y="685" text-anchor="middle" fill="#fca5a5" font-size="14" font-weight="700">使用される攻撃テクニック</text>

  <!-- Card: 放置端末悪用 -->
  <g transform="translate(165, 698)" filter="url(#shadow)">
    <rect x="-120" y="0" width="240" height="38" rx="8" fill="#1e1b2e" stroke="#ef4444" stroke-width="1"/>
    <rect x="-108" y="6" width="28" height="26" rx="5" fill="#ef4444" opacity="0.1"/>
    <g transform="translate(-94, 19)">
      <!-- Monitor icon -->
      <rect x="-7" y="-6" width="14" height="10" rx="2" fill="none" stroke="#ef4444" stroke-width="1.2"/>
      <line x1="0" y1="4" x2="0" y2="7" stroke="#ef4444" stroke-width="1.2"/>
      <line x1="-4" y1="7" x2="4" y2="7" stroke="#ef4444" stroke-width="1.2"/>
    </g>
    <text x="10" y="16" text-anchor="middle" fill="#f8fafc" font-size="11" font-weight="600">放置端末悪用</text>
    <text x="10" y="30" text-anchor="middle" fill="#94a3b8" font-size="8.5">ログアウト忘れの端末を利用</text>
  </g>

  <!-- Card: セッション窃取 -->
  <g transform="translate(465, 698)" filter="url(#shadow)">
    <rect x="-120" y="0" width="240" height="38" rx="8" fill="#1e1b2e" stroke="#ef4444" stroke-width="1"/>
    <rect x="-108" y="6" width="28" height="26" rx="5" fill="#ef4444" opacity="0.1"/>
    <g transform="translate(-94, 19)">
      <!-- Cookie steal icon -->
      <circle cx="0" cy="0" r="7" fill="none" stroke="#ef4444" stroke-width="1.2"/>
      <circle cx="-3" cy="-2" r="1.5" fill="#ef4444"/>
      <circle cx="3" cy="1" r="1.5" fill="#ef4444"/>
    </g>
    <text x="10" y="16" text-anchor="middle" fill="#f8fafc" font-size="11" font-weight="600">セッション窃取</text>
    <text x="10" y="30" text-anchor="middle" fill="#94a3b8" font-size="8.5">有効なCookieを再利用</text>
  </g>

  <!-- Card: 権限維持 -->
  <g transform="translate(765, 698)" filter="url(#shadow)">
    <rect x="-120" y="0" width="240" height="38" rx="8" fill="#1e1b2e" stroke="#ef4444" stroke-width="1"/>
    <rect x="-108" y="6" width="28" height="26" rx="5" fill="#ef4444" opacity="0.1"/>
    <g transform="translate(-94, 19)">
      <!-- Unlocked padlock icon -->
      <rect x="-5" y="-1" width="10" height="8" rx="2" fill="none" stroke="#ef4444" stroke-width="1.2"/>
      <path d="M-2,-1 L-2,-4 A3,3 0 0,1 4,-4" fill="none" stroke="#ef4444" stroke-width="1.2"/>
    </g>
    <text x="10" y="16" text-anchor="middle" fill="#f8fafc" font-size="11" font-weight="600">権限維持</text>
    <text x="10" y="30" text-anchor="middle" fill="#94a3b8" font-size="8.5">無期限に被害者の権限を保持</text>
  </g>

  <!-- ===== Legend ===== -->
  <g transform="translate(775, 445)">
    <rect x="0" y="0" width="305" height="68" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="14" y="18" fill="#94a3b8" font-size="10" font-weight="600">凡例</text>
    <line x1="14" y1="34" x2="44" y2="34" stroke="#ef4444" stroke-width="2" stroke-dasharray="6,3"/>
    <text x="52" y="38" fill="#fca5a5" font-size="9.5">攻撃通信</text>
    <line x1="152" y1="34" x2="182" y2="34" stroke="#3b82f6" stroke-width="2"/>
    <text x="190" y="38" fill="#93c5fd" font-size="9.5">サーバー応答</text>
    <line x1="14" y1="54" x2="44" y2="54" stroke="#a855f7" stroke-width="2"/>
    <text x="52" y="58" fill="#d8b4fe" font-size="9.5">ユーザー通信</text>
    <rect x="152" y="48" width="12" height="12" rx="2" fill="#451a03" stroke="#f97316" stroke-width="0.8"/>
    <text x="170" y="58" fill="#fdba74" font-size="9.5">脆弱性ポイント</text>
  </g>

</svg>