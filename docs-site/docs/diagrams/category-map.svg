<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 700" width="1100" height="700">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <filter id="glow-center">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#64748b" flood-opacity="0.4"/>
    </filter>
    <style>
      text { font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1100" height="700" rx="12" fill="url(#bg)"/>

  <!-- Title -->
  <text x="550" y="38" text-anchor="middle" fill="#f8fafc" font-size="22" font-weight="700">攻撃カテゴリマップ</text>
  <text x="550" y="60" text-anchor="middle" fill="#94a3b8" font-size="13">68のラボを4つのカテゴリで俯瞰する</text>

  <!-- Center Hub -->
  <g filter="url(#glow-center)">
    <circle cx="550" cy="365" r="52" fill="#1e293b" stroke="#475569" stroke-width="2"/>
    <text x="550" y="358" text-anchor="middle" fill="#f8fafc" font-size="13" font-weight="700">Web</text>
    <text x="550" y="376" text-anchor="middle" fill="#f8fafc" font-size="13" font-weight="700">Security</text>
  </g>

  <!-- Connecting lines -->
  <line x1="498" y1="340" x2="295" y2="200" stroke="#ef444466" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="602" y1="340" x2="805" y2="200" stroke="#8b5cf666" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="498" y1="390" x2="295" y2="530" stroke="#f59e0b66" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="602" y1="390" x2="805" y2="530" stroke="#06b6d466" stroke-width="2" stroke-dasharray="6,3"/>

  <!-- Category 1: 入力操作系 (Top Left) -->
  <g filter="url(#shadow)">
    <rect x="30" y="85" width="490" height="250" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
    <rect x="30" y="85" width="490" height="4" rx="2" fill="#ef4444"/>
    <!-- Header -->
    <g transform="translate(50, 108)">
      <!-- Keyboard icon -->
      <rect x="0" y="0" width="28" height="20" rx="3" fill="none" stroke="#ef4444" stroke-width="1.5"/>
      <line x1="6" y1="7" x2="10" y2="7" stroke="#ef4444" stroke-width="1"/>
      <line x1="13" y1="7" x2="17" y2="7" stroke="#ef4444" stroke-width="1"/>
      <line x1="20" y1="7" x2="24" y2="7" stroke="#ef4444" stroke-width="1"/>
      <line x1="6" y1="13" x2="22" y2="13" stroke="#ef4444" stroke-width="1"/>
    </g>
    <text x="90" y="122" fill="#f8fafc" font-size="16" font-weight="700">入力操作系</text>
    <text x="210" y="122" fill="#ef4444" font-size="12" font-weight="600">Input Manipulation</text>
    <rect x="420" y="104" width="80" height="24" rx="12" fill="#ef444420" stroke="#ef4444" stroke-width="1"/>
    <text x="460" y="120" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="700">15 ラボ</text>
    <text x="50" y="145" fill="#64748b" font-size="10">主に Step 2, 6, 8</text>

    <!-- Lab items - 2 columns -->
    <g fill="#94a3b8" font-size="10">
      <text x="50" y="168">• Reflected XSS</text>
      <text x="50" y="186">• Stored XSS</text>
      <text x="50" y="204">• DOM-based XSS</text>
      <text x="50" y="222">• SQLインジェクション</text>
      <text x="50" y="240">• OSコマンドインジェクション</text>
      <text x="50" y="258">• メールヘッダインジェクション</text>
      <text x="50" y="276">• CRLFインジェクション</text>
      <text x="50" y="294">• HPP</text>
      <text x="280" y="168">• CSVインジェクション</text>
      <text x="280" y="186">• evalインジェクション</text>
      <text x="280" y="204">• SSTI</text>
      <text x="280" y="222">• オープンリダイレクト</text>
      <text x="280" y="240">• Prototype Pollution</text>
      <text x="280" y="258">• Unicode正規化バイパス</text>
      <text x="280" y="276">• ReDoS</text>
    </g>
  </g>

  <!-- Category 2: 認証・セッション系 (Top Right) -->
  <g filter="url(#shadow)">
    <rect x="580" y="85" width="490" height="250" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
    <rect x="580" y="85" width="490" height="4" rx="2" fill="#8b5cf6"/>
    <!-- Header -->
    <g transform="translate(600, 105)">
      <!-- Lock icon -->
      <rect x="4" y="8" width="20" height="14" rx="3" fill="none" stroke="#8b5cf6" stroke-width="1.5"/>
      <path d="M 8 8 L 8 4 Q 8 0 14 0 Q 20 0 20 4 L 20 8" fill="none" stroke="#8b5cf6" stroke-width="1.5"/>
      <circle cx="14" cy="16" r="2" fill="#8b5cf6"/>
    </g>
    <text x="640" y="122" fill="#f8fafc" font-size="16" font-weight="700">認証・セッション系</text>
    <text x="800" y="122" fill="#8b5cf6" font-size="12" font-weight="600">Auth &amp; Session</text>
    <rect x="970" y="104" width="80" height="24" rx="12" fill="#8b5cf620" stroke="#8b5cf6" stroke-width="1"/>
    <text x="1010" y="120" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="700">18 ラボ</text>
    <text x="600" y="145" fill="#64748b" font-size="10">主に Step 3, 4, 8</text>

    <!-- Lab items -->
    <g fill="#94a3b8" font-size="10">
      <text x="600" y="168">• デフォルト認証情報</text>
      <text x="600" y="186">• 弱いパスワードポリシー</text>
      <text x="600" y="204">• ブルートフォース攻撃</text>
      <text x="600" y="222">• 平文パスワード保存</text>
      <text x="600" y="240">• 弱いハッシュ (MD5/SHA1)</text>
      <text x="600" y="258">• ユーザー名列挙</text>
      <text x="600" y="276">• Cookie操作</text>
      <text x="600" y="294">• セッション固定攻撃</text>
      <text x="830" y="168">• セッションハイジャック</text>
      <text x="830" y="186">• CSRF</text>
      <text x="830" y="204">• トークンリプレイ</text>
      <text x="830" y="222">• セッション有効期限の不備</text>
      <text x="830" y="240">• 推測可能なセッションID</text>
      <text x="830" y="258">• JWT改ざん</text>
      <text x="830" y="276">• JWT alg=none / 弱い鍵</text>
      <text x="830" y="294">• JWT Claim 検証不備</text>
    </g>
  </g>

  <!-- Category 3: 設定・設計系 (Bottom Left) -->
  <g filter="url(#shadow)">
    <rect x="30" y="395" width="490" height="250" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
    <rect x="30" y="395" width="490" height="4" rx="2" fill="#f59e0b"/>
    <!-- Header -->
    <g transform="translate(50, 415)">
      <!-- Gear icon -->
      <circle cx="14" cy="12" r="6" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
      <circle cx="14" cy="12" r="2.5" fill="#f59e0b"/>
      <line x1="14" y1="2" x2="14" y2="5" stroke="#f59e0b" stroke-width="1.5"/>
      <line x1="14" y1="19" x2="14" y2="22" stroke="#f59e0b" stroke-width="1.5"/>
      <line x1="4" y1="12" x2="7" y2="12" stroke="#f59e0b" stroke-width="1.5"/>
      <line x1="21" y1="12" x2="24" y2="12" stroke="#f59e0b" stroke-width="1.5"/>
    </g>
    <text x="90" y="432" fill="#f8fafc" font-size="16" font-weight="700">設定・設計系</text>
    <text x="210" y="432" fill="#f59e0b" font-size="12" font-weight="600">Config &amp; Design</text>
    <rect x="420" y="414" width="80" height="24" rx="12" fill="#f59e0b20" stroke="#f59e0b" stroke-width="1"/>
    <text x="460" y="430" text-anchor="middle" fill="#fcd34d" font-size="11" font-weight="700">17 ラボ</text>
    <text x="50" y="455" fill="#64748b" font-size="10">主に Step 1, 7</text>

    <!-- Lab items -->
    <g fill="#94a3b8" font-size="10">
      <text x="50" y="478">• HTTPヘッダー情報漏洩</text>
      <text x="50" y="496">• 機密ファイル露出</text>
      <text x="50" y="514">• エラーメッセージ漏洩</text>
      <text x="50" y="532">• ディレクトリリスティング</text>
      <text x="50" y="550">• 不要なヘッダー露出</text>
      <text x="50" y="568">• セキュリティヘッダ未設定</text>
      <text x="50" y="586">• クリックジャッキング</text>
      <text x="50" y="604">• HTTPでの機密データ送信</text>
      <text x="280" y="478">• 不要なHTTPメソッド許可</text>
      <text x="280" y="496">• キャッシュ制御の不備</text>
      <text x="280" y="514">• Web Storageの不適切な使用</text>
      <text x="280" y="532">• Host Header Injection</text>
      <text x="280" y="550">• X-Forwarded-For 信頼ミス</text>
      <text x="280" y="568">• レート制限なし</text>
      <text x="280" y="586">• 推測可能なパスワードリセット</text>
      <text x="280" y="604">• 署名なしデータの信頼</text>
    </g>
  </g>

  <!-- Category 4: サーバーサイド系 (Bottom Right) -->
  <g filter="url(#shadow)">
    <rect x="580" y="395" width="490" height="250" rx="8" fill="#1e293b" stroke="#06b6d4" stroke-width="1.5"/>
    <rect x="580" y="395" width="490" height="4" rx="2" fill="#06b6d4"/>
    <!-- Header -->
    <g transform="translate(600, 415)">
      <!-- Server icon -->
      <rect x="2" y="0" width="24" height="8" rx="2" fill="none" stroke="#06b6d4" stroke-width="1.5"/>
      <rect x="2" y="10" width="24" height="8" rx="2" fill="none" stroke="#06b6d4" stroke-width="1.5"/>
      <circle cx="21" cy="4" r="1.5" fill="#06b6d4"/>
      <circle cx="21" cy="14" r="1.5" fill="#06b6d4"/>
      <line x1="7" y1="4" x2="16" y2="4" stroke="#06b6d4" stroke-width="1"/>
      <line x1="7" y1="14" x2="16" y2="14" stroke="#06b6d4" stroke-width="1"/>
    </g>
    <text x="640" y="432" fill="#f8fafc" font-size="16" font-weight="700">サーバーサイド系</text>
    <text x="790" y="432" fill="#06b6d4" font-size="12" font-weight="600">Server-Side</text>
    <rect x="970" y="414" width="80" height="24" rx="12" fill="#06b6d420" stroke="#06b6d4" stroke-width="1"/>
    <text x="1010" y="430" text-anchor="middle" fill="#67e8f9" font-size="11" font-weight="700">18 ラボ</text>
    <text x="600" y="455" fill="#64748b" font-size="10">主に Step 5, 6, 8, 9</text>

    <!-- Lab items -->
    <g fill="#94a3b8" font-size="10">
      <text x="600" y="478">• SSRF</text>
      <text x="600" y="496">• SSRFバイパス</text>
      <text x="600" y="514">• XXE</text>
      <text x="600" y="532">• ファイルアップロード攻撃</text>
      <text x="600" y="550">• IDOR</text>
      <text x="600" y="568">• パストラバーサル</text>
      <text x="600" y="586">• 権限昇格</text>
      <text x="600" y="604">• Mass Assignment</text>
      <text x="830" y="478">• Zip Slip</text>
      <text x="830" y="496">• CORS設定ミス</text>
      <text x="830" y="514">• レースコンディション</text>
      <text x="830" y="532">• デシリアライゼーション</text>
      <text x="830" y="550">• ビジネスロジックの欠陥</text>
      <text x="830" y="568">• Fail-Open</text>
      <text x="830" y="586">• 詳細エラーメッセージ露出</text>
      <text x="830" y="604">• ログ不足 / ログインジェクション</text>
    </g>
  </g>

  <!-- Footer -->
  <rect x="350" y="660" width="400" height="28" rx="14" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="550" y="679" text-anchor="middle" fill="#64748b" font-size="11">※ 一部のラボは複数カテゴリにまたがります</text>
</svg>
