    <rect x="55" y="140" width="50" height="12" rx="6" fill="#7c2d1220" stroke="#f97316" stroke-width="0.5"/>
    <text x="80" y="150" text-anchor="middle" fill="#fb923c" font-size="7" font-weight="600">3 ラボ</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="245" y="55" width="185" height="100" rx="8" fill="#1e293b" stroke="#f97316" stroke-width="1.2"/>
    <text x="337" y="80" text-anchor="middle" fill="#f97316" font-size="22">📝</text>
    <text x="337" y="100" text-anchor="middle" fill="#f8fafc" font-size="11" font-weight="600">SSTI</text>
