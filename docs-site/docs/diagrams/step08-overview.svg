    <text x="542" y="100" text-anchor="middle" fill="#f8fafc" font-size="11" font-weight="600">レースコンディション</text>
    <text x="542" y="116" text-anchor="middle" fill="#94a3b8" font-size="9">並行処理の隙を</text>
    <text x="542" y="130" text-anchor="middle" fill="#94a3b8" font-size="9">突いた二重処理</text>
