  <g filter="url(#shadow)">
    <rect x="655" y="55" width="185" height="100" rx="8" fill="#1e293b" stroke="#f97316" stroke-width="1.2"/>
    <text x="747" y="80" text-anchor="middle" fill="#f97316" font-size="22">🧬</text>
    <text x="747" y="100" text-anchor="middle" fill="#f8fafc" font-size="11" font-weight="600">Prototype Pollution</text>
