<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 200" width="1100" height="200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <style>text { font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; }</style>
  </defs>
  <rect width="1100" height="200" rx="10" fill="url(#bg)"/>

  <rect x="20" y="15" width="6" height="24" rx="3" fill="#84cc16"/>
  <text x="36" y="33" fill="#f8fafc" font-size="15" font-weight="700">Step 7: 設計とロジックの問題 — 仕様の穴を見つける</text>

  <!-- 正しいコード -->
  <g filter="url(#shadow)">
    <rect x="40" y="55" width="220" height="100" rx="8" fill="#1e293b" stroke="#84cc16" stroke-width="1.2"/>
    <text x="60" y="78" fill="#84cc16" font-size="11" font-weight="700">✓ コードは正しい…が</text>
    <rect x="55" y="88" width="190" height="55" rx="4" fill="#0f172a"/>
    <text x="65" y="106" fill="#94a3b8" font-size="9" font-family="monospace">app.post('/login', (req) =&gt; {</text>
    <text x="65" y="120" fill="#94a3b8" font-size="9" font-family="monospace">  // レート制限なし!</text>
    <text x="65" y="134" fill="#94a3b8" font-size="9" font-family="monospace">  return checkPassword(req)</text>
  </g>

  <!-- 設計の穴 -->
  <g filter="url(#shadow)">
    <rect x="290" y="65" width="150" height="80" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <text x="365" y="93" text-anchor="middle" fill="#f59e0b" font-size="28">⚠️</text>
    <text x="365" y="118" text-anchor="middle" fill="#fcd34d" font-size="12" font-weight="700">設計の穴</text>
    <text x="365" y="135" text-anchor="middle" fill="#94a3b8" font-size="9">ツールでは見つけにくい</text>
  </g>

  <!-- 問題カテゴリ -->
  <g filter="url(#shadow)">
    <rect x="475" y="50" width="590" height="115" rx="8" fill="#1e293b" stroke="#84cc16" stroke-width="0.8"/>
    <text x="495" y="72" fill="#84cc16" font-size="11" font-weight="700">設計・ロジックの脆弱性（12ラボ）</text>
    <g font-size="9">
      <rect x="495" y="82" width="130" height="20" rx="4" fill="#1a2e05" stroke="#84cc1680" stroke-width="0.5"/>
      <text x="560" y="96" text-anchor="middle" fill="#bef264">🚫 レート制限なし</text>
      <rect x="635" y="82" width="130" height="20" rx="4" fill="#1a2e05" stroke="#84cc1680" stroke-width="0.5"/>
      <text x="700" y="96" text-anchor="middle" fill="#bef264">🖱️ クリックジャッキング</text>
      <rect x="775" y="82" width="130" height="20" rx="4" fill="#1a2e05" stroke="#84cc1680" stroke-width="0.5"/>
      <text x="840" y="96" text-anchor="middle" fill="#bef264">🔓 HTTPでの機密送信</text>
      <rect x="915" y="82" width="130" height="20" rx="4" fill="#1a2e05" stroke="#84cc1680" stroke-width="0.5"/>
      <text x="980" y="96" text-anchor="middle" fill="#bef264">🔧 不要なHTTPメソッド</text>
      <rect x="495" y="108" width="130" height="20" rx="4" fill="#1a2e05" stroke="#84cc1680" stroke-width="0.5"/>
      <text x="560" y="122" text-anchor="middle" fill="#bef264">🔑 パスワードリセット</text>
      <rect x="635" y="108" width="130" height="20" rx="4" fill="#1a2e05" stroke="#84cc1680" stroke-width="0.5"/>
      <text x="700" y="122" text-anchor="middle" fill="#bef264">💼 ビジネスロジック</text>
      <rect x="775" y="108" width="130" height="20" rx="4" fill="#1a2e05" stroke="#84cc1680" stroke-width="0.5"/>
      <text x="840" y="122" text-anchor="middle" fill="#bef264">✏️ 署名なしデータ</text>
      <rect x="915" y="108" width="130" height="20" rx="4" fill="#1a2e05" stroke="#84cc1680" stroke-width="0.5"/>
      <text x="980" y="122" text-anchor="middle" fill="#bef264">🛡️ セキュリティヘッダ</text>
      <rect x="495" y="134" width="130" height="20" rx="4" fill="#1a2e05" stroke="#84cc1680" stroke-width="0.5"/>
      <text x="560" y="148" text-anchor="middle" fill="#bef264">💾 キャッシュ制御不備</text>
      <rect x="635" y="134" width="130" height="20" rx="4" fill="#1a2e05" stroke="#84cc1680" stroke-width="0.5"/>
      <text x="700" y="148" text-anchor="middle" fill="#bef264">📦 Web Storage濫用</text>
      <rect x="775" y="134" width="130" height="20" rx="4" fill="#1a2e05" stroke="#84cc1680" stroke-width="0.5"/>
      <text x="840" y="148" text-anchor="middle" fill="#bef264">🏷️ Host Header攻撃</text>
      <rect x="915" y="134" width="130" height="20" rx="4" fill="#1a2e05" stroke="#84cc1680" stroke-width="0.5"/>
      <text x="980" y="148" text-anchor="middle" fill="#bef264">🔀 XFF信頼ミス</text>
    </g>
  </g>

  <text x="550" y="190" text-anchor="middle" fill="#475569" font-size="10">コードのバグではなく「設計」の問題 — ツールでは見つけにくい脆弱性を理解する</text>
</svg>
