<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 200" width="1100" height="200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444"/>
    </marker>
    <style>text { font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; }</style>
  </defs>
  <rect width="1100" height="200" rx="10" fill="url(#bg)"/>

  <rect x="20" y="15" width="6" height="24" rx="3" fill="#ef4444"/>
  <text x="36" y="33" fill="#f8fafc" font-size="15" font-weight="700">Step 2: インジェクション — 入力を操る基本技術</text>

  <!-- ユーザー入力 -->
  <g filter="url(#shadow)">
    <rect x="40" y="60" width="150" height="75" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="1.2"/>
    <text x="115" y="90" text-anchor="middle" fill="#ef4444" font-size="22">⌨️</text>
    <text x="115" y="112" text-anchor="middle" fill="#f8fafc" font-size="12" font-weight="600">ユーザー入力</text>
    <text x="115" y="126" text-anchor="middle" fill="#fca5a5" font-size="9">悪意あるデータ</text>
  </g>

  <line x1="190" y1="97" x2="240" y2="97" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>

  <!-- 注入ポイント（中央ハブ） -->
  <g filter="url(#shadow)">
    <rect x="245" y="50" width="160" height="95" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
    <text x="325" y="78" text-anchor="middle" fill="#ef4444" font-size="13" font-weight="700">💉 注入ポイント</text>
    <text x="325" y="98" text-anchor="middle" fill="#94a3b8" font-size="10">入力がそのまま</text>
    <text x="325" y="113" text-anchor="middle" fill="#94a3b8" font-size="10">処理に使われる</text>
    <text x="325" y="136" text-anchor="middle" fill="#fca5a5" font-size="9" font-weight="600">サニタイズ不足</text>
  </g>

  <!-- Branching arrows to attack types -->
  <line x1="405" y1="75" x2="465" y2="60" stroke="#ef4444" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <line x1="405" y1="90" x2="465" y2="90" stroke="#ef4444" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <line x1="405" y1="105" x2="465" y2="120" stroke="#ef4444" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr)"/>

  <!-- Attack type cards -->
  <g filter="url(#shadow)">
    <rect x="470" y="48" width="130" height="28" rx="6" fill="#7f1d1d" stroke="#ef4444" stroke-width="0.8"/>
    <text x="535" y="67" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="600">XSS (ブラウザ実行)</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="470" y="82" width="130" height="28" rx="6" fill="#7f1d1d" stroke="#ef4444" stroke-width="0.8"/>
    <text x="535" y="101" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="600">SQLi (DB操作)</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="470" y="116" width="130" height="28" rx="6" fill="#7f1d1d" stroke="#ef4444" stroke-width="0.8"/>
    <text x="535" y="135" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="600">OSコマンド (シェル)</text>
  </g>

  <!-- 結果 -->
  <line x1="600" y1="62" x2="660" y2="90" stroke="#ef4444" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <line x1="600" y1="96" x2="660" y2="96" stroke="#ef4444" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <line x1="600" y1="130" x2="660" y2="102" stroke="#ef4444" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr)"/>

  <g filter="url(#shadow)">
    <rect x="665" y="55" width="180" height="85" rx="8" fill="#1e293b" stroke="#f97316" stroke-width="1.2"/>
    <text x="755" y="78" text-anchor="middle" fill="#f97316" font-size="12" font-weight="700">💥 意図しない実行結果</text>
    <g fill="#94a3b8" font-size="10">
      <text x="685" y="98">• Cookie窃取</text>
      <text x="685" y="116">• データ漏洩・改ざん</text>
      <text x="685" y="134">• サーバー制御奪取</text>
    </g>
  </g>

  <!-- Other injection types -->
  <g filter="url(#shadow)">
    <rect x="880" y="55" width="185" height="95" rx="8" fill="#1e293b" stroke="#475569" stroke-width="0.8"/>
    <text x="900" y="76" fill="#64748b" font-size="10" font-weight="600">その他のインジェクション:</text>
    <g fill="#94a3b8" font-size="9">
      <text x="900" y="94">• メールヘッダインジェクション</text>
      <text x="900" y="110">• HTTP Parameter Pollution</text>
      <text x="900" y="126">• CSVインジェクション</text>
      <text x="900" y="142">• オープンリダイレクト</text>
    </g>
  </g>

  <text x="550" y="185" text-anchor="middle" fill="#475569" font-size="10">Webセキュリティの核心スキル — XSS と SQLi は最も重要な脆弱性</text>
</svg>
