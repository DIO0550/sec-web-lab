<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 560" width="1100" height="560">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <filter id="glow-green">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#22c55e" flood-opacity="0.5"/>
    </filter>
    <filter id="glow-blue">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#3b82f6" flood-opacity="0.5"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <style>
      text { font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; }
      @keyframes pulse { 0%,100% { opacity: 0.7; } 50% { opacity: 1; } }
      .pulse { animation: pulse 2s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1100" height="560" rx="12" fill="url(#bg)"/>

  <!-- Title -->
  <text x="550" y="38" text-anchor="middle" fill="#f8fafc" font-size="22" font-weight="700">sec-web-lab 学習ロードマップ</text>
  <text x="550" y="60" text-anchor="middle" fill="#94a3b8" font-size="13">9つのステップで Web セキュリティを体系的に学ぶ</text>

  <!-- Row 1: Step 1 → 2 → 3 -->
  <!-- Step 1 -->
  <g filter="url(#shadow)">
    <rect x="40" y="85" width="310" height="100" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
    <rect x="40" y="85" width="310" height="4" rx="2" fill="#3b82f6"/>
    <rect x="52" y="96" width="28" height="22" rx="4" fill="#3b82f6" opacity="0.9"/>
    <text x="66" y="112" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">01</text>
    <text x="90" y="112" fill="#f8fafc" font-size="14" font-weight="700">偵察フェーズ</text>
    <text x="90" y="132" fill="#94a3b8" font-size="11">Webアプリの情報を集める</text>
    <text x="90" y="152" fill="#64748b" font-size="10">★☆☆ 入門 · 5 ラボ</text>
    <!-- START badge -->
    <g filter="url(#glow-blue)" class="pulse">
      <rect x="270" y="96" width="62" height="22" rx="11" fill="#3b82f6"/>
      <text x="301" y="111" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">▶ START</text>
    </g>
  </g>

  <!-- Arrow 1→2 -->
  <line x1="350" y1="135" x2="390" y2="135" stroke="#475569" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow)"/>

  <!-- Step 2 -->
  <g filter="url(#shadow)">
    <rect x="395" y="85" width="310" height="100" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
    <rect x="395" y="85" width="310" height="4" rx="2" fill="#ef4444"/>
    <rect x="407" y="96" width="28" height="22" rx="4" fill="#ef4444" opacity="0.9"/>
    <text x="421" y="112" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">02</text>
    <text x="445" y="112" fill="#f8fafc" font-size="14" font-weight="700">インジェクション</text>
    <text x="445" y="132" fill="#94a3b8" font-size="11">入力を操る基本技術</text>
    <text x="445" y="152" fill="#64748b" font-size="10">★☆☆〜★★☆ · 9 ラボ</text>
  </g>

  <!-- Arrow 2→3 -->
  <line x1="705" y1="135" x2="745" y2="135" stroke="#475569" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow)"/>

  <!-- Step 3 -->
  <g filter="url(#shadow)">
    <rect x="750" y="85" width="310" height="100" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
    <rect x="750" y="85" width="310" height="4" rx="2" fill="#f59e0b"/>
    <rect x="762" y="96" width="28" height="22" rx="4" fill="#f59e0b" opacity="0.9"/>
    <text x="776" y="112" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">03</text>
    <text x="800" y="112" fill="#f8fafc" font-size="14" font-weight="700">認証突破</text>
    <text x="800" y="132" fill="#94a3b8" font-size="11">ログインの弱点を知る</text>
    <text x="800" y="152" fill="#64748b" font-size="10">★☆☆〜★★☆ · 6 ラボ</text>
  </g>

  <!-- Arrow 3→4 (down) -->
  <path d="M 1020 185 L 1020 210 Q 1020 220 1010 220 L 960 220" stroke="#475569" stroke-width="2" stroke-dasharray="6,3" fill="none" marker-end="url(#arrow)"/>

  <!-- Row 2: Step 6 ← 5 ← 4 -->
  <!-- Step 4 -->
  <g filter="url(#shadow)">
    <rect x="750" y="210" width="310" height="100" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
    <rect x="750" y="210" width="310" height="4" rx="2" fill="#8b5cf6"/>
    <rect x="762" y="221" width="28" height="22" rx="4" fill="#8b5cf6" opacity="0.9"/>
    <text x="776" y="237" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">04</text>
    <text x="800" y="237" fill="#f8fafc" font-size="14" font-weight="700">セッション奪取</text>
    <text x="800" y="257" fill="#94a3b8" font-size="11">なりすましの技術</text>
    <text x="800" y="277" fill="#64748b" font-size="10">★☆☆〜★★☆ · 7 ラボ</text>
  </g>

  <!-- Arrow 4→5 (left) -->
  <line x1="750" y1="260" x2="710" y2="260" stroke="#475569" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow)"/>

  <!-- Step 5 -->
  <g filter="url(#shadow)">
    <rect x="395" y="210" width="310" height="100" rx="8" fill="#1e293b" stroke="#ec4899" stroke-width="1.5"/>
    <rect x="395" y="210" width="310" height="4" rx="2" fill="#ec4899"/>
    <rect x="407" y="221" width="28" height="22" rx="4" fill="#ec4899" opacity="0.9"/>
    <text x="421" y="237" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">05</text>
    <text x="445" y="237" fill="#f8fafc" font-size="14" font-weight="700">アクセス制御突破</text>
    <text x="445" y="257" fill="#94a3b8" font-size="11">権限の壁を超える</text>
    <text x="445" y="277" fill="#64748b" font-size="10">★☆☆〜★★☆ · 4 ラボ</text>
  </g>

  <!-- Arrow 5→6 (left) -->
  <line x1="395" y1="260" x2="355" y2="260" stroke="#475569" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow)"/>

  <!-- Step 6 -->
  <g filter="url(#shadow)">
    <rect x="40" y="210" width="310" height="100" rx="8" fill="#1e293b" stroke="#06b6d4" stroke-width="1.5"/>
    <rect x="40" y="210" width="310" height="4" rx="2" fill="#06b6d4"/>
    <rect x="52" y="221" width="28" height="22" rx="4" fill="#06b6d4" opacity="0.9"/>
    <text x="66" y="237" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">06</text>
    <text x="90" y="237" fill="#f8fafc" font-size="14" font-weight="700">サーバーサイド攻撃</text>
    <text x="90" y="257" fill="#94a3b8" font-size="11">サーバーの弱点を突く</text>
    <text x="90" y="277" fill="#64748b" font-size="10">★★☆〜★★★ · 8 ラボ</text>
  </g>

  <!-- Arrow 6→7 (down) -->
  <path d="M 80 310 L 80 335 Q 80 345 90 345 L 140 345" stroke="#475569" stroke-width="2" stroke-dasharray="6,3" fill="none" marker-end="url(#arrow)"/>

  <!-- Row 3: Step 7 → 8 → 9 -->
  <!-- Step 7 -->
  <g filter="url(#shadow)">
    <rect x="40" y="335" width="310" height="100" rx="8" fill="#1e293b" stroke="#84cc16" stroke-width="1.5"/>
    <rect x="40" y="335" width="310" height="4" rx="2" fill="#84cc16"/>
    <rect x="52" y="346" width="28" height="22" rx="4" fill="#84cc16" opacity="0.9"/>
    <text x="66" y="362" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">07</text>
    <text x="90" y="362" fill="#f8fafc" font-size="14" font-weight="700">設計とロジックの問題</text>
    <text x="90" y="382" fill="#94a3b8" font-size="11">仕様の穴を見つける</text>
    <text x="90" y="402" fill="#64748b" font-size="10">★☆☆〜★★☆ · 12 ラボ</text>
  </g>

  <!-- Arrow 7→8 -->
  <line x1="350" y1="385" x2="390" y2="385" stroke="#475569" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow)"/>

  <!-- Step 8 -->
  <g filter="url(#shadow)">
    <rect x="395" y="335" width="310" height="100" rx="8" fill="#1e293b" stroke="#f97316" stroke-width="1.5"/>
    <rect x="395" y="335" width="310" height="4" rx="2" fill="#f97316"/>
    <rect x="407" y="346" width="28" height="22" rx="4" fill="#f97316" opacity="0.9"/>
    <text x="421" y="362" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">08</text>
    <text x="445" y="362" fill="#f8fafc" font-size="14" font-weight="700">高度な攻撃テクニック</text>
    <text x="445" y="382" fill="#94a3b8" font-size="11">エキスパートへの道</text>
    <text x="445" y="402" fill="#64748b" font-size="10">★★★ 上級 · 10 ラボ</text>
  </g>

  <!-- Arrow 8→9 -->
  <line x1="705" y1="385" x2="745" y2="385" stroke="#475569" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow)"/>

  <!-- Step 9 -->
  <g filter="url(#shadow)">
    <rect x="750" y="335" width="310" height="100" rx="8" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
    <rect x="750" y="335" width="310" height="4" rx="2" fill="#22c55e"/>
    <rect x="762" y="346" width="28" height="22" rx="4" fill="#22c55e" opacity="0.9"/>
    <text x="776" y="362" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">09</text>
    <text x="800" y="362" fill="#f8fafc" font-size="14" font-weight="700">守りを固める</text>
    <text x="800" y="382" fill="#94a3b8" font-size="11">ログ・例外処理・防御設計</text>
    <text x="800" y="402" fill="#64748b" font-size="10">★☆☆〜★★☆ · 7 ラボ</text>
    <!-- GOAL badge -->
    <g filter="url(#glow-green)" class="pulse">
      <rect x="980" y="346" width="62" height="22" rx="11" fill="#22c55e"/>
      <text x="1011" y="361" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">🏁 GOAL</text>
    </g>
  </g>

  <!-- Difficulty Legend -->
  <g transform="translate(40, 465)">
    <text fill="#94a3b8" font-size="11" font-weight="600">難易度ガイド:</text>
    <rect x="110" y="-12" width="12" height="12" rx="2" fill="#3b82f6" opacity="0.6"/>
    <text x="128" fill="#94a3b8" font-size="10">★☆☆ 入門</text>
    <rect x="210" y="-12" width="12" height="12" rx="2" fill="#f59e0b" opacity="0.6"/>
    <text x="228" fill="#94a3b8" font-size="10">★★☆ 中級</text>
    <rect x="310" y="-12" width="12" height="12" rx="2" fill="#ef4444" opacity="0.6"/>
    <text x="328" fill="#94a3b8" font-size="10">★★★ 上級</text>
  </g>

  <!-- Footer -->
  <rect x="300" y="500" width="500" height="36" rx="18" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="550" y="523" text-anchor="middle" fill="#94a3b8" font-size="13" font-weight="600">全 68 ラボ ｜ 入門から上級まで段階的に学習</text>
</svg>
