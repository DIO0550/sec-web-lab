<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 200" width="1100" height="200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444"/>
    </marker>
    <style>text { font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; }</style>
  </defs>
  <rect width="1100" height="200" rx="10" fill="url(#bg)"/>

  <rect x="20" y="15" width="6" height="24" rx="3" fill="#f59e0b"/>
  <text x="36" y="33" fill="#f8fafc" font-size="15" font-weight="700">Step 3: 認証を突破する — ログインの弱点を知る</text>

  <!-- 攻撃者 -->
  <g filter="url(#shadow)">
    <rect x="40" y="60" width="130" height="80" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="1.2"/>
    <text x="105" y="92" text-anchor="middle" fill="#ef4444" font-size="22">👤</text>
    <text x="105" y="115" text-anchor="middle" fill="#f8fafc" font-size="12" font-weight="600">攻撃者</text>
    <text x="105" y="130" text-anchor="middle" fill="#64748b" font-size="9">不正ログイン試行</text>
  </g>

  <line x1="170" y1="100" x2="220" y2="100" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>

  <!-- ログインフォーム -->
  <g filter="url(#shadow)">
    <rect x="225" y="55" width="170" height="90" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="310" y="80" text-anchor="middle" fill="#f59e0b" font-size="22">🔐</text>
    <text x="310" y="103" text-anchor="middle" fill="#f8fafc" font-size="12" font-weight="600">ログインフォーム</text>
    <rect x="247" y="113" width="126" height="14" rx="3" fill="#0f172a" stroke="#475569" stroke-width="0.5"/>
    <text x="310" y="124" text-anchor="middle" fill="#475569" font-size="8">password: ********</text>
  </g>

  <!-- 弱点カード群 -->
  <line x1="395" y1="80" x2="445" y2="65" stroke="#ef4444" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr-red)"/>
  <line x1="395" y1="100" x2="445" y2="100" stroke="#ef4444" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr-red)"/>
  <line x1="395" y1="120" x2="445" y2="135" stroke="#ef4444" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr-red)"/>

  <g filter="url(#shadow)">
    <rect x="450" y="50" width="200" height="28" rx="6" fill="#451a03" stroke="#f59e0b" stroke-width="0.8"/>
    <text x="550" y="69" text-anchor="middle" fill="#fcd34d" font-size="10" font-weight="600">🔓 弱いパスワード / デフォルト認証</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="450" y="84" width="200" height="28" rx="6" fill="#451a03" stroke="#f59e0b" stroke-width="0.8"/>
    <text x="550" y="103" text-anchor="middle" fill="#fcd34d" font-size="10" font-weight="600">🔨 ブルートフォース攻撃</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="450" y="118" width="200" height="28" rx="6" fill="#451a03" stroke="#f59e0b" stroke-width="0.8"/>
    <text x="550" y="137" text-anchor="middle" fill="#fcd34d" font-size="10" font-weight="600">📋 ユーザー名列挙</text>
  </g>

  <!-- 結果 -->
  <line x1="650" y1="98" x2="700" y2="98" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-red)"/>

  <g filter="url(#shadow)">
    <rect x="705" y="55" width="160" height="90" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
    <text x="785" y="82" text-anchor="middle" fill="#ef4444" font-size="22">🚪</text>
    <text x="785" y="105" text-anchor="middle" fill="#ef4444" font-size="12" font-weight="700">不正アクセス</text>
    <text x="785" y="122" text-anchor="middle" fill="#94a3b8" font-size="9">認証バイパス成功</text>
    <text x="785" y="136" text-anchor="middle" fill="#64748b" font-size="9">アカウント乗っ取り</text>
  </g>

  <!-- サーバー側の問題 -->
  <g filter="url(#shadow)">
    <rect x="900" y="55" width="170" height="90" rx="8" fill="#1e293b" stroke="#475569" stroke-width="0.8"/>
    <text x="920" y="76" fill="#64748b" font-size="10" font-weight="600">サーバー側の問題:</text>
    <g fill="#94a3b8" font-size="9">
      <text x="920" y="95">• 平文パスワード保存</text>
      <text x="920" y="112">• 弱いハッシュ (MD5/SHA1)</text>
      <text x="920" y="129">• 弱いパスワードポリシー</text>
    </g>
  </g>

  <text x="550" y="185" text-anchor="middle" fill="#475569" font-size="10">パスワードの保存方法からブルートフォースまで、認証の典型的な実装ミスを理解する</text>
</svg>
