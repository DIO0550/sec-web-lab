<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 200" width="1100" height="200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#06b6d4"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444"/>
    </marker>
    <style>text { font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; }</style>
  </defs>
  <rect width="1100" height="200" rx="10" fill="url(#bg)"/>

  <rect x="20" y="15" width="6" height="24" rx="3" fill="#06b6d4"/>
  <text x="36" y="33" fill="#f8fafc" font-size="15" font-weight="700">Step 6: サーバーサイド攻撃 — サーバーの弱点を突く</text>

  <!-- 攻撃者 -->
  <g filter="url(#shadow)">
    <rect x="40" y="58" width="120" height="65" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="1.2"/>
    <text x="100" y="84" text-anchor="middle" fill="#ef4444" font-size="18">😈</text>
    <text x="100" y="103" text-anchor="middle" fill="#f8fafc" font-size="11" font-weight="600">攻撃者</text>
    <text x="100" y="116" text-anchor="middle" fill="#94a3b8" font-size="9">細工したリクエスト</text>
  </g>

  <line x1="160" y1="90" x2="220" y2="90" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>

  <!-- Webサーバー -->
  <g filter="url(#shadow)">
    <rect x="225" y="50" width="180" height="82" rx="8" fill="#1e293b" stroke="#06b6d4" stroke-width="1.5"/>
    <text x="315" y="78" text-anchor="middle" fill="#06b6d4" font-size="20">🖥️</text>
    <text x="315" y="98" text-anchor="middle" fill="#f8fafc" font-size="12" font-weight="600">Webサーバー</text>
    <text x="315" y="114" text-anchor="middle" fill="#94a3b8" font-size="9">リクエストを処理</text>
    <text x="315" y="127" text-anchor="middle" fill="#67e8f9" font-size="9" font-weight="600">→ 内部へ中継してしまう</text>
  </g>

  <!-- 内部リソースへの矢印 -->
  <line x1="405" y1="72" x2="465" y2="60" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-red)"/>
  <line x1="405" y1="90" x2="465" y2="90" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-red)"/>
  <line x1="405" y1="108" x2="465" y2="120" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-red)"/>

  <!-- 内部リソース群 -->
  <g filter="url(#shadow)">
    <rect x="470" y="42" width="180" height="35" rx="6" fill="#164e63" stroke="#06b6d4" stroke-width="0.8"/>
    <text x="560" y="64" text-anchor="middle" fill="#67e8f9" font-size="10" font-weight="600">🌐 内部API / localhost</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="470" y="82" width="180" height="35" rx="6" fill="#164e63" stroke="#06b6d4" stroke-width="0.8"/>
    <text x="560" y="104" text-anchor="middle" fill="#67e8f9" font-size="10" font-weight="600">📂 ファイルシステム</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="470" y="122" width="180" height="35" rx="6" fill="#164e63" stroke="#06b6d4" stroke-width="0.8"/>
    <text x="560" y="144" text-anchor="middle" fill="#67e8f9" font-size="10" font-weight="600">☁️ クラウドメタデータ</text>
  </g>

  <!-- 攻撃手法カード -->
  <g filter="url(#shadow)">
    <rect x="700" y="45" width="370" height="115" rx="8" fill="#1e293b" stroke="#06b6d4" stroke-width="0.8"/>
    <text x="720" y="68" fill="#06b6d4" font-size="11" font-weight="700">サーバーサイド攻撃手法</text>
    <g font-size="10">
      <rect x="720" y="78" width="155" height="22" rx="4" fill="#164e63" stroke="#06b6d480" stroke-width="0.5"/>
      <text x="797" y="93" text-anchor="middle" fill="#67e8f9">🌐 SSRF / SSRFバイパス</text>
      <rect x="885" y="78" width="165" height="22" rx="4" fill="#164e63" stroke="#06b6d480" stroke-width="0.5"/>
      <text x="967" y="93" text-anchor="middle" fill="#67e8f9">📄 XXE (XML外部実体)</text>
      <rect x="720" y="106" width="155" height="22" rx="4" fill="#164e63" stroke="#06b6d480" stroke-width="0.5"/>
      <text x="797" y="121" text-anchor="middle" fill="#67e8f9">📤 ファイルアップロード</text>
      <rect x="885" y="106" width="165" height="22" rx="4" fill="#164e63" stroke="#06b6d480" stroke-width="0.5"/>
      <text x="967" y="121" text-anchor="middle" fill="#67e8f9">↩️ CRLFインジェクション</text>
      <rect x="720" y="134" width="155" height="22" rx="4" fill="#164e63" stroke="#06b6d480" stroke-width="0.5"/>
      <text x="797" y="149" text-anchor="middle" fill="#67e8f9">📦 Zip Slip</text>
      <rect x="885" y="134" width="165" height="22" rx="4" fill="#164e63" stroke="#06b6d480" stroke-width="0.5"/>
      <text x="967" y="149" text-anchor="middle" fill="#67e8f9">🔧 CORS設定ミス / eval</text>
    </g>
  </g>

  <text x="550" y="187" text-anchor="middle" fill="#475569" font-size="10">サーバーを「踏み台」にして内部リソースに到達する — Step 2 のインジェクション応用編</text>
</svg>
