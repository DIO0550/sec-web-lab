<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 200" width="1100" height="200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6"/>
    </marker>
    <style>text { font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; }</style>
  </defs>
  <rect width="1100" height="200" rx="10" fill="url(#bg)"/>

  <!-- Title bar -->
  <rect x="20" y="15" width="6" height="24" rx="3" fill="#3b82f6"/>
  <text x="36" y="33" fill="#f8fafc" font-size="15" font-weight="700">Step 1: 偵察フェーズ — Webアプリの情報を集めよう</text>

  <!-- Flow: 攻撃者 → DevTools → Webアプリ → 漏洩情報 -->
  <!-- 攻撃者 -->
  <g filter="url(#shadow)">
    <rect x="40" y="65" width="140" height="80" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1.2"/>
    <text x="110" y="95" text-anchor="middle" fill="#3b82f6" font-size="24">🔍</text>
    <text x="110" y="118" text-anchor="middle" fill="#f8fafc" font-size="12" font-weight="600">攻撃者</text>
    <text x="110" y="134" text-anchor="middle" fill="#64748b" font-size="9">情報収集</text>
  </g>

  <line x1="180" y1="105" x2="240" y2="105" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>

  <!-- DevTools -->
  <g filter="url(#shadow)">
    <rect x="245" y="65" width="160" height="80" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1.2"/>
    <text x="325" y="95" text-anchor="middle" fill="#3b82f6" font-size="24">🛠️</text>
    <text x="325" y="118" text-anchor="middle" fill="#f8fafc" font-size="12" font-weight="600">ブラウザ DevTools</text>
    <text x="325" y="134" text-anchor="middle" fill="#64748b" font-size="9">ヘッダー・レスポンス確認</text>
  </g>

  <line x1="405" y1="105" x2="465" y2="105" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>

  <!-- Webアプリ -->
  <g filter="url(#shadow)">
    <rect x="470" y="65" width="160" height="80" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1.2"/>
    <text x="550" y="95" text-anchor="middle" fill="#3b82f6" font-size="24">🌐</text>
    <text x="550" y="118" text-anchor="middle" fill="#f8fafc" font-size="12" font-weight="600">Webアプリ</text>
    <text x="550" y="134" text-anchor="middle" fill="#64748b" font-size="9">意図せず情報を公開</text>
  </g>

  <line x1="630" y1="105" x2="690" y2="105" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>

  <!-- 漏洩情報 -->
  <g filter="url(#shadow)">
    <rect x="695" y="55" width="370" height="100" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="1.2"/>
    <text x="715" y="80" fill="#ef4444" font-size="11" font-weight="700">⚠ 漏洩する情報</text>
    <g fill="#94a3b8" font-size="10">
      <text x="715" y="100">• HTTPヘッダー (Server, X-Powered-By)</text>
      <text x="715" y="118">• 機密ファイル (.git, .env)</text>
      <text x="715" y="136">• エラーメッセージ (スタックトレース)</text>
      <text x="900" y="100">• ディレクトリ一覧</text>
      <text x="900" y="118">• デバッグ情報</text>
    </g>
  </g>

  <!-- Footer -->
  <text x="550" y="185" text-anchor="middle" fill="#475569" font-size="10">ブラウザの DevTools だけで試せるものが多く、最初のステップに最適</text>
</svg>
