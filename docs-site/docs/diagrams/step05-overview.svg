<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 200" width="1100" height="200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="arr-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444"/>
    </marker>
    <style>text { font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; }</style>
  </defs>
  <rect width="1100" height="200" rx="10" fill="url(#bg)"/>

  <rect x="20" y="15" width="6" height="24" rx="3" fill="#ec4899"/>
  <text x="36" y="33" fill="#f8fafc" font-size="15" font-weight="700">Step 5: アクセス制御を突破する — 権限の壁を超える</text>

  <!-- ユーザーA -->
  <g filter="url(#shadow)">
    <rect x="40" y="58" width="120" height="65" rx="8" fill="#1e293b" stroke="#ec4899" stroke-width="1.2"/>
    <text x="100" y="84" text-anchor="middle" fill="#ec4899" font-size="18">👤</text>
    <text x="100" y="103" text-anchor="middle" fill="#f8fafc" font-size="11" font-weight="600">ユーザーA</text>
    <text x="100" y="116" text-anchor="middle" fill="#94a3b8" font-size="9">一般ユーザー</text>
  </g>

  <!-- 正常アクセス（上段） -->
  <line x1="160" y1="78" x2="230" y2="78" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <g filter="url(#shadow)">
    <rect x="235" y="55" width="180" height="42" rx="8" fill="#1e293b" stroke="#22c55e" stroke-width="1.2"/>
    <text x="325" y="75" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="600">✓ 自分のデータ (user_id=1)</text>
    <text x="325" y="90" text-anchor="middle" fill="#86efac" font-size="9">正常なアクセス</text>
  </g>

  <!-- 不正アクセス（下段） -->
  <line x1="160" y1="104" x2="230" y2="115" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-red)"/>
  <g filter="url(#shadow)">
    <rect x="235" y="103" width="180" height="42" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
    <text x="325" y="123" text-anchor="middle" fill="#ef4444" font-size="11" font-weight="700">✗ 他人のデータ (user_id=2)</text>
    <text x="325" y="138" text-anchor="middle" fill="#fca5a5" font-size="9">IDを書き換えるだけで…</text>
  </g>

  <!-- 攻撃手法 -->
  <g filter="url(#shadow)">
    <rect x="470" y="55" width="290" height="100" rx="8" fill="#1e293b" stroke="#ec4899" stroke-width="1.2"/>
    <text x="490" y="78" fill="#ec4899" font-size="11" font-weight="700">アクセス制御の脆弱性</text>
    <g font-size="10">
      <rect x="490" y="87" width="120" height="22" rx="4" fill="#831843" stroke="#ec489980" stroke-width="0.5"/>
      <text x="550" y="102" text-anchor="middle" fill="#f9a8d4">🆔 IDOR</text>
      <rect x="620" y="87" width="120" height="22" rx="4" fill="#831843" stroke="#ec489980" stroke-width="0.5"/>
      <text x="680" y="102" text-anchor="middle" fill="#f9a8d4">📁 パストラバーサル</text>
      <rect x="490" y="117" width="120" height="22" rx="4" fill="#831843" stroke="#ec489980" stroke-width="0.5"/>
      <text x="550" y="132" text-anchor="middle" fill="#f9a8d4">⬆️ 権限昇格</text>
      <rect x="620" y="117" width="120" height="22" rx="4" fill="#831843" stroke="#ec489980" stroke-width="0.5"/>
      <text x="680" y="132" text-anchor="middle" fill="#f9a8d4">📝 Mass Assignment</text>
    </g>
  </g>

  <!-- 本質 -->
  <g filter="url(#shadow)">
    <rect x="800" y="60" width="265" height="90" rx="8" fill="#1e293b" stroke="#475569" stroke-width="0.8"/>
    <text x="820" y="82" fill="#f8fafc" font-size="11" font-weight="600">💡 本質</text>
    <text x="820" y="102" fill="#94a3b8" font-size="10">認証は通っているが、</text>
    <text x="820" y="118" fill="#94a3b8" font-size="10">本来アクセスできないリソースに</text>
    <text x="820" y="134" fill="#ec4899" font-size="10" font-weight="600">IDの書き換え・パス操作でアクセス</text>
  </g>

  <text x="550" y="185" text-anchor="middle" fill="#475569" font-size="10">「自分のもの以外」にアクセスする攻撃 — 認可（Authorization）の不備を理解する</text>
</svg>
