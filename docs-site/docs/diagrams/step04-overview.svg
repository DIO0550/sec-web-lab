<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 200" width="1100" height="200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8b5cf6"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444"/>
    </marker>
    <style>text { font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; }</style>
  </defs>
  <rect width="1100" height="200" rx="10" fill="url(#bg)"/>

  <rect x="20" y="15" width="6" height="24" rx="3" fill="#8b5cf6"/>
  <text x="36" y="33" fill="#f8fafc" font-size="15" font-weight="700">Step 4: セッションを奪う — なりすましの技術</text>

  <!-- 正規ユーザー -->
  <g filter="url(#shadow)">
    <rect x="40" y="55" width="130" height="70" rx="8" fill="#1e293b" stroke="#22c55e" stroke-width="1.2"/>
    <text x="105" y="84" text-anchor="middle" fill="#22c55e" font-size="20">👤</text>
    <text x="105" y="105" text-anchor="middle" fill="#f8fafc" font-size="11" font-weight="600">正規ユーザー</text>
    <text x="105" y="118" text-anchor="middle" fill="#86efac" font-size="9">ログイン済み</text>
  </g>

  <!-- セッションID -->
  <line x1="170" y1="90" x2="235" y2="90" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arr)"/>
  <g filter="url(#shadow)">
    <rect x="240" y="55" width="180" height="70" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="330" y="80" text-anchor="middle" fill="#8b5cf6" font-size="18">🍪</text>
    <text x="330" y="98" text-anchor="middle" fill="#f8fafc" font-size="12" font-weight="600">セッションID / Cookie</text>
    <text x="330" y="114" text-anchor="middle" fill="#94a3b8" font-size="9">sid=abc123xyz...</text>
  </g>
  <line x1="420" y1="90" x2="485" y2="90" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- サーバー -->
  <g filter="url(#shadow)">
    <rect x="490" y="55" width="130" height="70" rx="8" fill="#1e293b" stroke="#22c55e" stroke-width="1.2"/>
    <text x="555" y="84" text-anchor="middle" fill="#22c55e" font-size="20">🖥️</text>
    <text x="555" y="105" text-anchor="middle" fill="#f8fafc" font-size="11" font-weight="600">サーバー</text>
    <text x="555" y="118" text-anchor="middle" fill="#86efac" font-size="9">セッション管理</text>
  </g>

  <!-- 攻撃者がセッションを奪取 -->
  <g filter="url(#shadow)">
    <rect x="260" y="135" width="140" height="45" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="1.5"/>
    <text x="330" y="155" text-anchor="middle" fill="#ef4444" font-size="16">😈</text>
    <text x="330" y="173" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="600">攻撃者が奪取!</text>
  </g>
  <line x1="330" y1="125" x2="330" y2="132" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#arr-red)"/>

  <!-- 攻撃手法カード -->
  <g filter="url(#shadow)">
    <rect x="660" y="50" width="410" height="120" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="0.8"/>
    <text x="680" y="72" fill="#8b5cf6" font-size="11" font-weight="700">セッション攻撃手法</text>
    <g font-size="10">
      <rect x="680" y="82" width="170" height="22" rx="4" fill="#2e1065" stroke="#8b5cf680" stroke-width="0.5"/>
      <text x="765" y="97" text-anchor="middle" fill="#c4b5fd">🍪 Cookie操作・窃取</text>
      <rect x="680" y="110" width="170" height="22" rx="4" fill="#2e1065" stroke="#8b5cf680" stroke-width="0.5"/>
      <text x="765" y="125" text-anchor="middle" fill="#c4b5fd">📌 セッション固定攻撃</text>
      <rect x="870" y="82" width="180" height="22" rx="4" fill="#2e1065" stroke="#8b5cf680" stroke-width="0.5"/>
      <text x="960" y="97" text-anchor="middle" fill="#c4b5fd">🎭 セッションハイジャック</text>
      <rect x="870" y="110" width="180" height="22" rx="4" fill="#2e1065" stroke="#8b5cf680" stroke-width="0.5"/>
      <text x="960" y="125" text-anchor="middle" fill="#c4b5fd">🔗 CSRF (クロスサイトリクエスト)</text>
      <rect x="680" y="138" width="170" height="22" rx="4" fill="#2e1065" stroke="#8b5cf680" stroke-width="0.5"/>
      <text x="765" y="153" text-anchor="middle" fill="#c4b5fd">🔄 トークンリプレイ</text>
      <rect x="870" y="138" width="180" height="22" rx="4" fill="#2e1065" stroke="#8b5cf680" stroke-width="0.5"/>
      <text x="960" y="153" text-anchor="middle" fill="#c4b5fd">🔮 推測可能なセッションID</text>
    </g>
  </g>

  <text x="550" y="192" text-anchor="middle" fill="#475569" font-size="10">Cookie の仕組みや CSRF 攻撃を通じて、なりすましの手法と防御策を体験</text>
</svg>
