<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 750" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a855f7"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="750" fill="url(#bgGrad)" rx="12"/>

  <!-- ===== Title ===== -->
  <text x="380" y="38" text-anchor="middle" fill="#f8fafc" font-size="22" font-weight="700">CSV Injection (Formula Injection)</text>
  <text x="380" y="58" text-anchor="middle" fill="#94a3b8" font-size="12">CSVインジェクション — エクスポート経由の数式実行攻撃</text>
  <rect x="290" y="66" width="180" height="20" rx="10" fill="#ef4444" opacity="0.15"/>
  <text x="380" y="80" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="600">OWASP Top 10 — A03:Injection</text>

  <!-- ====================================================== -->
  <!--  ACTORS (Flow型: 3-actor horizontal)                    -->
  <!-- ====================================================== -->

  <!-- Attacker (left) -->
  <g transform="translate(115, 250)" filter="url(#shadow)">
    <rect x="-56" y="-30" width="112" height="125" rx="12" fill="#1e1b2e" stroke="#ef4444" stroke-width="1.5"/>
    <g transform="translate(0, 10)">
      <path d="M-13,-17 Q0,-28 13,-17 L13,-4 Q0,2 -13,-4 Z" fill="none" stroke="#ef4444" stroke-width="1.8"/>
      <circle cx="-4" cy="-9" r="1.8" fill="#ef4444"/>
      <circle cx="4" cy="-9" r="1.8" fill="#ef4444"/>
      <path d="M-17,36 Q-17,14 0,10 Q17,14 17,36" fill="none" stroke="#ef4444" stroke-width="2"/>
      <line x1="-17" y1="36" x2="17" y2="36" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
    </g>
    <text x="0" y="72" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="700">攻撃者</text>
    <text x="0" y="86" text-anchor="middle" fill="#ef4444" font-size="9.5" opacity="0.7">Attacker</text>
  </g>

  <!-- Web Server (center) -->
  <g transform="translate(380, 250)" filter="url(#shadow)">
    <rect x="-56" y="-30" width="112" height="125" rx="12" fill="#1e1b2e" stroke="#3b82f6" stroke-width="1.5"/>
    <g transform="translate(0, 14)">
      <rect x="-20" y="-18" width="40" height="12" rx="3" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
      <circle cx="-12" cy="-12" r="2" fill="#3b82f6"/><circle cx="-5" cy="-12" r="2" fill="#3b82f6"/>
      <rect x="-20" y="-2" width="40" height="12" rx="3" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
      <circle cx="-12" cy="4" r="2" fill="#3b82f6"/><circle cx="-5" cy="4" r="2" fill="#3b82f6"/>
      <rect x="-20" y="14" width="40" height="12" rx="3" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
      <circle cx="-12" cy="20" r="2" fill="#3b82f6"/><circle cx="-5" cy="20" r="2" fill="#3b82f6"/>
    </g>
    <text x="0" y="72" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">Webサーバー</text>
    <text x="0" y="86" text-anchor="middle" fill="#3b82f6" font-size="9.5" opacity="0.7">Vulnerable App</text>
  </g>

  <!-- Victim (right) -->
  <g transform="translate(645, 250)" filter="url(#shadow)">
    <rect x="-56" y="-30" width="112" height="125" rx="12" fill="#1e1b2e" stroke="#a855f7" stroke-width="1.5"/>
    <g transform="translate(0, 10)">
      <circle cx="0" cy="-9" r="13" fill="none" stroke="#a855f7" stroke-width="1.8"/>
      <circle cx="-4" cy="-11" r="1.5" fill="#a855f7"/>
      <circle cx="4" cy="-11" r="1.5" fill="#a855f7"/>
      <path d="M-4,-4 Q0,1 4,-4" fill="none" stroke="#a855f7" stroke-width="1.3" stroke-linecap="round"/>
      <path d="M-17,36 Q-17,14 0,10 Q17,14 17,36" fill="none" stroke="#a855f7" stroke-width="2"/>
      <line x1="-17" y1="36" x2="17" y2="36" stroke="#a855f7" stroke-width="2" stroke-linecap="round"/>
    </g>
    <text x="0" y="72" text-anchor="middle" fill="#d8b4fe" font-size="13" font-weight="700">被害者</text>
    <text x="0" y="86" text-anchor="middle" fill="#a855f7" font-size="9.5" opacity="0.7">Victim</text>
  </g>

  <!-- ====================================================== -->
  <!--  ARROWS                                                 -->
  <!-- ====================================================== -->

  <!-- Step 1: Attacker → Server (upper curve, malicious data input) -->
  <path d="M 173 220 C 230 150, 280 150, 322 220" fill="none" stroke="#ef4444" stroke-width="2.2" stroke-dasharray="8,4" marker-end="url(#arrowRed)"/>
  <circle cx="248" cy="155" r="16" fill="#ef4444"/>
  <text x="248" y="160" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">1</text>

  <!-- Step 2: Server stores (shown as internal box, no arrow needed) -->

  <!-- Step 3: Victim → Server (upper line, CSV export request) -->
  <path d="M 587 235 L 438 235" fill="none" stroke="#a855f7" stroke-width="2.2" marker-end="url(#arrowPurple)"/>
  <circle cx="512" cy="213" r="16" fill="#a855f7"/>
  <text x="512" y="218" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">3</text>

  <!-- Step 4: Server → Victim (lower line, unsanitized CSV response) -->
  <path d="M 438 280 L 587 280" fill="none" stroke="#3b82f6" stroke-width="2.2" marker-end="url(#arrowBlue)"/>
  <circle cx="512" cy="302" r="16" fill="#3b82f6"/>
  <text x="512" y="307" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">4</text>

  <!-- Step 5: Victim opens in Excel (vertical arrow to browser box) -->
  <path d="M 645 345 L 645 400" fill="none" stroke="#ef4444" stroke-width="2.2" stroke-dasharray="6,3" marker-end="url(#arrowRed)"/>
  <circle cx="669" cy="373" r="16" fill="#ef4444"/>
  <text x="669" y="378" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">5</text>

  <!-- ===== Malicious input payload (below attacker) ===== -->
  <g transform="translate(115, 400)" filter="url(#shadow)">
    <rect x="-95" y="-18" width="190" height="52" rx="8" fill="#0f172a" stroke="#ef4444" stroke-width="1" stroke-dasharray="4,2"/>
    <text x="0" y="-2" text-anchor="middle" fill="#fca5a5" font-size="9.5" font-weight="600">悪意あるデータ入力</text>
    <text x="0" y="14" text-anchor="middle" fill="#ef4444" font-size="9" font-family="'Fira Code', monospace">=HYPERLINK("http://evil",</text>
    <text x="0" y="26" text-anchor="middle" fill="#ef4444" font-size="9" font-family="'Fira Code', monospace">"Click")</text>
  </g>

  <!-- Step 2: DB store annotation (between attacker payload and server) -->
  <g transform="translate(248, 395)" filter="url(#shadow)">
    <rect x="-55" y="-14" width="110" height="28" rx="6" fill="#0f172a" stroke="#3b82f6" stroke-width="1"/>
    <text x="0" y="4" text-anchor="middle" fill="#93c5fd" font-size="9" font-weight="600">DB に保存</text>
  </g>
  <circle cx="248" cy="360" r="16" fill="#3b82f6"/>
  <text x="248" y="365" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">2</text>

  <!-- Arrow from attacker box to DB store -->
  <path d="M 173 345 L 173 390 L 193 390" fill="none" stroke="#ef4444" stroke-width="2.2" stroke-dasharray="6,3" stroke-linejoin="round" marker-end="url(#arrowRed)"/>

  <!-- ===== Vulnerability box (below server) ===== -->
  <g transform="translate(380, 420)" filter="url(#shadow)">
    <rect x="-120" y="-22" width="240" height="68" rx="8" fill="#451a03" stroke="#f97316" stroke-width="1"/>
    <text x="0" y="-5" text-anchor="middle" fill="#fdba74" font-size="11" font-weight="700">⚠ エクスポート時の未サニタイズ</text>
    <text x="0" y="14" text-anchor="middle" fill="#fb923c" font-size="9" font-family="'Fira Code', monospace">cell: =HYPERLINK("http://evil"</text>
    <text x="0" y="28" text-anchor="middle" fill="#fb923c" font-size="9" font-family="'Fira Code', monospace">       ,"Click")</text>
    <text x="0" y="42" text-anchor="middle" fill="#fed7aa" font-size="8.5">数式がそのままCSVに出力される</text>
  </g>

  <!-- ===== Victim Excel execution box ===== -->
  <g transform="translate(645, 440)" filter="url(#shadow)">
    <rect x="-90" y="-28" width="180" height="78" rx="8" fill="#1e1b2e" stroke="#ef4444" stroke-width="1.2" stroke-dasharray="4,2"/>
    <!-- Title bar + traffic lights -->
    <rect x="-80" y="-20" width="160" height="13" rx="3" fill="#0f172a"/>
    <circle cx="-70" cy="-14" r="2.5" fill="#ef4444"/>
    <circle cx="-62" cy="-14" r="2.5" fill="#f59e0b"/>
    <circle cx="-54" cy="-14" r="2.5" fill="#22c55e"/>
    <text x="0" y="6" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="600">Excel で数式が実行</text>
    <text x="0" y="22" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="'Fira Code', monospace">=HYPERLINK(...) 実行</text>
    <text x="0" y="38" text-anchor="middle" fill="#ef4444" font-size="8.5">外部URLへの自動接続</text>
  </g>

  <!-- ====================================================== -->
  <!--  STEP LIST (right sidebar)                              -->
  <!-- ====================================================== -->
  <g transform="translate(775, 100)">
    <rect x="0" y="0" width="305" height="320" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="152" y="28" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="700">攻撃ステップ詳細</text>
    <line x1="16" y1="40" x2="289" y2="40" stroke="#334155" stroke-width="1"/>

    <!-- Step 1 -->
    <circle cx="34" cy="68" r="13" fill="#ef4444"/>
    <text x="34" y="73" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">1</text>
    <text x="56" y="64" fill="#f8fafc" font-size="11.5" font-weight="600">悪意あるデータ入力</text>
    <text x="56" y="80" fill="#94a3b8" font-size="9.5">フォームに =HYPERLINK() 等の</text>
    <text x="56" y="93" fill="#94a3b8" font-size="9.5">スプレッドシート数式を入力</text>

    <!-- Step 2 -->
    <circle cx="34" cy="124" r="13" fill="#3b82f6"/>
    <text x="34" y="129" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">2</text>
    <text x="56" y="120" fill="#f8fafc" font-size="11.5" font-weight="600">サーバーがDBに保存</text>
    <text x="56" y="136" fill="#94a3b8" font-size="9.5">入力値がそのままデータベースに</text>
    <text x="56" y="149" fill="#94a3b8" font-size="9.5">保存される（入力時は無害）</text>

    <!-- Step 3 -->
    <circle cx="34" cy="180" r="13" fill="#a855f7"/>
    <text x="34" y="185" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">3</text>
    <text x="56" y="176" fill="#f8fafc" font-size="11.5" font-weight="600">被害者がCSVエクスポート</text>
    <text x="56" y="192" fill="#94a3b8" font-size="9.5">管理者や一般ユーザーが</text>
    <text x="56" y="205" fill="#94a3b8" font-size="9.5">データをCSV形式でダウンロード</text>

    <!-- Step 4 -->
    <circle cx="34" cy="236" r="13" fill="#3b82f6"/>
    <text x="34" y="241" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">4</text>
    <text x="56" y="232" fill="#f8fafc" font-size="11.5" font-weight="600">未サニタイズのCSV返却</text>
    <text x="56" y="248" fill="#94a3b8" font-size="9.5">数式をそのまま含むCSVが</text>
    <text x="56" y="261" fill="#94a3b8" font-size="9.5">被害者にダウンロードされる</text>

    <!-- Step 5 -->
    <circle cx="34" cy="292" r="13" fill="#ef4444"/>
    <text x="34" y="297" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">5</text>
    <text x="56" y="288" fill="#f8fafc" font-size="11.5" font-weight="600">Excel で数式が実行</text>
    <text x="56" y="304" fill="#94a3b8" font-size="9.5">被害者がExcelで開くと</text>
    <text x="56" y="317" fill="#94a3b8" font-size="9.5">HYPERLINK等の数式が自動実行</text>
  </g>

  <!-- ====================================================== -->
  <!--  ATTACK TECHNIQUE CARDS (bottom)                        -->
  <!-- ====================================================== -->
  <line x1="30" y1="560" x2="740" y2="560" stroke="#334155" stroke-width="1"/>
  <text x="385" y="585" text-anchor="middle" fill="#fca5a5" font-size="14" font-weight="700">🔥 使用される攻撃テクニック</text>

  <!-- Card: 数式インジェクション -->
  <g transform="translate(115, 600)" filter="url(#shadow)">
    <rect x="-95" y="0" width="190" height="38" rx="8" fill="#1e1b2e" stroke="#ef4444" stroke-width="1"/>
    <rect x="-83" y="6" width="28" height="26" rx="5" fill="#ef4444" opacity="0.1"/>
    <g transform="translate(-69, 19)">
      <text x="0" y="4" text-anchor="middle" fill="#ef4444" font-size="9" font-family="'Fira Code', monospace">=f()</text>
    </g>
    <text x="20" y="16" text-anchor="middle" fill="#f8fafc" font-size="11" font-weight="600">数式インジェクション</text>
    <text x="20" y="30" text-anchor="middle" fill="#94a3b8" font-size="8.5">=,+,-,@でセル数式を実行</text>
  </g>

  <!-- Card: データ窃取 -->
  <g transform="translate(380, 600)" filter="url(#shadow)">
    <rect x="-95" y="0" width="190" height="38" rx="8" fill="#1e1b2e" stroke="#ef4444" stroke-width="1"/>
    <rect x="-83" y="6" width="28" height="26" rx="5" fill="#ef4444" opacity="0.1"/>
    <g transform="translate(-69, 19)">
      <rect x="-7" y="-6" width="14" height="12" rx="2" fill="none" stroke="#ef4444" stroke-width="1.2"/>
      <line x1="-4" y1="-2" x2="4" y2="-2" stroke="#ef4444" stroke-width="1"/>
      <line x1="-4" y1="2" x2="4" y2="2" stroke="#ef4444" stroke-width="1"/>
    </g>
    <text x="20" y="16" text-anchor="middle" fill="#f8fafc" font-size="11" font-weight="600">データ窃取</text>
    <text x="20" y="30" text-anchor="middle" fill="#94a3b8" font-size="8.5">HYPERLINKで外部へ送信</text>
  </g>

  <!-- Card: リモートアクセス -->
  <g transform="translate(645, 600)" filter="url(#shadow)">
    <rect x="-95" y="0" width="190" height="38" rx="8" fill="#1e1b2e" stroke="#ef4444" stroke-width="1"/>
    <rect x="-83" y="6" width="28" height="26" rx="5" fill="#ef4444" opacity="0.1"/>
    <g transform="translate(-69, 19)">
      <rect x="-7" y="-7" width="14" height="14" rx="2" fill="none" stroke="#ef4444" stroke-width="1.2"/>
      <text x="0" y="4" text-anchor="middle" fill="#ef4444" font-size="8" font-weight="700">!</text>
    </g>
    <text x="20" y="16" text-anchor="middle" fill="#f8fafc" font-size="11" font-weight="600">リモートアクセス</text>
    <text x="20" y="30" text-anchor="middle" fill="#94a3b8" font-size="8.5">DDE経由でOSコマンド実行</text>
  </g>

  <!-- ===== Legend ===== -->
  <g transform="translate(775, 445)">
    <rect x="0" y="0" width="305" height="68" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="14" y="18" fill="#94a3b8" font-size="10" font-weight="600">凡例</text>
    <line x1="14" y1="34" x2="44" y2="34" stroke="#ef4444" stroke-width="2" stroke-dasharray="6,3"/>
    <text x="52" y="38" fill="#fca5a5" font-size="9.5">攻撃通信</text>
    <line x1="152" y1="34" x2="182" y2="34" stroke="#3b82f6" stroke-width="2"/>
    <text x="190" y="38" fill="#93c5fd" font-size="9.5">サーバー応答</text>
    <line x1="14" y1="54" x2="44" y2="54" stroke="#a855f7" stroke-width="2"/>
    <text x="52" y="58" fill="#d8b4fe" font-size="9.5">ユーザー通信</text>
    <rect x="152" y="48" width="12" height="12" rx="2" fill="#451a03" stroke="#f97316" stroke-width="0.8"/>
    <text x="170" y="58" fill="#fdba74" font-size="9.5">脆弱性ポイント</text>
  </g>

</svg>