<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 780" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f97316"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="780" fill="url(#bgGrad)" rx="12"/>

  <!-- ===== Title ===== -->
  <text x="380" y="38" text-anchor="middle" fill="#f8fafc" font-size="22" font-weight="700">Unicode Normalization Bypass</text>
  <text x="380" y="58" text-anchor="middle" fill="#94a3b8" font-size="12">Unicode正規化バイパス — フィルタ回避によるインジェクション</text>
  <rect x="290" y="66" width="180" height="20" rx="10" fill="#ef4444" opacity="0.15"/>
  <text x="380" y="80" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="600">OWASP — A03:Injection</text>

  <!-- ====================================================== -->
  <!--  ACTORS (hierarchical: top, middle, bottom)             -->
  <!-- ====================================================== -->

  <!-- Attacker (Top) -->
  <g transform="translate(380, 160)" filter="url(#shadow)">
    <rect x="-56" y="-30" width="112" height="125" rx="12" fill="#1e1b2e" stroke="#ef4444" stroke-width="1.5"/>
    <g transform="translate(0, 10)">
      <path d="M-13,-17 Q0,-28 13,-17 L13,-4 Q0,2 -13,-4 Z" fill="none" stroke="#ef4444" stroke-width="1.8"/>
      <circle cx="-4" cy="-9" r="1.8" fill="#ef4444"/>
      <circle cx="4" cy="-9" r="1.8" fill="#ef4444"/>
      <path d="M-17,36 Q-17,14 0,10 Q17,14 17,36" fill="none" stroke="#ef4444" stroke-width="2"/>
      <line x1="-17" y1="36" x2="17" y2="36" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
    </g>
    <text x="0" y="72" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="700">攻撃者</text>
    <text x="0" y="86" text-anchor="middle" fill="#ef4444" font-size="9.5" opacity="0.7">Attacker</text>
  </g>

  <!-- Filter/WAF (Middle) - orange warning color -->
  <g transform="translate(380, 355)" filter="url(#shadow)">
    <rect x="-56" y="-30" width="112" height="125" rx="12" fill="#1e1b2e" stroke="#f97316" stroke-width="1.5"/>
    <g transform="translate(0, 10)">
      <!-- Shield/Filter icon -->
      <path d="M0,-20 L18,-12 L18,5 Q18,18 0,24 Q-18,18 -18,5 L-18,-12 Z" fill="none" stroke="#f97316" stroke-width="1.8"/>
      <line x1="-8" y1="-4" x2="8" y2="-4" stroke="#f97316" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="-8" y1="3" x2="8" y2="3" stroke="#f97316" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="-8" y1="10" x2="8" y2="10" stroke="#f97316" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    <text x="0" y="72" text-anchor="middle" fill="#fdba74" font-size="13" font-weight="700">フィルター</text>
    <text x="0" y="86" text-anchor="middle" fill="#f97316" font-size="9.5" opacity="0.7">WAF / Blocklist</text>
  </g>

  <!-- Web Server (Bottom) -->
  <g transform="translate(380, 550)" filter="url(#shadow)">
    <rect x="-56" y="-30" width="112" height="125" rx="12" fill="#1e1b2e" stroke="#3b82f6" stroke-width="1.5"/>
    <g transform="translate(0, 14)">
      <rect x="-20" y="-18" width="40" height="12" rx="3" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
      <circle cx="-12" cy="-12" r="2" fill="#3b82f6"/><circle cx="-5" cy="-12" r="2" fill="#3b82f6"/>
      <rect x="-20" y="-2" width="40" height="12" rx="3" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
      <circle cx="-12" cy="4" r="2" fill="#3b82f6"/><circle cx="-5" cy="4" r="2" fill="#3b82f6"/>
      <rect x="-20" y="14" width="40" height="12" rx="3" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
      <circle cx="-12" cy="20" r="2" fill="#3b82f6"/><circle cx="-5" cy="20" r="2" fill="#3b82f6"/>
    </g>
    <text x="0" y="72" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">Webサーバー</text>
    <text x="0" y="86" text-anchor="middle" fill="#3b82f6" font-size="9.5" opacity="0.7">Vulnerable App</text>
  </g>

  <!-- ====================================================== -->
  <!--  ARROWS (vertical flow)                                 -->
  <!-- ====================================================== -->

  <!-- Step 1: Attacker → Filter (sends fullwidth chars) -->
  <path d="M 380 255 L 380 319" fill="none" stroke="#ef4444" stroke-width="2.2" stroke-dasharray="8,4" marker-end="url(#arrowRed)"/>
  <circle cx="404" cy="287" r="16" fill="#ef4444"/>
  <text x="404" y="292" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">1</text>

  <!-- Step 1 label: fullwidth payload -->
  <g transform="translate(545, 270)">
    <rect x="-105" y="-14" width="210" height="28" rx="5" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="0" y="4" text-anchor="middle" fill="#fca5a5" font-size="9.5" font-family="'Fira Code', monospace">&#xFF53;&#xFF43;&#xFF52;&#xFF49;&#xFF50;&#xFF54; (fullwidth)</text>
  </g>

  <!-- Step 2: Filter check (passes) - arrow right from filter -->
  <path d="M 436 355 L 550 355" fill="none" stroke="#f97316" stroke-width="2.2" marker-end="url(#arrowOrange)"/>
  <circle cx="494" cy="333" r="16" fill="#f97316"/>
  <text x="494" y="338" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">2</text>

  <!-- Filter check result box -->
  <g transform="translate(616, 355)" filter="url(#shadow)">
    <rect x="-54" y="-20" width="108" height="46" rx="8" fill="#1e1b2e" stroke="#f97316" stroke-width="1.2" stroke-dasharray="4,2"/>
    <text x="0" y="-2" text-anchor="middle" fill="#fdba74" font-size="10" font-weight="600">&#10004; PASS</text>
    <text x="0" y="14" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="'Fira Code', monospace">"script" &#8800; "&#xFF53;&#xFF43;&#xFF52;&#xFF49;&#xFF50;&#xFF54;"</text>
  </g>

  <!-- Step 3: Filter → Server (passes through) -->
  <path d="M 380 450 L 380 514" fill="none" stroke="#f97316" stroke-width="2.2" stroke-dasharray="8,4" marker-end="url(#arrowOrange)"/>
  <circle cx="404" cy="482" r="16" fill="#f97316"/>
  <text x="404" y="487" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">3</text>

  <!-- Step 3 label: NFKC normalization -->
  <g transform="translate(545, 475)">
    <rect x="-95" y="-14" width="190" height="28" rx="5" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="0" y="4" text-anchor="middle" fill="#93c5fd" font-size="9.5" font-family="'Fira Code', monospace">NFKC normalize(input)</text>
  </g>

  <!-- Unicode normalization visual comparison -->
  <g transform="translate(170, 482)" filter="url(#shadow)">
    <rect x="-90" y="-22" width="180" height="50" rx="8" fill="#1e1b2e" stroke="#ef4444" stroke-width="1.2"/>
    <text x="0" y="-4" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="600">正規化変換</text>
    <text x="-40" y="16" text-anchor="middle" fill="#fdba74" font-size="10" font-family="'Fira Code', monospace">&#xFF53;&#xFF43;&#xFF52;&#xFF49;&#xFF50;&#xFF54;</text>
    <text x="0" y="16" text-anchor="middle" fill="#94a3b8" font-size="12">&#8594;</text>
    <text x="42" y="16" text-anchor="middle" fill="#ef4444" font-size="10" font-family="'Fira Code', monospace">script</text>
  </g>

  <!-- Step 4: Server processes normalized input (internal) -->
  <path d="M 324 570 L 240 570" fill="none" stroke="#3b82f6" stroke-width="2.2" stroke-dasharray="6,3" marker-end="url(#arrowBlue)"/>
  <circle cx="265" cy="548" r="16" fill="#3b82f6"/>
  <text x="265" y="553" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">4</text>

  <!-- Execution result box -->
  <g transform="translate(170, 570)" filter="url(#shadow)">
    <rect x="-68" y="-28" width="136" height="70" rx="8" fill="#1e1b2e" stroke="#ef4444" stroke-width="1.2" stroke-dasharray="4,2"/>
    <rect x="-58" y="-20" width="116" height="13" rx="3" fill="#0f172a"/>
    <circle cx="-48" cy="-14" r="2.5" fill="#ef4444"/>
    <circle cx="-40" cy="-14" r="2.5" fill="#f59e0b"/>
    <circle cx="-32" cy="-14" r="2.5" fill="#22c55e"/>
    <text x="0" y="6" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="600">XSS実行</text>
    <text x="0" y="20" text-anchor="middle" fill="#94a3b8" font-size="8.5" font-family="'Fira Code', monospace">&lt;script&gt;alert(1)</text>
    <text x="0" y="32" text-anchor="middle" fill="#ef4444" font-size="8.5">フィルタ回避成功</text>
  </g>

  <!-- Step 5: Payload executes (arrow from server down) -->
  <path d="M 380 645 L 380 665" fill="none" stroke="#ef4444" stroke-width="2.2" stroke-dasharray="6,3" marker-end="url(#arrowRed)"/>
  <circle cx="404" cy="655" r="16" fill="#ef4444"/>
  <text x="404" y="660" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">5</text>

  <!-- Payload execution label -->
  <g transform="translate(380, 690)">
    <rect x="-130" y="-14" width="260" height="28" rx="5" fill="#0f172a" stroke="#ef4444" stroke-width="1" opacity="0.8"/>
    <text x="0" y="4" text-anchor="middle" fill="#fca5a5" font-size="9.5" font-family="'Fira Code', monospace">
      <tspan fill="#ef4444">&lt;script&gt;</tspan><tspan fill="#fca5a5">alert(1)</tspan><tspan fill="#ef4444">&lt;/script&gt;</tspan>
    </text>
  </g>

  <!-- ===== Vulnerability callout ===== -->
  <g transform="translate(170, 390)" filter="url(#shadow)">
    <rect x="-110" y="-18" width="220" height="60" rx="8" fill="#451a03" stroke="#f97316" stroke-width="1"/>
    <text x="0" y="-1" text-anchor="middle" fill="#fdba74" font-size="11" font-weight="700">&#9888; 正規化前のフィルタリング</text>
    <text x="0" y="16" text-anchor="middle" fill="#fb923c" font-size="9" font-family="'Fira Code', monospace">filter(input)</text>
    <text x="0" y="30" text-anchor="middle" fill="#fb923c" font-size="9" font-family="'Fira Code', monospace">&#8594; normalize(input) // 順序が逆</text>
  </g>

  <!-- ====================================================== -->
  <!--  STEP LIST (right sidebar)                              -->
  <!-- ====================================================== -->
  <g transform="translate(775, 100)">
    <rect x="0" y="0" width="305" height="340" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="152" y="28" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="700">攻撃ステップ詳細</text>
    <line x1="16" y1="40" x2="289" y2="40" stroke="#334155" stroke-width="1"/>

    <!-- Step 1 -->
    <circle cx="34" cy="68" r="13" fill="#ef4444"/>
    <text x="34" y="73" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">1</text>
    <text x="56" y="64" fill="#f8fafc" font-size="11.5" font-weight="600">全角文字でペイロード送信</text>
    <text x="56" y="80" fill="#94a3b8" font-size="9.5">&#xFF53;&#xFF43;&#xFF52;&#xFF49;&#xFF50;&#xFF54; (全角) を入力に</text>
    <text x="56" y="93" fill="#94a3b8" font-size="9.5">送信し、フィルタを回避する</text>

    <!-- Step 2 -->
    <circle cx="34" cy="124" r="13" fill="#f97316"/>
    <text x="34" y="129" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">2</text>
    <text x="56" y="120" fill="#f8fafc" font-size="11.5" font-weight="600">フィルタが見逃し</text>
    <text x="56" y="136" fill="#94a3b8" font-size="9.5">ブロックリストに "script" が</text>
    <text x="56" y="149" fill="#94a3b8" font-size="9.5">一致しない &#8594; パス</text>

    <!-- Step 3 -->
    <circle cx="34" cy="180" r="13" fill="#f97316"/>
    <text x="34" y="185" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">3</text>
    <text x="56" y="176" fill="#f8fafc" font-size="11.5" font-weight="600">Unicode正規化 (NFKC)</text>
    <text x="56" y="192" fill="#94a3b8" font-size="9.5">アプリケーションがNFKCで</text>
    <text x="56" y="205" fill="#94a3b8" font-size="9.5">全角&#8594;半角に変換 (フィルタ後)</text>

    <!-- Step 4 -->
    <circle cx="34" cy="236" r="13" fill="#3b82f6"/>
    <text x="34" y="241" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">4</text>
    <text x="56" y="232" fill="#f8fafc" font-size="11.5" font-weight="600">正規化後に危険文字列出現</text>
    <text x="56" y="248" fill="#94a3b8" font-size="9.5">&#xFF53;&#xFF43;&#xFF52;&#xFF49;&#xFF50;&#xFF54; &#8594; script に変換</text>
    <text x="56" y="261" fill="#94a3b8" font-size="9.5">され、ブロックリスト一致する状態</text>

    <!-- Step 5 -->
    <circle cx="34" cy="292" r="13" fill="#ef4444"/>
    <text x="34" y="297" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">5</text>
    <text x="56" y="288" fill="#f8fafc" font-size="11.5" font-weight="600">XSSペイロード実行</text>
    <text x="56" y="304" fill="#94a3b8" font-size="9.5">&lt;script&gt;alert(1)&lt;/script&gt; が</text>
    <text x="56" y="317" fill="#94a3b8" font-size="9.5">ブラウザ上で実行される</text>
  </g>

  <!-- ====================================================== -->
  <!--  ATTACK TECHNIQUE CARDS (bottom)                        -->
  <!-- ====================================================== -->
  <line x1="30" y1="720" x2="1070" y2="720" stroke="#334155" stroke-width="1"/>
  <text x="550" y="745" text-anchor="middle" fill="#fca5a5" font-size="14" font-weight="700">&#128293; 使用される攻撃テクニック</text>

  <!-- Card: 全角文字 -->
  <g transform="translate(165, 758)" filter="url(#shadow)">
    <rect x="-120" y="0" width="240" height="38" rx="8" fill="#1e1b2e" stroke="#ef4444" stroke-width="1"/>
    <rect x="-108" y="6" width="28" height="26" rx="5" fill="#ef4444" opacity="0.1"/>
    <g transform="translate(-94, 19)">
      <text x="0" y="4" text-anchor="middle" fill="#ef4444" font-size="10" font-family="'Fira Code', monospace">&#xFF21;</text>
    </g>
    <text x="10" y="16" text-anchor="middle" fill="#f8fafc" font-size="11" font-weight="600">全角文字</text>
    <text x="10" y="30" text-anchor="middle" fill="#94a3b8" font-size="8.5">Fullwidth文字でフィルタ回避</text>
  </g>

  <!-- Card: ホモグリフ -->
  <g transform="translate(465, 758)" filter="url(#shadow)">
    <rect x="-120" y="0" width="240" height="38" rx="8" fill="#1e1b2e" stroke="#ef4444" stroke-width="1"/>
    <rect x="-108" y="6" width="28" height="26" rx="5" fill="#ef4444" opacity="0.1"/>
    <g transform="translate(-94, 19)">
      <text x="0" y="4" text-anchor="middle" fill="#ef4444" font-size="10" font-family="'Fira Code', monospace">&#1072;a</text>
    </g>
    <text x="10" y="16" text-anchor="middle" fill="#f8fafc" font-size="11" font-weight="600">ホモグリフ</text>
    <text x="10" y="30" text-anchor="middle" fill="#94a3b8" font-size="8.5">見た目が同じ別の文字を使用</text>
  </g>

  <!-- Card: 結合文字 -->
  <g transform="translate(765, 758)" filter="url(#shadow)">
    <rect x="-120" y="0" width="240" height="38" rx="8" fill="#1e1b2e" stroke="#ef4444" stroke-width="1"/>
    <rect x="-108" y="6" width="28" height="26" rx="5" fill="#ef4444" opacity="0.1"/>
    <g transform="translate(-94, 19)">
      <text x="0" y="4" text-anchor="middle" fill="#ef4444" font-size="10" font-family="'Fira Code', monospace">&#x308;&#x303;</text>
    </g>
    <text x="10" y="16" text-anchor="middle" fill="#f8fafc" font-size="11" font-weight="600">結合文字</text>
    <text x="10" y="30" text-anchor="middle" fill="#94a3b8" font-size="8.5">結合文字で正規化時に変換</text>
  </g>

  <!-- ===== Legend ===== -->
  <g transform="translate(775, 465)">
    <rect x="0" y="0" width="305" height="68" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="14" y="18" fill="#94a3b8" font-size="10" font-weight="600">凡例</text>
    <line x1="14" y1="34" x2="44" y2="34" stroke="#ef4444" stroke-width="2" stroke-dasharray="6,3"/>
    <text x="52" y="38" fill="#fca5a5" font-size="9.5">攻撃通信</text>
    <line x1="152" y1="34" x2="182" y2="34" stroke="#f97316" stroke-width="2"/>
    <text x="190" y="38" fill="#fdba74" font-size="9.5">フィルタ処理</text>
    <line x1="14" y1="54" x2="44" y2="54" stroke="#3b82f6" stroke-width="2"/>
    <text x="52" y="58" fill="#93c5fd" font-size="9.5">サーバー処理</text>
    <rect x="152" y="48" width="12" height="12" rx="2" fill="#451a03" stroke="#f97316" stroke-width="0.8"/>
    <text x="170" y="58" fill="#fdba74" font-size="9.5">脆弱性ポイント</text>
  </g>

</svg>