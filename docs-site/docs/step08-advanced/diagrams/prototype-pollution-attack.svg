<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 750" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f97316"/>
    </marker>
  </defs>

  <rect width="1100" height="750" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="380" y="38" text-anchor="middle" fill="#f8fafc" font-size="22" font-weight="700">Prototype Pollution Attack Flow</text>
  <text x="380" y="58" text-anchor="middle" fill="#94a3b8" font-size="12">プロトタイプ汚染 — 攻撃の流れ</text>
  <rect x="275" y="66" width="210" height="20" rx="10" fill="#ef4444" opacity="0.15"/>
  <text x="380" y="80" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="600">OWASP A03 — Injection</text>

  <!-- Attacker -->
  <g transform="translate(115, 250)" filter="url(#shadow)">
    <rect x="-56" y="-30" width="112" height="125" rx="12" fill="#1e1b2e" stroke="#ef4444" stroke-width="1.5"/>
    <g transform="translate(0, 10)">
      <path d="M-13,-17 Q0,-28 13,-17 L13,-4 Q0,2 -13,-4 Z" fill="none" stroke="#ef4444" stroke-width="1.8"/>
      <circle cx="-4" cy="-9" r="1.8" fill="#ef4444"/>
      <circle cx="4" cy="-9" r="1.8" fill="#ef4444"/>
      <path d="M-17,36 Q-17,14 0,10 Q17,14 17,36" fill="none" stroke="#ef4444" stroke-width="2"/>
      <line x1="-17" y1="36" x2="17" y2="36" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
    </g>
    <text x="0" y="72" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="700">攻撃者</text>
    <text x="0" y="86" text-anchor="middle" fill="#ef4444" font-size="9.5" opacity="0.7">Attacker</text>
  </g>

  <!-- Web Server -->
  <g transform="translate(380, 250)" filter="url(#shadow)">
    <rect x="-56" y="-30" width="112" height="125" rx="12" fill="#1e1b2e" stroke="#3b82f6" stroke-width="1.5"/>
    <g transform="translate(0, 14)">
      <rect x="-20" y="-18" width="40" height="12" rx="3" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
      <circle cx="-12" cy="-12" r="2" fill="#3b82f6"/><circle cx="-5" cy="-12" r="2" fill="#3b82f6"/>
      <rect x="-20" y="-2" width="40" height="12" rx="3" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
      <circle cx="-12" cy="4" r="2" fill="#3b82f6"/><circle cx="-5" cy="4" r="2" fill="#3b82f6"/>
      <rect x="-20" y="14" width="40" height="12" rx="3" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
      <circle cx="-12" cy="20" r="2" fill="#3b82f6"/><circle cx="-5" cy="20" r="2" fill="#3b82f6"/>
    </g>
    <text x="0" y="72" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">Webサーバー</text>
    <text x="0" y="86" text-anchor="middle" fill="#3b82f6" font-size="9.5" opacity="0.7">Node.js App</text>
  </g>

  <!-- Application State (Object.prototype) -->
  <g transform="translate(645, 250)" filter="url(#shadow)">
    <rect x="-56" y="-30" width="112" height="125" rx="12" fill="#1e1b2e" stroke="#f97316" stroke-width="1.5"/>
    <g transform="translate(0, 8)">
      <!-- Prototype chain icon: nested brackets {} -->
      <text x="0" y="-6" text-anchor="middle" fill="#f97316" font-size="11" font-family="'Fira Code', monospace">{__proto__}</text>
      <rect x="-22" y="4" width="44" height="16" rx="3" fill="none" stroke="#f97316" stroke-width="1.2" stroke-dasharray="3,2"/>
      <text x="0" y="16" text-anchor="middle" fill="#f97316" font-size="8" font-family="'Fira Code', monospace">.prototype</text>
    </g>
    <text x="0" y="72" text-anchor="middle" fill="#fdba74" font-size="13" font-weight="700">アプリ状態</text>
    <text x="0" y="86" text-anchor="middle" fill="#f97316" font-size="9.5" opacity="0.7">Object.prototype</text>
  </g>

  <!-- Step 1: Attacker sends JSON with __proto__ -->
  <path d="M 171 240 L 318 240" fill="none" stroke="#ef4444" stroke-width="2.2" stroke-dasharray="8,4" marker-end="url(#arrowRed)"/>
  <circle cx="245" cy="218" r="16" fill="#ef4444"/>
  <text x="245" y="223" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">1</text>

  <!-- Step 2: Server deep-merges -->
  <path d="M 438 240 L 583 240" fill="none" stroke="#3b82f6" stroke-width="2.2" marker-end="url(#arrowOrange)"/>
  <circle cx="510" cy="218" r="16" fill="#f97316"/>
  <text x="510" y="223" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">2</text>

  <!-- Step 3: Object.prototype polluted (vertical arrow down from third actor) -->
  <path d="M 645 345 L 645 410" fill="none" stroke="#f97316" stroke-width="2.2" stroke-dasharray="6,3" marker-end="url(#arrowOrange)"/>
  <circle cx="669" cy="378" r="16" fill="#f97316"/>
  <text x="669" y="383" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">3</text>

  <!-- Polluted Prototype Result Box -->
  <g transform="translate(645, 458)" filter="url(#shadow)">
    <rect x="-78" y="-28" width="156" height="76" rx="8" fill="#1e1b2e" stroke="#ef4444" stroke-width="1.2" stroke-dasharray="4,2"/>
    <rect x="-68" y="-20" width="136" height="13" rx="3" fill="#0f172a"/>
    <circle cx="-58" cy="-14" r="2.5" fill="#ef4444"/>
    <circle cx="-50" cy="-14" r="2.5" fill="#f59e0b"/>
    <circle cx="-42" cy="-14" r="2.5" fill="#22c55e"/>
    <text x="0" y="4" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="600">全オブジェクト汚染</text>
    <text x="0" y="18" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="'Fira Code', monospace">{}.isAdmin === true</text>
    <text x="0" y="34" text-anchor="middle" fill="#ef4444" font-size="8.5">権限チェック突破</text>
    <text x="0" y="44" text-anchor="middle" fill="#94a3b8" font-size="7.5">全オブジェクトが isAdmin を継承</text>
  </g>

  <!-- Step 4: All objects inherit (curved arrow from prototype box back toward server area) -->
  <path d="M 567 458 Q 500 480 436 420" fill="none" stroke="#ef4444" stroke-width="2.2" stroke-dasharray="6,3" marker-end="url(#arrowRed)"/>
  <circle cx="510" cy="480" r="16" fill="#ef4444"/>
  <text x="510" y="485" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">4</text>

  <!-- Step 5: Security bypass — result back to attacker -->
  <path d="M 324 375 C 280 500, 180 480, 115 345" fill="none" stroke="#ef4444" stroke-width="2.2" stroke-dasharray="8,4" marker-end="url(#arrowRed)"/>
  <circle cx="210" cy="478" r="16" fill="#ef4444"/>
  <text x="210" y="483" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">5</text>

  <!-- Vulnerability Box -->
  <g transform="translate(380, 420)" filter="url(#shadow)">
    <rect x="-120" y="-18" width="240" height="60" rx="8" fill="#451a03" stroke="#f97316" stroke-width="1"/>
    <text x="0" y="-1" text-anchor="middle" fill="#fdba74" font-size="11" font-weight="700">⚠ merge(target, userInput)</text>
    <text x="0" y="16" text-anchor="middle" fill="#fb923c" font-size="9.5" font-family="'Fira Code', monospace">__proto__キーが未フィルタリング</text>
    <text x="0" y="32" text-anchor="middle" fill="#fed7aa" font-size="8.5">再帰マージで __proto__ を辿り prototype を上書き</text>
  </g>

  <!-- Malicious Payload bar -->
  <g transform="translate(380, 510)">
    <rect x="-195" y="-14" width="390" height="28" rx="5" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="0" y="4" text-anchor="middle" fill="#94a3b8" font-size="9.5" font-family="'Fira Code', monospace">
      <tspan fill="#64748b">POST </tspan><tspan fill="#93c5fd">/api/config </tspan><tspan fill="#ef4444">{"__proto__": {"isAdmin": true}}</tspan>
    </text>
  </g>

  <!-- Step Sidebar -->
  <g transform="translate(775, 100)">
    <rect x="0" y="0" width="305" height="362" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="152" y="28" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="700">攻撃ステップ詳細</text>
    <line x1="16" y1="40" x2="289" y2="40" stroke="#334155" stroke-width="1"/>

    <circle cx="34" cy="68" r="13" fill="#ef4444"/>
    <text x="34" y="73" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">1</text>
    <text x="56" y="64" fill="#f8fafc" font-size="11.5" font-weight="600">__proto__付きJSON送信</text>
    <text x="56" y="80" fill="#94a3b8" font-size="9.5">攻撃者が __proto__ キーを含む</text>
    <text x="56" y="93" fill="#94a3b8" font-size="9.5">JSONペイロードをAPIに送信</text>

    <circle cx="34" cy="124" r="13" fill="#f97316"/>
    <text x="34" y="129" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">2</text>
    <text x="56" y="120" fill="#f8fafc" font-size="11.5" font-weight="600">サニタイズなしでマージ</text>
    <text x="56" y="136" fill="#94a3b8" font-size="9.5">サーバーがdeep merge関数で</text>
    <text x="56" y="149" fill="#94a3b8" font-size="9.5">__proto__キーをフィルタせず処理</text>

    <circle cx="34" cy="180" r="13" fill="#f97316"/>
    <text x="34" y="185" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">3</text>
    <text x="56" y="176" fill="#f8fafc" font-size="11.5" font-weight="600">Object.prototype汚染</text>
    <text x="56" y="192" fill="#94a3b8" font-size="9.5">Object.prototype に isAdmin: true</text>
    <text x="56" y="205" fill="#94a3b8" font-size="9.5">が追加され、グローバルに影響</text>

    <circle cx="34" cy="236" r="13" fill="#ef4444"/>
    <text x="34" y="241" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">4</text>
    <text x="56" y="232" fill="#f8fafc" font-size="11.5" font-weight="600">全オブジェクトに継承</text>
    <text x="56" y="248" fill="#94a3b8" font-size="9.5">新規作成される全オブジェクトが</text>
    <text x="56" y="261" fill="#94a3b8" font-size="9.5">isAdmin: true を継承してしまう</text>

    <circle cx="34" cy="292" r="13" fill="#ef4444"/>
    <text x="34" y="297" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">5</text>
    <text x="56" y="288" fill="#f8fafc" font-size="11.5" font-weight="600">セキュリティチェック突破</text>
    <text x="56" y="304" fill="#94a3b8" font-size="9.5">if (user.isAdmin) が true に評価</text>
    <text x="56" y="317" fill="#94a3b8" font-size="9.5">され、不正に管理者権限を取得</text>
  </g>

  <!-- Attack Technique Cards -->
  <line x1="30" y1="660" x2="1070" y2="660" stroke="#334155" stroke-width="1"/>
  <text x="550" y="685" text-anchor="middle" fill="#fca5a5" font-size="14" font-weight="700">🔥 使用される攻撃テクニック</text>

  <g transform="translate(165, 698)" filter="url(#shadow)">
    <rect x="-120" y="0" width="240" height="38" rx="8" fill="#1e1b2e" stroke="#ef4444" stroke-width="1"/>
    <rect x="-108" y="6" width="28" height="26" rx="5" fill="#ef4444" opacity="0.1"/>
    <text x="-94" y="24" text-anchor="middle" fill="#ef4444" font-size="11" font-family="'Fira Code', monospace">{}</text>
    <text x="10" y="16" text-anchor="middle" fill="#f8fafc" font-size="11" font-weight="600">__proto__汚染</text>
    <text x="10" y="30" text-anchor="middle" fill="#94a3b8" font-size="8.5">プロトタイプチェーンを改ざん</text>
  </g>

  <g transform="translate(465, 698)" filter="url(#shadow)">
    <rect x="-120" y="0" width="240" height="38" rx="8" fill="#1e1b2e" stroke="#ef4444" stroke-width="1"/>
    <rect x="-108" y="6" width="28" height="26" rx="5" fill="#ef4444" opacity="0.1"/>
    <text x="-94" y="24" text-anchor="middle" fill="#ef4444" font-size="13">⬆</text>
    <text x="10" y="16" text-anchor="middle" fill="#f8fafc" font-size="11" font-weight="600">権限昇格</text>
    <text x="10" y="30" text-anchor="middle" fill="#94a3b8" font-size="8.5">isAdmin=true で管理者に昇格</text>
  </g>

  <g transform="translate(765, 698)" filter="url(#shadow)">
    <rect x="-120" y="0" width="240" height="38" rx="8" fill="#1e1b2e" stroke="#ef4444" stroke-width="1"/>
    <rect x="-108" y="6" width="28" height="26" rx="5" fill="#ef4444" opacity="0.1"/>
    <g transform="translate(-94, 18)">
      <circle cx="0" cy="0" r="7" fill="none" stroke="#ef4444" stroke-width="1.2"/>
      <line x1="-3" y1="-3" x2="3" y2="3" stroke="#ef4444" stroke-width="1.2"/>
      <line x1="-3" y1="3" x2="3" y2="-3" stroke="#ef4444" stroke-width="1.2"/>
    </g>
    <text x="10" y="16" text-anchor="middle" fill="#f8fafc" font-size="11" font-weight="600">セキュリティバイパス</text>
    <text x="10" y="30" text-anchor="middle" fill="#94a3b8" font-size="8.5">認証・認可チェックを迂回</text>
  </g>

  <!-- Legend -->
  <g transform="translate(775, 487)">
    <rect x="0" y="0" width="305" height="68" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="14" y="18" fill="#94a3b8" font-size="10" font-weight="600">凡例</text>
    <line x1="14" y1="34" x2="44" y2="34" stroke="#ef4444" stroke-width="2" stroke-dasharray="6,3"/>
    <text x="52" y="38" fill="#fca5a5" font-size="9.5">攻撃通信</text>
    <line x1="152" y1="34" x2="182" y2="34" stroke="#3b82f6" stroke-width="2"/>
    <text x="190" y="38" fill="#93c5fd" font-size="9.5">サーバー処理</text>
    <line x1="14" y1="54" x2="44" y2="54" stroke="#f97316" stroke-width="2"/>
    <text x="52" y="58" fill="#fdba74" font-size="9.5">プロトタイプ汚染</text>
    <rect x="152" y="48" width="12" height="12" rx="2" fill="#451a03" stroke="#f97316" stroke-width="0.8"/>
    <text x="170" y="58" fill="#fdba74" font-size="9.5">脆弱性ポイント</text>
  </g>
</svg>