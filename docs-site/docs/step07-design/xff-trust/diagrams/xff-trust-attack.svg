<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 750" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a855f7"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="750" fill="url(#bgGrad)" rx="12"/>

  <!-- ===== Title ===== -->
  <text x="380" y="38" text-anchor="middle" fill="#f8fafc" font-size="22" font-weight="700">X-Forwarded-For Trust Attack</text>
  <text x="380" y="58" text-anchor="middle" fill="#94a3b8" font-size="12">X-Forwarded-For 信頼ミス — レート制限バイパスによるブルートフォース</text>
  <rect x="268" y="66" width="225" height="20" rx="10" fill="#ef4444" opacity="0.15"/>
  <text x="380" y="80" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="600">OWASP — A05:Security Misconfiguration</text>

  <!-- ====================================================== -->
  <!--  ACTORS                                                 -->
  <!-- ====================================================== -->

  <!-- Attacker (Left) -->
  <g transform="translate(115, 250)" filter="url(#shadow)">
    <rect x="-56" y="-30" width="112" height="125" rx="12" fill="#1e1b2e" stroke="#ef4444" stroke-width="1.5"/>
    <g transform="translate(0, 10)">
      <path d="M-13,-17 Q0,-28 13,-17 L13,-4 Q0,2 -13,-4 Z" fill="none" stroke="#ef4444" stroke-width="1.8"/>
      <circle cx="-4" cy="-9" r="1.8" fill="#ef4444"/>
      <circle cx="4" cy="-9" r="1.8" fill="#ef4444"/>
      <path d="M-17,36 Q-17,14 0,10 Q17,14 17,36" fill="none" stroke="#ef4444" stroke-width="2"/>
      <line x1="-17" y1="36" x2="17" y2="36" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
    </g>
    <text x="0" y="72" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="700">攻撃者</text>
    <text x="0" y="86" text-anchor="middle" fill="#ef4444" font-size="9.5" opacity="0.7">Attacker</text>
  </g>

  <!-- Web Server with Rate Limiter (Center) -->
  <g transform="translate(380, 250)" filter="url(#shadow)">
    <rect x="-56" y="-30" width="112" height="125" rx="12" fill="#1e1b2e" stroke="#3b82f6" stroke-width="1.5"/>
    <g transform="translate(0, 14)">
      <rect x="-20" y="-18" width="40" height="12" rx="3" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
      <circle cx="-12" cy="-12" r="2" fill="#3b82f6"/><circle cx="-5" cy="-12" r="2" fill="#3b82f6"/>
      <rect x="-20" y="-2" width="40" height="12" rx="3" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
      <circle cx="-12" cy="4" r="2" fill="#3b82f6"/><circle cx="-5" cy="4" r="2" fill="#3b82f6"/>
      <rect x="-20" y="14" width="40" height="12" rx="3" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
      <circle cx="-12" cy="20" r="2" fill="#3b82f6"/><circle cx="-5" cy="20" r="2" fill="#3b82f6"/>
    </g>
    <text x="0" y="72" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">Webサーバー</text>
    <text x="0" y="86" text-anchor="middle" fill="#3b82f6" font-size="9.5" opacity="0.7">Rate Limiter</text>
  </g>

  <!-- Victim (Right, dimmed - not directly involved) -->
  <g transform="translate(645, 250)" filter="url(#shadow)">
    <rect x="-56" y="-30" width="112" height="125" rx="12" fill="#1e1b2e" stroke="#a855f7" stroke-width="1.5" opacity="0.4"/>
    <g transform="translate(0, 10)" opacity="0.4">
      <circle cx="0" cy="-9" r="13" fill="none" stroke="#a855f7" stroke-width="1.8"/>
      <circle cx="-4" cy="-11" r="1.5" fill="#a855f7"/>
      <circle cx="4" cy="-11" r="1.5" fill="#a855f7"/>
      <path d="M-4,-4 Q0,1 4,-4" fill="none" stroke="#a855f7" stroke-width="1.3" stroke-linecap="round"/>
      <path d="M-17,36 Q-17,14 0,10 Q17,14 17,36" fill="none" stroke="#a855f7" stroke-width="2"/>
      <line x1="-17" y1="36" x2="17" y2="36" stroke="#a855f7" stroke-width="2" stroke-linecap="round"/>
    </g>
    <text x="0" y="72" text-anchor="middle" fill="#d8b4fe" font-size="13" font-weight="700" opacity="0.45">被害者</text>
    <text x="0" y="86" text-anchor="middle" fill="#a855f7" font-size="9.5" opacity="0.3">Victim</text>
  </g>

  <!-- ====================================================== -->
  <!--  ARROWS                                                 -->
  <!-- ====================================================== -->

  <!-- Step 1: Attacker → Server (upper curve - XFF: 1.2.3.4) -->
  <path d="M 170 220 Q 250 130 324 220" fill="none" stroke="#ef4444" stroke-width="2.2" stroke-dasharray="8,4" marker-end="url(#arrowRed)"/>
  <circle cx="248" cy="148" r="16" fill="#ef4444"/>
  <text x="248" y="153" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">1</text>

  <!-- Step 2: Server internal (identifies as 1.2.3.4) -->
  <path d="M 380 345 L 380 405" fill="none" stroke="#3b82f6" stroke-width="2.2" stroke-dasharray="6,3" marker-end="url(#arrowBlue)"/>
  <circle cx="404" cy="375" r="16" fill="#3b82f6"/>
  <text x="404" y="380" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">2</text>

  <!-- Step 3: Attacker → Server (Y=240 - different XFF) -->
  <path d="M 171 240 L 318 240" fill="none" stroke="#ef4444" stroke-width="2.2" stroke-dasharray="8,4" marker-end="url(#arrowRed)"/>
  <circle cx="245" cy="218" r="16" fill="#ef4444"/>
  <text x="245" y="223" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">3</text>

  <!-- Step 4: Server → Attacker (Y=282 - rate limit reset) -->
  <path d="M 324 282 L 175 282" fill="none" stroke="#3b82f6" stroke-width="2.2" marker-end="url(#arrowBlue)"/>
  <circle cx="248" cy="302" r="16" fill="#3b82f6"/>
  <text x="248" y="307" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">4</text>

  <!-- Step 5: Attacker → Server lower curve (unlimited brute force) -->
  <path d="M 171 310 C 230 520, 310 520, 324 310" fill="none" stroke="#ef4444" stroke-width="2.2" stroke-dasharray="8,4" marker-end="url(#arrowRed)"/>
  <!-- Multiple parallel lines to show brute force -->
  <path d="M 175 315 C 234 510, 306 510, 318 315" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.5"/>
  <path d="M 179 320 C 238 500, 302 500, 312 320" fill="none" stroke="#ef4444" stroke-width="1.0" stroke-dasharray="4,3" opacity="0.3"/>
  <circle cx="248" cy="510" r="16" fill="#ef4444"/>
  <text x="248" y="515" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">5</text>

  <!-- ====================================================== -->
  <!--  Rate Limiter Internal Box                              -->
  <!-- ====================================================== -->
  <g transform="translate(380, 448)" filter="url(#shadow)">
    <rect x="-90" y="-28" width="180" height="70" rx="8" fill="#1e1b2e" stroke="#3b82f6" stroke-width="1.2" stroke-dasharray="4,2"/>
    <rect x="-80" y="-20" width="160" height="13" rx="3" fill="#0f172a"/>
    <circle cx="-70" cy="-14" r="2.5" fill="#ef4444"/>
    <circle cx="-62" cy="-14" r="2.5" fill="#f59e0b"/>
    <circle cx="-54" cy="-14" r="2.5" fill="#22c55e"/>
    <text x="0" y="6" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="600">レート制限テーブル</text>
    <text x="0" y="21" text-anchor="middle" fill="#fca5a5" font-size="9" font-family="'Fira Code', monospace">1.2.3.4 → 100/100 &#10006;</text>
    <text x="0" y="34" text-anchor="middle" fill="#86efac" font-size="9" font-family="'Fira Code', monospace">5.6.7.8 →   1/100 &#10004;</text>
  </g>

  <!-- XFF request labels -->
  <g transform="translate(248, 183)">
    <rect x="-130" y="-14" width="260" height="28" rx="5" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="0" y="4" text-anchor="middle" fill="#94a3b8" font-size="9.5" font-family="'Fira Code', monospace">
      <tspan fill="#ef4444">POST</tspan><tspan fill="#93c5fd"> /login </tspan><tspan fill="#ef4444">XFF: 1.2.3.4</tspan>
    </text>
  </g>

  <g transform="translate(248, 330)">
    <rect x="-130" y="-14" width="260" height="28" rx="5" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="0" y="4" text-anchor="middle" fill="#94a3b8" font-size="9.5" font-family="'Fira Code', monospace">
      <tspan fill="#ef4444">POST</tspan><tspan fill="#93c5fd"> /login </tspan><tspan fill="#ef4444">XFF: 5.6.7.8</tspan>
    </text>
  </g>

  <!-- ===== Vulnerability callout ===== -->
  <g transform="translate(248, 570)" filter="url(#shadow)">
    <rect x="-155" y="-18" width="310" height="60" rx="8" fill="#451a03" stroke="#f97316" stroke-width="1"/>
    <text x="0" y="-1" text-anchor="middle" fill="#fdba74" font-size="11" font-weight="700">&#9888; クライアント供給ヘッダを信頼</text>
    <text x="0" y="16" text-anchor="middle" fill="#fb923c" font-size="9" font-family="'Fira Code', monospace">clientIp = req.headers</text>
    <text x="0" y="30" text-anchor="middle" fill="#fb923c" font-size="9" font-family="'Fira Code', monospace">  ['x-forwarded-for'].split(',')[0]</text>
  </g>

  <!-- Brute force success label -->
  <g transform="translate(248, 540)">
    <rect x="-78" y="-12" width="156" height="24" rx="5" fill="#0f172a" stroke="#ef4444" stroke-width="1" opacity="0.8"/>
    <text x="0" y="4" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="600">無制限ブルートフォース</text>
  </g>

  <!-- ====================================================== -->
  <!--  STEP LIST (right sidebar)                              -->
  <!-- ====================================================== -->
  <g transform="translate(775, 100)">
    <rect x="0" y="0" width="305" height="340" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="152" y="28" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="700">攻撃ステップ詳細</text>
    <line x1="16" y1="40" x2="289" y2="40" stroke="#334155" stroke-width="1"/>

    <!-- Step 1 -->
    <circle cx="34" cy="68" r="13" fill="#ef4444"/>
    <text x="34" y="73" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">1</text>
    <text x="56" y="64" fill="#f8fafc" font-size="11.5" font-weight="600">偽装IPでリクエスト送信</text>
    <text x="56" y="80" fill="#94a3b8" font-size="9.5">X-Forwarded-For: 1.2.3.4 を</text>
    <text x="56" y="93" fill="#94a3b8" font-size="9.5">付与してログイン試行を繰り返す</text>

    <!-- Step 2 -->
    <circle cx="34" cy="124" r="13" fill="#3b82f6"/>
    <text x="34" y="129" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">2</text>
    <text x="56" y="120" fill="#f8fafc" font-size="11.5" font-weight="600">偽装IPでレート制限判定</text>
    <text x="56" y="136" fill="#94a3b8" font-size="9.5">サーバーが1.2.3.4をクライアント</text>
    <text x="56" y="149" fill="#94a3b8" font-size="9.5">IPとして認識しカウント加算</text>

    <!-- Step 3 -->
    <circle cx="34" cy="180" r="13" fill="#ef4444"/>
    <text x="34" y="185" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">3</text>
    <text x="56" y="176" fill="#f8fafc" font-size="11.5" font-weight="600">別IPに切り替え</text>
    <text x="56" y="192" fill="#94a3b8" font-size="9.5">制限到達後、XFFを5.6.7.8に</text>
    <text x="56" y="205" fill="#94a3b8" font-size="9.5">変更して新規クライアントに偽装</text>

    <!-- Step 4 -->
    <circle cx="34" cy="236" r="13" fill="#3b82f6"/>
    <text x="34" y="241" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">4</text>
    <text x="56" y="232" fill="#f8fafc" font-size="11.5" font-weight="600">レート制限リセット</text>
    <text x="56" y="248" fill="#94a3b8" font-size="9.5">サーバーが新IPとして扱い</text>
    <text x="56" y="261" fill="#94a3b8" font-size="9.5">カウンタがゼロからリスタート</text>

    <!-- Step 5 -->
    <circle cx="34" cy="292" r="13" fill="#ef4444"/>
    <text x="34" y="297" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">5</text>
    <text x="56" y="288" fill="#f8fafc" font-size="11.5" font-weight="600">無制限ブルートフォース</text>
    <text x="56" y="304" fill="#94a3b8" font-size="9.5">IPを変え続けることで実質的に</text>
    <text x="56" y="317" fill="#94a3b8" font-size="9.5">レート制限なしで総当たり攻撃</text>
  </g>

  <!-- ====================================================== -->
  <!--  ATTACK TECHNIQUE CARDS (bottom)                        -->
  <!-- ====================================================== -->
  <line x1="30" y1="640" x2="1070" y2="640" stroke="#334155" stroke-width="1"/>
  <text x="550" y="665" text-anchor="middle" fill="#fca5a5" font-size="14" font-weight="700">&#128293; 使用される攻撃テクニック</text>

  <!-- Card: IP偽装 -->
  <g transform="translate(165, 678)" filter="url(#shadow)">
    <rect x="-120" y="0" width="240" height="38" rx="8" fill="#1e1b2e" stroke="#ef4444" stroke-width="1"/>
    <rect x="-108" y="6" width="28" height="26" rx="5" fill="#ef4444" opacity="0.1"/>
    <g transform="translate(-94, 19)">
      <circle cx="0" cy="0" r="7" fill="none" stroke="#ef4444" stroke-width="1.2"/>
      <text x="0" y="3" text-anchor="middle" fill="#ef4444" font-size="7" font-family="'Fira Code', monospace">IP</text>
    </g>
    <text x="10" y="16" text-anchor="middle" fill="#f8fafc" font-size="11" font-weight="600">IP偽装</text>
    <text x="10" y="30" text-anchor="middle" fill="#94a3b8" font-size="8.5">XFFヘッダでIPアドレスを詐称</text>
  </g>

  <!-- Card: レート制限回避 -->
  <g transform="translate(465, 678)" filter="url(#shadow)">
    <rect x="-120" y="0" width="240" height="38" rx="8" fill="#1e1b2e" stroke="#ef4444" stroke-width="1"/>
    <rect x="-108" y="6" width="28" height="26" rx="5" fill="#ef4444" opacity="0.1"/>
    <g transform="translate(-94, 19)">
      <circle cx="0" cy="0" r="7" fill="none" stroke="#ef4444" stroke-width="1.2"/>
      <line x1="-1" y1="-4" x2="-1" y2="0" stroke="#ef4444" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="-1" y1="0" x2="3" y2="2" stroke="#ef4444" stroke-width="1.2" stroke-linecap="round"/>
    </g>
    <text x="10" y="16" text-anchor="middle" fill="#f8fafc" font-size="11" font-weight="600">レート制限回避</text>
    <text x="10" y="30" text-anchor="middle" fill="#94a3b8" font-size="8.5">IP切替でカウンタをリセット</text>
  </g>

  <!-- Card: ブルートフォース -->
  <g transform="translate(765, 678)" filter="url(#shadow)">
    <rect x="-120" y="0" width="240" height="38" rx="8" fill="#1e1b2e" stroke="#ef4444" stroke-width="1"/>
    <rect x="-108" y="6" width="28" height="26" rx="5" fill="#ef4444" opacity="0.1"/>
    <g transform="translate(-94, 19)">
      <rect x="-8" y="-6" width="16" height="12" rx="2" fill="none" stroke="#ef4444" stroke-width="1.2"/>
      <text x="0" y="3" text-anchor="middle" fill="#ef4444" font-size="7" font-family="'Fira Code', monospace">BF</text>
    </g>
    <text x="10" y="16" text-anchor="middle" fill="#f8fafc" font-size="11" font-weight="600">ブルートフォース</text>
    <text x="10" y="30" text-anchor="middle" fill="#94a3b8" font-size="8.5">パスワード総当たりで不正ログイン</text>
  </g>

  <!-- ===== Legend ===== -->
  <g transform="translate(775, 465)">
    <rect x="0" y="0" width="305" height="68" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="14" y="18" fill="#94a3b8" font-size="10" font-weight="600">凡例</text>
    <line x1="14" y1="34" x2="44" y2="34" stroke="#ef4444" stroke-width="2" stroke-dasharray="6,3"/>
    <text x="52" y="38" fill="#fca5a5" font-size="9.5">攻撃通信</text>
    <line x1="152" y1="34" x2="182" y2="34" stroke="#3b82f6" stroke-width="2"/>
    <text x="190" y="38" fill="#93c5fd" font-size="9.5">サーバー応答</text>
    <line x1="14" y1="54" x2="44" y2="54" stroke="#a855f7" stroke-width="2" opacity="0.4"/>
    <text x="52" y="58" fill="#d8b4fe" font-size="9.5" opacity="0.5">被害者 (間接的)</text>
    <rect x="152" y="48" width="12" height="12" rx="2" fill="#451a03" stroke="#f97316" stroke-width="0.8"/>
    <text x="170" y="58" fill="#fdba74" font-size="9.5">脆弱性ポイント</text>
  </g>

</svg>