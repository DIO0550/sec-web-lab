    <text x="10" y="30" text-anchor="middle" fill="#94a3b8" font-size="8.5">iframe&#12391;UI&#12434;&#20605;&#35013;&#12375;&#25805;&#20316;&#35480;&#23566;</text>
  </g>

  <!-- Card: MIME Sniffing -->
  <g transform="translate(465, 676)" filter="url(#shadow)">
    <rect x="-120" y="0" width="240" height="38" rx="8" fill="#1e1b2e" stroke="#ef4444" stroke-width="1"/>
    <rect x="-108" y="6" width="28" height="26" rx="5" fill="#ef4444" opacity="0.1"/>
