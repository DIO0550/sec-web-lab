    <text x="10" y="16" text-anchor="middle" fill="#f8fafc" font-size="11" font-weight="600">MIME&#12473;&#12491;&#12483;&#12501;&#12451;&#12531;&#12464;</text>
    <text x="10" y="30" text-anchor="middle" fill="#94a3b8" font-size="8.5">Content-Type&#12434;&#28961;&#35222;&#12375;&#12390;&#23455;&#34892;</text>
  </g>

  <!-- Card: HTTPS Downgrade -->
  <g transform="translate(765, 676)" filter="url(#shadow)">
    <rect x="-120" y="0" width="240" height="38" rx="8" fill="#1e1b2e" stroke="#ef4444" stroke-width="1"/>
    <rect x="-108" y="6" width="28" height="26" rx="5" fill="#ef4444" opacity="0.1"/>
    <g transform="translate(-94, 19)">
