    <text x="10" y="30" text-anchor="middle" fill="#94a3b8" font-size="8.5">HSTS&#19981;&#22312;&#12391;HTTP&#12395;&#12480;&#12454;&#12531;&#12464;&#12524;&#12540;&#12489;</text>
