<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 750" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a855f7"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="750" fill="url(#bgGrad)" rx="12"/>

  <!-- ===== Title ===== -->
  <text x="380" y="38" text-anchor="middle" fill="#f8fafc" font-size="22" font-weight="700">Security Headers Misconfiguration</text>
  <text x="380" y="58" text-anchor="middle" fill="#94a3b8" font-size="12">セキュリティヘッダー不備 &#8212; 攻撃の流れ</text>
  <rect x="265" y="66" width="230" height="20" rx="10" fill="#ef4444" opacity="0.15"/>
  <text x="380" y="80" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="600">OWASP A05 &#8212; Security Misconfiguration</text>

  <!-- ====================================================== -->
  <!--  ACTORS                                                 -->
  <!-- ====================================================== -->

  <!-- Attacker -->
  <g transform="translate(115, 250)" filter="url(#shadow)">
    <rect x="-56" y="-30" width="112" height="125" rx="12" fill="#1e1b2e" stroke="#ef4444" stroke-width="1.5"/>
    <g transform="translate(0, 10)">
      <path d="M-13,-17 Q0,-28 13,-17 L13,-4 Q0,2 -13,-4 Z" fill="none" stroke="#ef4444" stroke-width="1.8"/>
      <circle cx="-4" cy="-9" r="1.8" fill="#ef4444"/>
      <circle cx="4" cy="-9" r="1.8" fill="#ef4444"/>
      <path d="M-17,36 Q-17,14 0,10 Q17,14 17,36" fill="none" stroke="#ef4444" stroke-width="2"/>
      <line x1="-17" y1="36" x2="17" y2="36" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
    </g>
    <text x="0" y="72" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="700">&#25915;&#25731;&#32773;</text>
    <text x="0" y="86" text-anchor="middle" fill="#ef4444" font-size="9.5" opacity="0.7">Attacker</text>
  </g>

  <!-- Victim -->
  <g transform="translate(380, 250)" filter="url(#shadow)">
    <rect x="-56" y="-30" width="112" height="125" rx="12" fill="#1e1b2e" stroke="#a855f7" stroke-width="1.5"/>
    <g transform="translate(0, 10)">
      <circle cx="0" cy="-9" r="13" fill="none" stroke="#a855f7" stroke-width="1.8"/>
      <circle cx="-4" cy="-11" r="1.5" fill="#a855f7"/>
      <circle cx="4" cy="-11" r="1.5" fill="#a855f7"/>
      <path d="M-4,-4 Q0,1 4,-4" fill="none" stroke="#a855f7" stroke-width="1.3" stroke-linecap="round"/>
      <path d="M-17,36 Q-17,14 0,10 Q17,14 17,36" fill="none" stroke="#a855f7" stroke-width="2"/>
      <line x1="-17" y1="36" x2="17" y2="36" stroke="#a855f7" stroke-width="2" stroke-linecap="round"/>
    </g>
    <text x="0" y="72" text-anchor="middle" fill="#d8b4fe" font-size="13" font-weight="700">&#34987;&#23475;&#32773;</text>
    <text x="0" y="86" text-anchor="middle" fill="#a855f7" font-size="9.5" opacity="0.7">Victim</text>
  </g>

  <!-- Web Server (No Security Headers) -->
  <g transform="translate(645, 250)" filter="url(#shadow)">
    <rect x="-56" y="-30" width="112" height="125" rx="12" fill="#1e1b2e" stroke="#3b82f6" stroke-width="1.5"/>
    <g transform="translate(0, 14)">
      <rect x="-20" y="-18" width="40" height="12" rx="3" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
      <circle cx="-12" cy="-12" r="2" fill="#3b82f6"/><circle cx="-5" cy="-12" r="2" fill="#3b82f6"/>
      <rect x="-20" y="-2" width="40" height="12" rx="3" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
      <circle cx="-12" cy="4" r="2" fill="#3b82f6"/><circle cx="-5" cy="4" r="2" fill="#3b82f6"/>
      <rect x="-20" y="14" width="40" height="12" rx="3" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
      <circle cx="-12" cy="20" r="2" fill="#3b82f6"/><circle cx="-5" cy="20" r="2" fill="#3b82f6"/>
    </g>
    <text x="0" y="72" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">Web&#12469;&#12540;&#12496;&#12540;</text>
    <text x="0" y="86" text-anchor="middle" fill="#3b82f6" font-size="9.5" opacity="0.7">No Security Headers</text>
  </g>

  <!-- ====================================================== -->
  <!--  ARROWS                                                 -->
  <!-- ====================================================== -->

  <!-- Step 1: Attacker prepares iframe/MITM trap (downward from attacker) -->
  <path d="M 115 345 L 115 410" fill="none" stroke="#ef4444" stroke-width="2.2" stroke-dasharray="6,3" marker-end="url(#arrowRed)"/>
  <circle cx="139" cy="378" r="16" fill="#ef4444"/>
  <text x="139" y="383" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">1</text>

  <!-- Step 2: Victim → Vulnerable Server (access) -->
  <path d="M 436 240 L 589 240" fill="none" stroke="#a855f7" stroke-width="2.2" stroke-dasharray="8,4" marker-end="url(#arrowPurple)"/>
  <circle cx="514" cy="218" r="16" fill="#a855f7"/>
  <text x="514" y="223" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">2</text>

  <!-- Step 3: Server responds without security headers -->
  <path d="M 589 265 L 436 265" fill="none" stroke="#3b82f6" stroke-width="2.2" stroke-dasharray="8,4" marker-end="url(#arrowBlue)"/>
  <circle cx="514" cy="285" r="16" fill="#3b82f6"/>
  <text x="514" y="290" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">3</text>

  <!-- Step 4: Browser allows clickjacking/sniffing (downward from victim) -->
  <path d="M 380 345 L 380 410" fill="none" stroke="#a855f7" stroke-width="2.2" stroke-dasharray="6,3" marker-end="url(#arrowPurple)"/>
  <circle cx="404" cy="378" r="16" fill="#a855f7"/>
  <text x="404" y="383" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">4</text>

  <!-- Step 5: Attacker exploits missing protections (curve from victim area back to attacker) -->
  <path d="M 324 300 L 171 300" fill="none" stroke="#ef4444" stroke-width="2.2" stroke-dasharray="8,4" marker-end="url(#arrowRed)"/>
  <circle cx="248" cy="320" r="16" fill="#ef4444"/>
  <text x="248" y="325" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">5</text>

  <!-- ====================================================== -->
  <!--  Attacker trap box                                      -->
  <!-- ====================================================== -->
  <g transform="translate(115, 462)" filter="url(#shadow)">
    <rect x="-80" y="-28" width="160" height="80" rx="8" fill="#1e1b2e" stroke="#ef4444" stroke-width="1.2" stroke-dasharray="4,2"/>
    <rect x="-70" y="-20" width="140" height="13" rx="3" fill="#0f172a"/>
    <circle cx="-60" cy="-14" r="2.5" fill="#ef4444"/>
    <circle cx="-52" cy="-14" r="2.5" fill="#f59e0b"/>
    <circle cx="-44" cy="-14" r="2.5" fill="#22c55e"/>
    <text x="0" y="6" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="600">iframe/MITM &#32608;&#12434;&#28310;&#20633;</text>
    <text x="0" y="20" text-anchor="middle" fill="#94a3b8" font-size="8.5" font-family="'Fira Code', monospace">&lt;iframe src="target"&gt;</text>
    <text x="0" y="34" text-anchor="middle" fill="#ef4444" font-size="8.5">&#12504;&#12483;&#12480;&#12540;&#19981;&#20633;&#12434;&#21033;&#29992;&#12377;&#12427;&#25915;&#25731;</text>
    <text x="0" y="46" text-anchor="middle" fill="#94a3b8" font-size="8">HTTPS&#38477;&#26684;&#12418;&#21487;&#33021;</text>
  </g>

  <!-- Browser vulnerability box -->
  <g transform="translate(380, 462)" filter="url(#shadow)">
    <rect x="-80" y="-28" width="160" height="80" rx="8" fill="#1e1b2e" stroke="#a855f7" stroke-width="1.2" stroke-dasharray="4,2"/>
    <rect x="-70" y="-20" width="140" height="13" rx="3" fill="#0f172a"/>
    <circle cx="-60" cy="-14" r="2.5" fill="#ef4444"/>
    <circle cx="-52" cy="-14" r="2.5" fill="#f59e0b"/>
    <circle cx="-44" cy="-14" r="2.5" fill="#22c55e"/>
    <text x="0" y="6" text-anchor="middle" fill="#d8b4fe" font-size="10" font-weight="600">&#12502;&#12521;&#12454;&#12470;&#12364;&#35377;&#21487;</text>
    <text x="0" y="20" text-anchor="middle" fill="#94a3b8" font-size="8.5">&#12475;&#12461;&#12517;&#12522;&#12486;&#12451;&#12504;&#12483;&#12480;&#12540;&#12394;&#12375;</text>
    <text x="0" y="34" text-anchor="middle" fill="#ef4444" font-size="8.5">&#12463;&#12522;&#12483;&#12463;&#12472;&#12515;&#12483;&#12461;&#12531;&#12464; / MIME&#12473;&#12491;&#12501;&#12451;&#12531;&#12464;</text>
    <text x="0" y="46" text-anchor="middle" fill="#94a3b8" font-size="8">&#38450;&#24481;&#27231;&#27083;&#12364;&#26377;&#21177;&#21270;&#12373;&#12428;&#12394;&#12356;</text>
  </g>

  <!-- ===== Vulnerability callout ===== -->
  <g transform="translate(520, 165)" filter="url(#shadow)">
    <rect x="-115" y="-18" width="230" height="56" rx="8" fill="#451a03" stroke="#f97316" stroke-width="1"/>
    <text x="0" y="-1" text-anchor="middle" fill="#fdba74" font-size="11" font-weight="700">&#9888; &#12475;&#12461;&#12517;&#12522;&#12486;&#12451;&#12504;&#12483;&#12480;&#12540;&#26410;&#35373;&#23450;</text>
    <text x="0" y="16" text-anchor="middle" fill="#fb923c" font-size="9" font-family="'Fira Code', monospace">// X-Frame-Options, HSTS&#31561;&#12364;&#27424;&#22914;</text>
    <text x="0" y="30" text-anchor="middle" fill="#fed7aa" font-size="8.5">&#12502;&#12521;&#12454;&#12470;&#12398;&#38450;&#24481;&#27231;&#33021;&#12364;&#28961;&#21177;</text>
  </g>

  <!-- ===== HTTP Response code example ===== -->
  <g transform="translate(380, 570)">
    <rect x="-220" y="-18" width="440" height="46" rx="5" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="0" y="-1" text-anchor="middle" fill="#94a3b8" font-size="9.5" font-family="'Fira Code', monospace">
      <tspan fill="#3b82f6">HTTP/1.1 200 OK</tspan>
    </text>
    <text x="0" y="14" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="'Fira Code', monospace">
      <tspan fill="#64748b">Content-Type: text/html</tspan><tspan fill="#ef4444">  &#8592; &#12475;&#12461;&#12517;&#12522;&#12486;&#12451;&#12504;&#12483;&#12480;&#12540;&#12394;&#12375;</tspan>
    </text>
    <text x="0" y="24" text-anchor="middle" fill="#64748b" font-size="8" font-family="'Fira Code', monospace">
      X-Frame-Options: &#10008;  |  X-Content-Type-Options: &#10008;  |  HSTS: &#10008;
    </text>
  </g>

  <!-- ====================================================== -->
  <!--  STEP LIST (right sidebar)                              -->
  <!-- ====================================================== -->
  <g transform="translate(775, 100)">
    <rect x="0" y="0" width="305" height="340" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="152" y="28" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="700">&#25915;&#25731;&#12473;&#12486;&#12483;&#12503;&#35443;&#32048;</text>
    <line x1="16" y1="40" x2="289" y2="40" stroke="#334155" stroke-width="1"/>

    <!-- Step 1 -->
    <circle cx="34" cy="68" r="13" fill="#ef4444"/>
    <text x="34" y="73" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">1</text>
    <text x="56" y="64" fill="#f8fafc" font-size="11.5" font-weight="600">iframe/MITM&#32608;&#12434;&#28310;&#20633;</text>
    <text x="56" y="80" fill="#94a3b8" font-size="9.5">&#25915;&#25731;&#32773;&#12364;&#12463;&#12522;&#12483;&#12463;&#12472;&#12515;&#12483;&#12461;&#12531;&#12464;</text>
    <text x="56" y="93" fill="#94a3b8" font-size="9.5">&#12420;MITM&#25915;&#25731;&#12398;&#28310;&#20633;&#12434;&#34892;&#12358;</text>

    <!-- Step 2 -->
    <circle cx="34" cy="124" r="13" fill="#a855f7"/>
    <text x="34" y="129" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">2</text>
    <text x="56" y="120" fill="#f8fafc" font-size="11.5" font-weight="600">&#34987;&#23475;&#32773;&#12364;&#12469;&#12540;&#12496;&#12540;&#12395;&#12450;&#12463;&#12475;&#12473;</text>
    <text x="56" y="136" fill="#94a3b8" font-size="9.5">&#34987;&#23475;&#32773;&#12364;&#33030;&#24369;&#12394;Web&#12469;&#12540;&#12496;&#12540;</text>
    <text x="56" y="149" fill="#94a3b8" font-size="9.5">&#12395;&#36890;&#24120;&#12398;&#12522;&#12463;&#12456;&#12473;&#12488;&#12434;&#36865;&#20449;</text>

    <!-- Step 3 -->
    <circle cx="34" cy="180" r="13" fill="#3b82f6"/>
    <text x="34" y="185" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">3</text>
    <text x="56" y="176" fill="#f8fafc" font-size="11.5" font-weight="600">&#12504;&#12483;&#12480;&#12540;&#12394;&#12375;&#12391;&#24540;&#31572;</text>
    <text x="56" y="192" fill="#94a3b8" font-size="9.5">&#12469;&#12540;&#12496;&#12540;&#12364;&#12475;&#12461;&#12517;&#12522;&#12486;&#12451;</text>
    <text x="56" y="205" fill="#94a3b8" font-size="9.5">&#12504;&#12483;&#12480;&#12540;&#12394;&#12375;&#12391;&#12524;&#12473;&#12509;&#12531;&#12473;&#12434;&#36820;&#12377;</text>

    <!-- Step 4 -->
    <circle cx="34" cy="236" r="13" fill="#a855f7"/>
    <text x="34" y="241" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">4</text>
    <text x="56" y="232" fill="#f8fafc" font-size="11.5" font-weight="600">&#12502;&#12521;&#12454;&#12470;&#12364;&#25915;&#25731;&#12434;&#35377;&#21487;</text>
    <text x="56" y="248" fill="#94a3b8" font-size="9.5">&#12504;&#12483;&#12480;&#12540;&#19981;&#22312;&#12395;&#12424;&#12426;&#12502;&#12521;&#12454;&#12470;&#12364;</text>
    <text x="56" y="261" fill="#94a3b8" font-size="9.5">&#38450;&#24481;&#27231;&#33021;&#12434;&#26377;&#21177;&#21270;&#12375;&#12394;&#12356;</text>

    <!-- Step 5 -->
    <circle cx="34" cy="292" r="13" fill="#ef4444"/>
    <text x="34" y="297" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">5</text>
    <text x="56" y="288" fill="#f8fafc" font-size="11.5" font-weight="600">&#25915;&#25731;&#32773;&#12364;&#20445;&#35703;&#19981;&#36275;&#12434;&#24746;&#29992;</text>
    <text x="56" y="304" fill="#94a3b8" font-size="9.5">&#12463;&#12522;&#12483;&#12463;&#12472;&#12515;&#12483;&#12461;&#12531;&#12464;&#12420;MIME</text>
    <text x="56" y="317" fill="#94a3b8" font-size="9.5">&#12473;&#12491;&#12501;&#12451;&#12531;&#12464;&#12391;&#24773;&#22577;&#31397;&#21462;</text>
  </g>

  <!-- ====================================================== -->
  <!--  ATTACK TECHNIQUE CARDS (bottom)                        -->
  <!-- ====================================================== -->
  <line x1="30" y1="638" x2="1070" y2="638" stroke="#334155" stroke-width="1"/>
  <text x="550" y="663" text-anchor="middle" fill="#fca5a5" font-size="14" font-weight="700">&#128293; &#20351;&#29992;&#12373;&#12428;&#12427;&#25915;&#25731;&#12486;&#12463;&#12491;&#12483;&#12463;</text>

  <!-- Card: Clickjacking -->
  <g transform="translate(165, 676)" filter="url(#shadow)">
    <rect x="-120" y="0" width="240" height="38" rx="8" fill="#1e1b2e" stroke="#ef4444" stroke-width="1"/>
    <rect x="-108" y="6" width="28" height="26" rx="5" fill="#ef4444" opacity="0.1"/>
    <g transform="translate(-94, 19)">
