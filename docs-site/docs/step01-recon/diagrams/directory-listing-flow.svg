<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 320" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrowSlate" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="700" height="320" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="350" y="32" text-anchor="middle" fill="#f8fafc" font-size="18" font-weight="700">ディレクトリへのリクエスト処理フロー</text>
  <text x="350" y="50" text-anchor="middle" fill="#94a3b8" font-size="11">Directory Request Handling Flow</text>

  <!-- ===== Step 1: GET /static/ request box ===== -->
  <rect x="260" y="65" width="180" height="40" rx="10" fill="#1e1b2e" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="350" y="83" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="600">📨 リクエスト</text>
  <text x="350" y="97" text-anchor="middle" fill="#e2e8f0" font-size="10" font-weight="600">GET /static/</text>

  <!-- Arrow from request to decision -->
  <line x1="350" y1="105" x2="350" y2="135" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowSlate)"/>

  <!-- ===== Step 2: Decision diamond ===== -->
  <polygon points="350,135 450,175 350,215 250,175" fill="#1e1b2e" stroke="#f97316" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="350" y="171" text-anchor="middle" fill="#fdba74" font-size="10" font-weight="600">index.html</text>
  <text x="350" y="184" text-anchor="middle" fill="#fdba74" font-size="10" font-weight="600">が存在する？</text>

  <!-- ===== Left branch: Yes (green/safe) ===== -->
  <!-- "Yes" label -->
  <text x="228" y="170" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="700">Yes</text>
  <!-- Arrow left from diamond to safe box -->
  <line x1="250" y1="175" x2="175" y2="175" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <!-- Arrow down to safe card -->
  <line x1="105" y1="175" x2="105" y2="230" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <!-- Horizontal connector -->
  <line x1="105" y1="175" x2="175" y2="175" stroke="#22c55e" stroke-width="1.5"/>

  <!-- Safe result card -->
  <rect x="20" y="230" width="170" height="60" rx="10" fill="#1e1b2e" stroke="#22c55e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="105" y="253" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="600">✅ 安全</text>
  <text x="105" y="270" text-anchor="middle" fill="#e2e8f0" font-size="10">index.html を返す</text>
  <text x="105" y="283" text-anchor="middle" fill="#94a3b8" font-size="9">通常のページ表示</text>

  <!-- ===== Right branch: No (red/danger) ===== -->
  <!-- "No" label -->
  <text x="472" y="170" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="700">No</text>
  <!-- Arrow right from diamond to danger box -->
  <line x1="450" y1="175" x2="525" y2="175" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <!-- Horizontal connector -->
  <line x1="525" y1="175" x2="595" y2="175" stroke="#ef4444" stroke-width="1.5"/>
  <!-- Arrow down to danger card -->
  <line x1="595" y1="175" x2="595" y2="230" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrowRed)"/>

  <!-- Danger result card -->
  <rect x="500" y="230" width="190" height="70" rx="10" fill="#1e1b2e" stroke="#ef4444" stroke-width="2" filter="url(#shadow)"/>
  <!-- Pulsing danger glow -->
  <rect x="500" y="230" width="190" height="70" rx="10" fill="none" stroke="#ef4444" stroke-width="0.5" opacity="0.3"/>
  <text x="595" y="253" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="600">⚠️ 危険</text>
  <text x="595" y="270" text-anchor="middle" fill="#e2e8f0" font-size="10">ファイル一覧を表示</text>
  <text x="595" y="283" text-anchor="middle" fill="#fca5a5" font-size="9" font-weight="600">Directory Listing</text>
  <text x="595" y="296" text-anchor="middle" fill="#94a3b8" font-size="9">内部構造が攻撃者に漏洩</text>
</svg>