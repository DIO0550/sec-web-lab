<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 800" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f97316"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="800" fill="url(#bgGrad)" rx="12"/>

  <!-- ===== Title ===== -->
  <text x="380" y="38" text-anchor="middle" fill="#f8fafc" font-size="22" font-weight="700">SSRF Filter Bypass Attack Flow</text>
  <text x="380" y="58" text-anchor="middle" fill="#94a3b8" font-size="12">SSRFバイパス — ブロックリストを迂回して内部サービスにアクセス</text>
  <rect x="302" y="66" width="156" height="20" rx="10" fill="#ef4444" opacity="0.15"/>
  <text x="380" y="80" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="600">OWASP A10 — SSRF</text>

  <!-- ====================================================== -->
  <!--  ACTORS (Hierarchical: top → middle → bottom)          -->
  <!-- ====================================================== -->

  <!-- Attacker (top) -->
  <g transform="translate(380, 150)" filter="url(#shadow)">
    <rect x="-56" y="-30" width="112" height="125" rx="12" fill="#1e1b2e" stroke="#ef4444" stroke-width="1.5"/>
    <g transform="translate(0, 10)">
      <path d="M-13,-17 Q0,-28 13,-17 L13,-4 Q0,2 -13,-4 Z" fill="none" stroke="#ef4444" stroke-width="1.8"/>
      <circle cx="-4" cy="-9" r="1.8" fill="#ef4444"/>
      <circle cx="4" cy="-9" r="1.8" fill="#ef4444"/>
      <path d="M-17,36 Q-17,14 0,10 Q17,14 17,36" fill="none" stroke="#ef4444" stroke-width="2"/>
      <line x1="-17" y1="36" x2="17" y2="36" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
    </g>
    <text x="0" y="72" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="700">攻撃者</text>
    <text x="0" y="86" text-anchor="middle" fill="#ef4444" font-size="9.5" opacity="0.7">Attacker</text>
  </g>

  <!-- Web Server (middle) -->
  <g transform="translate(380, 370)" filter="url(#shadow)">
    <rect x="-56" y="-30" width="112" height="125" rx="12" fill="#1e1b2e" stroke="#3b82f6" stroke-width="1.5"/>
    <g transform="translate(0, 14)">
      <rect x="-20" y="-18" width="40" height="12" rx="3" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
      <circle cx="-12" cy="-12" r="2" fill="#3b82f6"/><circle cx="-5" cy="-12" r="2" fill="#3b82f6"/>
      <rect x="-20" y="-2" width="40" height="12" rx="3" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
      <circle cx="-12" cy="4" r="2" fill="#3b82f6"/><circle cx="-5" cy="4" r="2" fill="#3b82f6"/>
      <rect x="-20" y="14" width="40" height="12" rx="3" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
      <circle cx="-12" cy="20" r="2" fill="#3b82f6"/><circle cx="-5" cy="20" r="2" fill="#3b82f6"/>
    </g>
    <text x="0" y="72" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">Webサーバー</text>
    <text x="0" y="86" text-anchor="middle" fill="#3b82f6" font-size="9.5" opacity="0.7">Vulnerable App</text>
  </g>

  <!-- Internal Service (bottom) -->
  <g transform="translate(380, 590)" filter="url(#shadow)">
    <rect x="-56" y="-30" width="112" height="125" rx="12" fill="#1e1b2e" stroke="#f59e0b" stroke-width="1.5"/>
    <g transform="translate(0, 10)">
      <rect x="-20" y="-16" width="40" height="28" rx="4" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
      <line x1="-20" y1="-4" x2="20" y2="-4" stroke="#f59e0b" stroke-width="0.8"/>
      <line x1="-20" y1="4" x2="20" y2="4" stroke="#f59e0b" stroke-width="0.8"/>
      <circle cx="-12" cy="-10" r="2" fill="#f59e0b"/>
      <circle cx="-5" cy="-10" r="2" fill="#f59e0b"/>
      <text x="0" y="0" text-anchor="middle" fill="#f59e0b" font-size="7" font-weight="600">127.0</text>
      <text x="0" y="10" text-anchor="middle" fill="#f59e0b" font-size="7" font-weight="600">.0.1</text>
      <rect x="-8" y="18" width="16" height="11" rx="2" fill="none" stroke="#f59e0b" stroke-width="1.2"/>
      <path d="M-4,18 L-4,14 Q-4,9 0,9 Q4,9 4,14" fill="none" stroke="#f59e0b" stroke-width="1.2"/>
    </g>
    <text x="0" y="72" text-anchor="middle" fill="#fcd34d" font-size="13" font-weight="700">内部サービス</text>
    <text x="0" y="86" text-anchor="middle" fill="#f59e0b" font-size="9.5" opacity="0.7">Internal API</text>
  </g>

  <!-- ====================================================== -->
  <!--  ARROWS                                                 -->
  <!-- ====================================================== -->

  <!-- Step 1: Attacker → Server (left side, BLOCKED) — localhost試行 -->
  <path d="M 340 245 L 340 338" fill="none" stroke="#ef4444" stroke-width="2.2" stroke-dasharray="8,4" marker-end="url(#arrowRed)" opacity="0.4"/>
  <circle cx="300" cy="290" r="16" fill="#ef4444" opacity="0.5"/>
  <text x="300" y="295" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">1</text>
  <!-- BLOCKED mark on step 1 -->
  <g transform="translate(340, 290)">
    <circle cx="0" cy="0" r="12" fill="#451a03" stroke="#f97316" stroke-width="1.5"/>
    <line x1="-4" y1="-4" x2="4" y2="4" stroke="#f97316" stroke-width="2" stroke-linecap="round"/>
    <line x1="4" y1="-4" x2="-4" y2="4" stroke="#f97316" stroke-width="2" stroke-linecap="round"/>
  </g>
  <text x="260" y="270" text-anchor="middle" fill="#fca5a5" font-size="9" opacity="0.6">localhost → BLOCKED</text>

  <!-- Step 2: Attacker → Server (right side) — バイパスURL送信 -->
  <path d="M 420 245 L 420 338" fill="none" stroke="#ef4444" stroke-width="2.2" stroke-dasharray="8,4" marker-end="url(#arrowRed)"/>
  <circle cx="460" cy="290" r="16" fill="#ef4444"/>
  <text x="460" y="295" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">2</text>
  <text x="510" y="270" text-anchor="middle" fill="#fca5a5" font-size="9" font-weight="600">0x7f000001で迂回</text>

  <!-- Step 3: Server validates (no match in blocklist) — shown as text annotation -->
  <circle cx="490" cy="370" r="16" fill="#3b82f6"/>
  <text x="490" y="375" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">3</text>
  <text x="560" y="375" fill="#93c5fd" font-size="9" font-weight="600">フィルタ通過</text>

  <!-- Step 4: Server → Internal Service — 内部リクエスト -->
  <path d="M 380 465 L 380 558" fill="none" stroke="#3b82f6" stroke-width="2.2" marker-end="url(#arrowBlue)"/>
  <circle cx="420" cy="510" r="16" fill="#3b82f6"/>
  <text x="420" y="515" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">4</text>
  <text x="485" y="515" fill="#93c5fd" font-size="9" font-weight="600">127.0.0.1へリクエスト</text>

  <!-- Step 5: Internal → Server → Attacker (response back up) -->
  <path d="M 340 558 L 340 465" fill="none" stroke="#f59e0b" stroke-width="2.2" marker-end="url(#arrowOrange)"/>
  <circle cx="300" cy="510" r="16" fill="#f59e0b"/>
  <text x="300" y="515" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">5</text>
  <text x="265" y="535" text-anchor="middle" fill="#fdba74" font-size="9" font-weight="600">機密データ返却</text>

  <!-- ===== Vulnerability callout ===== -->
  <g transform="translate(160, 390)" filter="url(#shadow)">
    <rect x="-120" y="-18" width="240" height="62" rx="8" fill="#451a03" stroke="#f97316" stroke-width="1"/>
    <text x="0" y="-1" text-anchor="middle" fill="#fdba74" font-size="11" font-weight="700">⚠ 文字列ベースのブロックリスト</text>
    <text x="0" y="16" text-anchor="middle" fill="#fb923c" font-size="9" font-family="'Fira Code', monospace">url.includes('localhost')</text>
    <text x="0" y="30" text-anchor="middle" fill="#fed7aa" font-size="8.5">0x7f000001, [::1] 等の代替表記を見逃す</text>
  </g>

  <!-- ===== Bypass techniques box ===== -->
  <g transform="translate(160, 530)" filter="url(#shadow)">
    <rect x="-120" y="-18" width="240" height="72" rx="8" fill="#1e1b2e" stroke="#ef4444" stroke-width="1" stroke-dasharray="4,2"/>
    <text x="0" y="-2" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="600">バイパス手法一覧</text>
    <text x="0" y="14" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="'Fira Code', monospace">127.0.0.1  |  0x7f000001</text>
    <text x="0" y="28" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="'Fira Code', monospace">[::1]      |  0177.0.0.1</text>
    <text x="0" y="42" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="'Fira Code', monospace">2130706433 |  127.1</text>
  </g>

  <!-- ====================================================== -->
  <!--  STEP LIST (right sidebar)                              -->
  <!-- ====================================================== -->
  <g transform="translate(775, 100)">
    <rect x="0" y="0" width="305" height="320" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="152" y="28" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="700">攻撃ステップ詳細</text>
    <line x1="16" y1="40" x2="289" y2="40" stroke="#334155" stroke-width="1"/>

    <!-- Step 1 -->
    <circle cx="34" cy="68" r="13" fill="#ef4444" opacity="0.5"/>
    <text x="34" y="73" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">1</text>
    <text x="56" y="64" fill="#f8fafc" font-size="11.5" font-weight="600">localhost直接指定 (失敗)</text>
    <text x="56" y="80" fill="#94a3b8" font-size="9.5">url=http://localhost を送信</text>
    <text x="56" y="93" fill="#94a3b8" font-size="9.5">→ ブロックリストで拒否される</text>

    <!-- Step 2 -->
    <circle cx="34" cy="124" r="13" fill="#ef4444"/>
    <text x="34" y="129" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">2</text>
    <text x="56" y="120" fill="#f8fafc" font-size="11.5" font-weight="600">代替表記でバイパス</text>
    <text x="56" y="136" fill="#94a3b8" font-size="9.5">url=http://0x7f000001 を送信</text>
    <text x="56" y="149" fill="#94a3b8" font-size="9.5">16進数IPでフィルタを迂回</text>

    <!-- Step 3 -->
    <circle cx="34" cy="180" r="13" fill="#3b82f6"/>
    <text x="34" y="185" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">3</text>
    <text x="56" y="176" fill="#f8fafc" font-size="11.5" font-weight="600">フィルタ通過</text>
    <text x="56" y="192" fill="#94a3b8" font-size="9.5">文字列マッチに一致しないため</text>
    <text x="56" y="205" fill="#94a3b8" font-size="9.5">バリデーションを通過</text>

    <!-- Step 4 -->
    <circle cx="34" cy="236" r="13" fill="#3b82f6"/>
    <text x="34" y="241" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">4</text>
    <text x="56" y="232" fill="#f8fafc" font-size="11.5" font-weight="600">内部サービスへリクエスト</text>
    <text x="56" y="248" fill="#94a3b8" font-size="9.5">0x7f000001が127.0.0.1に解決され</text>
    <text x="56" y="261" fill="#94a3b8" font-size="9.5">サーバーが内部にリクエスト送信</text>

    <!-- Step 5 -->
    <circle cx="34" cy="292" r="13" fill="#f59e0b"/>
    <text x="34" y="297" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">5</text>
    <text x="56" y="288" fill="#f8fafc" font-size="11.5" font-weight="600">機密データの漏洩</text>
    <text x="56" y="304" fill="#94a3b8" font-size="9.5">内部サービスが機密データを返却</text>
    <text x="56" y="317" fill="#94a3b8" font-size="9.5">攻撃者にレスポンスが到達</text>
  </g>

  <!-- ====================================================== -->
  <!--  ATTACK TECHNIQUE CARDS (bottom)                        -->
  <!-- ====================================================== -->
  <line x1="30" y1="710" x2="1070" y2="710" stroke="#334155" stroke-width="1"/>
  <text x="550" y="735" text-anchor="middle" fill="#fca5a5" font-size="14" font-weight="700">使用される攻撃テクニック</text>

  <!-- Card: 代替表記 -->
  <g transform="translate(165, 748)" filter="url(#shadow)">
    <rect x="-120" y="0" width="240" height="38" rx="8" fill="#1e1b2e" stroke="#ef4444" stroke-width="1"/>
    <rect x="-108" y="6" width="28" height="26" rx="5" fill="#ef4444" opacity="0.1"/>
    <g transform="translate(-94, 19)">
      <text x="0" y="4" text-anchor="middle" fill="#ef4444" font-size="8" font-weight="700">0x7f</text>
    </g>
    <text x="10" y="16" text-anchor="middle" fill="#f8fafc" font-size="11" font-weight="600">代替表記</text>
    <text x="10" y="30" text-anchor="middle" fill="#94a3b8" font-size="8.5">16進・8進・省略形でフィルタ迂回</text>
  </g>

  <!-- Card: DNSリバインド -->
  <g transform="translate(465, 748)" filter="url(#shadow)">
    <rect x="-120" y="0" width="240" height="38" rx="8" fill="#1e1b2e" stroke="#ef4444" stroke-width="1"/>
    <rect x="-108" y="6" width="28" height="26" rx="5" fill="#ef4444" opacity="0.1"/>
    <g transform="translate(-94, 19)">
      <path d="M-7,0 L0,-7 L7,0 L0,7 Z" fill="none" stroke="#ef4444" stroke-width="1.2"/>
      <circle cx="0" cy="0" r="2" fill="#ef4444"/>
    </g>
    <text x="10" y="16" text-anchor="middle" fill="#f8fafc" font-size="11" font-weight="600">DNSリバインド</text>
    <text x="10" y="30" text-anchor="middle" fill="#94a3b8" font-size="8.5">DNS応答を操作しIP検証を回避</text>
  </g>

  <!-- Card: URLパーサ悪用 -->
  <g transform="translate(765, 748)" filter="url(#shadow)">
    <rect x="-120" y="0" width="240" height="38" rx="8" fill="#1e1b2e" stroke="#ef4444" stroke-width="1"/>
    <rect x="-108" y="6" width="28" height="26" rx="5" fill="#ef4444" opacity="0.1"/>
    <g transform="translate(-94, 19)">
      <text x="0" y="4" text-anchor="middle" fill="#ef4444" font-size="10" font-weight="700">&lt;/&gt;</text>
    </g>
    <text x="10" y="16" text-anchor="middle" fill="#f8fafc" font-size="11" font-weight="600">URLパーサ悪用</text>
    <text x="10" y="30" text-anchor="middle" fill="#94a3b8" font-size="8.5">URL解析の差異を突いて迂回</text>
  </g>

  <!-- ===== Legend ===== -->
  <g transform="translate(775, 445)">
    <rect x="0" y="0" width="305" height="68" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="14" y="18" fill="#94a3b8" font-size="10" font-weight="600">凡例</text>
    <line x1="14" y1="34" x2="44" y2="34" stroke="#ef4444" stroke-width="2" stroke-dasharray="6,3"/>
    <text x="52" y="38" fill="#fca5a5" font-size="9.5">攻撃通信</text>
    <line x1="152" y1="34" x2="182" y2="34" stroke="#3b82f6" stroke-width="2"/>
    <text x="190" y="38" fill="#93c5fd" font-size="9.5">サーバー通信</text>
    <line x1="14" y1="54" x2="44" y2="54" stroke="#f59e0b" stroke-width="2"/>
    <text x="52" y="58" fill="#fdba74" font-size="9.5">内部サービス応答</text>
    <rect x="152" y="48" width="12" height="12" rx="2" fill="#451a03" stroke="#f97316" stroke-width="0.8"/>
    <text x="170" y="58" fill="#fdba74" font-size="9.5">脆弱性ポイント</text>
  </g>

</svg>